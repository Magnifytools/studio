// ════════════════════════════════════════════
// PRESENTACION — PPTX BUILDERS
// Layout: LAYOUT_WIDE 13.33 x 7.5 in
// ════════════════════════════════════════════

const PPTX_W = 13.33, PPTX_H = 7.5;
const COLOR_DARK = '0A0A0A', COLOR_YELLOW = 'FFD600', COLOR_WHITE = 'FFFFFF';
const COLOR_LIGHT_TEXT = 'F0F0F0', COLOR_GREY = '999999', COLOR_GREY_DK = '444444';
const FONT_SERIF = 'DM Serif Display', FONT_SANS = 'Inter';

// Convert [highlight] syntax to pptxgenjs rich text array.
// bgMode: 'light' (default), 'dark', or 'yellow' — determines highlight treatment since Keynote doesn't render OOXML highlight reliably.
function richWithHighlights(text, baseOpts, bgMode) {
  bgMode = bgMode || 'light';
  const parts = [];
  const re = /\[([^\]]+)\]/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ text: text.slice(last, m.index), options: baseOpts });
    let hlOpts;
    if (bgMode === 'dark') {
      hlOpts = { ...baseOpts, color: COLOR_YELLOW, bold: true };
    } else if (bgMode === 'yellow') {
      hlOpts = { ...baseOpts, color: COLOR_DARK, bold: true, italic: true };
    } else {
      // light: yellow highlight background + dark text = "stamp" style matching
      // the HTML preview. Olive (#B8A000) solid yellow without backgroundfill reads
      // muddy on white; the stamp treatment preserves the editorial brand.
      hlOpts = { ...baseOpts, color: COLOR_DARK, bold: true, highlight: COLOR_YELLOW };
    }
    // Extract trailing punctuation from the highlight so the bold/yellow run doesn't include it — punctuation stays in the normal baseOpts run.
    const inner = m[1];
    const punctMatch = inner.match(/^(.*?)([.,;:!?]+)$/);
    if (punctMatch) {
      parts.push({ text: punctMatch[1], options: hlOpts });
      parts.push({ text: punctMatch[2], options: baseOpts });
    } else {
      parts.push({ text: inner, options: hlOpts });
    }
    last = re.lastIndex;
  }
  if (last < text.length) parts.push({ text: text.slice(last), options: baseOpts });
  return parts.length ? parts : [{ text: text, options: baseOpts }];
}

function stripBrackets(text) {
  return (text || '').replace(/\[([^\]]+)\]/g, '$1');
}

function wordmarkDataUri(color) {
  // Same intrinsic-ratio fix as iconDataUri — explicit width/height so <img> knows the aspect.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="178" viewBox="348 620 2140 178"><path fill="${color}" d="${WORDMARK_PATH}"/></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}
function iconDataUri(color) {
  // Explicit width/height attributes on the SVG root — needed so <img> gets the correct intrinsic aspect ratio (155:178). Without them, browsers default to 300x150 which distorts the A-mark.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="155" height="178" viewBox="65 52 155 178"><polygon fill="${color}" points="${ICON_POINTS}"/></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}

function addFooterDk(slide) {
  slide.addImage({ data: iconDataUri('#FAFAFA'), x: 0.7, y: 6.85, w: 0.42, h: 0.48 });
  slide.addText([
    { text: 'magnify.', options: { color: 'DDDDDD' } },
    { text: 'ing', options: { color: COLOR_YELLOW, bold: true } }
  ], { x: 10.5, y: 6.95, w: 2.5, h: 0.35, fontFace: FONT_SANS, fontSize: 14, align: 'right', charSpacing: 2 });
}

function addFooterLt(slide) {
  slide.addImage({ data: iconDataUri('#0A0A0A'), x: 0.7, y: 6.85, w: 0.42, h: 0.48 });
  slide.addText([
    { text: 'magnify.', options: { color: '444444' } },
    { text: 'ing', options: { color: COLOR_YELLOW, bold: true } }
  ], { x: 10.5, y: 6.95, w: 2.5, h: 0.35, fontFace: FONT_SANS, fontSize: 14, align: 'right', charSpacing: 2 });
}

function buildPptxPortada(pptx, d, g) {
  const s = pptx.addSlide();
  s.background = { color: COLOR_DARK };

function buildPptxCuadrante(pptx, d) {
  const s = pptx.addSlide();

  s.addText(d.subtitulo || '', { x: 0.7, y: 0.9, w: 10, h: 0.65, fontFace: FONT_SERIF, fontSize: 32, color: COLOR_DARK });

  const gridX = 1.5, gridY = 2, cellW = 5.4, cellH = 2.0;
  const positions = [
    { n: 1, x: gridX, y: gridY },
    { n: 2, x: gridX + cellW + 0.1, y: gridY },
    { n: 3, x: gridX, y: gridY + cellH + 0.1 },
    { n: 4, x: gridX + cellW + 0.1, y: gridY + cellH + 0.1 }
  ];
  positions.forEach(p => {
    const hl = (d[`q${p.n}_highlight`] || '').toLowerCase() === 'si';
    const dim = (d[`q${p.n}_dimmed`] || '').toLowerCase() === 'si';
    const fill = hl ? COLOR_YELLOW : COLOR_WHITE;
    const border = hl ? COLOR_YELLOW : 'EEEEEE';
    const textColor = dim ? 'BBBBBB' : COLOR_DARK;
    s.addShape(pptx.ShapeType.rect, { x: p.x, y: p.y, w: cellW, h: cellH, fill: { color: fill }, line: { color: border, width: 2 } });
    s.addText(d[`q${p.n}_nombre`] || '', { x: p.x + 0.25, y: p.y + 0.2, w: cellW - 0.5, h: 0.6, fontFace: FONT_SERIF, fontSize: 24, color: textColor });
    s.addText(d[`q${p.n}_desc`] || '', { x: p.x + 0.25, y: p.y + 0.85, w: cellW - 0.5, h: 0.8, fontFace: FONT_SANS, fontSize: 15, color: dim ? 'CCCCCC' : '444444' });
    if (d[`q${p.n}_tag`]) {
      s.addText(d[`q${p.n}_tag`], { x: p.x + 0.25, y: p.y + cellH - 0.45, w: cellW - 0.5, h: 0.3, fontFace: FONT_SANS, fontSize: 12, color: dim ? 'CCCCCC' : '666666', bold: true, charSpacing: 2 });
    }
  });
  // Axis labels
  s.addText(d.eje_y || '', { x: 0.25, y: gridY + cellH - 0.25, w: 1.2, h: 0.4, fontFace: FONT_SANS, fontSize: 12, color: '666666', bold: true, charSpacing: 2, align: 'center' });
  s.addText(d.eje_x || '', { x: gridX, y: gridY + cellH * 2 + 0.25, w: cellW * 2 + 0.1, h: 0.4, fontFace: FONT_SANS, fontSize: 12, color: '666666', bold: true, charSpacing: 2, align: 'center' });
  addFooterLt(s);
}

function buildPptxTimeline(pptx, d) {
  const s = pptx.addSlide();
  s.background = { color: COLOR_WHITE };
  s.addText(d.titular || d.titulo || 'Timeline', { x: 0.7, y: 0.5, w: 11.9, h: 1, fontFace: FONT_SERIF, fontSize: 42, color: COLOR_DARK });
  const fases = [];
  for (let i = 1; i <= 4; i++) {
    if (d[`fase${i}_titulo`] || d[`fase${i}_etiqueta`]) {
      fases.push({ et: d[`fase${i}_etiqueta`] || '', ti: d[`fase${i}_titulo`] || '', du: d[`fase${i}_duracion`] || '' });
    }
  }
  const fW = (11.9 - (fases.length - 1) * 0.3) / fases.length;
  fases.forEach((f, i) => {
    const fx = 0.7 + i * (fW + 0.3);
    const m = f.et.match(/^(.+?)(\.ING)$/i);
    const etRich = m ? [
      { text: m[1], options: { fontFace: FONT_SANS, fontSize: 16, color: COLOR_DARK, bold: true, charSpacing: 2 } },
      { text: m[2], options: { fontFace: FONT_SANS, fontSize: 16, color: 'B8A000', bold: true, charSpacing: 2 } }
    ] : [{ text: f.et, options: { fontFace: FONT_SANS, fontSize: 16, color: COLOR_DARK, bold: true, charSpacing: 2 } }];
    s.addText(etRich, { x: fx, y: 2.3, w: fW, h: 0.45 });
    s.addText(f.ti, { x: fx, y: 2.85, w: fW, h: 1.3, fontFace: FONT_SERIF, fontSize: 28, color: COLOR_DARK });
    s.addText(f.du, { x: fx, y: 4.3, w: fW, h: 0.45, fontFace: FONT_SANS, fontSize: 16, color: '444444' });
    s.addShape(pptx.ShapeType.rect, { x: fx, y: 4.95, w: fW, h: 0.08, fill: { color: COLOR_YELLOW }, line: { color: COLOR_YELLOW } });
  });
  addFooterLt(s);
}

// ════════════════════════════════════════════
// CHARLA — PPTX builders (pragmatic, text-first)
// Image-heavy slides embed the uploaded image when available; otherwise
// they degrade to a monochrome card with text. PPTX doesn't render
// layered scrim gradients reliably, so captions sit on an opaque shape.
// ════════════════════════════════════════════

function addTopMetaPptx(slide, g, onColor) {
  if (!g) return;
  const handle = (g.evento_handle || '').trim();
  const nombre = (g.evento_nombre || '').trim();
  const logoRef = (g.evento_logo || '').trim();
  const logoSrc = uploadedImages[logoRef];
  const color = onColor || COLOR_GREY;
  if (logoSrc) {
    slide.addImage({ data: logoSrc, x: 0.7, y: 0.42, w: 1.8, h: 0.4, sizing: { type: 'contain', w: 1.8, h: 0.4 } });
  } else if (nombre) {
    slide.addText(nombre, { x: 0.7, y: 0.45, w: 6, h: 0.35, fontFace: FONT_SANS, fontSize: 14, color, charSpacing: 1.2 });
  }
  if (handle) {
    slide.addText(handle, { x: 7, y: 0.45, w: 5.63, h: 0.35, fontFace: FONT_SANS, fontSize: 14, color, align: 'right', bold: true });
  }
}

// Brand icon placement: kept tucked into the lower-left corner and smaller than
// before so it doesn't collide with caption bodies. Call sites pass `skip:true`
// when the slide content (image panes, grids) already fills that zone.
function addBrandIcon(slide, opts) {
  if (opts && opts.skip) return;
  slide.addImage({ data: iconDataUri('#FAFAFA'), x: 0.55, y: 6.95, w: 0.32, h: 0.37 });
}

function addBrandIconLt(slide, opts) {
  if (opts && opts.skip) return;
  slide.addImage({ data: iconDataUri('#0A0A0A'), x: 0.55, y: 6.95, w: 0.32, h: 0.37 });
}

function addPaginator(slide, n, tot, color) {
  if (!PS_PAGINATION_ENABLED) return;
  if (!n || !tot) return;
  slide.addText(`${String(n).padStart(2, '0')} / ${String(tot).padStart(2, '0')}`, {
    x: 10.8, y: 6.75, w: 2, h: 0.35, fontFace: FONT_SANS, fontSize: 14, color: color || COLOR_GREY, align: 'right', charSpacing: 1.2
  });
}

function surfaceBg(d, defaultDk) {
  if (d.fondo === 'amarillo') return { bg: COLOR_YELLOW, fg: COLOR_DARK, meta: '444444' };
  if (d.fondo === 'claro') return { bg: 'FFFFFF', fg: COLOR_DARK, meta: '666666' };
  if (d.fondo === 'oscuro' || defaultDk) return { bg: COLOR_DARK, fg: COLOR_LIGHT_TEXT, meta: COLOR_GREY };
  return { bg: 'FFFFFF', fg: COLOR_DARK, meta: '666666' };
}

function buildPptxHero(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  const eyebrow = d.eyebrow || d.kicker || (g.evento_nombre ? g.evento_nombre.toUpperCase() : '');
  if (eyebrow) s.addText(eyebrow, { x: 0.7, y: 3.8, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 16, color: surf.meta, charSpacing: 2 });
  s.addText(richWithHighlights(d.titular || g.titulo || 'Titulo', { fontFace: FONT_SERIF, fontSize: 72, color: surf.fg }, d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark')),
    { x: 0.7, y: 4.2, w: 12, h: 1.6, valign: 'top' });
  s.addShape(pptx.ShapeType.rect, { x: 0.7, y: 5.9, w: 0.6, h: 0.02, fill: { color: COLOR_YELLOW }, line: { color: COLOR_YELLOW } });
  const meta = [d.autor || g.autor, d.fecha || g.fecha].filter(Boolean).join(' · ');
  if (meta) s.addText(meta, { x: 0.7, y: 6.1, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 18, color: surf.fg });
  surf.fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxAgenda(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  s.addText(d.eyebrow || 'AGENDA', { x: 0.7, y: 1.2, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 16, color: surf.meta, charSpacing: 2 });
  s.addText(richWithHighlights(d.titular || 'Agenda', { fontFace: FONT_SERIF, fontSize: 56, color: surf.fg }, d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark')),
    { x: 0.7, y: 1.7, w: 12, h: 0.9 });
  const items = [];
  for (let i = 1; i <= 6; i++) if (d['item' + i]) items.push(d['item' + i]);
  const active = parseInt(d.activo || '1', 10);
  items.forEach((it, i) => {
    const y = 3.1 + i * 0.6;
    const numColor = (i + 1 === active) ? COLOR_YELLOW : (surf.fg === COLOR_DARK ? '777777' : COLOR_GREY);
    s.addText(String(i + 1).padStart(2, '0'), { x: 0.7, y, w: 1, h: 0.5, fontFace: FONT_SERIF, fontSize: 28, color: numColor });
    s.addText(it, { x: 1.8, y, w: 10, h: 0.5, fontFace: FONT_SANS, fontSize: 24, color: surf.fg });
  });
  surf.fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxManifiesto(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const useYellow = d.fondo !== 'oscuro' && d.fondo !== 'claro';
  const bg = useYellow ? COLOR_YELLOW : (d.fondo === 'claro' ? 'FFFFFF' : COLOR_DARK);
  const fg = useYellow || d.fondo === 'claro' ? COLOR_DARK : COLOR_LIGHT_TEXT;
  s.background = { color: bg };
  addTopMetaPptx(s, g, useYellow ? '444444' : COLOR_GREY);
  const mode = useYellow ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark');
  const raw = (d.titular || d.frase || '').replace(/\s+/g, ' ').trim();
  // Scale font by content length. With the fallback font (no DM Serif Display installed),
  // each glyph is ~1.3× wider than intended, so we size conservatively to avoid overflow.
  const len = raw.length;
  const size = len < 30 ? 80 : len < 60 ? 64 : len < 100 ? 52 : 42;
  s.addText(richWithHighlights((d.titular || d.frase || ''), { fontFace: FONT_SERIF, fontSize: size, color: fg, italic: true }, mode),
    { x: 0.7, y: 1.2, w: 11.9, h: 5.3, valign: 'middle', align: 'left' });
  fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, useYellow ? '444444' : COLOR_GREY);
}

function buildPptxDivisorC(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const useYellow = d.fondo !== 'oscuro' && d.fondo !== 'claro';
  const bg = useYellow ? COLOR_YELLOW : (d.fondo === 'claro' ? 'FFFFFF' : COLOR_DARK);
  const fg = useYellow || d.fondo === 'claro' ? COLOR_DARK : COLOR_LIGHT_TEXT;
  s.background = { color: bg };
  addTopMetaPptx(s, g, useYellow ? '444444' : COLOR_GREY);
  s.addText(d.numero || '01', { x: 0.5, y: 1.6, w: 6, h: 4.5, fontFace: FONT_SERIF, fontSize: 280, color: fg, align: 'center', valign: 'middle' });
  s.addShape(pptx.ShapeType.rect, { x: 6.5, y: 2.5, w: 0.02, h: 2.5, fill: { color: fg }, line: { color: fg } });
  s.addText((d.eyebrow || 'ACTO').toUpperCase(), { x: 7, y: 3, w: 5.5, h: 0.4, fontFace: FONT_SANS, fontSize: 16, color: fg, charSpacing: 2 });
  s.addText(richWithHighlights(d.titulo || d.titular || '', { fontFace: FONT_SERIF, fontSize: 60, color: fg }, useYellow ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark')),
    { x: 7, y: 3.6, w: 5.5, h: 2 });
  fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, useYellow ? '444444' : COLOR_GREY);
}

function buildPptxStandard(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  const mode = d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark');
  if (d.eyebrow) s.addText(d.eyebrow, { x: 0.7, y: 1.5, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 16, color: surf.meta, charSpacing: 2 });
  s.addText(richWithHighlights((d.titular || '').replace(/\n/g, '\n'), { fontFace: FONT_SERIF, fontSize: 52, color: surf.fg }, mode),

function buildPptxStatHero(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  const mode = d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark');
  // Combine numero + sufijo cleanly. parseBlock already strips surrounding quotes.
  const num = (d.numero || '0').toString();
  const suf = (d.sufijo || '').toString();
  const statText = num + suf;
  // Shrink the number size when the combined string is long (e.g. "3.4×", "8:1") so it fits the column.
  const statSize = statText.length <= 3 ? 180 : statText.length <= 5 ? 140 : 110;
  s.addText(statText, { x: 0.4, y: 1.8, w: 5.8, h: 3.8, fontFace: FONT_SERIF, fontSize: statSize, color: d.fondo === 'amarillo' ? COLOR_DARK : COLOR_YELLOW, align: 'center', valign: 'middle' });
  if (d.eyebrow) s.addText(d.eyebrow, { x: 6.4, y: 2, w: 6, h: 0.4, fontFace: FONT_SANS, fontSize: 16, color: surf.meta, charSpacing: 2 });
  const descLen = (d.descripcion || '').length;
  const descSize = descLen < 80 ? 28 : descLen < 140 ? 22 : 18;
  s.addText(richWithHighlights(d.descripcion || '', { fontFace: FONT_SERIF, fontSize: descSize, color: surf.fg }, mode),
    { x: 6.4, y: 2.55, w: 6.3, h: 3 });
  if (d.fuente) s.addText(d.fuente, { x: 6.4, y: 5.7, w: 6, h: 0.4, fontFace: FONT_SANS, fontSize: 14, color: surf.meta });
  surf.fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxCompare(pptx, d, g, n, tot) {
  const s = pptx.addSlide();

  // Compute title size based on length so multi-line titles don't collide with content.
  const titleLen = (d.titular || '').length;
  const titleSize = titleLen < 50 ? 34 : titleLen < 90 ? 28 : 24;
  s.addText(richWithHighlights(d.titular || '', { fontFace: FONT_SERIF, fontSize: titleSize, color: surf.fg }, d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark')),
    { x: 0.7, y: 0.95, w: 12, h: 1.4, align: 'center', valign: 'top' });
  const a = [], b = [];
  for (let i = 1; i <= 6; i++) { if (d['a' + i]) a.push(d['a' + i]); if (d['b' + i]) b.push(d['b' + i]); }
  const topList = 3.2;
  const rowH = 1.15; // generous: accommodates 2-line bullets without overlap
  const itemSize = 18;
  s.addText((d.label_a || 'MODELO TRADICIONAL').toUpperCase(), { x: 0.9, y: 2.55, w: 5.5, h: 0.4, fontFace: FONT_SANS, fontSize: 15, color: surf.meta, charSpacing: 2 });
  s.addText((d.label_b || 'MAGNIFY').toUpperCase(), { x: 7, y: 2.55, w: 5.5, h: 0.4, fontFace: FONT_SANS, fontSize: 15, color: COLOR_YELLOW, charSpacing: 2 });
  s.addShape(pptx.ShapeType.rect, { x: 6.65, y: 3, w: 0.02, h: Math.max(a.length, b.length) * rowH + 0.2, fill: { color: surf.meta, transparency: 70 }, line: { color: surf.meta } });
  a.forEach((t, i) => s.addText(t, { x: 0.9, y: topList + i * rowH, w: 5.5, h: rowH - 0.1, fontFace: FONT_SANS, fontSize: itemSize, color: surf.fg, valign: 'top' }));
  b.forEach((t, i) => s.addText(t, { x: 7, y: topList + i * rowH, w: 5.5, h: rowH - 0.1, fontFace: FONT_SANS, fontSize: itemSize, color: surf.fg, valign: 'top' }));
  surf.fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxFramework(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  s.addText(richWithHighlights(d.titular || '', { fontFace: FONT_SERIF, fontSize: 40, color: surf.fg }, d.fondo === 'amarillo' ? 'yellow' : 'dark'),
    { x: 0.7, y: 1.3, w: 12, h: 0.9 });
  const steps = [];
  for (let i = 1; i <= 4; i++) {
    const lbl = d[`paso${i}_label`] || d[`paso${i}_etiqueta`] || '';
    const desc = d[`paso${i}_titulo`] || d[`paso${i}_descripcion`] || '';
    if (lbl || desc) steps.push({ i, lbl, desc });
  }
  const four = steps.length >= 4;
  const colW = four ? 3.1 : 4.2;
  const numSize = four ? 100 : 130;
  const descSize = four ? 16 : 20;
  steps.forEach((st, idx) => {
    const x = 0.7 + idx * (colW + (four ? 0.1 : 0));
    s.addText(String(st.i).padStart(2, '0'), { x, y: 3, w: colW, h: 1.8, fontFace: FONT_SERIF, fontSize: numSize, color: COLOR_YELLOW });
    s.addText(st.lbl, { x, y: 4.5, w: colW, h: 0.4, fontFace: FONT_SANS, fontSize: 14, color: COLOR_YELLOW, charSpacing: 2, bold: true });
    s.addText(st.desc, { x, y: 4.95, w: colW, h: 1.5, fontFace: FONT_SANS, fontSize: descSize, color: surf.fg });
  });
  surf.fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxEquipo(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  s.addText(richWithHighlights(d.titular || 'El equipo', { fontFace: FONT_SERIF, fontSize: 36, color: surf.fg }, 'dark'),
    { x: 0.7, y: 1.3, w: 12, h: 0.8 });
  const members = [];
  for (let i = 1; i <= 8; i++) if (d[`persona${i}_nombre`]) members.push({ name: d[`persona${i}_nombre`], role: d[`persona${i}_rol`] || '', foto: d[`persona${i}_foto`] });
  const cols = Math.min(members.length, 4);
  const cardW = 11.5 / cols;
  members.slice(0, 8).forEach((m, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 0.7 + col * cardW, y = 2.5 + row * 2.8;
    const src = uploadedImages[m.foto];

function buildPptxStatsCharla(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta);
  if (d.titular) s.addText(richWithHighlights(d.titular, { fontFace: FONT_SERIF, fontSize: 40, color: surf.fg }, 'dark'),
    { x: 0.7, y: 1.1, w: 12, h: 0.9 });
  // hi semántico: si/negativo = rojo, positivo = amarillo realzado (B11).
  const hiColor = (v) => {
    const x = (v || '').toLowerCase().trim();
    if (['si', 'yes', 'true', 'negativo', 'neg', '1'].includes(x)) return 'D32F2F';
    if (['positivo', 'pos', 'ok', 'good'].includes(x)) return COLOR_YELLOW;
    return null;
  };
  const cells = [];
  for (let i = 1; i <= 4; i++) {
    if (d[`num${i}`] || d[`desc${i}`]) {
      cells.push({
        num: d[`num${i}`] || '',
        lbl: d[`label${i}`] || '',
        desc: d[`desc${i}`] || '',
        hi: hiColor(d[`hi${i}`])
      });
    }
  }
  const layout = (d.layout || '').toLowerCase();
  const cols = cells.length === 3 ? 3 : (cells.length === 4 && (layout === '2x2' || !layout.includes('x')) ? 2 : (cells.length >= 4 ? 4 : 2));
  const rows = Math.ceil(cells.length / cols);
  // Geometría: reservamos y:6.7-7.0 para la fuente (.src). El grid nunca se mete ahí.
  // En 2x2 antes las celdas ocupaban hasta y:6.9 y la fuente aparecía ENCIMA de las celdas
  // inferiores. Ahora cellH en 2x2 se reduce a 1.7 para que el grid acabe en y:6.4 con aire.
  const gridTop = 2.3;
  const cellH = rows === 1 ? 4.2 : 1.8;
  const rowGap = 0.25;
  const cellW = 11.6 / cols;
  const numSize = cols === 4 ? 68 : (cols === 3 ? 96 : 110);
  cells.forEach((c, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 0.7 + col * cellW;
    const y = gridTop + row * (cellH + rowGap);
    const numColor = c.hi || (surf.fg === COLOR_DARK ? '888800' : COLOR_YELLOW);
    s.addText(c.num, { x, y, w: cellW - 0.3, h: cellH * 0.55, fontFace: FONT_SERIF, fontSize: numSize, color: numColor });
    if (c.lbl) s.addText(c.lbl.toUpperCase(), { x, y: y + cellH * 0.6, w: cellW - 0.3, h: 0.3, fontFace: FONT_SANS, fontSize: 13, color: COLOR_YELLOW, charSpacing: 2, bold: true });
    if (c.desc) s.addText(c.desc, { x, y: y + cellH * 0.78, w: cellW - 0.3, h: cellH * 0.22, fontFace: FONT_SANS, fontSize: cols === 4 ? 13 : 15, color: surf.fg });
  });
  if (d.fuente) s.addText(d.fuente, { x: 0.7, y: 6.85, w: 12, h: 0.3, fontFace: FONT_SANS, fontSize: 13, color: surf.meta });
  surf.fg === COLOR_DARK ? addBrandIconLt(s) : addBrandIcon(s);
  addPaginator(s, n, tot, surf.meta);
}

function generatePresentacion(raw, preview, renderC) {
  const { global, sections } = parseMultiDoc(raw);
  if (sections.length === 0) { toast('A\u00f1ade al menos un slide separado por ---'); return; }

  // Toggle global de paginación. Acepta varios valores off-ish para ser permisivo.
  const pagVal = (global.paginacion || global.numeracion || '').toString().toLowerCase().trim();
  PS_PAGINATION_ENABLED = !['no', 'off', 'false', '0', 'none'].includes(pagVal);

  const slides = [];
  // Count valid slides first so renderers can emit N / total pagination.
  const valid = sections.filter(s => PS_RENDERERS[(s.slide || '').toLowerCase().trim()]);
  const tot = valid.length;
  valid.forEach((s, idx) => {
    const key = (s.slide || '').toLowerCase().trim();
    const fn = PS_RENDERERS[key];
    slides.push({ key, data: s, html: fn(s, global, idx + 1, tot) });
  });

  if (slides.length === 0) { toast('Ning\u00fan slide reconocido. Usa slide: portada/divisor/contenido/etc.'); return; }

  // Non-blocking validations against the 12 canonical rules.
  showWarnings(validatePresentacion(valid, global));
  showStats(statsPresentacion(valid));

  const w = 1920, h = 1080;
  const maxW = preview.clientWidth - 80;
  const colW = (maxW - 32) / 2;
  const scale = Math.min(colW / w, 0.4);

  slides.forEach((sl, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = sl.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.style.width = (w * scale) + 'px';
    card.style.height = (h * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${String(i + 1).padStart(2, '0')} \u00b7 ${sl.key}</div>` + sl.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

async function exportPptx() {
  const raw = document.getElementById('content').value.trim();
  const { global, sections } = parseMultiDoc(raw);
  if (!window.PptxGenJS) { toast('pptxgenjs no cargado'); return; }
  // Honor el toggle de paginación también al exportar, por si el usuario exporta sin haber
  // pulsado Generar Preview antes (el flag se setea en ambos caminos).
  const pagVal = (global.paginacion || global.numeracion || '').toString().toLowerCase().trim();
  PS_PAGINATION_ENABLED = !['no', 'off', 'false', '0', 'none'].includes(pagVal);
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';
  pptx.title = global.titulo || 'Presentacion Magnify';
  pptx.author = global.autor || 'Magnify';

  // Wrap addSlide to capture a reference to the last slide so we can attach speaker notes
  const origAddSlide = pptx.addSlide.bind(pptx);
  let lastSlide = null;
  pptx.addSlide = function(...args) {
    lastSlide = origAddSlide(...args);
    return lastSlide;
  };

  sections.forEach(s => {
    const key = (s.slide || '').toLowerCase().trim();
    const fn = PS_BUILDERS[key];
    if (!fn) return;
    fn(pptx, s, global);
    // Speaker notes: any `notas:` field on the slide (also accept `notes:` alias)
    const notas = s.notas || s.notes || '';
    if (notas && lastSlide && typeof lastSlide.addNotes === 'function') {
      lastSlide.addNotes(notas);
    }
  });

  const slug = (global.titulo || 'presentacion').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  await pptx.writeFile({ fileName: `magnify-presentacion-${slug}.pptx` });
  toast('\u2713 PPTX descargado');
}

function showError(msg) {

  el.classList.add('show');
}
function clearError() {

}
function showWarnings(items) {
  const el = document.getElementById('warn');
  if (!items || !items.length) { el.classList.remove('show'); el.innerHTML = ''; return; }
  el.innerHTML = '<strong>Avisos de diseño</strong><ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  el.classList.add('show');
}
function clearWarnings() {
  const el = document.getElementById('warn');

  el.innerHTML = '';
}
function showStats(parts) {
  const el = document.getElementById('stats');
  if (!parts || !parts.length) { el.classList.remove('show'); el.innerHTML = ''; return; }
  el.innerHTML = parts.map(p => `<span class="stat">${p}</span>`).join('');

}

// Word counter that strips bracket syntax and HTML.
function countWords(s) {
  if (!s) return 0;
  return String(s).replace(/\[([^\]]+)\]/g, '$1').replace(/<[^>]+>/g, ' ').trim().split(/\s+/).filter(Boolean).length;
}

// ───── Presentacion: validator + stats ─────
// Applies the 12 canonical rules (Anderson / Kawasaki / Naegle / C4C / Smallppt)
// as non-blocking warnings. Returns { warnings: string[], stats: string[] }.
const PS_META_FIELDS = new Set(['slide', 'fondo', 'layout', 'posicion', 'notas', 'notes', 'activo', 'color']);

function validatePresentacion(sections, global) {
  const warnings = [];
  const imageSlideTypes = new Set(['hero', 'imagen', 'imagen-full', 'imagen-split', 'diptych', 'triptych', 'mosaic', 'portrait-quote', 'cierre']);
  const manifiestoTypes = new Set(['manifiesto', 'divisor-charla', 'divisor']);

  let consecutiveManifiestos = 0;

  sections.forEach((s, idx) => {
    const n = idx + 1;
    const key = (s.slide || '').toLowerCase().trim();

    // Rule 4 — titular longitud
    const titWords = countWords(s.titular || s.titulo);
    if (titWords > 12) warnings.push(`Slide <code>${n}</code> (<code>${key}</code>): titular con <code>${titWords}</code> palabras — regla 4 sugiere ≤ 12.`);

    // Rule 4 — cuerpo longitud
    const cuerpoWords = countWords(s.cuerpo);
    if (cuerpoWords > 40) warnings.push(`Slide <code>${n}</code> (<code>${key}</code>): cuerpo con <code>${cuerpoWords}</code> palabras — regla 4 sugiere ≤ 40.`);

    // Rule 6 — demasiados bullets en contenido
    if (key === 'contenido') {
      let bullets = 0;
      for (let i = 1; i <= 10; i++) if (s['bullet' + i]) bullets++;
      if (bullets > 5) warnings.push(`Slide <code>${n}</code> (<code>contenido</code>): <code>${bullets}</code> bullets — regla 6 sugiere ≤ 5, o partir en dos slides.`);
    }

    // Rules 1+5 — densidad de campos. Solo aplica a slide types de texto/hero/manifesto
    // donde cada campo = 1 elemento visual. Los grids (pricing, equipo, timeline, framework,
    // stats-charla, citas-grid, recursos-agrupados, mosaic, triptych, tabla, compare) usan
    // muchos campos por diseño, así que contamos items lógicos y avisamos solo si son > 8.
    const textSlides = new Set(['portada', 'hero', 'standard', 'manifiesto', 'divisor', 'divisor-charla', 'quote', 'quote-big', 'stat', 'stat-hero', 'siguiente-paso', 'cta-final', 'imagen', 'imagen-full', 'imagen-split', 'contenido', 'diptych', 'portrait-quote', 'cierre']);
    if (textSlides.has(key)) {
      const fields = Object.keys(s).filter(k => !PS_META_FIELDS.has(k) && s[k]);
      if (fields.length > 8) warnings.push(`Slide <code>${n}</code> (<code>${key}</code>): <code>${fields.length}</code> campos rellenados — reglas 1+5 avisan que >6 elementos visuales saturan. Revisa si caben todos.`);
    }

    // Rule 10 — respiro cada 5, no acumular manifiestos
    if (manifiestoTypes.has(key)) {
      consecutiveManifiestos++;
      if (consecutiveManifiestos > 3) warnings.push(`Slide <code>${n}</code>: <code>${consecutiveManifiestos}</code> manifiestos/divisores consecutivos — regla 10 sugiere intercalar una slide de respiro (<code>imagen-full</code>, <code>quote-big</code>, dato) entre ellos.`);
    } else {
      consecutiveManifiestos = 0;
    }

    // Sub-rule — imagen slide sin imagen referenciada
    const needsImage = ['imagen-full', 'imagen-split', 'portrait-quote'];
    if (needsImage.includes(key) && !uploadedImages[(s.imagen || '').trim()]) {
      warnings.push(`Slide <code>${n}</code> (<code>${key}</code>): falta imagen (<code>imagen: imgN</code> no sube). El slide renderizará placeholder.`);
    }
  });

  // Rule 10 global — al menos 1 slide "imagen/respiro" cada 7
  const imageSlideCount = sections.filter(s => imageSlideTypes.has((s.slide || '').toLowerCase().trim())).length;
  const total = sections.length;
  if (total > 10 && imageSlideCount / total < 0.15) {
    warnings.push(`Deck muy text-heavy: solo <code>${imageSlideCount}</code> slides de imagen/respiro en <code>${total}</code> totales. Regla 10 + Anderson sugieren romper ritmo cada ~5 slides.`);
  }

  return warnings;
}

function statsPresentacion(sections) {
  let totalWords = 0;
  sections.forEach(s => {
    for (const k of Object.keys(s)) {
      if (PS_META_FIELDS.has(k)) continue;
      totalWords += countWords(s[k]);
    }
  });
  const slides = sections.length;
  // Avg ~35-45s per slide for conversational keynote. Use 40s as baseline.
  const estSec = slides * 40;
  const estMin = Math.round(estSec / 60 * 10) / 10;
  // Kawasaki 10/20/30: <=10 slides + <=20min. TED/keynote: 15-25 slides / 18 min.
  const targetMin = 18;
  const timeFlag = estMin > targetMin + 5 ? '<span class="warn-inline">largo</span>' : (estMin < targetMin - 8 ? '<span class="warn-inline">corto</span>' : '');
  return [
    `<b>${slides}</b> slides`,
    `≈ <b>${estMin} min</b> ${timeFlag}`.trim(),
    `<b>${totalWords}</b> palabras`,
    `<b>${(slides / (estSec / 60)).toFixed(1)}</b> slides/min`,
  ];
}

// One-time font check on load. Returns true if DM Serif Display is resolvable locally.
// Browsers lie if the font isn't installed but reports "available" via Google Fonts CDN —
// using `document.fonts.check()` against a specific size is the reliable probe.
function checkBrandFonts() {
  try {
    // Wait until font loading resolves then check.
    if (!document.fonts) return;
    document.fonts.ready.then(() => {
      const hasDM = document.fonts.check('16px "DM Serif Display"');
      if (!hasDM) {
        const el = document.getElementById('warn');
        if (!el) return;
        const msg = '<strong>Fuente Magnify no instalada</strong><ul><li>DM Serif Display no está disponible localmente. El PPTX exportado se renderizará con una itálica sans genérica en Keynote/PowerPoint (preview HTML sí la carga via Google Fonts CDN).</li><li>Instala desde <code>fonts.google.com/specimen/DM+Serif+Display</code> (30 seg) antes de exportar slides para presentar.</li></ul>';
        // Show once on load, but don't override dynamic warnings from generate().
        if (!el.classList.contains('show')) {
          el.innerHTML = msg;
          el.classList.add('show');
        }
      }
    });
  } catch (e) { /* no-op */ }
}

// Quick sanity check on the raw input: looks like key:value at all?
function validateShape(raw) {
  const hasKV = /^\s*\w[\w-]*:\s*.+/m.test(raw);
  if (!hasKV) {
    return 'El formato esperado es <code>clave: valor</code> (una por línea). No he encontrado ninguna línea con ese patrón. Mira el ejemplo del panel de ayuda.';
  }
  return null;
}

function generate() {
  clearError();
  clearWarnings();
  clearStats();
  const raw = document.getElementById('content').value.trim();
  if (!raw) { showError('Pega tu contenido primero. Copia el ejemplo del panel de ayuda si necesitas una plantilla.'); return; }

  // Shape validation only applies to key:value types. The documento type is raw markdown, so skip.
  if (currentType !== 'documento') {
    const shapeErr = validateShape(raw);
    if (shapeErr) { showError('<strong>Formato no reconocido.</strong> ' + shapeErr); return; }
  }

  const preview = document.getElementById('preview');
  const renderC = document.getElementById('render-container');
  preview.innerHTML = '';
  renderC.innerHTML = '';
  renderedFrames = [];

  try {
    switch (currentType) {
      case 'linkedin-post': generatePost(raw, preview, renderC); break;
      case 'linkedin-carousel': generateCarousel(raw, preview, renderC); break;
      case 'banner': generateBanner(raw, preview, renderC); break;
      case 'case-study': generateMultiPageDoc(raw, preview, renderC, CS_RENDERERS, { label: 'Caso de estudio' }); break;
      case 'propuesta': generateMultiPageDoc(raw, preview, renderC, PR_RENDERERS, { label: 'Propuesta' }); break;
      case 'report-cover': generateA4(raw, preview, renderC, renderReportCover); break;
      case 'email-sig': generateSig(raw, preview, renderC); break;
      case 'presentacion': generatePresentacion(raw, preview, renderC); break;
      case 'documento': generateDocumento(raw, preview, renderC); break;
    }
  } catch (e) {
    console.error(e);
    showError('<strong>Error al generar:</strong> ' + (e && e.message ? e.message : String(e)) + '. Revisa la estructura de tu texto.');
    document.getElementById('btn-export').disabled = true;
    return;
  }

  document.getElementById('btn-export').disabled = renderedFrames.length === 0;
}

function generatePost(raw, preview, renderC) {
  const data = parseBlock(raw);
  const tpl = data.plantilla || 'quote';
  const renderer = postRenderers[tpl];
  if (!renderer) { toast('Plantilla no reconocida: ' + tpl); return; }

  const html = renderer(data);

  const actualDiv = document.createElement('div');
  actualDiv.innerHTML = html;
  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  const frame = actualDiv.querySelector('.frame');
  const w = frame.offsetWidth;
  const h = frame.offsetHeight;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 80;
  const scale = Math.min(maxW / w, maxH / h, 0.7);

  const card = document.createElement('div');
  card.className = 'preview-card';
  card.style.width = (w * scale) + 'px';
  card.style.height = (h * scale) + 'px';
  card.innerHTML = html;
  const inner = card.querySelector('.frame');
  inner.style.transform = `scale(${scale})`;
  inner.style.transformOrigin = 'top left';
  preview.appendChild(card);
}

function generateCarousel(raw, preview, renderC) {
  const blocks = raw.split(/^---$/m).map(b => b.trim()).filter(Boolean);
  if (blocks.length === 0) { toast('Separa cada slide con ---'); return; }

  const totalContent = blocks.length;
  const slides = [];

  blocks.forEach((block, idx) => {
    const data = parseBlock(block);
    let html;

    const plantilla = (data.plantilla || '').toLowerCase().trim();
    if (idx === 0 || plantilla === 'cover' || plantilla === 'portada') {
      html = renderCarouselCover(data);
    } else if (plantilla === 'cta' || (data.cta && !data.titular && !data.cuerpo)) {
      html = renderCarouselCTA(data);
    } else if (plantilla === 'imagen' || plantilla === 'image' || plantilla === 'foto') {
      html = renderCarouselImage(data, idx, totalContent);
    } else if (plantilla === 'stat' || data.stat || data.numero) {
      html = renderCarouselSplit(data, idx, totalContent);
    } else {
      html = renderCarouselText(data, idx, totalContent);
    }

    slides.push({ html, label: idx === 0 ? 'Portada' : (data.cta && !data.titular ? 'CTA' : `Slide ${idx}`) });
  });

  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 120;
  const scale = Math.min(maxW / (slides.length * 300), maxH / 375, 0.35);

  slides.forEach((s, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = s.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.style.width = (1080 * scale) + 'px';
    card.style.height = (1350 * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${s.label}</div>` + s.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

function generateBanner(raw, preview, renderC) {
  const data = parseBlock(raw);
  const tpl = (data.plantilla || 'statement').toLowerCase().trim();
  const renderer = bannerRenderers[tpl];
  if (!renderer) { toast('Plantilla no reconocida: ' + tpl); return; }

  // formato selects the canvas size. default = og (1200x630 post-share).
  const formato = (data.formato || '').toLowerCase().trim();
  let frameClass = 'frame bn';
  if (formato === 'linkedin-profile' || formato === 'linkedin' || formato === 'profile') frameClass = 'frame bn-li';
  else if (formato === 'linkedin-company' || formato === 'company') frameClass = 'frame bn-co';
  else if (formato === 'logo' || formato === 'square' || formato === 'thumbnail' || formato === 'avatar') frameClass = 'frame bn-lg';

  // statement/data only fit on the 1200x630 canvas — too tight on the other formats.
  let html;
  if (frameClass !== 'frame bn' && (tpl === 'statement' || tpl === 'data')) {
    toast(`Plantilla "${tpl}" no cabe en formato ${formato}. Usa wordmark, icon o minimal.`);
    return;
  } else {
    html = renderer(data, frameClass);
  }

  const actualDiv = document.createElement('div');
  actualDiv.innerHTML = html;
  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  const frame = actualDiv.querySelector('.frame');
  const w = frame.offsetWidth;
  const h = frame.offsetHeight;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 80;
  const scale = Math.min(maxW / w, maxH / h, 0.7);

  const card = document.createElement('div');
  card.className = 'preview-card';
  card.style.width = (w * scale) + 'px';
  card.style.height = (h * scale) + 'px';
  card.innerHTML = html;
  const inner = card.querySelector('.frame');
  inner.style.transform = `scale(${scale})`;
  inner.style.transformOrigin = 'top left';
  preview.appendChild(card);
}

function generateA4(raw, preview, renderC, rendererFn) {
  const data = parseBlock(raw);
  const html = rendererFn(data);

  const actualDiv = document.createElement('div');
  actualDiv.innerHTML = html;
  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  const w = 794;
  const h = 1123;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 80;
  const scale = Math.min(maxW / w, maxH / h, 0.7);

  const card = document.createElement('div');
  card.className = 'preview-card paper';
  card.style.width = (w * scale) + 'px';
  card.style.height = (h * scale) + 'px';
  card.innerHTML = html;
  const inner = card.querySelector('.frame');
  inner.style.transform = `scale(${scale})`;
  inner.style.transformOrigin = 'top left';
  preview.appendChild(card);
}

function generateSig(raw, preview, renderC) {
  const data = parseBlock(raw);
  const html = renderEmailSig(data);

  const actualDiv = document.createElement('div');
  actualDiv.innerHTML = html;
  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  // Preview at 1:1 scale, centered
  const card = document.createElement('div');
  card.className = 'preview-card';
  card.style.width = '600px';
  card.innerHTML = html;
  preview.appendChild(card);

  // Store data for HTML copy
  card.dataset.sigData = JSON.stringify(data);
}

// ════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════

async function exportAll() {
  if (renderedFrames.length === 0) return;

  // Email signature: copy HTML
  if (currentType === 'email-sig') {
    const raw = document.getElementById('content').value.trim();
    const data = parseBlock(raw);
    const inlineHtml = generateEmailSigInlineHTML(data);
    try {
      await navigator.clipboard.writeText(inlineHtml);
      toast('\u2713 HTML copiado al portapapeles');
    } catch (e) {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = inlineHtml;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('\u2713 HTML copiado al portapapeles');
    }
    return;
  }

  // Presentacion: export .pptx editable
  if (currentType === 'presentacion') {
    toast('Generando PPTX...');
    try { await exportPptx(); } catch (e) { console.error(e); toast('Error: ' + e.message); }
    return;
  }

  toast('Generando...');

  if ((currentType === 'case-study' || currentType === 'propuesta' || currentType === 'documento') && renderedFrames.length > 0) {
    // Multi-page PDF. scale:1.5 + JPEG @ q0.92 + compress cuts file size ~20× vs scale:2 + PNG while staying
    // crisp at A4 print resolution (894×1264 per page is >150dpi on A4). A 5-page doc now ends up ~2-3MB
    // instead of 60-70MB.
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'pt', format: 'a4', orientation: 'portrait', compress: true });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    for (let i = 0; i < renderedFrames.length; i++) {
      const canvas = await html2canvas(renderedFrames[i], { scale: 1.5, useCORS: true, backgroundColor: '#ffffff', logging: false });
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH, undefined, 'FAST');
    }
    const raw = document.getElementById('content').value.trim();
    let slug, prefix;
    if (currentType === 'documento') {
      slug = deriveDocSlug(raw);
      prefix = 'magnify-doc';
    } else {
      const g = parseMultiDoc(raw).global;
      slug = (g.cliente || 'doc').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      prefix = currentType === 'case-study' ? 'magnify-caso' : 'magnify-propuesta';
    }
    pdf.save(`${prefix}-${slug}.pdf`);
    toast('\u2713 PDF descargado');
    return;
  }

  if (currentType === 'linkedin-carousel' && renderedFrames.length > 1) {
    // LinkedIn Document Post requires a single multi-page PDF (not individual PNGs).
    // Page size matches the 1080x1350 carousel aspect. We also bundle PNGs in the same ZIP for flexibility (LinkedIn native image carousel, Instagram, etc.).
    const { jsPDF } = window.jspdf;
    const SLIDE_W = 1080, SLIDE_H = 1350;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [SLIDE_W, SLIDE_H] });
    const zip = new JSZip();
    for (let i = 0; i < renderedFrames.length; i++) {
      const canvas = await html2canvas(renderedFrames[i], { scale: 2, useCORS: true, backgroundColor: null, logging: false });
      const dataUrl = canvas.toDataURL('image/png');
      if (i > 0) pdf.addPage([SLIDE_W, SLIDE_H], 'portrait');
      pdf.addImage(dataUrl, 'PNG', 0, 0, SLIDE_W, SLIDE_H, undefined, 'FAST');
      const base64 = dataUrl.split(',')[1];
      zip.file(`slide-${String(i + 1).padStart(2, '0')}.png`, base64, { base64: true });
    }
    // PDF first (primary format for LinkedIn Document Post)
    pdf.save('magnify-carousel.pdf');
    // PNGs zip as bonus (for native image carousel / Instagram / reuse)
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipLink = document.createElement('a');
    zipLink.download = 'magnify-carousel-pngs.zip';
    zipLink.href = URL.createObjectURL(zipBlob);
    zipLink.click();
    toast('\u2713 PDF + ZIP de PNGs descargados');
  } else {
    // Single PNG
    const canvas = await html2canvas(renderedFrames[0], { scale: 1, useCORS: true, backgroundColor: null, logging: false });
    const link = document.createElement('a');
    const names = {
      'linkedin-post': 'magnify-post.png',
      'linkedin-carousel': 'magnify-carousel.png',
      'banner': 'magnify-banner.png',
      'case-study': 'magnify-case-study.png',
      'report-cover': 'magnify-report-cover.png',
    };
    link.download = names[currentType] || 'magnify-export.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('\u2713 PNG descargado');
  }
}
