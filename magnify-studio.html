<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnify Content Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='65 52 155 178'%3E%3Crect x='65' y='52' width='155' height='178' fill='%23FFD600'/%3E%3Cpolygon fill='%230A0A0A' points='141.7,77.7 97.6,224.7 71,224.7 133.9,57.9 141.7,57.9 149.5,57.9 212.3,224.7 185.7,224.7'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" integrity="sha384-Cck14aA9cifjYolcnjebXRfWGkz5ltHMBiG4px/j8GS+xQcb7OhNQWZYyWjQ+UwQ" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  @font-face { font-family: 'NM'; src: url('fonts/PPNeueMontreal-Book.woff2') format('woff2'); font-weight: 400; }
  @font-face { font-family: 'NM'; src: url('fonts/PPNeueMontreal-Medium.woff2') format('woff2'); font-weight: 500; }
  @font-face { font-family: 'NM'; src: url('fonts/PPNeueMontreal-Bold.woff2') format('woff2'); font-weight: 700; }

  :root {
    --bg: #0A0A0A; --yellow: #FFD600; --h1: #F0F0F0; --h2: #FAFAFA;
    --body-dk: #999999; --body-lt: #444444;
    --border-dk: rgba(255,255,255,0.1); --border-lt: rgba(0,0,0,0.1);
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'NM', system-ui, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0A0A0A; font-family: var(--sans); color: var(--h2);
    -webkit-font-smoothing: antialiased; height:100vh; overflow:hidden;
  }

  /* ── LAYOUT ── */
  .layout { display:flex; height:100vh; }

  /* ── SIDEBAR ── */
  /* Sidebar: icon + label row. Wide enough to show what each template is without guessing ASCII symbols. */
  .sidebar {
    width:220px; min-width:220px; background:#0D0D0D;
    border-right:1px solid var(--border-dk);
    display:flex; flex-direction:column;
    padding:20px 12px; gap:2px;
  }
  .sidebar-logo {
    height:36px; display:flex; align-items:center; padding:0 12px;
    margin-bottom:24px;
  }
  .sidebar-logo img, .sidebar-logo .logo-svg.ic { height:24px; width:auto; }
  .sidebar-item {
    width:100%; min-height:44px; padding:10px 14px;
    display:flex; align-items:center; gap:14px;
    border-radius:8px; cursor:pointer; transition:background 0.15s, color 0.15s;
    position:relative; color:#888; border:none; background:transparent; text-align:left;
    font-family:var(--sans); font-size:14px; font-weight:500; line-height:1.2;
  }
  .sidebar-item .ic {
    flex-shrink:0; width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    font-size:18px; font-family:var(--sans); font-weight:700; color:inherit; opacity:0.85;
  }
  .sidebar-item:hover { background:rgba(255,255,255,0.05); color:#DDD; }
  .sidebar-item.on { color:var(--yellow); background:rgba(255,214,0,0.08); }
  .sidebar-item.on .ic { opacity:1; }
  .sidebar-item.on::before {
    content:''; position:absolute; left:-12px; top:10px; bottom:10px;
    width:3px; background:var(--yellow); border-radius:0 3px 3px 0;
  }

  /* ── CENTER PANEL ── */
  .panel {
    width:400px; min-width:400px; background:#111;
    border-right:1px solid var(--border-dk);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .panel-head {
    padding:20px 24px 16px; border-bottom:1px solid var(--border-dk);
  }
  .panel-head h2 { font-size:18px; font-weight:600; color:#F0F0F0; margin-bottom:6px; }
  .panel-head p { font-size:13px; color:#999; line-height:1.4; }

  /* Textarea */
  .input-area { flex:1; padding:16px 24px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
  .input-area label {
    font-size:12px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; color:#BBB; display:block; margin-bottom:8px;
  }
  .input-area textarea {
    width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px;
    color:#EEE; font-family:'SF Mono', 'Fira Code', monospace; font-size:13px;
    padding:14px; line-height:1.7; resize:none; outline:none; transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color:var(--yellow); }
  .input-area textarea.main { flex:1; min-height:200px; }
  /* Hint: bigger + much higher contrast. 14px light grey on #111 bg = 8:1 contrast ratio (AAA). */
  .hint { font-size:13px; color:#C8C8C8; line-height:1.65; }
  .hint strong { color:#F0F0F0; }
  .hint code { color:var(--yellow); font-family:'SF Mono', monospace; font-size:12px; background:rgba(255,214,0,0.08); padding:2px 6px; border-radius:3px; }

  /* Error panel: persistent, inline in the input column (not a transient toast) so the user can read the parser complaint while they edit. */
  .err {
    display:none; background:rgba(255,80,80,0.08); border:1px solid rgba(255,80,80,0.4);
    border-radius:8px; padding:12px 14px; font-size:13px; color:#FFB4B4; line-height:1.5;
  }
  .err.show { display:block; }
  .err strong { color:#FF8080; font-weight:600; }
  .err code { font-family:'SF Mono', monospace; font-size:12px; color:#FFD0D0; background:rgba(255,80,80,0.12); padding:1px 5px; border-radius:3px; }

  /* Image uploads: only rendered for content types that support images (see TYPE_META.supportsImages). Images are embedded as data URIs in state, referenced from the textarea as img1, img2… */
  .uploads { display:none; }
  .uploads.on { display:block; }
  .uploads-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:12px; }
  .uploads-head label { margin-bottom:0 !important; }
  .uploads-head .hint-inline { font-size:11.5px; color:#888; letter-spacing:0; text-transform:none; font-weight:400; }
  .uploads-head .hint-inline code { font-family:'SF Mono', monospace; font-size:11px; color:var(--yellow); background:rgba(255,214,0,0.08); padding:1px 5px; border-radius:3px; }
  .upload-drop { border:1px dashed #333; border-radius:8px; padding:18px 14px; text-align:center; color:#999; font-size:12px; cursor:pointer; transition:all 0.15s; user-select:none; }
  .upload-drop u { color:#ccc; text-decoration:underline; }
  .upload-drop:hover, .upload-drop.drag { border-color:var(--yellow); color:#ddd; background:rgba(255,214,0,0.04); }
  .upload-thumbs { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-top:10px; }
  .upload-thumb { position:relative; aspect-ratio:1/1; background:#1a1a1a; border-radius:6px; overflow:hidden; border:1px solid #2a2a2a; }
  .upload-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .upload-thumb .id { position:absolute; top:4px; left:4px; background:var(--yellow); color:var(--bg); font-size:10px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:0.04em; font-family:'SF Mono', monospace; }
  .upload-thumb .rm { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.75); color:#fff; width:20px; height:20px; border-radius:50%; border:none; cursor:pointer; font-size:12px; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; }
  .upload-thumb .rm:hover { background:#c33; }

  /* Color selector: appears only for variants that declare `colors`. Segmented-control look. */
  .color-bar { display:none; align-items:center; gap:10px; padding:14px 24px 0; }
  .color-bar.on { display:flex; }
  .color-bar .color-label { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#BBB; }
  .color-btn {
    display:inline-flex; align-items:center; gap:8px;
    background:#1a1a1a; border:1px solid #2a2a2a; border-radius:999px;
    padding:6px 14px 6px 8px; color:#bbb; font-family:var(--sans); font-size:12px; font-weight:500;
    cursor:pointer; transition:all 0.15s;
  }
  .color-btn:hover { border-color:#555; color:#ddd; }
  .color-btn .swatch { width:16px; height:16px; border-radius:50%; border:1px solid rgba(255,255,255,0.15); flex-shrink:0; }
  .color-btn[data-color="dark"] .swatch { background:#0A0A0A; }
  .color-btn[data-color="light"] .swatch { background:#FFFFFF; border-color:rgba(0,0,0,0.15); }
  .color-btn[data-color="yellow"] .swatch { background:#FFD600; border-color:rgba(0,0,0,0.15); }
  .color-btn.on { background:var(--yellow); color:var(--bg); border-color:var(--yellow); }
  .color-btn.on .swatch { border-color:rgba(10,10,10,0.3); }

  /* Variant gallery: shown when a type has multiple sub-variants. User picks one, then edits. */
  .variant-intro { font-size:13px; color:#C8C8C8; line-height:1.5; margin-bottom:14px; }
  .variant-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .variant-card {
    background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px;
    padding:12px 14px; cursor:pointer; transition:all 0.15s; text-align:left;
    display:flex; flex-direction:column; gap:4px;
  }
  .variant-card:hover { border-color:var(--yellow); background:#1f1f1f; }
  .variant-card.on { border-color:var(--yellow); background:rgba(255,214,0,0.06); }
  .variant-card .vn { font-family:var(--serif); font-size:17px; color:#F0F0F0; line-height:1.1; }
  .variant-card .vd { font-size:11.5px; color:#999; line-height:1.4; }
  /* Back link must sit on its own line (above the "Formato:" hint block), so display:flex + width:fit-content over the previous inline-flex which was flowing inline with the following text. */
  .variant-back { font-size:12px; color:#888; cursor:pointer; margin-bottom:16px; display:flex; width:fit-content; align-items:center; gap:6px; padding:4px 2px; }
  .variant-back:hover { color:var(--yellow); }

  /* Buttons */
  .actions { padding:16px 24px; border-top:1px solid var(--border-dk); display:flex; flex-direction:column; gap:8px; }
  .btn {
    width:100%; padding:12px; border:none; border-radius:8px; font-family:var(--sans);
    font-size:13px; font-weight:500; cursor:pointer; transition: all 0.15s; letter-spacing:0.02em;
  }
  .btn-primary { background:var(--yellow); color:var(--bg); }
  .btn-primary:hover { background:#ffe640; }
  .btn-secondary { background:#1a1a1a; color:#aaa; border:1px solid #2a2a2a; }
  .btn-secondary:hover { border-color:#444; color:#ddd; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* ── RIGHT: PREVIEW ── */
  .preview-area {
    flex:1; overflow:auto; padding:40px;
    display:flex; flex-wrap:wrap; gap:32px; align-content:flex-start; justify-content:center;
  }
  .preview-card {
    position:relative; box-shadow:0 4px 24px rgba(0,0,0,0.4);
    border-radius:4px; overflow:hidden; transition: box-shadow 0.2s;
  }
  .preview-card:hover { box-shadow:0 4px 32px rgba(255,214,0,0.15); }
  .preview-card.paper {
    box-shadow: 0 2px 20px rgba(0,0,0,0.5), 0 0 60px rgba(0,0,0,0.3);
    border-radius:2px;
  }
  .slide-label {
    position:absolute; top:-28px; left:0; font-size:11px; font-weight:500;
    letter-spacing:1.2px; text-transform:uppercase; color:#555;
  }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#111; color:#ddd; font-family:var(--sans); font-size:13px; font-weight:500;
    padding:12px 24px; border-radius:50px; border:1px solid var(--border-dk);
    box-shadow:0 8px 32px rgba(0,0,0,0.5); opacity:0; transition:opacity 0.3s;
    pointer-events:none; z-index:200;
  }
  .toast.show { opacity:1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px; color:#333; text-align:center;
  }
  .empty-state p { font-size:15px; max-width:400px; line-height:1.6; }

  /* ════════════════════════════════════════════
     TEMPLATE STYLES — LinkedIn (T1-T11)
     ════════════════════════════════════════════ */
  .frame { position:relative; overflow:hidden; }
  .frame.sq { width:1200px; height:1200px; }
  .frame.ls { width:1200px; height:628px; }
  .frame.cr { width:1080px; height:1350px; }
  .frame.ps { width:1920px; height:1080px; }
  .frame.dk { background:var(--bg); }
  .frame.lt { background:#FFFFFF; }
  .frame.yl { background:var(--yellow); }

  /* Unified footer height across all templates for visual consistency (carousel .t8-bar, .ftr-c, and .ftr all = 120px). */
  .ftr { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 80px; height:120px; }
  .ftr.ftr-dk { border-top:1px solid var(--border-dk); }
  .ftr.ftr-lt { border-top:1px solid var(--border-lt); }
  .ftr img, .ftr .logo-svg.wm { height:40px; width:auto; display:block; }
  .ftr .logo-svg.ic { height:48px; width:auto; display:block; }
  .ftr .url { font-size:22px; letter-spacing:0.12em; font-weight:500; }
  .ftr .url-dk { color:rgba(255,255,255,0.55); }
  .ftr .url-dk .ing-ap { color:var(--yellow); font-weight:500; }
  .ftr .url-lt { color:rgba(0,0,0,0.55); }
  .ftr .url-lt .ing-ap { color:var(--yellow); font-weight:500; }

  .ftr-c { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 80px; height:120px; }
  .ftr-c.ftr-dk { border-top:1px solid var(--border-dk); }
  .ftr-c.ftr-lt { border-top:1px solid var(--border-lt); }
  .ftr-c img, .ftr-c .logo-svg.wm { height:48px; width:auto; display:block; }
  .ftr-c .logo-svg.ic { height:58px; width:auto; display:block; }
  .ftr-c .url { font-size:28px; letter-spacing:0.12em; font-weight:500; }
  .ftr-c .url-dk { color:rgba(255,255,255,0.6); }
  .ftr-c .url-dk .ing-ap { color:var(--yellow); font-weight:500; }
  .ftr-c .url-lt { color:rgba(0,0,0,0.6); }
  .ftr-c .url-lt .ing-ap { color:var(--yellow); font-weight:500; }

  .eyebrow { font-family:var(--sans); font-size:26px; font-weight:700; letter-spacing:2.8px; text-transform:uppercase; }
  .eyebrow-dk { color:var(--body-dk); }
  .eyebrow-yl { color:var(--yellow); }
  .eyebrow-lt { color:#1a1a1a; }
  .eyebrow .ing-ap { color:var(--yellow); font-weight:700; }
  .eyebrow.eyebrow-yl .ing-ap { color:#FFFFFF; font-weight:700; }
  .eyebrow.eyebrow-lt .ing-ap { color:var(--bg); background:var(--yellow); padding:2px 6px; border-radius:2px; margin-left:1px; }

  /* Highlight uses linear-gradient with explicit background-size so the yellow band stays ~x-height + buffer, never overflowing into adjacent lines — critical for serif display fonts with tall ascenders (DM Serif Display) set at tight line-heights (1.0-1.1). */
  .hl { background-image:linear-gradient(var(--yellow), var(--yellow)); background-size:100% 0.92em; background-position:0 55%; background-repeat:no-repeat; color:var(--bg); padding:0 0.22em; display:inline; box-decoration-break:clone; -webkit-box-decoration-break:clone; border-radius:2px; }
  .frame.yl .hl { background-image:linear-gradient(var(--bg), var(--bg)); color:var(--yellow); }
  .ing { color:var(--yellow); }
  .ing-dk { color:var(--bg); }
  .accent { width:56px; height:3px; margin-top:20px; }
  .accent-yl { background:var(--yellow); }
  .accent-dk { background:#1a1a1a; }

  /* T1 — Quote */
  .t1 { padding:100px; display:flex; flex-direction:column; justify-content:center; height:calc(100% - 96px); position:relative; overflow:hidden; }
  .t1 .watermark { position:absolute; top:40px; right:60px; opacity:0.04; pointer-events:none; }
  .t1 .watermark .logo-svg.ic { height:420px; width:auto; }
  .t1 h2 { font-family:var(--serif); font-size:86px; font-weight:400; line-height:1.04; letter-spacing:-2px; color:var(--h1); margin-top:32px; max-width:1000px; }
  .t1 .attr { font-size:26px; color:var(--body-dk); margin-top:56px; letter-spacing:0.02em; max-width:900px; line-height:1.5; }
  /* Quote color variants: the three surfaces in the Magnify brand system. Light/yellow invert the titular + body + watermark colors to keep contrast without leaving brand. */
  .frame.lt .t1 h2 { color:var(--bg); }
  .frame.lt .t1 .attr { color:var(--body-lt); }
  .frame.yl .t1 h2 { color:var(--bg); }
  .frame.yl .t1 .attr { color:rgba(10,10,10,0.7); }

  /* Stats Hero color variants: the big numeral keeps yellow on dark/light but flips to black on yellow surface (yellow-on-yellow would vanish). Supporting text inverts accordingly. */
  .frame.lt .t3 .t3-desc { color:var(--bg); }
  .frame.lt .t3 .t3-meta { color:rgba(0,0,0,0.5); }
  .frame.yl .t3 .t3-num { color:var(--bg); }
  .frame.yl .t3 .t3-desc { color:var(--bg); }
  .frame.yl .t3 .t3-meta { color:rgba(0,0,0,0.55); }

  /* Framework color variants: row dividers and text need to follow the surface. Yellow numbers are preserved on dark/light, but on yellow surface they flip to black (legibility). */
  .frame.dk .t4 h2 { color:var(--h1); }
  .frame.dk .t4-item { border-bottom-color:rgba(255,255,255,0.12); }
  .frame.dk .t4-item:first-child { border-top-color:rgba(255,255,255,0.12); }
  .frame.dk .t4-item h3 { color:var(--h2); }
  .frame.dk .t4-item p { color:var(--body-dk); }
  .frame.yl .t4 h2 { color:var(--bg); }
  .frame.yl .t4-n { color:var(--bg); }
  .frame.yl .t4-item h3 { color:var(--bg); }
  .frame.yl .t4-item p { color:rgba(10,10,10,0.65); }
  .frame.yl .t4-item { border-bottom-color:rgba(10,10,10,0.15); }
  .frame.yl .t4-item:first-child { border-top-color:rgba(10,10,10,0.15); }

  /* Quote Landscape color variants: titular + attribution + divider line follow the surface. */
  .frame.dk .t7-l h2 { color:var(--h1); }
  .frame.dk .t7-r { border-left-color:rgba(255,255,255,0.15); }
  .frame.dk .t7-r p { color:var(--body-dk); }
  .frame.yl .t7-l h2 { color:var(--bg); }
  .frame.yl .t7-r { border-left-color:rgba(10,10,10,0.2); }
  .frame.yl .t7-r p { color:rgba(10,10,10,0.7); }

  /* T-IMG — Carousel Image: full-bleed photo + lower gradient overlay with caption. Height reserves the 120px footer so the photo never overlaps the brand bar. */
  .t-img { height:calc(100% - 120px); position:relative; overflow:hidden; background:#222; }
  .t-img .photo { position:absolute; inset:0; background-size:cover; background-position:center; }
  .t-img .photo.empty { display:flex; align-items:center; justify-content:center; color:#666; font-size:18px; letter-spacing:0.1em; text-transform:uppercase; background:repeating-linear-gradient(45deg, #1a1a1a 0 24px, #222 24px 48px); }
  .t-img .shade { position:absolute; left:0; right:0; bottom:0; height:62%; background:linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,0.35) 40%, rgba(10,10,10,0.9) 100%); }
  .t-img .copy { position:absolute; left:80px; right:80px; bottom:56px; }
  .t-img .copy .eb { font-family:var(--sans); font-size:24px; font-weight:700; letter-spacing:2.8px; text-transform:uppercase; color:var(--yellow); margin-bottom:20px; }
  .t-img .copy h2 { font-family:var(--serif); font-size:64px; color:var(--h1); line-height:1.08; letter-spacing:-1.2px; max-width:920px; font-weight:400; }
  .t-img .dots { position:absolute; bottom:24px; right:80px; display:flex; gap:8px; }
  .t-img .dots .d { width:40px; height:4px; background:rgba(250,250,250,0.35); border-radius:2px; }
  .t-img .dots .d.on { background:var(--yellow); }
  /* T2 — Stats Grid */
  .t2 { padding:100px; display:flex; flex-direction:column; height:calc(100% - 80px); }
  .t2-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:rgba(0,0,0,0.12); margin-top:48px; flex:1; border-radius:2px; overflow:hidden; }
  .t2-cell { background:#FFFFFF; padding:56px; display:flex; flex-direction:column; justify-content:flex-end; position:relative; }
  .t2-cell::before { content:""; position:absolute; top:56px; left:56px; width:28px; height:2px; background:rgba(0,0,0,0.15); }
  .t2-cell:first-child::before { background:var(--yellow); }
  .t2-num { font-family:var(--serif); font-size:112px; color:var(--bg); line-height:1; margin-bottom:18px; letter-spacing:-2px; font-feature-settings:"tnum"; }
  .t2-num-yl { color:var(--yellow); }
  .t2-lbl { font-size:24px; color:var(--body-lt); line-height:1.45; max-width:360px; }
  /* T3 — Stats Hero */
  .t3 { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 96px); text-align:center; padding:100px; }
  .t3 .eyebrow { font-size:22px; }
  .t3-num { font-family:var(--serif); font-size:320px; color:var(--yellow); line-height:0.85; letter-spacing:-10px; margin-top:44px; font-feature-settings:"tnum"; }
  .t3-num sup { font-size:96px; opacity:0.65; letter-spacing:0; top:-0.55em; margin-left:-0.05em; }
  .t3-desc { font-size:32px; color:var(--h2); margin-top:44px; max-width:760px; line-height:1.45; font-weight:400; }
  .t3-meta { font-size:14px; font-weight:500; color:rgba(255,255,255,0.45); margin-top:28px; letter-spacing:2px; text-transform:uppercase; }
  /* T4 — Framework */
  .t4 { padding:100px; height:calc(100% - 96px); display:flex; flex-direction:column; }
  .t4 h2 { font-family:var(--serif); font-size:64px; font-weight:400; color:var(--bg); line-height:1.12; margin-top:28px; letter-spacing:-1.4px; max-width:940px; }
  .t4-list { margin-top:52px; flex:1; display:flex; flex-direction:column; justify-content:center; }
  /* Bumped: at 1200×1200 scaled down for LinkedIn feed (~550px wide on desktop, ~360px mobile), 28/22px title/body became unreadable. 42/30 gives a comfortable 72dpi-equivalent size on mobile feed. */
  .t4-item { display:flex; align-items:baseline; padding:34px 0; border-bottom:1px solid rgba(0,0,0,0.08); gap:16px; }
  .t4-item:first-child { border-top:1px solid rgba(0,0,0,0.08); }
  .t4-n { font-family:var(--serif); font-size:64px; color:var(--yellow); width:108px; flex-shrink:0; line-height:1; font-feature-settings:"tnum"; }
  .t4-item > div { flex:1; }
  .t4-item h3 { font-size:42px; font-weight:500; color:var(--bg); margin-bottom:14px; letter-spacing:-0.4px; line-height:1.15; }
  .t4-item p { font-size:30px; color:var(--body-lt); line-height:1.4; }
  /* T5 — Servicio */
  .t5 { display:flex; flex-direction:column; height:calc(100% - 96px); position:relative; }
  .t5-body { flex:1; padding:100px 100px 60px; display:flex; flex-direction:column; justify-content:center; }
  .t5-body h2 { font-family:var(--serif); font-size:84px; font-weight:400; color:var(--bg); line-height:1.04; margin-top:28px; letter-spacing:-2px; max-width:980px; }
  .t5-desc { font-size:30px; color:var(--body-lt); line-height:1.45; margin-top:40px; max-width:880px; font-weight:400; }
  .t5-cta-bar { display:flex; align-items:center; justify-content:space-between; background:var(--yellow); color:var(--bg); padding:42px 100px; font-size:28px; font-weight:500; letter-spacing:-0.3px; text-decoration:none; font-family:var(--sans); }
  .t5-cta-bar .t5-cta-ar { font-size:32px; }
  /* T6 — Antes/Despues */
  .t6 { display:flex; height:calc(100% - 96px); position:relative; }
  .t6-col { flex:1; padding:80px 72px; display:flex; flex-direction:column; }
  .t6-div { width:2px; background:linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.18) 20%, var(--yellow) 50%, rgba(255,255,255,0.18) 80%, transparent 100%); }
  .t6-ul { list-style:none; flex:1; display:flex; flex-direction:column; justify-content:center; gap:0; }
  .t6-ul li { font-size:25px; line-height:1.4; padding:24px 0 24px 44px; position:relative; border-bottom:1px solid rgba(255,255,255,0.08); }
  .t6-ul li:last-child { border-bottom:none; }
  .t6-ul-antes li { color:var(--body-dk); }
  .t6-ul-antes li::before { content:"\00D7"; position:absolute; left:0; top:20px; color:rgba(255,255,255,0.35); font-size:24px; font-weight:300; line-height:1; }
  .t6-ul-despues li { color:var(--h2); font-weight:400; }
  .t6-ul-despues li::before { content:"\2713"; position:absolute; left:0; top:22px; color:var(--yellow); font-size:20px; font-weight:700; line-height:1; }
  /* T7 — Quote Landscape */
  .t7 { padding:56px 100px 0; display:flex; align-items:center; height:calc(100% - 96px); gap:80px; }
  .t7-l { flex:1; }
  .t7-l h2 { font-family:var(--serif); font-size:50px; font-weight:400; color:var(--bg); line-height:1.18; margin-top:24px; max-width:640px; letter-spacing:-0.8px; }
  .t7-r { flex-shrink:0; max-width:300px; border-left:2px solid rgba(0,0,0,0.08); padding-left:28px; }
  .t7-r p { font-size:22px; text-align:left; color:var(--body-lt); line-height:1.55; }
  /* T-CUAD — Cuadrante 2x2 */
  .tcq { padding:80px 80px 0; height:calc(100% - 120px); display:flex; flex-direction:column; }
  .tcq-head { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:44px; }
  .tcq-head h2 { font-family:var(--serif); font-size:56px; font-weight:400; color:var(--bg); line-height:1.1; max-width:840px; letter-spacing:-1.2px; margin-top:14px; }
  .tcq-grid { flex:1; display:grid; grid-template-columns: 80px 1fr 1fr; grid-template-rows: 1fr 1fr 64px; gap:0; position:relative; }
  .tcq-axis-y { grid-row:1 / span 2; grid-column:1; display:flex; flex-direction:column; justify-content:space-between; align-items:center; padding:24px 0; border-right:2px solid var(--bg); }
  /* Vertical axis labels: rotate -90deg so text reads bottom-to-top with upright letters (chart-axis convention, tilt head LEFT to read). transform: rotate is the most reliable cross-browser approach. display:inline-block is required for transform to apply. white-space:nowrap prevents wrapping. */
  .tcq-axis-y .lbl, .tcq-axis-y .tip { display:inline-block; transform:rotate(-90deg); transform-origin:center; white-space:nowrap; writing-mode:horizontal-tb; }
  .tcq-axis-y .lbl { font-size:16px; font-weight:700; letter-spacing:0.2em; color:var(--bg); text-transform:uppercase; }
  .tcq-axis-y .tip { font-size:14px; color:rgba(0,0,0,0.55); letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
  .tcq-axis-x { grid-row:3; grid-column:2 / span 2; display:flex; justify-content:space-between; align-items:center; padding:20px 0 0; border-top:2px solid var(--bg); }
  .tcq-axis-x .lbl { font-size:16px; font-weight:700; letter-spacing:0.2em; color:var(--bg); text-transform:uppercase; }
  .tcq-axis-x .tip { font-size:14px; color:rgba(0,0,0,0.55); letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
  .tcq-axis-x .mid { flex:1; text-align:center; }
  .tcq-cell { padding:36px 32px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid rgba(0,0,0,0.1); background:#FAFAFA; transition:all 0.2s; }
  .tcq-cell.q1 { grid-row:1; grid-column:2; }
  .tcq-cell.q2 { grid-row:1; grid-column:3; border-left:none; }
  .tcq-cell.q3 { grid-row:2; grid-column:2; border-top:none; }
  .tcq-cell.q4 { grid-row:2; grid-column:3; border-top:none; border-left:none; }
  .tcq-cell.hl { background:var(--yellow); border-color:var(--bg); z-index:2; box-shadow:0 0 0 2px var(--bg); }
  .tcq-cell.dim { opacity:0.5; background:#F5F5F5; }
  .tcq-cell .nm { font-family:var(--serif); font-size:32px; line-height:1.08; color:var(--bg); margin-bottom:16px; letter-spacing:-0.4px; }
  .tcq-cell .ds { font-size:20px; color:var(--body-lt); line-height:1.4; max-width:380px; }
  .tcq-cell.hl .ds { color:rgba(10,10,10,0.8); }
  .tcq-cell .tg { font-size:15px; font-weight:700; color:var(--bg); letter-spacing:0.08em; margin-top:20px; text-transform:uppercase; }
  .tcq-cell.dim .tg { color:rgba(10,10,10,0.55); }
  /* T8 — Carousel Cover */
  /* COVER: the .ing url next to the wordmark was redundant (two logos / two brand cues fighting). Removed. Wordmark alone at top breathes. Eyebrow becomes the dominant "category" marker at cover scale. */
  .t8 { display:flex; flex-direction:column; padding:80px; height:100%; position:relative; }
  .t8-brand { position:absolute; top:72px; left:80px; display:flex; align-items:center; }
  .t8-brand img, .t8-brand .logo-svg.wm { height:44px; width:auto; display:block; }
  .t8-top { flex:1; display:flex; flex-direction:column; justify-content:center; gap:0; }
  .t8-top .t8-eyebrow-wrap { display:flex; align-items:center; gap:32px; margin-bottom:40px; }
  .t8-top .t8-eyebrow-wrap .ln { width:72px; height:3px; background:var(--yellow); flex-shrink:0; }
  /* MANIFIESTO/eyebrow in DM Serif Display italic — editorial section-header treatment, matches the brand serif voice. */
  .t8-top .t8-eyebrow { font-family:var(--serif); font-size:72px; font-weight:400; font-style:italic; letter-spacing:-1px; color:var(--yellow); line-height:1; }
  .t8-top h2 { font-family:var(--serif); font-size:86px; font-weight:400; color:var(--h1); line-height:1.04; max-width:920px; letter-spacing:-2px; }
  /* Sub: bumped to 44px + max-width wider so it reads with zero effort on 1080px canvas. */
  .t8-top .sub { font-size:44px; color:#E5E5E5; margin-top:52px; max-width:920px; line-height:1.35; font-weight:400; }
  /* Bottom bar: matches the 120px footer height of the rest of the carousel for perfect consistency across slides. */
  .t8-bar { background:var(--yellow); margin:0 -80px -80px; height:120px; padding:0 80px; display:flex; align-items:center; justify-content:flex-end; }
  .t8-bar .arr { font-size:40px; color:var(--bg); font-weight:500; line-height:1; }
  /* T9 — Carousel Text */
  .t9 { padding:80px; height:calc(100% - 88px); display:flex; flex-direction:column; }
  .t9-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:48px; }
  .t9-head .eyebrow { margin:0; font-size:26px; letter-spacing:3px; }
  .t9-big { font-family:var(--serif); font-size:96px; color:var(--bg); opacity:0.14; line-height:1; letter-spacing:-2px; font-feature-settings:"tnum"; }
  .t9-content { flex:1; display:flex; flex-direction:column; justify-content:center; max-width:940px; }
  .t9-title { font-family:var(--serif); font-size:68px; font-weight:400; color:var(--bg); line-height:1.08; margin-bottom:36px; letter-spacing:-1.2px; }
  .t9-body { font-size:40px; color:var(--body-lt); line-height:1.4; max-width:960px; }
  .t9-dots { display:flex; gap:10px; margin-top:auto; }
  .t9-dot { width:44px; height:4px; background:#ddd; border-radius:2px; }
  .t9-dot.on { background:var(--yellow); }
  /* T10 — Carousel Split */
  .t10 { height:calc(100% - 108px); display:flex; flex-direction:column; }
  .t10-top { flex:1; background:var(--bg); padding:80px; display:flex; flex-direction:column; justify-content:center; border-bottom:4px solid var(--yellow); position:relative; }
  .t10-top .eyebrow { margin-bottom:28px; font-size:26px; }
  .t10-stat { font-family:var(--serif); font-size:180px; color:var(--yellow); line-height:0.9; margin-bottom:28px; letter-spacing:-5px; font-feature-settings:"tnum"; }
  .t10-stat sup { font-size:72px; opacity:0.65; letter-spacing:0; top:-0.55em; margin-left:-0.05em; }
  .t10-sl { font-size:32px; color:var(--h2); max-width:860px; line-height:1.45; font-weight:400; }
  .t10-bot { padding:72px 80px; flex:1; display:flex; flex-direction:column; justify-content:center; background:#FFF; }
  .t10-bot h3 { font-family:var(--serif); font-size:52px; font-weight:400; color:var(--bg); margin-bottom:24px; line-height:1.12; letter-spacing:-0.5px; }
  .t10-bot p { font-size:30px; color:var(--body-lt); line-height:1.45; max-width:860px; }
  /* T11 — Carousel CTA */
  /* CTA: title + wordmark lockup centered in upper 2/3. URL pinned to the actual slide bottom as footer. */
  .t11 { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; padding:80px 80px 220px; text-align:center; position:relative; }
  .t11 h2 { font-family:var(--serif); font-size:84px; font-weight:400; color:var(--bg); line-height:1.06; max-width:920px; margin-bottom:56px; letter-spacing:-1.8px; }
  .t11-ln { width:72px; height:4px; background:var(--bg); margin-bottom:48px; }
  .t11 .logo-area { display:flex; flex-direction:column; align-items:center; }
  .t11 .logo-area .logo-svg.wm { height:60px; }
  /* URL pinned to exact bottom of the 1350px frame. Not margin-top — absolute at bottom:72px so it sits in the footer zone, far from the wordmark. */
  .t11 .url { position:absolute; bottom:72px; left:0; right:0; text-align:center; font-size:30px; color:rgba(10,10,10,0.8); letter-spacing:0.14em; font-weight:500; margin:0; }
  .t11 .url .ing-ap { color:var(--bg); font-weight:700; }

  /* ════════════════════════════════════════════
     BANNER STYLES
     ════════════════════════════════════════════ */
  /* Banner sizes:
     - bn: OG/post-share (1200x630)
     - bn-li: LinkedIn profile banner (1584x396)
     - bn-co: LinkedIn company page cover (1128x191)
     - bn-lg: Square logo / thumbnail (400x400) for LinkedIn company logo, avatar, favicon */
  .frame.bn { width:1200px; height:630px; }
  .frame.bn-li { width:1584px; height:396px; }
  .frame.bn-co { width:1128px; height:191px; }
  .frame.bn-lg { width:400px; height:400px; }

  .bn { position:relative; overflow:hidden; }
  .bn-wm { position:absolute; right:-60px; bottom:-80px; opacity:0.05; pointer-events:none; }
  .bn-wm .logo-svg.ic { height:360px; width:auto; }

  .bn-statement { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 96px); text-align:center; padding:40px 120px; }
  .bn-statement h2 { font-family:var(--serif); font-size:72px; font-weight:400; color:var(--h1); line-height:1.08; max-width:1000px; letter-spacing:-1.4px; }
  .bn-statement .sub { font-size:28px; color:var(--body-dk); margin-top:28px; line-height:1.5; max-width:820px; }

  .bn-data { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 96px); text-align:center; padding:40px 120px; }
  .bn-data .big-num { font-family:var(--serif); font-size:220px; color:var(--yellow); line-height:0.88; letter-spacing:-7px; font-feature-settings:"tnum"; display:flex; align-items:flex-start; justify-content:center; }
  .bn-data .big-num sup { font-size:72px; opacity:0.55; letter-spacing:0; top:0.08em; margin-left:4px; font-weight:400; }
  .bn-data .context { font-size:30px; color:var(--body-dk); margin-top:26px; max-width:780px; line-height:1.4; }
  .bn-data .meta { font-size:17px; font-weight:500; color:rgba(255,255,255,0.55); margin-top:22px; letter-spacing:2px; text-transform:uppercase; }

  .bn-minimal { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:28px; }
  .bn-minimal .logo-svg.wm { height:96px; width:auto; }
  .bn-minimal .ln { width:72px; height:3px; background:var(--yellow); }
  .bn-minimal .tagline { font-size:19px; color:var(--body-dk); letter-spacing:0.22em; text-transform:uppercase; font-weight:500; }

  /* Wordmark-only: pure black bg, centered wordmark. Scales to any frame size. Perfect for LinkedIn profile banner. */
  .bn-wmark { position:relative; display:flex; align-items:center; justify-content:center; height:100%; }
  .bn-wmark .logo-svg.wm { height:22%; width:auto; max-height:140px; }
  /* For very short/wide linkedin profile banner, scale the wordmark relative to height. */
  .frame.bn-li .bn-wmark .logo-svg.wm { height:52%; max-height:none; }
  .frame.bn-co .bn-wmark .logo-svg.wm { height:56%; max-height:none; }

  /* Icon-only: A-mark positioning varies by format.
     - Horizontal banners (bn, bn-li, bn-co): bottom-right corner (signature style)
     - Square logo (bn-lg): CENTERED (because LinkedIn crops it circular for avatars/company logos) */
  .bn-imark { position:relative; width:100%; height:100%; display:block; }
  .bn-imark .bn-imark-img { position:absolute; width:auto; display:block; }
  .frame.bn .bn-imark .bn-imark-img { height:220px; right:72px; bottom:88px; }
  .frame.bn-li .bn-imark .bn-imark-img { height:170px; right:80px; bottom:64px; }
  .frame.bn-co .bn-imark .bn-imark-img { height:110px; right:45px; bottom:24px; }
  .frame.bn-lg .bn-imark .bn-imark-img { height:240px; top:50%; left:50%; right:auto; bottom:auto; transform:translate(-50%, -50%); }

  /* Wordmark centered — add a specific rule for square logo so it fills proportionally without being tiny. */
  .frame.bn-lg .bn-wmark .logo-svg.wm { height:auto; width:72%; max-height:none; }

  /* ════════════════════════════════════════════
     CASE STUDY STYLES (A4)
     ════════════════════════════════════════════ */
  .frame.a4 { width:794px; height:1123px; }

  .cs { display:flex; flex-direction:column; height:100%; background:#FFFFFF; }
  .cs-header { background:var(--bg); padding:48px 56px 40px; }
  .cs-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
  .cs-header img, .cs-header .logo-svg.wm { height:16px; width:auto; }
  .cs-header .cs-eyebrow { font-family:var(--sans); font-size:11px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--yellow); }
  .cs-client { font-family:var(--serif); font-size:36px; color:var(--h1); line-height:1.15; }
  .cs-meta { font-size:13px; color:var(--body-dk); margin-top:8px; }

  .cs-body { flex:1; padding:40px 56px; display:flex; flex-direction:column; gap:32px; }
  .cs-section h3 { font-family:var(--sans); font-size:12px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--body-lt); margin-bottom:12px; }
  .cs-section p { font-size:15px; color:#333; line-height:1.7; }
  .cs-section .cs-sol-item { display:flex; align-items:flex-start; gap:14px; margin-bottom:14px; }
  .cs-section .cs-sol-num { font-family:var(--serif); font-size:28px; color:var(--yellow); line-height:1; min-width:28px; }
  .cs-section .cs-sol-text { font-size:15px; color:#333; line-height:1.6; padding-top:4px; }

  .cs-stats { display:flex; gap:1px; background:var(--border-lt); margin:8px 0; }
  .cs-stat-card { flex:1; background:#FFF; padding:28px 24px; text-align:center; }
  .cs-stat-num { font-family:var(--serif); font-size:42px; color:var(--bg); line-height:1; margin-bottom:8px; }
  .cs-stat-label { font-size:12px; color:var(--body-dk); line-height:1.4; text-transform:lowercase; }

  .cs-quote { padding:28px 0; border-top:1px solid var(--border-lt); margin-top:auto; }
  .cs-quote blockquote { font-family:var(--serif); font-style:italic; font-size:18px; color:#333; line-height:1.5; margin-bottom:12px; }
  .cs-quote cite { font-size:13px; color:var(--body-dk); font-style:normal; }

  .cs-footer { padding:16px 56px; border-top:1px solid var(--border-lt); display:flex; align-items:center; justify-content:space-between; }
  .cs-footer img, .cs-footer .logo-svg.wm { height:14px; width:auto; }
  .cs-footer .url { font-size:15px; letter-spacing:0.12em; color:rgba(0,0,0,0.5); font-weight:500; }
  .cs-footer .url .ing-ap { color:var(--yellow); font-weight:500; }

  /* ════════════════════════════════════════════
     CASE STUDY MULTI-PAGE & PROPUESTA (A4)
     ════════════════════════════════════════════ */
  .doc-page { width:794px; height:1123px; background:#FFF; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .doc-header { display:flex; justify-content:space-between; align-items:center; padding:32px 56px 0; }
  .doc-header .doc-wm { height:16px; }
  .doc-header .doc-eyebrow { font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:2.4px; text-transform:uppercase; color:var(--yellow); }
  .doc-sep { height:2px; background:var(--yellow); margin:14px 56px 0; }
  .doc-footer { position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:20px 56px; font-size:11px; color:rgba(0,0,0,0.4); letter-spacing:0.1em; border-top:1px solid var(--border-lt); }
  .doc-footer .ing-ap { color:var(--yellow); font-weight:500; }
  .doc-content { flex:1; padding:56px 56px 80px; overflow:hidden; }

  /* Portada oscura compartida */
  .doc-portada { width:794px; height:1123px; background:var(--bg); color:var(--h1); position:relative; padding:80px 64px; display:flex; flex-direction:column; }
  .doc-portada .pt-wm { height:28px; margin-bottom:auto; }

// ── COLOR SELECTOR ──
// Renders a segmented control when the active variant declares `colors`. Clicking a button updates state
// and re-runs generate() if a preview already exists so the user sees the change instantly.
function renderColorBar(colors) {
  const bar = document.getElementById('color-bar');
  if (!colors || !colors.length) {
    bar.classList.remove('on');
    bar.innerHTML = '';
    currentColor = null;
    currentVariantColors = null;
    return;
  }
  currentVariantColors = colors;
  if (!currentColor || !colors.find(c => c.id === currentColor)) {
    currentColor = colors[0].id;
  }
  bar.innerHTML = `<span class="color-label">Color</span>` + colors.map(c =>
    `<button class="color-btn${c.id === currentColor ? ' on' : ''}" data-color="${c.id}" onclick="setColor('${c.id}')">
      <span class="swatch"></span>${c.label}
    </button>`
  ).join('');
  bar.classList.add('on');
}

function setColor(color) {
  currentColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('on', b.dataset.color === color));
  // Re-render if a preview already exists so the change is visible immediately.
  if (renderedFrames.length) generate();
}

// ── IMAGE UPLOADS ──
// ~5MB per image cap: larger files produce data URIs that make the HTML and exports sluggish. LinkedIn compresses anyway.
const MAX_IMG_BYTES = 5 * 1024 * 1024;

function handleImageFiles(files) {
  const list = Array.from(files || []).filter(f => f.type.startsWith('image/'));
  if (!list.length) return;
  list.forEach(file => {
    if (file.size > MAX_IMG_BYTES) {
      toast(`${file.name}: supera los 5MB`);
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      uploadCounter += 1;
      const id = 'img' + uploadCounter;
      uploadedImages[id] = reader.result;
      renderImageThumbs();
    };
    reader.onerror = () => toast('Error leyendo ' + file.name);
    reader.readAsDataURL(file);
  });
}

function removeUploadedImage(id) {
  delete uploadedImages[id];
  renderImageThumbs();
}

function renderImageThumbs() {
  const host = document.getElementById('upload-thumbs');
  if (!host) return;
  const ids = Object.keys(uploadedImages);
  host.innerHTML = ids.map(id => `
    <div class="upload-thumb">
      <img src="${uploadedImages[id]}" alt="${id}">
      <span class="id">${id}</span>
      <button class="rm" title="Eliminar" onclick="removeUploadedImage('${id}')">×</button>
    </div>
  `).join('');
}

function wireUploadZone() {
  const drop = document.getElementById('upload-drop');
  const input = document.getElementById('upload-input');
  if (!drop || !input) return;
  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', e => { handleImageFiles(e.target.files); input.value = ''; });
  ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); drop.classList.add('drag');
  }));
  ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    if (ev === 'dragleave' && e.target !== drop) return;
    drop.classList.remove('drag');
  }));
  drop.addEventListener('drop', e => handleImageFiles(e.dataTransfer.files));
}

// ── SIDEBAR / TYPE SELECTION ──
function selectType(type) {
  currentType = type;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('on'));
  document.querySelector(`[data-type="${type}"]`).classList.add('on');

  const meta = TYPE_META[type];
  document.getElementById('panel-title').textContent = meta.title;
  document.getElementById('panel-desc').textContent = meta.desc;
  document.getElementById('btn-export').textContent = meta.exportLabel;
  document.getElementById('btn-export').disabled = true;

  // Show/hide upload zone based on whether this type supports images.
  document.getElementById('uploads').classList.toggle('on', !!meta.supportsImages);
  // Hide color bar by default; variants re-show it via selectVariant.
  renderColorBar(null);

  // If this type has multiple variants, show the variant picker gallery first.
  const variants = VARIANTS[type];
  const contentEl = document.getElementById('content');
  const contentWrap = contentEl.parentElement;
  if (variants && variants.length) {
    // Hide textarea, show gallery in hint area
    contentWrap.style.display = 'none';
    document.getElementById('hint').innerHTML = renderVariantGallery(type, variants);
  } else {
    contentWrap.style.display = '';
    document.getElementById('hint').innerHTML = meta.hint;
    contentEl.value = meta.example;
  }

  // Reset preview
  document.getElementById('preview').innerHTML = `<div class="empty-state">
    <p style="font-size:32px; opacity:0.15; font-family:var(--serif);">M</p>
    <p>${variants ? 'Elige una plantilla arriba para empezar' : 'Pulsa <strong>Generar Preview</strong> para ver el resultado'}</p>
  </div>`;
  document.getElementById('render-container').innerHTML = '';
  renderedFrames = [];
}

function renderVariantGallery(type, variants) {
  const cards = variants.map(v => `<button class="variant-card" onclick="selectVariant('${type}', '${v.id}')">
    <span class="vn">${v.name}</span>
    <span class="vd">${v.desc}</span>
  </button>`).join('');
  return `<p class="variant-intro"><strong>Elige una plantilla:</strong></p>
    <div class="variant-grid">${cards}</div>`;
}

function selectVariant(type, variantId) {
  const variants = VARIANTS[type] || [];
  const v = variants.find(x => x.id === variantId);
  if (!v) return;
  const meta = TYPE_META[type];
  // Swap UI from gallery to editor
  const contentEl = document.getElementById('content');
  contentEl.parentElement.style.display = '';
  contentEl.value = v.example;
  // Hint: show a "back to gallery" link + the type-level format hint
  document.getElementById('hint').innerHTML = `<div class="variant-back" onclick="selectType('${type}')">\u2190 Ver otras plantillas</div>${meta.hint}`;
  // Color bar: show only if this variant declares `colors`. Reset currentColor so each variant starts on its default.
  currentColor = null;
  renderColorBar(v.colors || null);
  // Auto-generate preview so user sees the variant immediately
  generate();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── PARSER ──
function parseBlock(text) {
  const data = {};
  const lines = text.trim().split('\n');
  let currentKey = null;
  for (const line of lines) {
    // Comment lines (# ...) are ignored outright — they neither open a new key nor append to the previous one.
    if (/^\s*#/.test(line)) { continue; }
    const m = line.match(/^(\w+(?:[-_]\w+)*):\s*(.*)$/);
    if (m) {
      currentKey = m[1].toLowerCase();
      data[currentKey] = m[2].trim();
    } else if (currentKey) {
      data[currentKey] += '\n' + line;
    }
  }
  return data;
}

function applyHighlights(text) {
  // Include trailing punctuation (.,;:!?) INSIDE the yellow highlight so "[realidades]." reads as one visual unit.
  // The previous behavior left punctuation outside, which — combined with the 0.22em side-padding on .hl — produced
  // a visible gap ("realidades ."). Pulling punctuation inside both removes the gap and reads as a single editorial beat.
  // Inner-trailing punctuation ([word.]) is kept inside too (same rule).
  return text.replace(/\[([^\]]+)\]([.,;:!?]*)/g, (_, inner, trailing) => {
    return `<span class="hl">${inner}${trailing}</span>`;
  });
}

// Highlight the .ING suffix in eyebrows (Active Particle pattern: DIAGNOS.ING, PRIORITIZ.ING, etc.)
function applyActiveParticle(text) {
  if (!text) return text;
  return String(text).replace(/\.ING\b/gi, '<span class="ing-ap">.ING</span>');
}

// Returns eyebrow + accent line markup, or empty string if no text provided.
// This way eyebrow-less posts don't show placeholder defaults like "INSIGHT" or "DATO CLAVE".
function eyebrowBlock(text, eyebrowClass, accentClass, accentStyle) {
  if (!text || !String(text).trim()) return '';
  eyebrowClass = eyebrowClass || 'eyebrow-yl';
  accentClass = accentClass || 'accent-yl';
  const style = accentStyle ? ` style="${accentStyle}"` : '';
  return `<span class="eyebrow ${eyebrowClass}">${applyActiveParticle(text)}</span>
    <div class="accent ${accentClass}"${style}></div>`;
}

  // Footer here is a custom 68px bar (landscape is short), so we inline the class + swatches per surface.
  const footer = color === 'dark'
    ? `<div class="ftr ftr-dk" style="height:68px;padding:0 100px">${wordmark('#FAFAFA')}<span class="url url-dk">magnify.<span class="ing-ap">ing</span></span></div>`

function renderCuadrante(d) {
  const symbolize = (s) => (s || '')
    .replace(/^->\s*/, '\u2192 ')
    .replace(/^=>\s*/, '\u2192 ')
    .replace(/^\*\s*/, '\u2605 ')
    .replace(/^x\s*/i, '\u2715 ')
    .replace(/^!\s*/, '\u26A0 ');
  const cell = (n) => {
    const flags = [];
    if ((d[`q${n}_highlight`] || '').toLowerCase() === 'si') flags.push('hl');
    if ((d[`q${n}_dimmed`] || '').toLowerCase() === 'si') flags.push('dim');
    return `<div class="tcq-cell q${n} ${flags.join(' ')}">
      <div>
        <div class="nm">${d[`q${n}_nombre`] || ''}</div>
        <div class="ds">${d[`q${n}_desc`] || ''}</div>
      </div>
      <div class="tg">${symbolize(d[`q${n}_tag`])}</div>
    </div>`;
  };
  return `<div class="frame sq lt"><div class="tcq">
    <div class="tcq-head">
      <div>
        ${eyebrowBlock(d.eyebrow, 'eyebrow-lt', 'accent-yl')}

        <span class="lbl">${d.eje_y || 'Eje Y'}</span>
        <span class="tip">${d.eje_y_min || 'Baja'}</span>
      </div>
      ${cell(1)}${cell(2)}${cell(3)}${cell(4)}
      <div class="tcq-axis-x">
        <span class="tip">${d.eje_x_min || 'Baja'}</span>
        <span class="lbl mid">${d.eje_x || 'Eje X'}</span>

    </div>
  </div>${ftrLt()}</div>`;
}

function renderCarouselText(d, slideNum, totalSlides) {

function renderCarouselSplit(d, slideNum, totalSlides) {
  const dots = Array.from({ length: totalSlides }, (_, i) =>
    `<div class="t9-dot${i + 1 === slideNum ? ' on' : ''}"></div>`
  ).join('');
  // Extract suffix (%, x, +) from stat for sup treatment
  let statNum = d.stat || d.numero || '73%';
  const statMatch = String(statNum).match(/^(\d+[.,]?\d*)([%x+]+)?$/);
  let statHtml;
  if (statMatch && statMatch[2]) {
    statHtml = `${statMatch[1]}<sup>${statMatch[2]}</sup>`;
  } else {
    statHtml = statNum;
  }
  return `<div class="frame cr dk"><div class="t10">
    <div class="t10-top">
      ${eyebrowBlock(d.eyebrow, 'eyebrow-yl', 'accent-yl', 'margin-bottom:0')}

}

function renderCarouselImage(d, slideNum, totalSlides) {
  // Full-bleed photo slide with lower gradient + caption. Image is referenced by its uploaded ID (img1, img2…);
  // if the ID doesn't resolve (user forgot to upload or typo'd), we render a diagonal-stripe placeholder so the
  // user sees immediately that the reference is broken without the preview blowing up.
  const imgRef = (d.imagen || d.image || '').trim().toLowerCase();
  const dataUrl = uploadedImages[imgRef];
  const photoHtml = dataUrl
    ? `<div class="photo" style="background-image:url('${dataUrl}')"></div>`
    : `<div class="photo empty">Sin imagen — sube una y referénciala como <code style="margin:0 .3em">${imgRef || 'img1'}</code></div>`;
  const dots = Array.from({ length: totalSlides }, (_, i) =>
    `<div class="d${i + 1 === slideNum ? ' on' : ''}"></div>`
  ).join('');
  return `<div class="frame cr dk"><div class="t-img">
    ${photoHtml}
    <div class="shade"></div>
    <div class="copy">
      ${d.eyebrow ? `<div class="eb">${d.eyebrow}</div>` : ''}
      <h2>${applyHighlights(d.titular || '')}</h2>
    </div>
    <div class="dots">${dots}</div>
  </div>${ftrCDk()}</div>`;
}

function renderCarouselCTA(d) {
  // titular = main message/headline at top (serif, dark).
  // url = URL footer at bottom of slide. Fallback: accept legacy `cta` only if it looks like a URL, otherwise treat as message.
  const ctaLooksLikeUrl = d.cta && /\b(\.ing|\.com|\.co|\.es|\/)\b/i.test(d.cta);
  const url = d.url || (ctaLooksLikeUrl ? d.cta : null) || 'magnify.ing';
  const titular = d.titular || (ctaLooksLikeUrl ? null : d.cta) || '\u00bfHablamos?';
  // Auto-highlight the .ing TLD in the URL for brand consistency.
  const urlHtml = url.replace(/\.ing(\/|$)/i, '.<span class="ing-ap">ing</span>$1');
  return `<div class="frame cr yl"><div class="t11">
    <h2>${applyHighlights(titular)}</h2>
    <div class="t11-ln"></div>
    <div class="logo-area">${wordmark('#0A0A0A')}</div>
    <p class="url">${urlHtml}</p>
  </div></div>`;
}

function parseMultiDoc(raw) {
  const blocks = raw.split(/^---$/m).map(b => b.trim()).filter(Boolean);
  if (blocks.length === 0) return { global: {}, sections: [] };
  const global = parseBlock(blocks[0]);
  const sections = blocks.slice(1).map(b => parseBlock(b));
  return { global, sections };
}

function pageHeader(label) {
  return `<div class="doc-header">
    ${wordmark('#0A0A0A').replace('class="logo-svg wm"', 'class="logo-svg wm doc-wm"')}
    <span class="doc-eyebrow">${label}</span>
  </div><div class="doc-sep"></div>`;
}
function pageFooter(pageN, total) {
  const num = String(pageN).padStart(2, '0');
  const tot = String(total).padStart(2, '0');
  return `<div class="doc-footer"><span>${num} / ${tot}</span><span>magnify.<span class="ing-ap">ing</span></span></div>`;
}

function parseSlashStat(s) {
  if (!s) return { num: '', lbl: '' };
  const parts = s.split('/');
  return { num: (parts[0] || '').trim(), lbl: (parts.slice(1).join('/') || '').trim() };
}

function renderCSCierre(g, s, pN, tot) {

function generateMultiPageDoc(raw, preview, renderC, renderers, options) {
  const { global, sections } = parseMultiDoc(raw);
  if (sections.length === 0) { toast('A\u00f1ade al menos una secci\u00f3n separada por ---'); return; }

  const total = sections.length;
  const pages = [];
  sections.forEach((s, idx) => {
    const key = (s.seccion || '').toLowerCase().trim();
    const fn = renderers[key];
    if (!fn) return;
    // portada is page 1 but no numbered footer logic — still pass
    const html = fn(global, s, idx + 1, total, sections.find(x => (x.seccion || '').toLowerCase() === 'aproximacion'));
    pages.push({ html, label: key });
  });

  // Render into renderC and preview
  const previewCols = Math.min(2, pages.length);
  pages.forEach((p, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = p.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));
  });

  const w = 794, h = 1123;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 120;
  const scale = Math.min((maxW / 2 - 32) / w, maxH / h, 0.45);

  pages.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'preview-card paper';
    card.style.width = (w * scale) + 'px';
    card.style.height = (h * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${String(i + 1).padStart(2, '0')} \u00b7 ${p.label}</div>` + p.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

const PPTX_W = 13.33, PPTX_H = 7.5;
const COLOR_DARK = '0A0A0A', COLOR_YELLOW = 'FFD600', COLOR_WHITE = 'FFFFFF';
const COLOR_LIGHT_TEXT = 'F0F0F0', COLOR_GREY = '999999', COLOR_GREY_DK = '444444';
const FONT_SERIF = 'DM Serif Display', FONT_SANS = 'Inter';

// Convert [highlight] syntax to pptxgenjs rich text array.
// bgMode: 'light' (default), 'dark', or 'yellow' — determines highlight treatment since Keynote doesn't render OOXML highlight reliably.
function richWithHighlights(text, baseOpts, bgMode) {
  bgMode = bgMode || 'light';
  const parts = [];
  const re = /\[([^\]]+)\]/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ text: text.slice(last, m.index), options: baseOpts });
    let hlOpts;
    if (bgMode === 'dark') {
      hlOpts = { ...baseOpts, color: COLOR_YELLOW, bold: true };
    } else if (bgMode === 'yellow') {
      hlOpts = { ...baseOpts, color: COLOR_DARK, bold: true, italic: true };
    } else {
      // light: yellow color + bold reads well on white
      hlOpts = { ...baseOpts, color: 'B8A000', bold: true };
    }
    // Extract trailing punctuation from the highlight so the bold/yellow run doesn't include it — punctuation stays in the normal baseOpts run.
    const inner = m[1];
    const punctMatch = inner.match(/^(.*?)([.,;:!?]+)$/);
    if (punctMatch) {
      parts.push({ text: punctMatch[1], options: hlOpts });
      parts.push({ text: punctMatch[2], options: baseOpts });
    } else {
      parts.push({ text: inner, options: hlOpts });
    }
    last = re.lastIndex;
  }
  if (last < text.length) parts.push({ text: text.slice(last), options: baseOpts });
  return parts.length ? parts : [{ text: text, options: baseOpts }];
}

function stripBrackets(text) {
  return (text || '').replace(/\[([^\]]+)\]/g, '$1');
}

function wordmarkDataUri(color) {
  // Same intrinsic-ratio fix as iconDataUri — explicit width/height so <img> knows the aspect.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="178" viewBox="348 620 2140 178"><path fill="${color}" d="${WORDMARK_PATH}"/></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}
function iconDataUri(color) {
  // Explicit width/height attributes on the SVG root — needed so <img> gets the correct intrinsic aspect ratio (155:178). Without them, browsers default to 300x150 which distorts the A-mark.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="155" height="178" viewBox="65 52 155 178"><polygon fill="${color}" points="${ICON_POINTS}"/></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}

function buildPptxTimeline(pptx, d) {
  const s = pptx.addSlide();
  s.background = { color: COLOR_WHITE };

  const fases = [];
  for (let i = 1; i <= 4; i++) {
    if (d[`fase${i}_titulo`] || d[`fase${i}_etiqueta`]) {
      fases.push({ et: d[`fase${i}_etiqueta`] || '', ti: d[`fase${i}_titulo`] || '', du: d[`fase${i}_duracion`] || '' });
    }
  }
  const fW = (11.9 - (fases.length - 1) * 0.3) / fases.length;
  fases.forEach((f, i) => {
    const fx = 0.7 + i * (fW + 0.3);
    const m = f.et.match(/^(.+?)(\.ING)$/i);
    const etRich = m ? [
      { text: m[1], options: { fontFace: FONT_SANS, fontSize: 16, color: COLOR_DARK, bold: true, charSpacing: 2 } },
      { text: m[2], options: { fontFace: FONT_SANS, fontSize: 16, color: 'B8A000', bold: true, charSpacing: 2 } }

    s.addText(etRich, { x: fx, y: 2.3, w: fW, h: 0.45 });
    s.addText(f.ti, { x: fx, y: 2.85, w: fW, h: 1.3, fontFace: FONT_SERIF, fontSize: 28, color: COLOR_DARK });
    s.addText(f.du, { x: fx, y: 4.3, w: fW, h: 0.45, fontFace: FONT_SANS, fontSize: 16, color: '444444' });
    s.addShape(pptx.ShapeType.rect, { x: fx, y: 4.95, w: fW, h: 0.08, fill: { color: COLOR_YELLOW }, line: { color: COLOR_YELLOW } });

function generatePresentacion(raw, preview, renderC) {
  const { global, sections } = parseMultiDoc(raw);
  if (sections.length === 0) { toast('A\u00f1ade al menos un slide separado por ---'); return; }

  const slides = [];
  sections.forEach((s, idx) => {
    const key = (s.slide || '').toLowerCase().trim();
    const fn = PS_RENDERERS[key];
    if (!fn) return;
    slides.push({ key, data: s, html: fn(s, global) });
  });

  if (slides.length === 0) { toast('Ning\u00fan slide reconocido. Usa slide: portada/divisor/contenido/etc.'); return; }

  const w = 1920, h = 1080;
  const maxW = preview.clientWidth - 80;
  const colW = (maxW - 32) / 2;
  const scale = Math.min(colW / w, 0.4);

  slides.forEach((sl, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = sl.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.style.width = (w * scale) + 'px';
    card.style.height = (h * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${String(i + 1).padStart(2, '0')} \u00b7 ${sl.key}</div>` + sl.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

async function exportPptx() {
  const raw = document.getElementById('content').value.trim();
  const { global, sections } = parseMultiDoc(raw);
  if (!window.PptxGenJS) { toast('pptxgenjs no cargado'); return; }
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';
  pptx.title = global.titulo || 'Presentacion Magnify';
  pptx.author = global.autor || 'Magnify';

  // Wrap addSlide to capture a reference to the last slide so we can attach speaker notes
  const origAddSlide = pptx.addSlide.bind(pptx);
  let lastSlide = null;
  pptx.addSlide = function(...args) {
    lastSlide = origAddSlide(...args);
    return lastSlide;
  };

  sections.forEach(s => {
    const key = (s.slide || '').toLowerCase().trim();
    const fn = PS_BUILDERS[key];
    if (!fn) return;
    fn(pptx, s, global);
    // Speaker notes: any `notas:` field on the slide (also accept `notes:` alias)
    const notas = s.notas || s.notes || '';
    if (notas && lastSlide && typeof lastSlide.addNotes === 'function') {
      lastSlide.addNotes(notas);
    }
  });

  const slug = (global.titulo || 'presentacion').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  await pptx.writeFile({ fileName: `magnify-presentacion-${slug}.pptx` });
  toast('\u2713 PPTX descargado');
}

function showError(msg) {
  const el = document.getElementById('err');
  el.innerHTML = msg;
  el.classList.add('show');
}
function clearError() {
  const el = document.getElementById('err');
  el.classList.remove('show');
  el.innerHTML = '';
}

// Quick sanity check on the raw input: looks like key:value at all?
function validateShape(raw) {
  const hasKV = /^\s*\w[\w-]*:\s*.+/m.test(raw);
  if (!hasKV) {
    return 'El formato esperado es <code>clave: valor</code> (una por línea). No he encontrado ninguna línea con ese patrón. Mira el ejemplo del panel de ayuda.';
  }
  return null;
}

function generate() {
  clearError();
  const raw = document.getElementById('content').value.trim();
  if (!raw) { showError('Pega tu contenido primero. Copia el ejemplo del panel de ayuda si necesitas una plantilla.'); return; }

  const shapeErr = validateShape(raw);
  if (shapeErr) { showError('<strong>Formato no reconocido.</strong> ' + shapeErr); return; }

  const preview = document.getElementById('preview');
  const renderC = document.getElementById('render-container');
  preview.innerHTML = '';
  renderC.innerHTML = '';
  renderedFrames = [];

  try {
    switch (currentType) {
      case 'linkedin-post': generatePost(raw, preview, renderC); break;
      case 'linkedin-carousel': generateCarousel(raw, preview, renderC); break;
      case 'banner': generateBanner(raw, preview, renderC); break;
      case 'case-study': generateMultiPageDoc(raw, preview, renderC, CS_RENDERERS, { label: 'Caso de estudio' }); break;
      case 'propuesta': generateMultiPageDoc(raw, preview, renderC, PR_RENDERERS, { label: 'Propuesta' }); break;
      case 'report-cover': generateA4(raw, preview, renderC, renderReportCover); break;
      case 'email-sig': generateSig(raw, preview, renderC); break;
      case 'presentacion': generatePresentacion(raw, preview, renderC); break;
    }
  } catch (e) {
    console.error(e);
    showError('<strong>Error al generar:</strong> ' + (e && e.message ? e.message : String(e)) + '. Revisa la estructura de tu texto.');
    document.getElementById('btn-export').disabled = true;
    return;
  }

  document.getElementById('btn-export').disabled = renderedFrames.length === 0;
}

function generatePost(raw, preview, renderC) {
  const data = parseBlock(raw);
  const tpl = data.plantilla || 'quote';
  const renderer = postRenderers[tpl];
  if (!renderer) { toast('Plantilla no reconocida: ' + tpl); return; }

  const html = renderer(data);

  const actualDiv = document.createElement('div');
  actualDiv.innerHTML = html;
  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  const frame = actualDiv.querySelector('.frame');
  const w = frame.offsetWidth;
  const h = frame.offsetHeight;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 80;
  const scale = Math.min(maxW / w, maxH / h, 0.7);

  const card = document.createElement('div');
  card.className = 'preview-card';
  card.style.width = (w * scale) + 'px';
  card.style.height = (h * scale) + 'px';
  card.innerHTML = html;
  const inner = card.querySelector('.frame');
  inner.style.transform = `scale(${scale})`;
  inner.style.transformOrigin = 'top left';
  preview.appendChild(card);
}

function generateCarousel(raw, preview, renderC) {
  const blocks = raw.split(/^---$/m).map(b => b.trim()).filter(Boolean);
  if (blocks.length === 0) { toast('Separa cada slide con ---'); return; }

  const totalContent = blocks.length;
  const slides = [];

  blocks.forEach((block, idx) => {
    const data = parseBlock(block);
    let html;

    const plantilla = (data.plantilla || '').toLowerCase().trim();
    if (idx === 0 || plantilla === 'cover' || plantilla === 'portada') {
      html = renderCarouselCover(data);
    } else if (plantilla === 'cta' || (data.cta && !data.titular && !data.cuerpo)) {
      html = renderCarouselCTA(data);
    } else if (plantilla === 'imagen' || plantilla === 'image' || plantilla === 'foto') {
      html = renderCarouselImage(data, idx, totalContent);
    } else if (plantilla === 'stat' || data.stat || data.numero) {
      html = renderCarouselSplit(data, idx, totalContent);
    } else {
      html = renderCarouselText(data, idx, totalContent);
    }

    slides.push({ html, label: idx === 0 ? 'Portada' : (data.cta && !data.titular ? 'CTA' : `Slide ${idx}`) });
  });

  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 120;
  const scale = Math.min(maxW / (slides.length * 300), maxH / 375, 0.35);

  slides.forEach((s, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = s.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.style.width = (1080 * scale) + 'px';
    card.style.height = (1350 * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${s.label}</div>` + s.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

function generateBanner(raw, preview, renderC) {
  const data = parseBlock(raw);

  // formato selects the canvas size. default = og (1200x630 post-share).

  else if (formato === 'linkedin-company' || formato === 'company') frameClass = 'frame bn-co';
  else if (formato === 'logo' || formato === 'square' || formato === 'thumbnail' || formato === 'avatar') frameClass = 'frame bn-lg';

  // statement/data only fit on the 1200x630 canvas — too tight on the other formats.
  let html;
  if (frameClass !== 'frame bn' && (tpl === 'statement' || tpl === 'data')) {
    toast(`Plantilla "${tpl}" no cabe en formato ${formato}. Usa wordmark, icon o minimal.`);
    return;
  } else {
    html = renderer(data, frameClass);
  }

  const actualDiv = document.createElement('div');
  actualDiv.innerHTML = html;
  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  const frame = actualDiv.querySelector('.frame');
  const w = frame.offsetWidth;
  const h = frame.offsetHeight;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 80;
  const scale = Math.min(maxW / w, maxH / h, 0.7);

  const card = document.createElement('div');
  card.className = 'preview-card';
  card.style.width = (w * scale) + 'px';
  card.style.height = (h * scale) + 'px';
  card.innerHTML = html;
  const inner = card.querySelector('.frame');
  inner.style.transform = `scale(${scale})`;

  preview.appendChild(card);
}

  renderC.appendChild(actualDiv);
  renderedFrames = [actualDiv.querySelector('.frame')];

  // Preview at 1:1 scale, centered
  const card = document.createElement('div');
  card.className = 'preview-card';
  card.style.width = '600px';
  card.innerHTML = html;
  preview.appendChild(card);

  // Store data for HTML copy
  card.dataset.sigData = JSON.stringify(data);
}

// ════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════

async function exportAll() {
  if (renderedFrames.length === 0) return;

  // Email signature: copy HTML
  if (currentType === 'email-sig') {
    const raw = document.getElementById('content').value.trim();
    const data = parseBlock(raw);
    const inlineHtml = generateEmailSigInlineHTML(data);
    try {
      await navigator.clipboard.writeText(inlineHtml);
      toast('\u2713 HTML copiado al portapapeles');
    } catch (e) {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = inlineHtml;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('\u2713 HTML copiado al portapapeles');
    }
    return;
  }

  // Presentacion: export .pptx editable
  if (currentType === 'presentacion') {
    toast('Generando PPTX...');
    try { await exportPptx(); } catch (e) { console.error(e); toast('Error: ' + e.message); }
    return;
  }

  toast('Generando...');

  if ((currentType === 'case-study' || currentType === 'propuesta') && renderedFrames.length > 0) {
    // Multi-page PDF
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'pt', format: 'a4', orientation: 'portrait' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    for (let i = 0; i < renderedFrames.length; i++) {
      const canvas = await html2canvas(renderedFrames[i], { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false });
      const imgData = canvas.toDataURL('image/png');
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, 0, pageW, pageH);
    }
    const raw = document.getElementById('content').value.trim();
    const g = parseMultiDoc(raw).global;
    const slug = (g.cliente || 'doc').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const prefix = currentType === 'case-study' ? 'magnify-caso' : 'magnify-propuesta';
    pdf.save(`${prefix}-${slug}.pdf`);
    toast('\u2713 PDF descargado');
    return;
  }

  if (currentType === 'linkedin-carousel' && renderedFrames.length > 1) {
    // LinkedIn Document Post requires a single multi-page PDF (not individual PNGs).
    // Page size matches the 1080x1350 carousel aspect. We also bundle PNGs in the same ZIP for flexibility (LinkedIn native image carousel, Instagram, etc.).
    const { jsPDF } = window.jspdf;
    const SLIDE_W = 1080, SLIDE_H = 1350;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [SLIDE_W, SLIDE_H] });
    const zip = new JSZip();
    for (let i = 0; i < renderedFrames.length; i++) {
      const canvas = await html2canvas(renderedFrames[i], { scale: 2, useCORS: true, backgroundColor: null, logging: false });
      const dataUrl = canvas.toDataURL('image/png');
      if (i > 0) pdf.addPage([SLIDE_W, SLIDE_H], 'portrait');
      pdf.addImage(dataUrl, 'PNG', 0, 0, SLIDE_W, SLIDE_H, undefined, 'FAST');
      const base64 = dataUrl.split(',')[1];
      zip.file(`slide-${String(i + 1).padStart(2, '0')}.png`, base64, { base64: true });
    }
    // PDF first (primary format for LinkedIn Document Post)
    pdf.save('magnify-carousel.pdf');
    // PNGs zip as bonus (for native image carousel / Instagram / reuse)
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipLink = document.createElement('a');
    zipLink.download = 'magnify-carousel-pngs.zip';
    zipLink.href = URL.createObjectURL(zipBlob);
    zipLink.click();
    toast('\u2713 PDF + ZIP de PNGs descargados');
  } else {
    // Single PNG
    const canvas = await html2canvas(renderedFrames[0], { scale: 1, useCORS: true, backgroundColor: null, logging: false });
    const link = document.createElement('a');
    const names = {
      'linkedin-post': 'magnify-post.png',
      'linkedin-carousel': 'magnify-carousel.png',
      'banner': 'magnify-banner.png',
      'case-study': 'magnify-case-study.png',
      'report-cover': 'magnify-report-cover.png',
    };
    link.download = names[currentType] || 'magnify-export.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('\u2713 PNG descargado');
  }
}
