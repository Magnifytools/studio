<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnify Content Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='65 52 155 178'%3E%3Crect x='65' y='52' width='155' height='178' fill='%23FFD600'/%3E%3Cpolygon fill='%230A0A0A' points='141.7,77.7 97.6,224.7 71,224.7 133.9,57.9 141.7,57.9 149.5,57.9 212.3,224.7 185.7,224.7'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" integrity="sha384-Cck14aA9cifjYolcnjebXRfWGkz5ltHMBiG4px/j8GS+xQcb7OhNQWZYyWjQ+UwQ" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  @font-face { font-family: 'NM'; src: url('fonts/PPNeueMontreal-Book.woff2') format('woff2'); font-weight: 400; }
  @font-face { font-family: 'NM'; src: url('fonts/PPNeueMontreal-Medium.woff2') format('woff2'); font-weight: 500; }
  @font-face { font-family: 'NM'; src: url('fonts/PPNeueMontreal-Bold.woff2') format('woff2'); font-weight: 700; }

  :root {
    --bg: #0A0A0A; --yellow: #FFD600; --h1: #F0F0F0; --h2: #FAFAFA;
    --body-dk: #999999; --body-lt: #444444;
    --border-dk: rgba(255,255,255,0.1); --border-lt: rgba(0,0,0,0.1);
    /* DM Serif Display es la fuente oficial Magnify (cargada via Google Fonts arriba; misma
       que usa la web magnify.ing y el design system PPTX). Georgia es fallback offline.
       Helvetica Neue/Arial cubren glyphs griegos que NM no incluye (B14: τέλος, Έ, etc.) —
       per-glyph fallback, NM se sigue usando para latín. */
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'NM', 'PP Neue Montreal', 'Helvetica Neue', Arial, system-ui, sans-serif;
    /* Mono coherente con la marca (pies de dossier, eyebrows técnicos, .ing en footer).
       JetBrains Mono se carga vía Google Fonts arriba; SF Mono es el fallback en Mac. */
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0A0A0A; font-family: var(--sans); color: var(--h2);
    -webkit-font-smoothing: antialiased; height:100vh; overflow:hidden;
  }

  /* ── LAYOUT ── */
  .layout { display:flex; height:100vh; }

  /* ── SIDEBAR ── */
  /* Sidebar: icon + label row. Wide enough to show what each template is without guessing ASCII symbols. */
  .sidebar {
    width:220px; min-width:220px; background:#0D0D0D;
    border-right:1px solid var(--border-dk);
    display:flex; flex-direction:column;
    padding:20px 12px; gap:2px;
  }
  .sidebar-logo {
    height:36px; display:flex; align-items:center; padding:0 12px;
    margin-bottom:24px;
  }
  .sidebar-logo img, .sidebar-logo .logo-svg.ic { height:24px; width:auto; }
  .sidebar-item {
    width:100%; min-height:44px; padding:10px 14px;
    display:flex; align-items:center; gap:14px;
    border-radius:8px; cursor:pointer; transition:background 0.15s, color 0.15s;
    position:relative; color:#888; border:none; background:transparent; text-align:left;
    font-family:var(--sans); font-size:14px; font-weight:500; line-height:1.2;
  }
  .sidebar-item .ic {
    flex-shrink:0; width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    font-size:18px; font-family:var(--sans); font-weight:700; color:inherit; opacity:0.85;
  }
  .sidebar-item:hover { background:rgba(255,255,255,0.05); color:#DDD; }
  .sidebar-item.on { color:var(--yellow); background:rgba(255,214,0,0.08); }
  .sidebar-item.on .ic { opacity:1; }
  .sidebar-item.on::before {
    content:''; position:absolute; left:-12px; top:10px; bottom:10px;
    width:3px; background:var(--yellow); border-radius:0 3px 3px 0;
  }

  /* ── CENTER PANEL ── */
  .panel {
    width:400px; min-width:400px; background:#111;
    border-right:1px solid var(--border-dk);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .panel-head {
    padding:20px 24px 16px; border-bottom:1px solid var(--border-dk);
  }
  .panel-head h2 { font-size:18px; font-weight:600; color:#F0F0F0; margin-bottom:6px; }
  .panel-head p { font-size:13px; color:#999; line-height:1.4; }

  /* Textarea */
  .input-area { flex:1; padding:16px 24px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
  .input-area label {
    font-size:12px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; color:#BBB; display:block; margin-bottom:8px;
  }
  .input-area textarea {
    width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px;
    color:#EEE; font-family:'SF Mono', 'Fira Code', monospace; font-size:13px;
    padding:14px; line-height:1.7; resize:none; outline:none; transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color:var(--yellow); }
  .input-area textarea.main { flex:1; min-height:200px; }
  /* Hint: bigger + much higher contrast. 14px light grey on #111 bg = 8:1 contrast ratio (AAA). */
  .hint { font-size:13px; color:#C8C8C8; line-height:1.65; }
  .hint strong { color:#F0F0F0; }
  .hint code { color:var(--yellow); font-family:'SF Mono', monospace; font-size:12px; background:rgba(255,214,0,0.08); padding:2px 6px; border-radius:3px; }

  /* Error panel: persistent, inline in the input column (not a transient toast) so the user can read the parser complaint while they edit. */
  .err {
    display:none; background:rgba(255,80,80,0.08); border:1px solid rgba(255,80,80,0.4);
    border-radius:8px; padding:12px 14px; font-size:13px; color:#FFB4B4; line-height:1.5;
  }
  .err.show { display:block; }
  .err strong { color:#FF8080; font-weight:600; }
  .err code { font-family:'SF Mono', monospace; font-size:12px; color:#FFD0D0; background:rgba(255,80,80,0.12); padding:1px 5px; border-radius:3px; }

  /* Warning panel: yellow, soft. Non-blocking hints at rule violations (titulares largos, demasiados bullets, ritmo sin respiro). Distinto de .err porque el preview igual se genera. */
  .warn {
    display:none; background:rgba(255,214,0,0.06); border:1px solid rgba(255,214,0,0.35);
    border-radius:8px; padding:10px 14px; font-size:13px; color:#F0E59A; line-height:1.5;
    margin-top:8px;
  }
  .warn.show { display:block; }
  .warn strong { color:var(--yellow); font-weight:600; }
  .warn ul { list-style:none; padding:0; margin:8px 0 0; }
  .warn li { padding:2px 0; }
  .warn li::before { content:"⚠ "; color:var(--yellow); margin-right:4px; }
  .warn code { font-family:'SF Mono', monospace; font-size:12px; color:#FFECB0; background:rgba(255,214,0,0.1); padding:1px 5px; border-radius:3px; }

  /* Stats panel: slide count, estimated time, word count. Non-critical UI, discreto. */
  .stats {
    display:none; font-size:11.5px; color:#888; margin-top:10px;
    display:flex; gap:16px; flex-wrap:wrap; padding:8px 12px;
    background:rgba(255,255,255,0.02); border-radius:6px;
  }
  .stats.show { display:flex; }
  .stats .stat { display:flex; gap:4px; align-items:baseline; }
  .stats .stat b { color:#DDD; font-weight:500; }
  .stats .stat .warn-inline { color:var(--yellow); }

  /* Image uploads: only rendered for content types that support images (see TYPE_META.supportsImages). Images are embedded as data URIs in state, referenced from the textarea as img1, img2… */
  .uploads { display:none; }
  .uploads.on { display:block; }
  .uploads-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:12px; }
  .uploads-head label { margin-bottom:0 !important; }
  .uploads-head .hint-inline { font-size:11.5px; color:#888; letter-spacing:0; text-transform:none; font-weight:400; }
  .uploads-head .hint-inline code { font-family:'SF Mono', monospace; font-size:11px; color:var(--yellow); background:rgba(255,214,0,0.08); padding:1px 5px; border-radius:3px; }
  .upload-drop { border:1px dashed #333; border-radius:8px; padding:18px 14px; text-align:center; color:#999; font-size:12px; cursor:pointer; transition:all 0.15s; user-select:none; }
  .upload-drop u { color:#ccc; text-decoration:underline; }
  .upload-drop:hover, .upload-drop.drag { border-color:var(--yellow); color:#ddd; background:rgba(255,214,0,0.04); }
  .upload-thumbs { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-top:10px; }
  .upload-thumb { position:relative; aspect-ratio:1/1; background:#1a1a1a; border-radius:6px; overflow:hidden; border:1px solid #2a2a2a; }
  .upload-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .upload-thumb .id { position:absolute; top:4px; left:4px; background:var(--yellow); color:var(--bg); font-size:10px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:0.04em; font-family:'SF Mono', monospace; }
  .upload-thumb .rm { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.75); color:#fff; width:20px; height:20px; border-radius:50%; border:none; cursor:pointer; font-size:12px; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; }
  .upload-thumb .rm:hover { background:#c33; }
  /* Botones ↑/↓ para reordenar imágenes: al mover se reasignan los IDs (img1 queda siempre el primero). */
  .upload-thumb .move { position:absolute; bottom:4px; right:4px; display:flex; gap:2px; }
  .upload-thumb .mv { background:rgba(0,0,0,0.75); color:#fff; width:20px; height:20px; border-radius:3px; border:none; cursor:pointer; font-size:13px; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; }
  .upload-thumb .mv:hover { background:var(--yellow); color:var(--bg); }

  /* Color selector: appears only for variants that declare `colors`. Segmented-control look. */
  .color-bar { display:none; align-items:center; gap:10px; padding:14px 24px 0; }
  .color-bar.on { display:flex; }
  .color-bar .color-label { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#BBB; }
  .color-btn {
    display:inline-flex; align-items:center; gap:8px;
    background:#1a1a1a; border:1px solid #2a2a2a; border-radius:999px;
    padding:6px 14px 6px 8px; color:#bbb; font-family:var(--sans); font-size:12px; font-weight:500;
    cursor:pointer; transition:all 0.15s;
  }
  .color-btn:hover { border-color:#555; color:#ddd; }
  .color-btn .swatch { width:16px; height:16px; border-radius:50%; border:1px solid rgba(255,255,255,0.15); flex-shrink:0; }
  .color-btn[data-color="dark"] .swatch { background:#0A0A0A; }
  .color-btn[data-color="light"] .swatch { background:#FFFFFF; border-color:rgba(0,0,0,0.15); }
  .color-btn[data-color="yellow"] .swatch { background:#FFD600; border-color:rgba(0,0,0,0.15); }
  .color-btn.on { background:var(--yellow); color:var(--bg); border-color:var(--yellow); }
  .color-btn.on .swatch { border-color:rgba(10,10,10,0.3); }

  /* Variant gallery: shown when a type has multiple sub-variants. User picks one, then edits. */
  .variant-intro { font-size:13px; color:#C8C8C8; line-height:1.5; margin-bottom:14px; }
  .variant-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .variant-card {
    background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px;
    padding:12px 14px; cursor:pointer; transition:all 0.15s; text-align:left;
    display:flex; flex-direction:column; gap:4px;
  }
  .variant-card:hover { border-color:var(--yellow); background:#1f1f1f; }
  .variant-card.on { border-color:var(--yellow); background:rgba(255,214,0,0.06); }
  .variant-card .vn { font-family:var(--serif); font-size:17px; color:#F0F0F0; line-height:1.1; }
  .variant-card .vd { font-size:11.5px; color:#999; line-height:1.4; }
  /* Back link must sit on its own line (above the "Formato:" hint block), so display:flex + width:fit-content over the previous inline-flex which was flowing inline with the following text. */
  .variant-back { font-size:12px; color:#888; cursor:pointer; margin-bottom:16px; display:flex; width:fit-content; align-items:center; gap:6px; padding:4px 2px; }
  .variant-back:hover { color:var(--yellow); }

  /* Buttons */
  .actions { padding:16px 24px; border-top:1px solid var(--border-dk); display:flex; flex-direction:column; gap:8px; }
  .btn {
    width:100%; padding:12px; border:none; border-radius:8px; font-family:var(--sans);
    font-size:13px; font-weight:500; cursor:pointer; transition: all 0.15s; letter-spacing:0.02em;
  }
  .btn-primary { background:var(--yellow); color:var(--bg); }
  .btn-primary:hover { background:#ffe640; }
  .btn-secondary { background:#1a1a1a; color:#aaa; border:1px solid #2a2a2a; }
  .btn-secondary:hover { border-color:#444; color:#ddd; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* ── RIGHT: PREVIEW ── */
  .preview-area {
    flex:1; overflow:auto; padding:40px;
    display:flex; flex-wrap:wrap; gap:32px; align-content:flex-start; justify-content:center;
  }
  .preview-card {
    position:relative; box-shadow:0 4px 24px rgba(0,0,0,0.4);
    border-radius:4px; overflow:hidden; transition: box-shadow 0.2s;
  }
  .preview-card:hover { box-shadow:0 4px 32px rgba(255,214,0,0.15); }
  .preview-card.paper {
    box-shadow: 0 2px 20px rgba(0,0,0,0.5), 0 0 60px rgba(0,0,0,0.3);
    border-radius:2px;
  }
  .slide-label {
    position:absolute; top:-28px; left:0; font-size:11px; font-weight:500;
    letter-spacing:1.2px; text-transform:uppercase; color:#555;
  }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#111; color:#ddd; font-family:var(--sans); font-size:13px; font-weight:500;
    padding:12px 24px; border-radius:50px; border:1px solid var(--border-dk);
    box-shadow:0 8px 32px rgba(0,0,0,0.5); opacity:0; transition:opacity 0.3s;
    pointer-events:none; z-index:200;
  }
  .toast.show { opacity:1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px; color:#333; text-align:center;
  }
  .empty-state p { font-size:15px; max-width:400px; line-height:1.6; }

  /* ════════════════════════════════════════════
     TEMPLATE STYLES — LinkedIn (T1-T11)
     ════════════════════════════════════════════ */
  .frame { position:relative; overflow:hidden; }
  .frame.sq { width:1200px; height:1200px; }
  .frame.ls { width:1200px; height:628px; }
  .frame.cr { width:1080px; height:1350px; }
  .frame.ps { width:1920px; height:1080px; }
  .frame.dk { background:var(--bg); }
  .frame.lt { background:#FFFFFF; }
  .frame.yl { background:var(--yellow); }

  /* Unified footer height across all templates for visual consistency (carousel .t8-bar, .ftr-c, and .ftr all = 120px). */
  .ftr { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 80px; height:120px; }
  .ftr.ftr-dk { border-top:1px solid var(--border-dk); }
  .ftr.ftr-lt { border-top:1px solid var(--border-lt); }
  .ftr img, .ftr .logo-svg.wm { height:40px; width:auto; display:block; }
  .ftr .logo-svg.ic { height:48px; width:auto; display:block; }
  .ftr .url { font-size:22px; letter-spacing:0.12em; font-weight:500; }
  .ftr .url-dk { color:rgba(255,255,255,0.55); }
  .ftr .url-dk .ing-ap { color:var(--yellow); font-weight:500; }
  .ftr .url-lt { color:rgba(0,0,0,0.55); }
  .ftr .url-lt .ing-ap { color:var(--yellow); font-weight:500; }
  /* Yellow surface: .ing-ap in yellow vanishes on yellow bg. Flip to black stamp so the particle still pops. */
  .frame.yl .ftr .url-lt { color:rgba(10,10,10,0.7); }
  .frame.yl .ftr .url-lt .ing-ap { color:var(--bg); font-weight:700; }

  .ftr-c { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 80px; height:120px; }
  .ftr-c.ftr-dk { border-top:1px solid var(--border-dk); }
  .ftr-c.ftr-lt { border-top:1px solid var(--border-lt); }
  .ftr-c img, .ftr-c .logo-svg.wm { height:48px; width:auto; display:block; }
  .ftr-c .logo-svg.ic { height:58px; width:auto; display:block; }
  .ftr-c .url { font-size:28px; letter-spacing:0.12em; font-weight:500; }
  .ftr-c .url-dk { color:rgba(255,255,255,0.6); }
  .ftr-c .url-dk .ing-ap { color:var(--yellow); font-weight:500; }
  .ftr-c .url-lt { color:rgba(0,0,0,0.6); }
  .ftr-c .url-lt .ing-ap { color:var(--yellow); font-weight:500; }
  .frame.yl .ftr-c .url-lt { color:rgba(10,10,10,0.7); }
  .frame.yl .ftr-c .url-lt .ing-ap { color:var(--bg); font-weight:700; }

  .eyebrow { font-family:var(--sans); font-size:26px; font-weight:700; letter-spacing:2.8px; text-transform:uppercase; }
  .eyebrow-dk { color:var(--body-dk); }
  .eyebrow-yl { color:var(--yellow); }
  .eyebrow-lt { color:#1a1a1a; }
  .eyebrow .ing-ap { color:var(--yellow); font-weight:700; }
  .eyebrow.eyebrow-yl .ing-ap { color:#FFFFFF; font-weight:700; }
  .eyebrow.eyebrow-lt .ing-ap { color:var(--bg); background:var(--yellow); padding:2px 6px; border-radius:2px; margin-left:1px; }

  /* Highlight uses linear-gradient with explicit background-size so the yellow band stays ~x-height + buffer, never overflowing into adjacent lines — critical for serif display fonts with tall ascenders (DM Serif Display) set at tight line-heights (1.0-1.1). */
  /* Replica el tratamiento editorial de magnify.ing (.hero_title .highlight + <em>):
     fondo amarillo sólido, texto negro itálica del serif, padding horizontal generoso.
     Antes era gradient-size 92% + bold; ahora es el stamp amarillo real de la web. */
  .hl { background:var(--yellow); color:var(--bg); font-style:italic; padding:0 0.18em; display:inline; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
  /* Sobre fondo amarillo el stamp amarillo sería invisible. Alternativa editorial:
     texto negro italic con underline grueso del mismo color (subrayado manuscrito),
     sin fondo de color. Funciona con la tipografía serif sin romper el amarillo
     dominante del slide. */
  .frame.yl .hl, .ps-slide.yl .hl { background:transparent; color:var(--bg); text-decoration:underline; text-decoration-thickness:0.08em; text-underline-offset:0.14em; padding:0; }
  /* Sobre fondo oscuro el patrón del Magnify Design System es fondo amarillo + texto negro
     (igual que en surface lt/default). Coincide con `<a:highlight val="FFD600"/>` + color
     `0A0A0A` que escribe richWithHighlights en el PPTX. Visualmente: la palabra "salta"
     como un stamp amarillo sobre el dark. */
  .ps-slide.dk .hl, .frame.dk .hl { background:var(--yellow); color:var(--bg); font-style:italic; padding:0.02em 0.3em; display:inline; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
  /* Sobre fondo claro/hueso el highlighter amarillo queda flojo. Tratamiento editorial
     alternativo: texto negro italic con underline grueso negro (mismo patrón que yellow). */
  .ps-slide.lt .hl, .frame.lt .hl { background:transparent; color:var(--bg); text-decoration:underline; text-decoration-thickness:0.08em; text-underline-offset:0.14em; padding:0; font-style:italic; font-weight:400; }
  .ing { color:var(--yellow); }
  .ing-dk { color:var(--bg); }
  .accent { width:56px; height:3px; margin-top:20px; }
  .accent-yl { background:var(--yellow); }
  .accent-dk { background:#1a1a1a; }

  /* T1 — Quote */
  .t1 { padding:100px; display:flex; flex-direction:column; justify-content:center; height:calc(100% - 96px); position:relative; overflow:hidden; }
  .t1 .watermark { position:absolute; top:40px; right:60px; opacity:0.04; pointer-events:none; }
  .t1 .watermark .logo-svg.ic { height:420px; width:auto; }
  .t1 .eyebrow { font-size:32px; letter-spacing:3.2px; }
  .t1 h2 { font-family:var(--serif); font-size:112px; font-weight:400; line-height:1.04; letter-spacing:-2.4px; color:var(--h1); margin-top:40px; max-width:1040px; }
  .t1 .attr { font-size:32px; color:var(--body-dk); margin-top:64px; letter-spacing:0.02em; max-width:900px; line-height:1.5; }
  /* Quote color variants: the three surfaces in the Magnify brand system. Light/yellow invert the titular + body + watermark colors to keep contrast without leaving brand. */
  .frame.lt .t1 h2 { color:var(--bg); }
  .frame.lt .t1 .attr { color:var(--body-lt); }
  .frame.yl .t1 h2 { color:var(--bg); }
  .frame.yl .t1 .attr { color:rgba(10,10,10,0.7); }

  /* Stats Hero color variants: the big numeral keeps yellow on dark/light but flips to black on yellow surface (yellow-on-yellow would vanish). Supporting text inverts accordingly. */
  .frame.lt .t3 .t3-desc { color:var(--bg); }
  .frame.lt .t3 .t3-meta { color:rgba(0,0,0,0.5); }
  .frame.yl .t3 .t3-num { color:var(--bg); }
  .frame.yl .t3 .t3-desc { color:var(--bg); }
  .frame.yl .t3 .t3-meta { color:rgba(0,0,0,0.55); }

  /* Framework color variants: row dividers and text need to follow the surface. Yellow numbers are preserved on dark/light, but on yellow surface they flip to black (legibility). */
  .frame.dk .t4 h2 { color:var(--h1); }
  .frame.dk .t4-item { border-bottom-color:rgba(255,255,255,0.12); }
  .frame.dk .t4-item:first-child { border-top-color:rgba(255,255,255,0.12); }
  .frame.dk .t4-item h3 { color:var(--h2); }
  .frame.dk .t4-item p { color:var(--body-dk); }
  .frame.yl .t4 h2 { color:var(--bg); }
  .frame.yl .t4-n { color:var(--bg); }
  .frame.yl .t4-item h3 { color:var(--bg); }
  .frame.yl .t4-item p { color:rgba(10,10,10,0.65); }
  .frame.yl .t4-item { border-bottom-color:rgba(10,10,10,0.15); }
  .frame.yl .t4-item:first-child { border-top-color:rgba(10,10,10,0.15); }

  /* Quote Landscape color variants: titular + attribution + divider line follow the surface. */
  .frame.dk .t7-l h2 { color:var(--h1); }
  .frame.dk .t7-r { border-left-color:rgba(255,255,255,0.15); }
  .frame.dk .t7-r p { color:var(--body-dk); }
  .frame.yl .t7-l h2 { color:var(--bg); }
  .frame.yl .t7-r { border-left-color:rgba(10,10,10,0.2); }
  .frame.yl .t7-r p { color:rgba(10,10,10,0.7); }

  /* Stats Grid color variants. Light (default): white cells on light bg with a near-transparent grid divider.
     Dark: near-black cells on darker bg, light numbers, light-grey dividers. Yellow: white cells pop on yellow — keep
     cell+number styling but re-tint the divider so it reads. */
  .frame.dk .t2-grid { background:rgba(255,255,255,0.1); }
  .frame.dk .t2-cell { background:#0F0F0F; }
  .frame.dk .t2-cell::before { background:rgba(255,255,255,0.2); }
  .frame.dk .t2-cell:first-child::before { background:var(--yellow); }
  .frame.dk .t2-num { color:var(--h1); }
  .frame.dk .t2-lbl { color:var(--body-dk); }
  .frame.yl .t2-grid { background:rgba(10,10,10,0.15); }

  /* Servicio color variants. Dark: yellow CTA bar stays (pops on dark). Yellow: CTA bar flips to black+yellow text
     because yellow-on-yellow disappears. Title/body invert per surface. */
  .frame.dk .t5-body h2 { color:var(--h1); }
  .frame.dk .t5-desc { color:var(--body-dk); }
  .frame.yl .t5-body h2 { color:var(--bg); }
  .frame.yl .t5-desc { color:rgba(10,10,10,0.7); }
  .frame.yl .t5-cta-bar { background:var(--bg); color:var(--yellow); }

  /* Antes/Después color variants. Default dark. Light+yellow swap list text + row dividers + central gradient.
     On yellow, the yellow check glyph is invisible — flipped to black for legibility. */
  .frame.lt .t6-ul li { border-bottom-color:rgba(0,0,0,0.08); }
  .frame.lt .t6-ul-antes li { color:var(--body-lt); }
  .frame.lt .t6-ul-antes li::before { color:rgba(0,0,0,0.35); }
  .frame.lt .t6-ul-despues li { color:var(--bg); }
  .frame.lt .t6-div { background:linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.14) 20%, var(--yellow) 50%, rgba(0,0,0,0.14) 80%, transparent 100%); }
  .frame.lt .t6 .eyebrow-dk { color:var(--body-lt); }
  .frame.lt .t6 .accent[style*="rgba(255"] { background:rgba(0,0,0,0.2) !important; }
  .frame.yl .t6-ul li { border-bottom-color:rgba(10,10,10,0.18); }
  .frame.yl .t6-ul-antes li { color:rgba(10,10,10,0.78); }
  .frame.yl .t6-ul-antes li::before { color:rgba(10,10,10,0.6); }
  .frame.yl .t6-ul-despues li { color:var(--bg); }
  .frame.yl .t6-ul-despues li::before { color:var(--bg); }
  .frame.yl .t6-div { background:linear-gradient(to bottom, transparent 0%, rgba(10,10,10,0.14) 20%, var(--bg) 50%, rgba(10,10,10,0.14) 80%, transparent 100%); }
  .frame.yl .t6 .eyebrow-dk { color:rgba(10,10,10,0.75); }
  .frame.yl .t6 .eyebrow-yl { color:var(--bg); }
  .frame.yl .t6 .accent-yl { background:var(--bg); }
  .frame.yl .t6 .accent[style*="rgba(255"] { background:rgba(10,10,10,0.25) !important; }

  /* Cuadrante color variants. The highlighted cell has to stay visually dominant on every surface:
     on dark stays yellow; on yellow it flips to black (yellow-on-yellow would erase it). Axes + text invert. */
  .frame.dk .tcq-head h2 { color:var(--h1); }
  .frame.dk .tcq-axis-y { border-right-color:var(--h1); }
  .frame.dk .tcq-axis-x { border-top-color:var(--h1); }
  .frame.dk .tcq-axis-y .lbl, .frame.dk .tcq-axis-x .lbl { color:var(--h1); }
  .frame.dk .tcq-axis-y .tip, .frame.dk .tcq-axis-x .tip { color:rgba(255,255,255,0.55); }
  .frame.dk .tcq-cell { background:#111; border-color:rgba(255,255,255,0.12); }
  .frame.dk .tcq-cell.dim { background:#0D0D0D; }
  .frame.dk .tcq-cell .nm { color:var(--h1); }
  .frame.dk .tcq-cell .ds { color:var(--body-dk); }
  .frame.dk .tcq-cell .tg { color:var(--body-dk); }
  .frame.dk .tcq-cell.hl { box-shadow:0 0 0 2px var(--yellow); border-color:var(--yellow); }
  .frame.yl .tcq-cell { background:#FFFFFF; border-color:rgba(0,0,0,0.15); }
  .frame.yl .tcq-cell.dim { background:#FAFAFA; }
  .frame.yl .tcq-cell.hl { background:var(--bg); border-color:var(--bg); box-shadow:0 0 0 2px var(--bg); }
  .frame.yl .tcq-cell.hl .nm { color:var(--h1); }
  .frame.yl .tcq-cell.hl .ds { color:rgba(250,250,250,0.78); }
  .frame.yl .tcq-cell.hl .tg { color:var(--yellow); background:transparent; }

  /* T-IMG — Carousel Image: full-bleed photo + lower gradient overlay with caption. Height reserves the 120px footer so the photo never overlaps the brand bar. */
  .t-img { height:calc(100% - 120px); position:relative; overflow:hidden; background:#222; }
  .t-img .photo { position:absolute; inset:0; background-size:cover; background-position:center; }
  .t-img .photo.empty { display:flex; align-items:center; justify-content:center; color:#666; font-size:18px; letter-spacing:0.1em; text-transform:uppercase; background:repeating-linear-gradient(45deg, #1a1a1a 0 24px, #222 24px 48px); }
  .t-img .shade { position:absolute; left:0; right:0; bottom:0; height:62%; background:linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,0.35) 40%, rgba(10,10,10,0.9) 100%); }
  .t-img .copy { position:absolute; left:80px; right:80px; bottom:56px; }
  .t-img .copy .eb { font-family:var(--sans); font-size:24px; font-weight:700; letter-spacing:2.8px; text-transform:uppercase; color:var(--yellow); margin-bottom:20px; }
  .t-img .copy h2 { font-family:var(--serif); font-size:64px; color:var(--h1); line-height:1.08; letter-spacing:-1.2px; max-width:920px; font-weight:400; }
  .t-img .dots { position:absolute; bottom:24px; right:80px; display:flex; gap:8px; }
  .t-img .dots .d { width:40px; height:4px; background:rgba(250,250,250,0.35); border-radius:2px; }
  .t-img .dots .d.on { background:var(--yellow); }
  /* T2 — Stats Grid */
  .t2 { padding:100px; display:flex; flex-direction:column; height:calc(100% - 80px); }
  .t2-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:rgba(0,0,0,0.12); margin-top:48px; flex:1; border-radius:2px; overflow:hidden; }
  .t2-cell { background:#FFFFFF; padding:56px; display:flex; flex-direction:column; justify-content:flex-end; position:relative; }
  .t2-cell::before { content:""; position:absolute; top:56px; left:56px; width:28px; height:2px; background:rgba(0,0,0,0.15); }
  .t2-cell:first-child::before { background:var(--yellow); }
  .t2-num { font-family:var(--serif); font-size:112px; color:var(--bg); line-height:1; margin-bottom:18px; letter-spacing:-2px; font-feature-settings:"tnum"; }
  .t2-num-yl { color:var(--yellow); }
  .t2-lbl { font-size:24px; color:var(--body-lt); line-height:1.45; max-width:360px; }
  /* T3 — Stats Hero */
  .t3 { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 96px); text-align:center; padding:100px; }
  .t3 .eyebrow { font-size:22px; }
  .t3-num { font-family:var(--serif); font-size:320px; color:var(--yellow); line-height:0.85; letter-spacing:-10px; margin-top:44px; font-feature-settings:"tnum"; }
  .t3-num sup { font-size:96px; opacity:0.65; letter-spacing:0; top:-0.55em; margin-left:-0.05em; }
  .t3-desc { font-size:32px; color:var(--h2); margin-top:44px; max-width:760px; line-height:1.45; font-weight:400; }
  .t3-meta { font-size:14px; font-weight:500; color:rgba(255,255,255,0.45); margin-top:28px; letter-spacing:2px; text-transform:uppercase; }
  /* T4 — Framework */
  .t4 { padding:100px; height:calc(100% - 96px); display:flex; flex-direction:column; }
  .t4 h2 { font-family:var(--serif); font-size:64px; font-weight:400; color:var(--bg); line-height:1.12; margin-top:28px; letter-spacing:-1.4px; max-width:940px; }
  .t4-list { margin-top:52px; flex:1; display:flex; flex-direction:column; justify-content:center; }
  /* Bumped: at 1200×1200 scaled down for LinkedIn feed (~550px wide on desktop, ~360px mobile), 28/22px title/body became unreadable. 42/30 gives a comfortable 72dpi-equivalent size on mobile feed. */
  .t4-item { display:flex; align-items:baseline; padding:34px 0; border-bottom:1px solid rgba(0,0,0,0.08); gap:16px; }
  .t4-item:first-child { border-top:1px solid rgba(0,0,0,0.08); }
  .t4-n { font-family:var(--serif); font-size:64px; color:var(--yellow); width:108px; flex-shrink:0; line-height:1; font-feature-settings:"tnum"; }
  .t4-item > div { flex:1; }
  .t4-item h3 { font-size:42px; font-weight:500; color:var(--bg); margin-bottom:14px; letter-spacing:-0.4px; line-height:1.15; }
  .t4-item p { font-size:30px; color:var(--body-lt); line-height:1.4; }
  /* T5 — Servicio */
  .t5 { display:flex; flex-direction:column; height:calc(100% - 96px); position:relative; }
  .t5-body { flex:1; padding:100px 100px 60px; display:flex; flex-direction:column; justify-content:center; }
  .t5-body h2 { font-family:var(--serif); font-size:84px; font-weight:400; color:var(--bg); line-height:1.04; margin-top:28px; letter-spacing:-2px; max-width:980px; }
  .t5-desc { font-size:30px; color:var(--body-lt); line-height:1.45; margin-top:40px; max-width:880px; font-weight:400; }
  .t5-cta-bar { display:flex; align-items:center; justify-content:space-between; background:var(--yellow); color:var(--bg); padding:42px 100px; font-size:28px; font-weight:500; letter-spacing:-0.3px; text-decoration:none; font-family:var(--sans); }
  .t5-cta-bar .t5-cta-ar { font-size:32px; }
  /* T6 — Antes/Despues */
  .t6 { display:flex; height:calc(100% - 96px); position:relative; }
  .t6-col { flex:1; padding:80px 72px; display:flex; flex-direction:column; }
  .t6-div { width:2px; background:linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.18) 20%, var(--yellow) 50%, rgba(255,255,255,0.18) 80%, transparent 100%); }
  .t6-ul { list-style:none; flex:1; display:flex; flex-direction:column; justify-content:center; gap:0; }
  .t6-ul li { font-size:25px; line-height:1.4; padding:24px 0 24px 44px; position:relative; border-bottom:1px solid rgba(255,255,255,0.08); }
  .t6-ul li:last-child { border-bottom:none; }
  .t6-ul-antes li { color:var(--body-dk); }
  .t6-ul-antes li::before { content:"\00D7"; position:absolute; left:0; top:20px; color:rgba(255,255,255,0.35); font-size:24px; font-weight:300; line-height:1; }
  .t6-ul-despues li { color:var(--h2); font-weight:400; }
  .t6-ul-despues li::before { content:"\2713"; position:absolute; left:0; top:22px; color:var(--yellow); font-size:20px; font-weight:700; line-height:1; }
  /* T7 — Quote Landscape */
  .t7 { padding:56px 100px 0; display:flex; align-items:center; height:calc(100% - 96px); gap:80px; }
  .t7-l { flex:1; }
  .t7-l h2 { font-family:var(--serif); font-size:50px; font-weight:400; color:var(--bg); line-height:1.18; margin-top:24px; max-width:640px; letter-spacing:-0.8px; }
  .t7-r { flex-shrink:0; max-width:300px; border-left:2px solid rgba(0,0,0,0.08); padding-left:28px; }
  .t7-r p { font-size:22px; text-align:left; color:var(--body-lt); line-height:1.55; }
  /* T-CUAD — Cuadrante 2x2 */
  .tcq { padding:80px 80px 0; height:calc(100% - 120px); display:flex; flex-direction:column; }
  .tcq-head { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:44px; }
  .tcq-head h2 { font-family:var(--serif); font-size:56px; font-weight:400; color:var(--bg); line-height:1.1; max-width:840px; letter-spacing:-1.2px; margin-top:14px; }
  .tcq-grid { flex:1; display:grid; grid-template-columns: 80px 1fr 1fr; grid-template-rows: 1fr 1fr 64px; gap:0; position:relative; }
  .tcq-axis-y { grid-row:1 / span 2; grid-column:1; display:flex; flex-direction:column; justify-content:space-between; align-items:center; padding:24px 0; border-right:2px solid var(--bg); }
  /* Vertical axis labels: rotate -90deg so text reads bottom-to-top with upright letters (chart-axis convention, tilt head LEFT to read). transform: rotate is the most reliable cross-browser approach. display:inline-block is required for transform to apply. white-space:nowrap prevents wrapping. */
  .tcq-axis-y .lbl, .tcq-axis-y .tip { display:inline-block; transform:rotate(-90deg); transform-origin:center; white-space:nowrap; writing-mode:horizontal-tb; }
  .tcq-axis-y .lbl { font-size:16px; font-weight:700; letter-spacing:0.2em; color:var(--bg); text-transform:uppercase; }
  .tcq-axis-y .tip { font-size:14px; color:rgba(0,0,0,0.55); letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
  .tcq-axis-x { grid-row:3; grid-column:2 / span 2; display:flex; justify-content:space-between; align-items:center; padding:20px 0 0; border-top:2px solid var(--bg); }
  .tcq-axis-x .lbl { font-size:16px; font-weight:700; letter-spacing:0.2em; color:var(--bg); text-transform:uppercase; }
  .tcq-axis-x .tip { font-size:14px; color:rgba(0,0,0,0.55); letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
  .tcq-axis-x .mid { flex:1; text-align:center; }
  .tcq-cell { padding:36px 32px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid rgba(0,0,0,0.1); background:#FAFAFA; transition:all 0.2s; }
  .tcq-cell.q1 { grid-row:1; grid-column:2; }
  .tcq-cell.q2 { grid-row:1; grid-column:3; border-left:none; }
  .tcq-cell.q3 { grid-row:2; grid-column:2; border-top:none; }
  .tcq-cell.q4 { grid-row:2; grid-column:3; border-top:none; border-left:none; }
  .tcq-cell.hl { background:var(--yellow); border-color:var(--bg); z-index:2; box-shadow:0 0 0 2px var(--bg); }
  .tcq-cell.dim { opacity:0.5; background:#F5F5F5; }
  .tcq-cell .nm { font-family:var(--serif); font-size:32px; line-height:1.08; color:var(--bg); margin-bottom:16px; letter-spacing:-0.4px; }
  .tcq-cell .ds { font-size:20px; color:var(--body-lt); line-height:1.4; max-width:380px; }
  .tcq-cell.hl .ds { color:rgba(10,10,10,0.8); }
  .tcq-cell .tg { font-size:15px; font-weight:700; color:var(--bg); letter-spacing:0.08em; margin-top:20px; text-transform:uppercase; }
  .tcq-cell.dim .tg { color:rgba(10,10,10,0.55); }
  /* T8 — Carousel Cover */
  /* COVER: the .ing url next to the wordmark was redundant (two logos / two brand cues fighting). Removed. Wordmark alone at top breathes. Eyebrow becomes the dominant "category" marker at cover scale. */
  .t8 { display:flex; flex-direction:column; padding:80px; height:100%; position:relative; }
  .t8-brand { position:absolute; top:72px; left:80px; display:flex; align-items:center; }
  .t8-brand img, .t8-brand .logo-svg.wm { height:44px; width:auto; display:block; }
  .t8-top { flex:1; display:flex; flex-direction:column; justify-content:center; gap:0; }
  .t8-top .t8-eyebrow-wrap { display:flex; align-items:center; gap:32px; margin-bottom:40px; }
  .t8-top .t8-eyebrow-wrap .ln { width:72px; height:3px; background:var(--yellow); flex-shrink:0; }
  /* MANIFIESTO/eyebrow in DM Serif Display italic — editorial section-header treatment, matches the brand serif voice. */
  .t8-top .t8-eyebrow { font-family:var(--serif); font-size:72px; font-weight:400; font-style:italic; letter-spacing:-1px; color:var(--yellow); line-height:1; }
  .t8-top h2 { font-family:var(--serif); font-size:86px; font-weight:400; color:var(--h1); line-height:1.04; max-width:920px; letter-spacing:-2px; }
  /* Sub: bumped to 44px + max-width wider so it reads with zero effort on 1080px canvas. */
  .t8-top .sub { font-size:44px; color:#E5E5E5; margin-top:52px; max-width:920px; line-height:1.35; font-weight:400; }
  /* Bottom bar: matches the 120px footer height of the rest of the carousel for perfect consistency across slides. */
  .t8-bar { background:var(--yellow); margin:0 -80px -80px; height:120px; padding:0 80px; display:flex; align-items:center; justify-content:flex-end; }
  .t8-bar .arr { font-size:40px; color:var(--bg); font-weight:500; line-height:1; }
  /* T9 — Carousel Text */
  .t9 { padding:80px; height:calc(100% - 88px); display:flex; flex-direction:column; }
  .t9-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:48px; }
  .t9-head .eyebrow { margin:0; font-size:26px; letter-spacing:3px; }
  .t9-big { font-family:var(--serif); font-size:96px; color:var(--bg); opacity:0.14; line-height:1; letter-spacing:-2px; font-feature-settings:"tnum"; }
  .t9-content { flex:1; display:flex; flex-direction:column; justify-content:center; max-width:940px; }
  .t9-title { font-family:var(--serif); font-size:68px; font-weight:400; color:var(--bg); line-height:1.08; margin-bottom:36px; letter-spacing:-1.2px; }
  .t9-body { font-size:40px; color:var(--body-lt); line-height:1.4; max-width:960px; }
  .t9-dots { display:flex; gap:10px; margin-top:auto; }
  .t9-dot { width:44px; height:4px; background:#ddd; border-radius:2px; }
  .t9-dot.on { background:var(--yellow); }
  /* T10 — Carousel Split */
  .t10 { height:calc(100% - 108px); display:flex; flex-direction:column; }
  .t10-top { flex:1; background:var(--bg); padding:80px; display:flex; flex-direction:column; justify-content:center; border-bottom:4px solid var(--yellow); position:relative; }
  .t10-top .eyebrow { margin-bottom:28px; font-size:26px; }
  .t10-stat { font-family:var(--serif); font-size:180px; color:var(--yellow); line-height:0.9; margin-bottom:28px; letter-spacing:-5px; font-feature-settings:"tnum"; }
  .t10-stat sup { font-size:72px; opacity:0.65; letter-spacing:0; top:-0.55em; margin-left:-0.05em; }
  .t10-sl { font-size:32px; color:var(--h2); max-width:860px; line-height:1.45; font-weight:400; }
  .t10-bot { padding:72px 80px; flex:1; display:flex; flex-direction:column; justify-content:center; background:#FFF; }
  .t10-bot h3 { font-family:var(--serif); font-size:52px; font-weight:400; color:var(--bg); margin-bottom:24px; line-height:1.12; letter-spacing:-0.5px; }
  .t10-bot p { font-size:30px; color:var(--body-lt); line-height:1.45; max-width:860px; }
  /* T11 — Carousel CTA */
  /* CTA: title + wordmark lockup centered in upper 2/3. URL pinned to the actual slide bottom as footer. */
  .t11 { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; padding:80px 80px 220px; text-align:center; position:relative; }

  .frame.bn { width:1200px; height:630px; }

  .bn-wmark .logo-svg.wm { height:22%; width:auto; max-height:140px; }

  /* Icon-only: A-mark positioning varies by format.
     - Horizontal banners (bn, bn-li, bn-co): bottom-right corner (signature style)
     - Square logo (bn-lg): CENTERED (because LinkedIn crops it circular for avatars/company logos) */
  .bn-imark { position:relative; width:100%; height:100%; display:block; }
  .bn-imark .bn-imark-img { position:absolute; width:auto; display:block; }

  /* Wordmark centered — add a specific rule for square logo so it fills proportionally without being tiny. */
  .frame.bn-lg .bn-wmark .logo-svg.wm { height:auto; width:72%; max-height:none; }

     ════════════════════════════════════════════ */
  .csl-page { width:794px; height:1123px; background:#FAFAFA; display:flex; flex-direction:column; position:relative; overflow:hidden; color:#1A1A1A; }
  .csl-page.dk { background:var(--bg); color:#FAFAFA; }

  /* Header institucional + footer en cada página (excepto divisores full-bleed). */

  .csl-page.dk .csl-head { color:rgba(250,250,250,0.55); }

  .csl-page.yl .csl-foot .ing-ap { color:var(--bg); text-decoration:underline; text-decoration-thickness:1.5px; }
  /* Mismo header/footer Magnify aplicado dentro de .doc-page (case-study, propuesta, documento). */
  .doc-page.dk .csl-head { color:rgba(250,250,250,0.55); }
  .doc-page.yl .csl-head { color:rgba(10,10,10,0.55); }
  .doc-page.dk .csl-foot { color:rgba(250,250,250,0.4); border-top-color:rgba(250,250,250,0.08); }
  .doc-page.yl .csl-foot { color:rgba(10,10,10,0.55); border-top-color:rgba(10,10,10,0.12); }
  .doc-page.yl .csl-foot .ing-ap { color:var(--bg); text-decoration:underline; text-decoration-thickness:1.5px; }
  .csl-body { flex:1; padding:56px 64px 84px; display:flex; flex-direction:column; }

  /* Highlight `[palabra]` editorial: amarillo subrayado sobre claro, italic sobre oscuro/amarillo. */
  /* Titulares del dossier nunca se parten por sílabas. Las palabras saltan de línea
     enteras; si una palabra concreta es más larga que la columna (raro), `overflow-wrap:
     anywhere` la parte limpio sin guion ni carácter custom. Pattern Magnify Design System. */
  .csl-page h1, .csl-page h2, .csl-page h3 { hyphens:none; -webkit-hyphens:none; word-break:keep-all; overflow-wrap:anywhere; }
  /* Highlight uniforme en TODOS los surfaces (lt, dk): fondo amarillo + texto negro italic.
     Pattern Magnify Design System (slide 13: <a:highlight FFD600 + color 0A0A0A>).
     Padding ajustado para que el recuadro abrace la palabra sin halo lateral. */
  .csl-page .hl-c { background:var(--yellow); color:var(--bg); font-style:italic; padding:0 0.18em; text-decoration:none; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
  /* Surface amarillo: el highlight con fondo amarillo se confundiría con el fondo de la página.
     Mantenemos solo el italic editorial (mismo color que el resto del titular). */
  .csl-page.yl .hl-c { background:transparent; color:inherit; padding:0; font-weight:500; }
  .csl-page.yl .hl-c { color:var(--bg); text-decoration:underline; text-decoration-thickness:0.1em; text-decoration-color:var(--bg); font-style:italic; }

  /* PORTADA — dossier hero, dark, large serif title */
  .csl-portada { background:var(--bg); color:#FAFAFA; padding:84px 64px; display:flex; flex-direction:column; height:100%; position:relative; }
  .csl-portada .pt-wm { height:24px; margin-bottom:auto; }
  /* Forzar tamaño del SVG dentro de .pt-wm — había reglas globales `.logo-svg.wm { height:40-96px }`
     que sobreescribían el tamaño del contenedor y el wordmark salía gigante en la portada del dossier. */
  .csl-portada .pt-wm svg.logo-svg.wm { height:24px !important; width:auto; display:block; }
  /* wordmark: abajo — pattern editorial maduro (contenido manda, marca firma).
     El wordmark grande va al pie, encima del pt-bottom (URL + Confidencial). */
  .csl-portada .pt-wm-bottom { height:32px; margin-top:auto; margin-bottom:32px; }
  .csl-portada .pt-wm-bottom svg { height:100%; width:auto; display:block; }
  .csl-portada.wm-bottom { padding-top:64px; }
  .csl-portada .pt-eyebrow { font-family:var(--mono,monospace); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--yellow); margin-bottom:24px; font-weight:600; }
  /* Tamaño del titular escalado por longitud (clases las aplica renderCSLPortada).
     short = ≤30 chars (ej. "Mírate.") · medium = 30-70 · long = >70. */
  .csl-portada h1 { font-family:var(--serif); font-weight:400; line-height:1.02; letter-spacing:-2px; color:#FAFAFA; max-width:680px; margin:0; font-size:80px; }
  .csl-portada h1.t-short { font-size:120px; letter-spacing:-3px; max-width:720px; }
  .csl-portada h1.t-medium { font-size:88px; letter-spacing:-2.2px; }
  .csl-portada h1.t-long { font-size:64px; letter-spacing:-1.4px; line-height:1.05; max-width:660px; }
  .csl-portada.csl-page.lt h1 { color:var(--bg); }
  .csl-portada.csl-page.yl h1 { color:var(--bg); }
  .csl-portada .pt-sub { font-size:30px; line-height:1.35; color:#D0D0D0; margin-top:40px; max-width:680px; font-weight:400; }
  .csl-portada.csl-page.lt .pt-sub { color:#444; }
  .csl-portada.csl-page.yl .pt-sub { color:rgba(10,10,10,0.7); }
  .csl-portada .pt-accent { width:44px; height:3px; background:var(--yellow); margin:36px 0 28px; }
  .csl-portada .pt-meta { font-family:var(--mono,monospace); font-size:11px; line-height:2.0; color:rgba(255,255,255,0.5); letter-spacing:0.08em; }
  .csl-portada .pt-meta strong { color:#FAFAFA; font-weight:600; }
  .csl-portada .pt-bottom { position:absolute; bottom:48px; left:64px; right:64px; display:flex; justify-content:space-between; align-items:flex-end; font-family:var(--mono,monospace); font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:0.18em; text-transform:uppercase; }
  .csl-portada .pt-bottom .ing-ap { color:var(--yellow); }

  /* TL;DR — hueso, lista numerada con números amarillos grandes */
  .csl-tldr { background:#F5F1EA; }
  .csl-tldr .csl-body { padding:88px 76px 96px; }
  .csl-tldr .tl-eyebrow { font-family:var(--mono,monospace); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#666; font-weight:600; margin-bottom:18px; }
  .csl-tldr h2 { font-family:var(--serif); font-size:42px; font-weight:400; line-height:1.05; letter-spacing:-0.7px; color:var(--bg); margin:0 0 12px; }
  .csl-tldr .tl-deck { font-family:var(--serif); font-style:italic; font-size:19px; line-height:1.5; color:#444; margin-bottom:48px; max-width:580px; }
  .csl-tldr ol { list-style:none; padding:0; margin:0; counter-reset:tldr; display:flex; flex-direction:column; gap:24px; }
  .csl-tldr ol li { counter-increment:tldr; display:grid; grid-template-columns:64px 1fr; gap:18px; align-items:baseline; }
  .csl-tldr ol li::before { content:counter(tldr,decimal-leading-zero); font-family:var(--serif); font-size:38px; font-weight:400; color:var(--yellow); line-height:0.9; letter-spacing:-1px; }
  .csl-tldr ol li p { font-family:var(--serif); font-size:17px; line-height:1.55; color:var(--bg); margin:0; }
  .csl-tldr ol li p strong { font-weight:600; }

  /* DIVISOR-SECCION — full-bleed chapter break (oscuro / claro / amarillo según fondo) */
  .csl-divisor { display:flex; flex-direction:column; height:100%; padding:84px 76px; position:relative; }
  .csl-divisor .num { font-family:var(--serif); font-size:240px; font-weight:400; line-height:0.85; letter-spacing:-7px; margin:0 0 24px; color:inherit; }
  .csl-divisor.yl .num, .csl-divisor.lt .num { color:var(--bg); }
  .csl-divisor .num-line { width:80px; height:3px; background:var(--yellow); margin-bottom:48px; }
  .csl-divisor.yl .num-line { background:var(--bg); }
  .csl-divisor .eyebrow { font-family:var(--mono,monospace); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--yellow); font-weight:600; margin-bottom:20px; }
  .csl-divisor.yl .eyebrow { color:var(--bg); }
  .csl-divisor.lt .eyebrow { color:#666; }
  .csl-divisor h2 { font-family:var(--serif); font-size:56px; font-weight:400; line-height:1.05; letter-spacing:-1.2px; color:inherit; margin:0; max-width:620px; }
  .csl-divisor .deck { font-family:var(--serif); font-style:italic; font-size:18px; line-height:1.55; margin-top:24px; max-width:520px; opacity:0.8; }

  /* SECCION-CUERPO — texto editorial denso con visuals */
  .csl-section .sec-eyebrow { font-family:var(--mono,monospace); font-size:15px; letter-spacing:0.2em; text-transform:uppercase; color:#666; font-weight:600; margin-bottom:18px; }
  .csl-page.dk .csl-section .sec-eyebrow { color:rgba(250,250,250,0.55); }
  .csl-section h2 { font-family:var(--serif); font-size:36px; font-weight:400; line-height:1.1; letter-spacing:-0.6px; color:inherit; margin:0 0 28px; max-width:620px; }
  /* Sección minimal: solo eyebrow + titular sin cuerpo/pull/visual. Centra contenido vertical
     con titular escalado por longitud (similar a portada): titulares cortos pueden ser tipo
     manifiesto, titulares largos quedan más legibles a tamaño moderado. */
  .csl-section.is-minimal .csl-body { justify-content:center; padding-top:56px; padding-bottom:84px; }
  .csl-section.is-minimal .sec-eyebrow { margin-bottom:28px; font-size:15px; }
  .csl-section.is-minimal h2 { font-size:56px; line-height:1.05; letter-spacing:-1.4px; max-width:680px; margin:0 0 24px; font-weight:400; }
  /* Accent line bajo el titular para "anclar" la página y romper el aire muerto. */
  .csl-section.is-minimal h2::after { content:""; display:block; width:48px; height:2px; background:var(--yellow); margin-top:32px; }
  .csl-section .sec-body { font-size:17px; line-height:1.6; color:inherit; margin-bottom:18px; max-width:600px; }
  .csl-section .sec-body strong { font-weight:600; color:inherit; }
  .csl-page.dk .csl-section .sec-body { color:rgba(250,250,250,0.85); }
  .csl-section .sec-body p { margin:0 0 14px; }
  .csl-section .sec-pull { font-family:var(--serif); font-style:italic; font-size:20px; line-height:1.45; color:var(--bg); border-left:3px solid var(--yellow); padding:6px 0 6px 22px; margin:24px 0 24px; max-width:560px; }
  .csl-page.dk .csl-section .sec-pull { color:#FAFAFA; }

  /* VISUAL slot — placeholder for SVG/PNG with editorial caption */
  .csl-visual { background:#fff; border:1px solid rgba(0,0,0,0.08); padding:28px; display:flex; flex-direction:column; gap:18px; margin:18px 0; }
  /* Visual protagonista (renderCSLVisual): la caja se expande al alto del body para que
     no queden 30% de aire arriba y abajo. v-slot abandona aspect-ratio:16/9 fijo y crece
     con flex; la imagen mantiene proporción con object-fit:contain. */
  .csl-visual-fill { flex:1; min-height:0; margin:18px 0 0; }
  .csl-visual-fill .v-slot { aspect-ratio:auto; flex:1; min-height:0; }
  .csl-visual-fill .v-slot.has-img img { width:100%; height:100%; object-fit:contain; }
  /* layout: protagonista — sin caja, sin borde, sin v-id; el visual ocupa la columna útil
     y el eyebrow+titular de la página actúan como título único (evita doble titulación
     cuando el SVG ya lleva su propio H1 interno). */
  .csl-visual-protag { background:transparent !important; border:none !important; padding:0 !important; }
  .csl-visual-protag .v-slot { border:none !important; background:transparent !important; }
  .csl-page.dk .csl-visual { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.1); }
  /* Placeholder editorial: el slot vacío muestra el ID en serif italic amarillo, no un rayado
     tan tenue que parecía página en blanco. Aspect ratio se mantiene para anclar el layout. */
  .csl-visual .v-slot { aspect-ratio:16/9; background:transparent; border:1px solid rgba(255,214,0,0.25); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-style:italic; font-size:48px; color:rgba(255,214,0,0.55); }
  .csl-visual .v-slot.has-img { background:none; padding:0; border:none; }
  .csl-visual .v-slot.has-img img { width:100%; height:100%; object-fit:contain; display:block; }
  .csl-page.dk .csl-visual .v-slot { border-color:rgba(255,214,0,0.2); color:rgba(255,214,0,0.45); }
  .csl-page.yl .csl-visual .v-slot { border-color:rgba(10,10,10,0.2); color:rgba(10,10,10,0.4); }
  .csl-visual .v-cap { font-family:var(--sans); font-size:15px; line-height:1.55; color:#444; max-width:620px; }
  .csl-page.dk .csl-visual .v-cap { color:#B8B8B8; }
  .csl-visual .v-cap strong { font-weight:600; color:var(--bg); }
  .csl-page.dk .csl-visual .v-cap strong { color:#FAFAFA; }
  .csl-visual .v-id { font-family:var(--mono,monospace); font-size:9.5px; color:#999; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:6px; }

  /* SECCION-VISUAL — página entera, solo visual + eyebrow opcional. Sin titular, sin caption, sin pull.
     Respeta el margen estándar de la página (csl-body padding 56/64/84). */
  .csl-seccion-visual .csl-body { gap:18px; }
  .csl-seccion-visual .sv-eyebrow { font-family:var(--mono,monospace); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#666; font-weight:600; }
  .csl-page.dk .csl-seccion-visual .sv-eyebrow { color:rgba(250,250,250,0.55); }
  .csl-page.yl .csl-seccion-visual .sv-eyebrow { color:rgba(10,10,10,0.6); }
  /* Placeholder editorial cuando no hay imagen subida: caja con borde sutil + label tipográfico
     amarillo italic grande en el centro. Antes era un patrón rayado tan tenue que parecía blanco
     vacío con el label flotando. Ahora cuando una página requiere imagen pero no la tiene, el
     placeholder lo deja claro al lector y al usuario que falta subirla. */
  .csl-seccion-visual .sv-slot { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; border:1px solid rgba(255,214,0,0.25); font-family:var(--serif); font-style:italic; font-size:64px; color:rgba(255,214,0,0.5); }
  .csl-page.dk .csl-seccion-visual .sv-slot { border-color:rgba(255,214,0,0.2); color:rgba(255,214,0,0.45); }
  .csl-page.yl .csl-seccion-visual .sv-slot { border-color:rgba(10,10,10,0.2); color:rgba(10,10,10,0.4); }
  .csl-seccion-visual .sv-slot.has-img { background:none; padding:0; border:none; }
  /* La imagen ocupa el ancho útil completo de la página (no se queda chica si es panorámica
     o si tiene aspect ratio extremo). object-fit:contain limita la altura al slot disponible. */
  .csl-seccion-visual .sv-slot.has-img img { width:100%; height:auto; max-height:100%; object-fit:contain; display:block; margin:auto; }

  /* CITAS-CLIENTES — grid 2x3 sobre hueso */
  .csl-citas { background:#F5F1EA; }
  .csl-citas .csl-body { padding:88px 64px 96px; }
  .csl-citas .ct-eyebrow { font-family:var(--mono,monospace); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#666; font-weight:600; margin-bottom:14px; }
  .csl-citas h2 { font-family:var(--serif); font-size:34px; font-weight:400; line-height:1.1; letter-spacing:-0.6px; color:var(--bg); margin:0 0 36px; max-width:560px; }
  .csl-citas .ct-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px 32px; }
  .csl-citas .ct-cell { padding-left:18px; border-left:3px solid var(--yellow); display:flex; flex-direction:column; gap:8px; }
  .csl-citas .ct-cell .q { font-family:var(--serif); font-style:italic; font-size:18px; line-height:1.4; color:var(--bg); margin:0; }
  .csl-citas .ct-cell .a { font-family:var(--mono,monospace); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#666; margin-top:auto; }

  /* STATS-6 — grid 3x2 con num grande + label + desc */
  .csl-stats6 .csl-body { padding:80px 64px 96px; }
  .csl-stats6 .st-eyebrow { font-family:var(--mono,monospace); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--yellow); font-weight:600; margin-bottom:14px; }
  .csl-page.lt .csl-stats6 .st-eyebrow, .csl-page:not(.dk):not(.yl) .csl-stats6 .st-eyebrow { color:#B8A000; }
  .csl-stats6 h2 { font-family:var(--serif); font-size:36px; font-weight:400; line-height:1.1; letter-spacing:-0.6px; margin:0 0 36px; max-width:580px; color:inherit; }
  .csl-stats6 .st-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:32px 28px; }
  .csl-stats6 .st-cell { padding-top:18px; border-top:2px solid var(--yellow); }
  .csl-stats6 .st-cell .n { font-family:var(--serif); font-size:46px; font-weight:400; line-height:1; letter-spacing:-1px; color:var(--bg); margin-bottom:8px; }
  .csl-page.dk .csl-stats6 .st-cell .n { color:var(--yellow); }
  .csl-stats6 .st-cell .l { font-family:var(--mono,monospace); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-bottom:10px; }
  .csl-stats6 .st-cell .d { font-size:12px; line-height:1.5; color:#444; }
  .csl-page.dk .csl-stats6 .st-cell .l { color:rgba(250,250,250,0.55); }
  .csl-page.dk .csl-stats6 .st-cell .d { color:rgba(250,250,250,0.78); }

  /* FRAMEWORK-EXTENDIDO — pasos con párrafo largo */
  .csl-framework .csl-body { padding:72px 64px 96px; }
  .csl-framework .fr-eyebrow { font-family:var(--mono,monospace); font-size:15px; letter-spacing:0.2em; text-transform:uppercase; color:var(--yellow); font-weight:600; margin-bottom:18px; }
  .csl-framework h2 { font-family:var(--serif); font-size:38px; font-weight:400; line-height:1.1; letter-spacing:-0.7px; margin:0 0 32px; max-width:580px; color:inherit; }
  .csl-framework .fr-step { display:grid; grid-template-columns:48px 1fr; gap:20px; padding:20px 0; border-top:1px solid rgba(0,0,0,0.1); }
  .csl-framework .fr-step:last-child { border-bottom:1px solid rgba(0,0,0,0.1); }
  .csl-page.dk .csl-framework .fr-step { border-top-color:rgba(250,250,250,0.12); }
  .csl-page.dk .csl-framework .fr-step:last-child { border-bottom-color:rgba(250,250,250,0.12); }
  .csl-framework .fr-step .n { font-family:var(--serif); font-size:36px; line-height:1; letter-spacing:-1px; color:var(--yellow); }
  .csl-framework .fr-step h3 { font-family:var(--sans); font-size:22px; font-weight:600; letter-spacing:-0.3px; color:inherit; margin:0 0 6px; }
  .csl-framework .fr-step .sub { font-family:var(--serif); font-style:italic; font-size:17px; color:#666; margin:0 0 12px; }
  .csl-page.dk .csl-framework .fr-step .sub { color:rgba(250,250,250,0.7); }
  .csl-framework .fr-step .desc { font-size:17px; line-height:1.55; color:#333; margin:0; max-width:560px; }
  .csl-framework .fr-step .desc strong { font-weight:600; }
  .csl-page.dk .csl-framework .fr-step .desc { color:rgba(250,250,250,0.78); }

  /* CIERRE — divisor amarillo crescendo */
  .csl-cierre { background:var(--yellow); color:var(--bg); padding:120px 76px; display:flex; flex-direction:column; justify-content:flex-start; height:100%; position:relative; }
  /* Alineación vertical configurable (default arriba). */
  .csl-cierre.v-center { justify-content:center; }
  .csl-cierre.v-bottom { justify-content:flex-end; padding-bottom:140px; }
  .csl-cierre .ci-num { font-family:var(--serif); font-size:200px; font-weight:400; line-height:0.85; letter-spacing:-7px; color:var(--bg); margin:0 0 24px; }
  .csl-cierre .ci-line { width:80px; height:3px; background:var(--bg); margin-bottom:36px; }
  .csl-cierre h2 { font-family:var(--serif); font-size:60px; font-weight:400; line-height:1.05; letter-spacing:-1.2px; color:var(--bg); margin:0 0 24px; max-width:600px; font-style:italic; }
  .csl-cierre .ci-deck { font-family:var(--serif); font-size:20px; line-height:1.45; color:var(--bg); margin:0; max-width:560px; opacity:0.85; }
  /* CTA tamaños: default pequeño · ci-cta-md · ci-cta-lg (proporcional al titular grande). */
  .csl-cierre .ci-cta.ci-cta-md { padding:22px 32px; font-size:14px; gap:16px; margin-top:12px; }
  .csl-cierre .ci-cta.ci-cta-lg { padding:28px 40px; font-size:16px; gap:20px; margin-top:18px; }
  .csl-cierre .ci-cta { display:inline-flex; align-items:center; gap:12px; padding:16px 22px; background:var(--bg); color:var(--yellow); font-family:var(--mono,monospace); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:600; margin-top:48px; align-self:flex-start; }

  /* FOOTER-ANONIMIZACION — pie legal-editorial en última página */
  .csl-anonim .csl-body { padding:84px 64px 90px; display:flex; flex-direction:column; justify-content:flex-end; }
  .csl-anonim .an-eyebrow { font-family:var(--mono,monospace); font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:#999; font-weight:600; margin-bottom:14px; }
  .csl-anonim h3 { font-family:var(--sans); font-size:14px; font-weight:600; letter-spacing:-0.1px; color:#444; margin:0 0 14px; }
  .csl-anonim .an-body { font-family:var(--sans); font-size:11.5px; line-height:1.7; color:#666; margin:0 0 16px; max-width:540px; }
  .csl-anonim .an-meta { font-family:var(--mono,monospace); font-size:9.5px; letter-spacing:0.18em; text-transform:uppercase; color:#999; margin-top:24px; }

  /* Overrides explícitos para que `fondo: oscuro/amarillo/claro` gane sobre los defaults
     hueso de tldr/citas/cierre/anonim. CSS specificity: misma clase, definimos después. */
  .csl-page.dk.csl-tldr, .csl-page.dk.csl-citas, .csl-page.dk.csl-anonim { background:var(--bg); color:#FAFAFA; }
  .csl-page.yl.csl-tldr, .csl-page.yl.csl-citas, .csl-page.yl.csl-anonim { background:var(--yellow); color:var(--bg); }
  .csl-page.lt.csl-tldr, .csl-page.lt.csl-citas, .csl-page.lt.csl-anonim { background:#FAFAFA; color:var(--bg); }
  .csl-page.dk.csl-cierre { background:var(--bg); color:#FAFAFA; }
  .csl-page.dk.csl-cierre .ci-num, .csl-page.dk.csl-cierre h2, .csl-page.dk.csl-cierre .ci-deck { color:#FAFAFA; }
  .csl-page.dk.csl-cierre .ci-line { background:var(--yellow); }
  .csl-page.dk.csl-cierre .ci-cta { background:var(--yellow); color:var(--bg); }
  .csl-page.lt.csl-cierre { background:#FAFAFA; color:var(--bg); }
  /* Overrides texto en tldr/citas oscuras */
  .csl-page.dk.csl-tldr h2, .csl-page.dk.csl-tldr ol li p { color:#FAFAFA; }
  .csl-page.dk.csl-tldr .tl-eyebrow { color:rgba(250,250,250,0.55); }
  .csl-page.dk.csl-tldr .tl-deck { color:rgba(250,250,250,0.78); }
  .csl-page.dk.csl-citas h2, .csl-page.dk.csl-citas .ct-cell .q { color:#FAFAFA; }
  .csl-page.dk.csl-citas .ct-eyebrow, .csl-page.dk.csl-citas .ct-cell .a { color:rgba(250,250,250,0.6); }
  .csl-page.dk.csl-anonim h3, .csl-page.dk.csl-anonim .an-body { color:#FAFAFA; }
  .csl-page.dk.csl-anonim .an-eyebrow, .csl-page.dk.csl-anonim .an-meta { color:rgba(250,250,250,0.55); }
  /* Yellow variants — texto en negro */
  .csl-page.yl.csl-tldr h2, .csl-page.yl.csl-tldr ol li p { color:var(--bg); }
  .csl-page.yl.csl-tldr ol li::before { color:var(--bg); }
  .csl-page.yl.csl-citas h2, .csl-page.yl.csl-citas .ct-cell .q { color:var(--bg); }

  /* ════════════════════════════════════════════
     DOCUMENTO (MD-rendered A4) — long-form prose, proposals, case studies from raw markdown
     Major page breaks: double horizontal rule (---\n---). Within a page, single --- stays as <hr>.
     ════════════════════════════════════════════ */
  .docmd-page { background:#FFF; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .docmd-head { display:flex; justify-content:space-between; align-items:center; padding:30px 56px 0; }
  .docmd-head .logo-svg.wm { height:16px; width:auto; display:block; }
  .docmd-head .docmd-meta { font-size:11px; letter-spacing:2.2px; text-transform:uppercase; color:rgba(0,0,0,0.4); font-weight:600; }
  .docmd-sep { height:2px; background:var(--yellow); margin:12px 56px 0; width:40px; }
  .docmd-body { flex:1; padding:36px 56px 72px; overflow:hidden; font-family:var(--sans); font-size:13.5px; line-height:1.65; color:#222; }
  .docmd-body > *:first-child { margin-top:0; }

  .docmd-body h1 { font-family:var(--serif); font-size:36px; font-weight:400; line-height:1.1; color:var(--bg); letter-spacing:-0.8px; margin:8px 0 18px; padding-bottom:14px; border-bottom:2px solid var(--yellow); }
  .docmd-body h2 { font-family:var(--serif); font-size:22px; font-weight:400; line-height:1.2; color:var(--bg); letter-spacing:-0.4px; margin:26px 0 10px; }
  .docmd-body h2::before { content:''; display:block; width:28px; height:2px; background:var(--yellow); margin-bottom:10px; }
  /* Kill the redundant dash above h2 when an h1 (which already has a yellow underline) sits right before it. */
  .docmd-body h1 + h2 { margin-top:16px; }
  .docmd-body h1 + h2::before { display:none; }
  .docmd-body h3 { font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--bg); margin:22px 0 8px; }
  .docmd-body h4 { font-family:var(--sans); font-size:15.5px; font-weight:700; color:var(--bg); margin:24px 0 8px; letter-spacing:-0.1px; }
  .docmd-body p { margin:0 0 11px; }
  .docmd-body strong { color:var(--bg); font-weight:700; }

  /* Sign-off block: "Best,\nName\nAffiliation" patterns get styled with a separator rule above,
     the name in bold, affiliation slightly muted serif-italic for a proper letter closing. */
  .docmd-body .docmd-signoff { margin:22px 0 6px; padding-top:14px; border-top:1px solid rgba(0,0,0,0.08); line-height:1.5; }
  .docmd-body .docmd-signoff .so-salutation { color:#555; font-size:13px; }
  .docmd-body .docmd-signoff .so-name { font-weight:700; color:var(--bg); font-size:14px; }
  .docmd-body .docmd-signoff .so-affiliation { font-family:var(--serif); font-style:italic; color:#666; font-size:14px; }
  .docmd-body em { font-style:italic; }
  .docmd-body ul { list-style:none; padding-left:0; margin:10px 0 14px; }
  .docmd-body ul > li { padding:0 0 0 22px; position:relative; margin-bottom:6px; }
  .docmd-body ul > li::before { content:'\2014'; position:absolute; left:0; top:-1px; color:var(--yellow); font-weight:700; }
  .docmd-body ol { margin:10px 0 14px; padding-left:22px; }
  .docmd-body ol li { margin-bottom:6px; }
  .docmd-body ol li::marker { color:var(--yellow); font-weight:700; }
  .docmd-body li > p { margin:0 0 4px; }
  .docmd-body hr { border:none; height:1px; background:rgba(0,0,0,0.12); margin:20px 0; }
  .docmd-body blockquote { border-left:3px solid var(--yellow); margin:14px 0; padding:4px 0 4px 18px; font-family:var(--serif); font-style:italic; font-size:16px; color:#333; line-height:1.5; }
  .docmd-body blockquote p { margin:0; }
  .docmd-body code { font-family:'SF Mono', 'Fira Code', monospace; font-size:12px; background:rgba(255,214,0,0.12); color:var(--bg); padding:1px 5px; border-radius:3px; }
  .docmd-body a { color:var(--bg); text-decoration:underline; text-decoration-color:var(--yellow); text-decoration-thickness:2px; text-underline-offset:3px; }

  /* Tables: compact by default so 10-row pitch tables fit A4 without row clipping. */
  .docmd-body table { width:100%; border-collapse:collapse; margin:12px 0; font-size:10px; line-height:1.4; }
  .docmd-body thead th { background:var(--bg); color:var(--h1); text-align:left; font-weight:600; font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 8px; border-bottom:2px solid var(--yellow); }
  .docmd-body tbody td { padding:5px 8px; border-bottom:1px solid rgba(0,0,0,0.08); vertical-align:top; }
  .docmd-body tbody tr:nth-child(even) td { background:#FAFAFA; }

  .docmd-foot { position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:16px 56px; font-size:11px; color:rgba(0,0,0,0.4); letter-spacing:0.1em; border-top:1px solid rgba(0,0,0,0.08); }
  .docmd-foot .ing-ap { color:var(--yellow); font-weight:600; }

  /* Overflow indicator: visible-only hint shown when the rendered markdown chunk exceeds the A4 body height. Non-destructive — content still clips, but the user sees immediately that a split is needed. */
  .docmd-overflow-warn { position:absolute; bottom:48px; left:56px; right:56px; padding:8px 12px; background:#FFF3C4; border-left:3px solid #E6A100; font-family:var(--sans); font-size:11.5px; color:#6B4800; line-height:1.4; border-radius:2px; }

  /* Cover page: dark surface, editorial typography — reserved for the first chunk when it looks like a cover
     (has a heading + prose/metadata, no lists/tables/hrs). Uses the same A4 frame so PDF page size is consistent. */
  .docmd-cover { background:var(--bg); color:var(--h1); padding:80px 64px 120px; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .docmd-cover .logo-svg.wm { height:24px; width:auto; margin-bottom:72px; display:block; }
  .docmd-cover .mc-eyebrow { font-family:var(--serif); font-style:italic; font-size:20px; color:var(--yellow); margin-bottom:22px; letter-spacing:-0.2px; }
  .docmd-cover h1.mc-title, .docmd-cover .mc-title { font-family:var(--serif); font-size:60px; font-weight:400; line-height:1.04; color:var(--h1); letter-spacing:-1.4px; max-width:600px; margin:0 0 26px; }
  .docmd-cover .mc-subtitle { font-size:21px; line-height:1.45; color:#D0D0D0; max-width:580px; margin:0 0 34px; font-weight:400; }
  .docmd-cover .mc-accent { width:44px; height:3px; background:var(--yellow); }
  .docmd-cover .mc-meta { font-size:13.5px; color:rgba(255,255,255,0.55); line-height:1.95; margin-top:auto; }
  .docmd-cover .mc-meta strong { color:var(--h1); font-weight:500; }
  .docmd-cover .mc-meta p { margin:0 0 4px; }
  .docmd-cover .mc-confidential { font-family:var(--serif); font-style:italic; font-size:13px; color:rgba(255,214,0,0.85); margin-top:14px; letter-spacing:0.02em; }
  .docmd-cover .mc-bottom { position:absolute; bottom:42px; left:64px; right:64px; display:flex; justify-content:space-between; align-items:center; font-size:11px; color:rgba(255,255,255,0.35); letter-spacing:0.12em; }
  .docmd-cover .mc-bottom .ing-ap { color:var(--yellow); font-weight:600; }

  /* ════════════════════════════════════════════
     REPORT COVER STYLES (A4)
     ════════════════════════════════════════════ */
  .rc { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:var(--bg); position:relative; text-align:center; padding:80px; overflow:hidden; }
  .rc-watermark { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); opacity:0.04; pointer-events:none; }
  .rc-watermark .logo-svg.ic { height:480px; width:auto; }
  .rc-top { position:absolute; top:56px; left:56px; right:56px; display:flex; justify-content:space-between; align-items:center; }
  .rc-top .logo-svg.wm { height:20px; width:auto; }
  .rc-body { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
  /* Same editorial serif italic eyebrow system as carousel cover + doc portadas. */
  .rc-eyebrow { font-family:var(--serif); font-size:24px; font-weight:400; font-style:italic; letter-spacing:-0.3px; color:var(--yellow); margin-bottom:28px; }
  .rc-accent { width:40px; height:2px; background:var(--yellow); margin-bottom:32px; }
  .rc-client { font-family:var(--serif); font-size:56px; color:var(--h1); line-height:1.15; margin-bottom:18px; letter-spacing:-1.2px; }
  .rc-date { font-size:14px; color:rgba(255,255,255,0.45); letter-spacing:0.1em; text-transform:uppercase; font-weight:500; }
  .rc-badge { font-size:10px; font-weight:600; letter-spacing:2.2px; text-transform:uppercase; color:var(--yellow); border:1px solid var(--yellow); padding:6px 14px; }
  .rc-bottom { position:absolute; bottom:56px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .rc-bottom .url { font-size:12px; letter-spacing:0.2em; color:rgba(255,255,255,0.4); text-transform:uppercase; font-weight:500; }
  .rc-bottom .url .ing-ap { color:var(--yellow); font-weight:600; }

  /* ════════════════════════════════════════════
     EMAIL SIGNATURE STYLES
     ════════════════════════════════════════════ */
  .frame.sig { width:600px; min-height:140px; background:#FFFFFF; }
  .sig-inner { display:flex; align-items:stretch; padding:28px 32px; font-family:var(--sans); gap:24px; border-left:3px solid var(--yellow); }
  .sig-icon { width:44px; flex-shrink:0; display:flex; align-items:flex-start; justify-content:center; padding-top:2px; }
  .sig-icon .logo-svg.ic { height:36px; width:auto; }
  .sig-info { flex:1; }
  .sig-name { font-size:15px; font-weight:700; color:var(--bg); margin-bottom:3px; letter-spacing:-0.1px; }
  .sig-role { font-size:13px; color:var(--body-dk); margin-bottom:14px; }
  .sig-divider { width:40px; height:1px; background:var(--border-lt); margin-bottom:12px; }
  .sig-url { font-size:12px; color:rgba(0,0,0,0.45); letter-spacing:0.12em; text-transform:uppercase; font-weight:500; }
  .sig-url .ing-ap { color:var(--bg); background:var(--yellow); padding:1px 5px; border-radius:2px; margin-left:1px; font-weight:600; }
  .sig-link { display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-size:13px; color:var(--bg); font-weight:600; text-decoration:none; letter-spacing:0.02em; }
  .sig-link .arrow { font-size:14px; }

  /* ── PRESENTACION (slides 1920x1080) ── */
  .ps-slide { position:relative; width:100%; height:100%; padding:100px 120px; display:flex; flex-direction:column; }
  .ps-slide.dk { background:var(--bg); color:var(--h1); }
  .ps-slide.lt { background:#FAFAFA; color:var(--bg); }
  .ps-slide.yl { background:var(--yellow); color:var(--bg); }
  .ps-wm { position:absolute; top:60px; left:120px; }
  .ps-wm svg { height:40px; }
  .ps-footer { position:absolute; bottom:50px; left:120px; right:120px; display:flex; justify-content:space-between; align-items:center; font-size:40px; letter-spacing:0.1em; }
  .ps-footer .url-dk { color:rgba(255,255,255,0.35); }
  .ps-footer .url-lt { color:rgba(0,0,0,0.35); }
  .ps-footer .ing-ap { color:var(--yellow); font-weight:500; }
  .ps-footer svg { height:28px; }
  .ps-bar-yl { width:120px; height:10px; background:var(--yellow); }

  /* portada */
  .ps-portada { justify-content:center; }
  .ps-portada h1 { font-family:var(--serif); font-size:130px; line-height:1.02; letter-spacing:-2px; color:var(--h1); max-width:1500px; }
  .ps-portada .sub { font-size:44px; color:#E5E5E5; margin-top:44px; max-width:1280px; line-height:1.4; }
  .ps-portada .bar { margin-top:60px; }

  /* divisor */
  .ps-divisor .num { font-family:var(--serif); font-size:260px; line-height:0.9; color:var(--bg); }
  .ps-divisor h2 { font-family:var(--serif); font-size:96px; line-height:1.05; margin-top:40px; color:var(--bg); max-width:1400px; }

  /* contenido */
  .ps-contenido .eyebrow { font-size:40px; letter-spacing:2px; color:var(--yellow); text-transform:uppercase; font-weight:500; }
  .ps-contenido .bar { width:60px; height:4px; background:var(--yellow); margin:16px 0 28px; }
  .ps-contenido h2 { font-family:var(--serif); font-size:72px; line-height:1.1; color:var(--bg); max-width:1500px; margin-bottom:48px; }
  .ps-contenido ul { list-style:none; display:flex; flex-direction:column; gap:24px; }
  .ps-contenido li { display:flex; align-items:flex-start; gap:24px; font-size:44px; line-height:1.4; color:var(--bg); }
  .ps-contenido li::before { content:''; width:14px; height:14px; background:var(--yellow); flex-shrink:0; margin-top:16px; }

  /* stat */
  .ps-stat { align-items:center; justify-content:center; text-align:center; }
  .ps-stat .num { font-family:var(--serif); font-size:380px; line-height:0.9; color:var(--yellow); letter-spacing:-8px; }
  .ps-stat .num sup { font-size:120px; opacity:0.6; }
  .ps-stat .desc { font-size:44px; color:var(--h1); max-width:1200px; margin-top:40px; line-height:1.4; }
  .ps-stat .meta { font-size:40px; color:var(--body-dk); margin-top:24px; letter-spacing:0.05em; }

  /* quote */
  .ps-quote { justify-content:center; }
  .ps-quote .mark { font-family:var(--serif); font-size:280px; color:var(--yellow); line-height:0.8; position:absolute; top:80px; left:100px; opacity:0.9; }
  .ps-quote blockquote { font-family:var(--serif); font-style:italic; font-size:70px; line-height:1.2; color:var(--bg); max-width:1500px; position:relative; z-index:2; }
  .ps-quote .author { font-size:40px; color:var(--body-lt); margin-top:48px; letter-spacing:0.04em; }

  /* comparacion */
  .ps-comp { flex-direction:row; gap:0; padding:100px 80px; }
  .ps-comp .col { flex:1; padding:40px 60px; display:flex; flex-direction:column; gap:24px; }
  .ps-comp .col .eb { font-size:40px; letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .ps-comp .col .eb.a { color:var(--body-lt); }
  .ps-comp .col .eb.b { color:var(--yellow); }
  .ps-comp .col .bar { width:60px; height:4px; }
  .ps-comp .col .bar.a { background:#ccc; }
  .ps-comp .col .bar.b { background:var(--yellow); }
  .ps-comp .col.a ul li { color:var(--body-lt); }
  .ps-comp .col.b ul li { color:var(--bg); }
  .ps-comp .col ul { list-style:none; display:flex; flex-direction:column; gap:20px; margin-top:20px; }
  .ps-comp .col ul li { font-size:40px; line-height:1.35; }
  .ps-comp .sep { width:3px; background:var(--yellow); margin:40px 0; }

  /* cuadrante */
  .ps-cua .head { margin-bottom:30px; }
  .ps-cua .head .eb { font-size:40px; color:var(--body-lt); letter-spacing:2px; text-transform:uppercase; }
  .ps-cua .head h2 { font-family:var(--serif); font-size:44px; color:var(--bg); margin-top:10px; }
  .ps-cua .mat { flex:1; display:grid; grid-template-columns:80px 1fr 1fr; grid-template-rows:1fr 1fr 60px; gap:8px; }
  .ps-cua .yax { grid-column:1; grid-row:1/3; display:flex; flex-direction:column; justify-content:space-between; align-items:center; font-size:40px; color:var(--body-lt); }
  .ps-cua .yax .lbl { transform:rotate(-90deg); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .ps-cua .xax { grid-column:2/4; grid-row:3; display:flex; justify-content:space-between; align-items:center; padding:0 20px; font-size:40px; color:var(--body-lt); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .ps-cua .cell { border:2px solid #eee; padding:36px; display:flex; flex-direction:column; justify-content:space-between; background:#FFFFFF; }
  .ps-cua .cell.hl { background:var(--yellow); border-color:var(--yellow); }
  .ps-cua .cell.dim { opacity:0.35; background:#FAFAFA; }
  .ps-cua .cell .nm { font-family:var(--serif); font-size:44px; color:var(--bg); line-height:1.15; letter-spacing:-0.5px; }
  .ps-cua .cell .ds { font-size:40px; color:var(--body-lt); margin-top:12px; line-height:1.4; }
  .ps-cua .cell.hl .ds { color:rgba(10,10,10,0.7); }
  .ps-cua .cell .tg { font-size:40px; color:var(--body-lt); letter-spacing:2px; text-transform:uppercase; margin-top:16px; font-weight:600; }
  .ps-cua .cell.hl .tg { color:var(--bg); background:var(--bg); color:var(--yellow); padding:6px 10px; display:inline-block; align-self:flex-start; }

  /* timeline */
  .ps-tl h2 { font-family:var(--serif); font-size:68px; color:var(--bg); margin-bottom:60px; line-height:1.05; letter-spacing:-1px; }
  .ps-tl .fases { display:flex; gap:40px; flex:1; align-items:flex-start; }
  .ps-tl .fase { flex:1; display:flex; flex-direction:column; gap:14px; }
  .ps-tl .fase .et { font-size:40px; font-weight:600; letter-spacing:2.2px; color:var(--bg); text-transform:uppercase; }
  .ps-tl .fase .et .ing { color:var(--bg); background:var(--yellow); padding:2px 8px; border-radius:2px; margin-left:2px; }
  .ps-tl .fase .ti { font-family:var(--serif); font-size:44px; color:var(--bg); line-height:1.15; letter-spacing:-0.5px; }
  .ps-tl .fase .du { font-size:40px; color:var(--body-lt); letter-spacing:0.02em; }
  .ps-tl .fase .b { height:6px; background:var(--yellow); margin-top:12px; width:60px; }

  /* imagen */
  .ps-img { justify-content:center; align-items:center; }
