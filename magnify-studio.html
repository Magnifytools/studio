  /* ════════════════════════════════════════════
     DOCUMENTO (MD-rendered A4) — long-form prose, proposals, case studies from raw markdown
     Major page breaks: double horizontal rule (---\n---). Within a page, single --- stays as <hr>.
     ════════════════════════════════════════════ */
  .docmd-page { background:#FFF; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .docmd-head { display:flex; justify-content:space-between; align-items:center; padding:30px 56px 0; }
  .docmd-head .logo-svg.wm { height:16px; width:auto; display:block; }
  .docmd-head .docmd-meta { font-size:11px; letter-spacing:2.2px; text-transform:uppercase; color:rgba(0,0,0,0.4); font-weight:600; }
  .docmd-sep { height:2px; background:var(--yellow); margin:12px 56px 0; width:40px; }
  .docmd-body { flex:1; padding:36px 56px 72px; overflow:hidden; font-family:var(--sans); font-size:13.5px; line-height:1.65; color:#222; }
  .docmd-body > *:first-child { margin-top:0; }

  .docmd-body h1 { font-family:var(--serif); font-size:36px; font-weight:400; line-height:1.1; color:var(--bg); letter-spacing:-0.8px; margin:8px 0 18px; padding-bottom:14px; border-bottom:2px solid var(--yellow); }
  .docmd-body h2 { font-family:var(--serif); font-size:22px; font-weight:400; line-height:1.2; color:var(--bg); letter-spacing:-0.4px; margin:26px 0 10px; }
  .docmd-body h2::before { content:''; display:block; width:28px; height:2px; background:var(--yellow); margin-bottom:10px; }
  /* Kill the redundant dash above h2 when an h1 (which already has a yellow underline) sits right before it. */
  .docmd-body h1 + h2 { margin-top:16px; }
  .docmd-body h1 + h2::before { display:none; }
  .docmd-body h3 { font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--bg); margin:22px 0 8px; }
  .docmd-body h4 { font-family:var(--sans); font-size:15.5px; font-weight:700; color:var(--bg); margin:24px 0 8px; letter-spacing:-0.1px; }
  .docmd-body p { margin:0 0 11px; }
  .docmd-body strong { color:var(--bg); font-weight:700; }

  /* Sign-off block: "Best,\nName\nAffiliation" patterns get styled with a separator rule above,
     the name in bold, affiliation slightly muted serif-italic for a proper letter closing. */
  .docmd-body .docmd-signoff { margin:22px 0 6px; padding-top:14px; border-top:1px solid rgba(0,0,0,0.08); line-height:1.5; }
  .docmd-body .docmd-signoff .so-salutation { color:#555; font-size:13px; }
  .docmd-body .docmd-signoff .so-name { font-weight:700; color:var(--bg); font-size:14px; }
  .docmd-body .docmd-signoff .so-affiliation { font-family:var(--serif); font-style:italic; color:#666; font-size:14px; }
  .docmd-body em { font-style:italic; }
  .docmd-body ul { list-style:none; padding-left:0; margin:10px 0 14px; }
  .docmd-body ul > li { padding:0 0 0 22px; position:relative; margin-bottom:6px; }
  .docmd-body ul > li::before { content:'\2014'; position:absolute; left:0; top:-1px; color:var(--yellow); font-weight:700; }
  .docmd-body ol { margin:10px 0 14px; padding-left:22px; }
  .docmd-body ol li { margin-bottom:6px; }
  .docmd-body ol li::marker { color:var(--yellow); font-weight:700; }
  .docmd-body li > p { margin:0 0 4px; }
  .docmd-body hr { border:none; height:1px; background:rgba(0,0,0,0.12); margin:20px 0; }
  .docmd-body blockquote { border-left:3px solid var(--yellow); margin:14px 0; padding:4px 0 4px 18px; font-family:var(--serif); font-style:italic; font-size:16px; color:#333; line-height:1.5; }
  .docmd-body blockquote p { margin:0; }
  .docmd-body code { font-family:'SF Mono', 'Fira Code', monospace; font-size:12px; background:rgba(255,214,0,0.12); color:var(--bg); padding:1px 5px; border-radius:3px; }
  .docmd-body a { color:var(--bg); text-decoration:underline; text-decoration-color:var(--yellow); text-decoration-thickness:2px; text-underline-offset:3px; }

  /* Tables: compact by default so 10-row pitch tables fit A4 without row clipping. */
  .docmd-body table { width:100%; border-collapse:collapse; margin:12px 0; font-size:10px; line-height:1.4; }
  .docmd-body thead th { background:var(--bg); color:var(--h1); text-align:left; font-weight:600; font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 8px; border-bottom:2px solid var(--yellow); }
  .docmd-body tbody td { padding:5px 8px; border-bottom:1px solid rgba(0,0,0,0.08); vertical-align:top; }
  .docmd-body tbody tr:nth-child(even) td { background:#FAFAFA; }

  .docmd-foot { position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:16px 56px; font-size:11px; color:rgba(0,0,0,0.4); letter-spacing:0.1em; border-top:1px solid rgba(0,0,0,0.08); }
  .docmd-foot .ing-ap { color:var(--yellow); font-weight:600; }

  /* Overflow indicator: visible-only hint shown when the rendered markdown chunk exceeds the A4 body height. Non-destructive — content still clips, but the user sees immediately that a split is needed. */
  .docmd-overflow-warn { position:absolute; bottom:48px; left:56px; right:56px; padding:8px 12px; background:#FFF3C4; border-left:3px solid #E6A100; font-family:var(--sans); font-size:11.5px; color:#6B4800; line-height:1.4; border-radius:2px; }

  /* Cover page: dark surface, editorial typography — reserved for the first chunk when it looks like a cover
     (has a heading + prose/metadata, no lists/tables/hrs). Uses the same A4 frame so PDF page size is consistent. */
  .docmd-cover { background:var(--bg); color:var(--h1); padding:80px 64px 120px; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .docmd-cover .logo-svg.wm { height:24px; width:auto; margin-bottom:72px; display:block; }
  .docmd-cover .mc-eyebrow { font-family:var(--serif); font-style:italic; font-size:20px; color:var(--yellow); margin-bottom:22px; letter-spacing:-0.2px; }
  .docmd-cover h1.mc-title, .docmd-cover .mc-title { font-family:var(--serif); font-size:60px; font-weight:400; line-height:1.04; color:var(--h1); letter-spacing:-1.4px; max-width:600px; margin:0 0 26px; }
  .docmd-cover .mc-subtitle { font-size:21px; line-height:1.45; color:#D0D0D0; max-width:580px; margin:0 0 34px; font-weight:400; }
  .docmd-cover .mc-accent { width:44px; height:3px; background:var(--yellow); }
  .docmd-cover .mc-meta { font-size:13.5px; color:rgba(255,255,255,0.55); line-height:1.95; margin-top:auto; }
  .docmd-cover .mc-meta strong { color:var(--h1); font-weight:500; }
  .docmd-cover .mc-meta p { margin:0 0 4px; }
  .docmd-cover .mc-confidential { font-family:var(--serif); font-style:italic; font-size:13px; color:rgba(255,214,0,0.85); margin-top:14px; letter-spacing:0.02em; }
  .docmd-cover .mc-bottom { position:absolute; bottom:42px; left:64px; right:64px; display:flex; justify-content:space-between; align-items:center; font-size:11px; color:rgba(255,255,255,0.35); letter-spacing:0.12em; }
  .docmd-cover .mc-bottom .ing-ap { color:var(--yellow); font-weight:600; }

  /* ════════════════════════════════════════════
     REPORT COVER STYLES (A4)
     ════════════════════════════════════════════ */
  .rc { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:var(--bg); position:relative; text-align:center; padding:80px; overflow:hidden; }
  .rc-watermark { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); opacity:0.04; pointer-events:none; }
  .rc-watermark .logo-svg.ic { height:480px; width:auto; }
  .rc-top { position:absolute; top:56px; left:56px; right:56px; display:flex; justify-content:space-between; align-items:center; }
  .rc-top .logo-svg.wm { height:20px; width:auto; }
  .rc-body { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
  /* Same editorial serif italic eyebrow system as carousel cover + doc portadas. */
  .rc-eyebrow { font-family:var(--serif); font-size:24px; font-weight:400; font-style:italic; letter-spacing:-0.3px; color:var(--yellow); margin-bottom:28px; }
  .rc-accent { width:40px; height:2px; background:var(--yellow); margin-bottom:32px; }
  .rc-client { font-family:var(--serif); font-size:56px; color:var(--h1); line-height:1.15; margin-bottom:18px; letter-spacing:-1.2px; }
  .rc-date { font-size:14px; color:rgba(255,255,255,0.45); letter-spacing:0.1em; text-transform:uppercase; font-weight:500; }
  .rc-badge { font-size:10px; font-weight:600; letter-spacing:2.2px; text-transform:uppercase; color:var(--yellow); border:1px solid var(--yellow); padding:6px 14px; }
  .rc-bottom { position:absolute; bottom:56px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .rc-bottom .url { font-size:12px; letter-spacing:0.2em; color:rgba(255,255,255,0.4); text-transform:uppercase; font-weight:500; }
  .rc-bottom .url .ing-ap { color:var(--yellow); font-weight:600; }

  /* ════════════════════════════════════════════
     EMAIL SIGNATURE STYLES
     ════════════════════════════════════════════ */
  .frame.sig { width:600px; min-height:140px; background:#FFFFFF; }
  .sig-inner { display:flex; align-items:stretch; padding:28px 32px; font-family:var(--sans); gap:24px; border-left:3px solid var(--yellow); }
  .sig-icon { width:44px; flex-shrink:0; display:flex; align-items:flex-start; justify-content:center; padding-top:2px; }
  .sig-icon .logo-svg.ic { height:36px; width:auto; }
  .sig-info { flex:1; }
  .sig-name { font-size:15px; font-weight:700; color:var(--bg); margin-bottom:3px; letter-spacing:-0.1px; }
  .sig-role { font-size:13px; color:var(--body-dk); margin-bottom:14px; }
  .sig-divider { width:40px; height:1px; background:var(--border-lt); margin-bottom:12px; }
  .sig-url { font-size:12px; color:rgba(0,0,0,0.45); letter-spacing:0.12em; text-transform:uppercase; font-weight:500; }
  .sig-url .ing-ap { color:var(--bg); background:var(--yellow); padding:1px 5px; border-radius:2px; margin-left:1px; font-weight:600; }
  .sig-link { display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-size:13px; color:var(--bg); font-weight:600; text-decoration:none; letter-spacing:0.02em; }
  .sig-link .arrow { font-size:14px; }

  /* ── PRESENTACION (slides 1920x1080) ── */
  .ps-slide { position:relative; width:100%; height:100%; padding:100px 120px; display:flex; flex-direction:column; }
  .ps-slide.dk { background:var(--bg); color:var(--h1); }
  .ps-slide.lt { background:#FFFFFF; color:var(--bg); }
  .ps-slide.yl { background:var(--yellow); color:var(--bg); }
  .ps-wm { position:absolute; top:60px; left:120px; }
  .ps-wm svg { height:40px; }
  .ps-footer { position:absolute; bottom:50px; left:120px; right:120px; display:flex; justify-content:space-between; align-items:center; font-size:20px; letter-spacing:0.1em; }
  .ps-footer .url-dk { color:rgba(255,255,255,0.35); }
  .ps-footer .url-lt { color:rgba(0,0,0,0.35); }
  .ps-footer .ing-ap { color:var(--yellow); font-weight:500; }
  .ps-footer svg { height:28px; }
  .ps-bar-yl { width:120px; height:10px; background:var(--yellow); }

  /* portada */
  .ps-portada { justify-content:center; }
  .ps-portada h1 { font-family:var(--serif); font-size:130px; line-height:1.02; letter-spacing:-2px; color:var(--h1); max-width:1500px; }
  .ps-portada .sub { font-size:32px; color:#E5E5E5; margin-top:44px; max-width:1280px; line-height:1.4; }
  .ps-portada .bar { margin-top:60px; }

  /* divisor */
  .ps-divisor .num { font-family:var(--serif); font-size:260px; line-height:0.9; color:var(--bg); }
  .ps-divisor h2 { font-family:var(--serif); font-size:96px; line-height:1.05; margin-top:40px; color:var(--bg); max-width:1400px; }

  /* contenido */
  .ps-contenido .eyebrow { font-size:20px; letter-spacing:2px; color:var(--yellow); text-transform:uppercase; font-weight:500; }
  .ps-contenido .bar { width:60px; height:4px; background:var(--yellow); margin:16px 0 28px; }
  .ps-contenido h2 { font-family:var(--serif); font-size:72px; line-height:1.1; color:var(--bg); max-width:1500px; margin-bottom:48px; }
  .ps-contenido ul { list-style:none; display:flex; flex-direction:column; gap:24px; }
  .ps-contenido li { display:flex; align-items:flex-start; gap:24px; font-size:30px; line-height:1.4; color:var(--bg); }
  .ps-contenido li::before { content:''; width:14px; height:14px; background:var(--yellow); flex-shrink:0; margin-top:16px; }

  /* stat */
  .ps-stat { align-items:center; justify-content:center; text-align:center; }
  .ps-stat .num { font-family:var(--serif); font-size:380px; line-height:0.9; color:var(--yellow); letter-spacing:-8px; }
  .ps-stat .num sup { font-size:120px; opacity:0.6; }
  .ps-stat .desc { font-size:36px; color:var(--h1); max-width:1200px; margin-top:40px; line-height:1.4; }
  .ps-stat .meta { font-size:20px; color:var(--body-dk); margin-top:24px; letter-spacing:0.05em; }

  /* quote */
  .ps-quote { justify-content:center; }
  .ps-quote .mark { font-family:var(--serif); font-size:280px; color:var(--yellow); line-height:0.8; position:absolute; top:80px; left:100px; opacity:0.9; }
  .ps-quote blockquote { font-family:var(--serif); font-style:italic; font-size:70px; line-height:1.2; color:var(--bg); max-width:1500px; position:relative; z-index:2; }
  .ps-quote .author { font-size:26px; color:var(--body-lt); margin-top:48px; letter-spacing:0.04em; }

  /* comparacion */
  .ps-comp { flex-direction:row; gap:0; padding:100px 80px; }
  .ps-comp .col { flex:1; padding:40px 60px; display:flex; flex-direction:column; gap:24px; }
  .ps-comp .col .eb { font-size:18px; letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .ps-comp .col .eb.a { color:var(--body-lt); }
  .ps-comp .col .eb.b { color:var(--yellow); }
  .ps-comp .col .bar { width:60px; height:4px; }
  .ps-comp .col .bar.a { background:#ccc; }
  .ps-comp .col .bar.b { background:var(--yellow); }
  .ps-comp .col.a ul li { color:var(--body-lt); }
  .ps-comp .col.b ul li { color:var(--bg); }
  .ps-comp .col ul { list-style:none; display:flex; flex-direction:column; gap:20px; margin-top:20px; }
  .ps-comp .col ul li { font-size:26px; line-height:1.35; }
  .ps-comp .sep { width:3px; background:var(--yellow); margin:40px 0; }

  /* cuadrante */
  .ps-cua .head { margin-bottom:30px; }
  .ps-cua .head .eb { font-size:18px; color:var(--body-lt); letter-spacing:2px; text-transform:uppercase; }
  .ps-cua .head h2 { font-family:var(--serif); font-size:44px; color:var(--bg); margin-top:10px; }
  .ps-cua .mat { flex:1; display:grid; grid-template-columns:80px 1fr 1fr; grid-template-rows:1fr 1fr 60px; gap:8px; }
  .ps-cua .yax { grid-column:1; grid-row:1/3; display:flex; flex-direction:column; justify-content:space-between; align-items:center; font-size:16px; color:var(--body-lt); }
  .ps-cua .yax .lbl { transform:rotate(-90deg); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .ps-cua .xax { grid-column:2/4; grid-row:3; display:flex; justify-content:space-between; align-items:center; padding:0 20px; font-size:16px; color:var(--body-lt); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .ps-cua .cell { border:2px solid #eee; padding:36px; display:flex; flex-direction:column; justify-content:space-between; background:#FFFFFF; }
  .ps-cua .cell.hl { background:var(--yellow); border-color:var(--yellow); }
  .ps-cua .cell.dim { opacity:0.35; background:#FAFAFA; }
  .ps-cua .cell .nm { font-family:var(--serif); font-size:34px; color:var(--bg); line-height:1.15; letter-spacing:-0.5px; }
  .ps-cua .cell .ds { font-size:20px; color:var(--body-lt); margin-top:12px; line-height:1.4; }
  .ps-cua .cell.hl .ds { color:rgba(10,10,10,0.7); }
  .ps-cua .cell .tg { font-size:13px; color:var(--body-lt); letter-spacing:2px; text-transform:uppercase; margin-top:16px; font-weight:600; }
  .ps-cua .cell.hl .tg { color:var(--bg); background:var(--bg); color:var(--yellow); padding:6px 10px; display:inline-block; align-self:flex-start; }

  /* timeline */
  .ps-tl h2 { font-family:var(--serif); font-size:68px; color:var(--bg); margin-bottom:60px; line-height:1.05; letter-spacing:-1px; }
  .ps-tl .fases { display:flex; gap:40px; flex:1; align-items:flex-start; }
  .ps-tl .fase { flex:1; display:flex; flex-direction:column; gap:14px; }
  .ps-tl .fase .et { font-size:18px; font-weight:600; letter-spacing:2.2px; color:var(--bg); text-transform:uppercase; }
  .ps-tl .fase .et .ing { color:var(--bg); background:var(--yellow); padding:2px 8px; border-radius:2px; margin-left:2px; }
  .ps-tl .fase .ti { font-family:var(--serif); font-size:36px; color:var(--bg); line-height:1.15; letter-spacing:-0.5px; }
  .ps-tl .fase .du { font-size:18px; color:var(--body-lt); letter-spacing:0.02em; }
  .ps-tl .fase .b { height:6px; background:var(--yellow); margin-top:12px; width:60px; }

  /* imagen */
  .ps-img { justify-content:center; align-items:center; }
  .ps-img .ph { width:72%; height:62%; background:#F0F0F0; display:flex; align-items:center; justify-content:center; font-size:24px; color:#AAA; letter-spacing:4px; font-weight:500; position:relative; border:2px dashed #DDD; }
  .ps-img .ph::before { content:""; position:absolute; top:0; left:0; width:60px; height:4px; background:var(--yellow); }
  .ps-img .cap { font-size:18px; color:var(--body-lt); margin-top:32px; letter-spacing:2.5px; text-transform:uppercase; font-weight:500; }

  /* siguiente-paso */
  .ps-sig { justify-content:center; align-items:center; text-align:center; }
  .ps-sig h2 { font-family:var(--serif); font-size:140px; line-height:1.04; color:var(--bg); max-width:1500px; letter-spacing:-3px; }
  .ps-sig h2 .hl { background:var(--bg); color:var(--yellow); padding:0.08em 0.22em 0.14em; }
  .ps-sig .cta { margin-top:72px; background:var(--bg); color:#fff; font-size:30px; font-weight:500; padding:28px 56px; letter-spacing:0.04em; display:inline-flex; align-items:center; gap:18px; }
  .ps-sig .cta .arrow { color:var(--yellow); font-size:32px; }

  /* ══════════════════════════════════════════════════════════════
     CHARLA — keynote slide types ported from Deck template.
     Minimum font size 20px across the board (meta/url can go to 20).
     New slide types live alongside the existing ps-* ones; they use
     their own class prefixes to avoid collisions. Event chrome
     (logo + handle) is injected via .ps-top-meta from the renderer.
     ═══════════════════════════════════════════════════════════ */

  /* Chrome: icon bottom-left + paginator bottom-right + event top-meta */
  .ps-wmk-bl { position:absolute; bottom:72px; left:120px; width:56px; height:56px; z-index:2; }
  .ps-wmk-bl svg { width:100%; height:100%; display:block; }
  .ps-pag { position:absolute; bottom:84px; right:120px; font-size:24px; letter-spacing:0.08em; color:#B8B8B8; font-family:var(--sans); z-index:2; }
  .ps-top-meta { position:absolute; top:72px; left:120px; right:120px; display:flex; justify-content:space-between; align-items:center; font-size:22px; letter-spacing:0.08em; color:#B8B8B8; font-family:var(--sans); z-index:3; }
  .ps-top-meta .logo { max-height:44px; max-width:260px; width:auto; height:auto; display:block; }
  .ps-top-meta .handle { font-weight:500; }
  .ps-slide.lt .ps-pag, .ps-slide.lt .ps-top-meta { color:#666; }
  .ps-slide.yl .ps-pag, .ps-slide.yl .ps-top-meta { color:rgba(10,10,10,0.6); }
  .ps-slide.on-image .ps-pag, .ps-slide.on-image .ps-top-meta { color:#FAFAFA; opacity:0.95; }
  /* Scrim sobre slides con imagen: evita que el top-meta y paginator colisionen con contenido de capturas
     (chips de ChatGPT, header de SERP, etc.). 140px de degradado suave arriba + 120px abajo. */
  .ps-slide.on-image::before { content:""; position:absolute; top:0; left:0; right:0; height:160px; background:linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0)); pointer-events:none; z-index:2; }
  .ps-slide.on-image::after { content:""; position:absolute; bottom:0; left:0; right:0; height:140px; background:linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0)); pointer-events:none; z-index:2; }

  /* Generic charla body area (matches Deck template geometry). 20px min enforced. */
  .ps-charla { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-charla .eyebrow { font-family:var(--sans); font-size:28px; font-weight:400; letter-spacing:0.15em; color:#B8B8B8; text-transform:uppercase; }
  .ps-slide.lt .ps-charla .eyebrow, .ps-slide.yl .ps-charla .eyebrow { color:#444; }
  .ps-charla h1.h1 { font-family:var(--serif); font-weight:400; font-size:96px; line-height:1.05; letter-spacing:-0.02em; color:#F0F0F0; margin:0; }
  .ps-slide.lt .ps-charla h1.h1, .ps-slide.yl .ps-charla h1.h1 { color:var(--bg); }
  .ps-charla h2.h2 { font-family:var(--serif); font-weight:400; font-size:64px; line-height:1.10; letter-spacing:-0.02em; color:#FAFAFA; margin:0; }
  .ps-slide.lt .ps-charla h2.h2, .ps-slide.yl .ps-charla h2.h2 { color:var(--bg); }
  .ps-charla .body-l { font-family:var(--sans); font-size:36px; line-height:1.35; color:#FAFAFA; max-width:1200px; }
  .ps-slide.lt .ps-charla .body-l, .ps-slide.yl .ps-charla .body-l { color:var(--bg); }
  .ps-charla .body-m { font-family:var(--sans); font-size:28px; line-height:1.4; color:#FAFAFA; }
  .ps-slide.lt .ps-charla .body-m, .ps-slide.yl .ps-charla .body-m { color:var(--bg); }
  .ps-charla .meta-s { font-family:var(--sans); font-size:24px; line-height:1.5; color:#B8B8B8; }
  .ps-slide.lt .ps-charla .meta-s { color:#666; }
  .ps-slide.yl .ps-charla .meta-s { color:var(--bg); }
  .ps-charla .h3-label { font-family:var(--sans); font-size:26px; font-weight:400; letter-spacing:0.10em; color:#B8B8B8; text-transform:uppercase; }
  .ps-slide.lt .ps-charla .h3-label, .ps-slide.yl .ps-charla .h3-label { color:#444; }
  .ps-charla em { font-style:italic; }

  /* hero (cover with hairline) */
  .ps-hero { padding:0 160px 240px 160px; display:flex; flex-direction:column; justify-content:flex-end; height:100%; }
  .ps-hero .eyebrow { font-size:32px; margin-bottom:56px; }
  .ps-hero .title { font-family:var(--serif); font-weight:400; font-size:140px; line-height:1.0; letter-spacing:-0.02em; color:#F0F0F0; max-width:1500px; }
  .ps-slide.lt .ps-hero .title, .ps-slide.yl .ps-hero .title { color:var(--bg); }
  .ps-hero .hairline { width:80px; height:2px; background:var(--yellow); margin:40px 0; }
  .ps-hero .author { font-family:var(--sans); font-size:30px; color:#CCC; }
  .ps-slide.lt .ps-hero .author { color:#666; }
  .ps-slide.yl .ps-hero .author { color:var(--bg); }

  /* agenda */
  .ps-agenda-list { list-style:none; margin-top:48px; padding:0; }
  .ps-agenda-list li { font-family:var(--sans); font-weight:400; font-size:48px; line-height:1.6; color:#FAFAFA; display:grid; grid-template-columns:120px 1fr; align-items:baseline; }
  .ps-slide.lt .ps-agenda-list li, .ps-slide.yl .ps-agenda-list li { color:var(--bg); }
  .ps-agenda-list .n { color:#B8B8B8; font-family:var(--serif); }
  .ps-slide.lt .ps-agenda-list .n { color:#777; }
  .ps-slide.yl .ps-agenda-list .n { color:rgba(10,10,10,0.5); }
  .ps-agenda-list li.active .n { color:var(--yellow); }
  .ps-slide.yl .ps-agenda-list li.active .n { color:#fff; }

  /* manifiesto (hero-xxl italic) */
  .ps-manif { display:flex; align-items:center; justify-content:center; height:100%; padding:0 120px; }
  .ps-manif .hero-xxl { font-family:var(--serif); font-weight:400; font-style:italic; font-size:180px; line-height:0.95; letter-spacing:-0.02em; text-align:left; max-width:1600px; color:#F0F0F0; }
  .ps-slide.lt .ps-manif .hero-xxl, .ps-slide.yl .ps-manif .hero-xxl { color:var(--bg); }

  /* stat-hero (big number + side explanation) */
  .ps-stat-hero { padding:0 160px; display:flex; align-items:center; gap:120px; height:100%; }
  /* white-space:nowrap evita que sufijos con espacio (' · KD 72', '/mes') se partan en dos líneas.
     Cuando numero+sufijo suman muchos caracteres, el renderer ya baja el font-size dinámicamente. */
  .ps-stat-hero .num { font-family:var(--serif); font-weight:400; font-size:320px; line-height:0.9; letter-spacing:-0.04em; color:var(--yellow); flex-shrink:0; white-space:nowrap; }
  .ps-stat-hero .num.long { font-size:200px; }
  .ps-stat-hero .num.xlong { font-size:140px; letter-spacing:-0.02em; }
  .ps-stat-hero .explain { max-width:800px; }
  .ps-stat-hero .explain .eyebrow { display:block; margin-bottom:32px; font-size:26px; }
  .ps-stat-hero .explain h2 { font-family:var(--serif); font-weight:400; font-size:72px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:40px; color:#FAFAFA; }
  .ps-slide.lt .ps-stat-hero .explain h2, .ps-slide.yl .ps-stat-hero .explain h2 { color:var(--bg); }
  .ps-stat-hero .explain .src { font-family:var(--sans); font-size:24px; color:#B8B8B8; }
  .ps-slide.lt .ps-stat-hero .explain .src { color:#666; }
  .ps-slide.yl .ps-stat-hero .explain .src { color:var(--bg); }

  /* divisor charla (yellow act with huge number + right text) */
  .ps-divisor-c { display:flex; align-items:center; justify-content:center; height:100%; }
  .ps-divisor-c .num { font-family:var(--serif); font-size:560px; line-height:0.8; letter-spacing:-0.04em; font-weight:400; color:var(--bg); }
  .ps-divisor-c .sep { width:2px; height:240px; background:var(--bg); opacity:0.25; margin:0 80px; }
  .ps-divisor-c .right .meta-s { font-family:var(--sans); font-size:26px; letter-spacing:0.1em; color:var(--bg); opacity:0.7; text-transform:uppercase; margin-bottom:24px; }
  .ps-divisor-c .right .title { font-family:var(--serif); font-size:120px; line-height:1.0; letter-spacing:-0.02em; color:var(--bg); }

  /* compare (horizontal 2-col with hairline dividers) */
  .ps-compare { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-compare h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; text-align:center; margin-bottom:80px; color:#FAFAFA; }
  .ps-slide.lt .ps-compare h2, .ps-slide.yl .ps-compare h2 { color:var(--bg); }
  .ps-compare .grid { display:grid; grid-template-columns:1fr 1px 1fr; gap:80px; align-items:start; }
  .ps-compare .divider { background:rgba(255,255,255,0.1); width:1px; min-height:400px; }
  .ps-slide.lt .ps-compare .divider, .ps-slide.yl .ps-compare .divider { background:rgba(0,0,0,0.15); }
  .ps-compare .col .lbl { font-family:var(--sans); font-size:26px; letter-spacing:0.1em; color:#B8B8B8; display:block; margin-bottom:40px; text-transform:uppercase; }
  .ps-slide.lt .ps-compare .col .lbl, .ps-slide.yl .ps-compare .col .lbl { color:#444; }
  .ps-compare .col.magnify .lbl { color:var(--yellow); }
  .ps-slide.lt .ps-compare .col.magnify .lbl, .ps-slide.yl .ps-compare .col.magnify .lbl { color:#B8A000; }
  .ps-compare .col ul { list-style:none; padding:0; }
  .ps-compare .col li { padding:24px 0; border-bottom:1px solid rgba(255,255,255,0.1); font-family:var(--sans); font-size:34px; color:#FAFAFA; }
  .ps-slide.lt .ps-compare .col li, .ps-slide.yl .ps-compare .col li { color:var(--bg); border-bottom-color:rgba(0,0,0,0.12); }
  .ps-compare .col li:last-child { border-bottom:none; }

  /* framework 3 steps */
  .ps-fw { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-fw h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:96px; color:#FAFAFA; }
  .ps-slide.lt .ps-fw h2, .ps-slide.yl .ps-fw h2 { color:var(--bg); }
  .ps-fw .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:80px; }
  .ps-fw .grid.cols4 { grid-template-columns:repeat(4, 1fr); gap:48px; }
  .ps-fw .grid.cols4 .step .num { font-size:170px; }
  .ps-fw .grid.cols4 .step .desc { font-size:26px; }
  .ps-fw .step .num { color:var(--yellow); font-family:var(--serif); font-size:220px; line-height:0.9; letter-spacing:-0.04em; margin-bottom:32px; }
  .ps-fw .step .label { font-family:var(--sans); font-size:28px; letter-spacing:0.1em; color:var(--yellow); margin-bottom:24px; text-transform:uppercase; }
  .ps-slide.lt .ps-fw .step .label, .ps-slide.yl .ps-fw .step .label { color:#B8A000; }
  .ps-fw .step .desc { font-family:var(--sans); font-size:32px; line-height:1.4; color:#FAFAFA; }
  .ps-slide.lt .ps-fw .step .desc, .ps-slide.yl .ps-fw .step .desc { color:var(--bg); }

  /* timeline charla (4 nodes on horizontal rail) */
  .ps-tl-c { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-tl-c h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:120px; color:#FAFAFA; }
  .ps-slide.lt .ps-tl-c h2, .ps-slide.yl .ps-tl-c h2 { color:var(--bg); }
  .ps-tl-c .track { position:relative; }
  .ps-tl-c .track::before { content:""; position:absolute; top:14px; left:14px; right:14px; height:1px; background:rgba(255,255,255,0.2); }
  .ps-slide.lt .ps-tl-c .track::before, .ps-slide.yl .ps-tl-c .track::before { background:rgba(0,0,0,0.2); }
  .ps-tl-c .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:48px; position:relative; }
  .ps-tl-c .node .dot { width:28px; height:28px; background:var(--yellow); border:6px solid var(--bg); margin-bottom:40px; }
  .ps-slide.lt .ps-tl-c .node .dot, .ps-slide.yl .ps-tl-c .node .dot { border-color:#fff; }
  .ps-slide.yl .ps-tl-c .node .dot { background:var(--bg); border-color:var(--yellow); }
  .ps-tl-c .node .label { font-family:var(--sans); font-size:24px; letter-spacing:0.1em; color:var(--yellow); margin-bottom:20px; text-transform:uppercase; }
  .ps-slide.lt .ps-tl-c .node .label, .ps-slide.yl .ps-tl-c .node .label { color:#B8A000; }
  .ps-tl-c .node .title { font-family:var(--serif); font-size:52px; line-height:1.1; color:#FAFAFA; margin-bottom:20px; letter-spacing:-0.01em; }
  .ps-slide.lt .ps-tl-c .node .title, .ps-slide.yl .ps-tl-c .node .title { color:var(--bg); }
  .ps-tl-c .node .desc { font-family:var(--sans); font-size:26px; line-height:1.45; color:#FAFAFA; }
  .ps-slide.lt .ps-tl-c .node .desc, .ps-slide.yl .ps-tl-c .node .desc { color:var(--bg); }

  /* imagen full-bleed */
  .ps-imgfull { position:absolute; inset:0; overflow:hidden; }
  .ps-imgfull .bg { position:absolute; inset:0; background-size:cover; background-position:center; }
  .ps-imgfull .bg.ph { background:linear-gradient(180deg,#2a2a2a 0%,#161616 70%,#0a0a0a 100%); }
  .ps-imgfull .bg.ph::after { content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg, transparent 0 80px, rgba(255,255,255,0.02) 80px 82px); }
  .ps-imgfull .scrim { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.75), transparent 55%); }
  .ps-imgfull .overlay { position:absolute; bottom:240px; left:120px; right:120px; }
  .ps-imgfull .overlay .eyebrow { color:#FAFAFA; opacity:0.85; margin-bottom:20px; display:block; font-size:28px; letter-spacing:0.15em; font-family:var(--sans); text-transform:uppercase; }
  .ps-imgfull .overlay .title { color:#FAFAFA; font-family:var(--serif); font-weight:400; font-size:96px; line-height:1.05; letter-spacing:-0.02em; }
  .ps-imgfull .overlay em { font-style:italic; }

  /* imagen split (2col: image + text) */
  .ps-imgsplit { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; }
  .ps-imgsplit .pane-img { position:relative; overflow:hidden; background-size:cover; background-position:center; }
  .ps-imgsplit .pane-img.ph { background:linear-gradient(135deg,#555,#1c1c1c); }
  .ps-imgsplit.rev .pane-img { order:2; }
  .ps-imgsplit .pane-txt { padding:160px 120px; display:flex; flex-direction:column; justify-content:center; background:var(--bg); color:#FAFAFA; }
  .ps-slide.lt .ps-imgsplit .pane-txt { background:#FFF; color:var(--bg); }
  .ps-slide.yl .ps-imgsplit .pane-txt { background:var(--yellow); color:var(--bg); }
  .ps-imgsplit .pane-txt .eyebrow { font-family:var(--sans); font-size:28px; letter-spacing:0.15em; color:#B8B8B8; margin-bottom:32px; display:block; text-transform:uppercase; }
  .ps-slide.lt .ps-imgsplit .pane-txt .eyebrow, .ps-slide.yl .ps-imgsplit .pane-txt .eyebrow { color:#444; }
  .ps-imgsplit .pane-txt h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:32px; font-weight:400; }
  .ps-imgsplit .pane-txt .body-l { font-family:var(--sans); font-size:30px; max-width:560px; line-height:1.35; }
  .ps-imgsplit .pane-txt .meta-s { font-family:var(--sans); font-size:24px; margin-top:32px; color:#B8B8B8; }
  .ps-slide.lt .ps-imgsplit .pane-txt .meta-s { color:#666; }
  .ps-slide.yl .ps-imgsplit .pane-txt .meta-s { color:var(--bg); opacity:0.7; }
  .ps-imgsplit em { font-style:italic; }

  /* diptych (2 images with captions) */
  /* Diptych: 2 columns, cada una partida en 70% imagen / 30% caption sólida abajo.
     Antes el caption iba superpuesto sobre la imagen tapando contenido crítico (SERPs, chips de ChatGPT).
     Ahora la imagen respira arriba y el caption va en zona exclusiva con fondo opaco del brand. */
  .ps-dip { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; }
  .ps-dip .pane { position:relative; overflow:hidden; display:grid; grid-template-rows:70% 30%; background:var(--bg); }
  .ps-dip .pane .img { position:relative; background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#0A0A0A; }
  .ps-dip .pane .img.ph1 { background:linear-gradient(135deg,#3a3a3a 0%,#1a1a1a 100%); }
  .ps-dip .pane .img.ph2 { background:linear-gradient(135deg,#555,#1c1c1c 100%); }
  .ps-dip .pane .cap { padding:32px 48px 40px; display:flex; flex-direction:column; justify-content:center; background:#0A0A0A; border-top:4px solid var(--yellow); }
  .ps-dip .pane:nth-child(2) .cap { border-top-color:var(--yellow); }
  .ps-dip .pane .lbl { font-family:var(--sans); font-size:22px; letter-spacing:0.15em; color:var(--yellow); margin-bottom:12px; display:block; text-transform:uppercase; font-weight:500; }
  .ps-dip .pane .title { font-family:var(--serif); font-size:44px; line-height:1.08; letter-spacing:-0.01em; color:#FAFAFA; font-weight:400; }
  .ps-dip .pane .body { font-family:var(--sans); font-size:22px; line-height:1.4; color:#CCC; margin-top:10px; max-width:540px; }
  .ps-dip em { font-style:italic; }

  /* triptych (3 image tiles + caption overlay) */
  .ps-trp { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr 1fr; }
  .ps-trp .tile { position:relative; overflow:hidden; display:flex; align-items:flex-end; padding:64px 64px 200px; background-size:cover; background-position:center; }
  .ps-trp .tile.ph1 { background:linear-gradient(135deg,#383838,#1a1a1a); }
  .ps-trp .tile.ph2 { background:linear-gradient(135deg,#555,#1c1c1c); }
  .ps-trp .tile.ph3 { background:linear-gradient(135deg,#2a2a2a,#0f0f0f); }
  .ps-trp .tile::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 50%); }
  .ps-trp .tile .cap { position:relative; z-index:1; }
  .ps-trp .tile .num { font-family:var(--serif); font-size:80px; line-height:0.9; color:var(--yellow); margin-bottom:16px; font-weight:400; }
  .ps-trp .tile .t { font-family:var(--serif); font-size:40px; line-height:1.1; color:#FAFAFA; letter-spacing:-0.01em; font-weight:400; }
  .ps-trp .tile .s { font-family:var(--sans); font-size:24px; color:#FAFAFA; opacity:0.85; margin-top:16px; max-width:320px; }
  .ps-trp em { font-style:italic; }

  /* mosaic (1 big + 3-4 small) */
  .ps-mos { position:absolute; inset:120px; display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:1fr 1fr; gap:16px; }
  .ps-mos .cell { position:relative; overflow:hidden; background-size:cover; background-position:center; }
  .ps-mos .cell.big { grid-row:1 / span 2; }
  .ps-mos .cell.ph1 { background:linear-gradient(135deg,#3a3a3a,#1a1a1a); }
  .ps-mos .cell.ph2 { background:linear-gradient(135deg,#555,#1c1c1c); }
  .ps-mos .cell.ph3 { background:linear-gradient(135deg,#383838,#1a1a1a); }
  .ps-mos .cell.ph4 { background:linear-gradient(135deg,#1a1a1a,#0a0a0a); }
  .ps-mos .cell.ph5 { background:linear-gradient(135deg,#2a2a2a,#161616); }
  .ps-mos .cell::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.55), transparent 60%); }
  .ps-mos .cap { position:absolute; bottom:32px; left:32px; right:32px; z-index:1; }
  .ps-mos .cap .lbl { font-family:var(--sans); font-size:24px; letter-spacing:0.12em; color:var(--yellow); display:block; margin-bottom:10px; text-transform:uppercase; }
  .ps-mos .cap .t { font-family:var(--serif); font-size:38px; line-height:1.1; color:#FAFAFA; letter-spacing:-0.01em; font-weight:400; }
  .ps-mos .big .cap .t { font-size:64px; }
  .ps-mos em { font-style:italic; }
  .ps-mos-head { position:absolute; top:72px; left:120px; right:120px; z-index:3; display:flex; justify-content:space-between; align-items:baseline; }
  .ps-mos-head h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; color:#FAFAFA; font-weight:400; margin:0; }

  /* portrait quote (big photo + quote) */
  .ps-port { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; }
  .ps-port .pane-img { position:relative; overflow:hidden; background-size:cover; background-position:center; }
  .ps-port .pane-img.ph { background:linear-gradient(160deg,#4a4a4a 0%,#2a2a2a 60%,#101010 100%); }
  .ps-port .pane-txt { padding:120px 120px 180px; display:flex; flex-direction:column; justify-content:flex-end; background:var(--bg); color:#FAFAFA; }
  .ps-slide.lt .ps-port .pane-txt { background:#FFF; color:var(--bg); }
  .ps-port .pane-txt .eyebrow { font-family:var(--sans); font-size:28px; letter-spacing:0.15em; color:#B8B8B8; display:block; margin-bottom:24px; text-transform:uppercase; }
  .ps-port .pane-txt .h-quote { font-family:var(--serif); font-size:60px; line-height:1.15; color:#FAFAFA; letter-spacing:-0.01em; margin-bottom:40px; font-weight:400; }
  .ps-slide.lt .ps-port .pane-txt .h-quote { color:var(--bg); }
  .ps-port .pane-txt .name { font-family:var(--sans); font-size:30px; color:#FAFAFA; font-weight:500; }
  .ps-slide.lt .ps-port .pane-txt .name { color:var(--bg); }
  .ps-port .pane-txt .role { font-family:var(--sans); font-size:24px; color:#B8B8B8; margin-top:6px; }
  .ps-slide.lt .ps-port .pane-txt .role { color:#666; }
  .ps-port em { font-style:italic; }

  /* quote-big (single centered quote with photo) */
  .ps-qbig { padding:160px 160px 200px; height:100%; display:flex; flex-direction:column; justify-content:center; position:relative; }
  /* Comilla decorativa flotante arriba-izquierda del bloque, fuera del flujo para no empujar ni solapar la primera letra.
     (Antes iba inline y chocaba visualmente con "A" o cualquier palabra que empezara por letra alta.) */
  .ps-qbig .mark { position:absolute; top:140px; left:100px; font-family:var(--serif); font-size:260px; line-height:0.9; color:var(--bg); opacity:0.9; pointer-events:none; }
  .ps-slide.lt .ps-qbig .mark, .ps-slide.yl .ps-qbig .mark { color:var(--bg); opacity:0.85; }
  .ps-qbig .text { font-family:var(--serif); font-weight:400; font-size:88px; line-height:1.1; letter-spacing:-0.01em; color:var(--bg); max-width:1500px; margin-top:80px; padding-left:48px; position:relative; z-index:1; }
  .ps-qbig .attr { display:flex; align-items:center; gap:24px; margin-top:64px; }
  .ps-qbig .attr .photo { width:120px; height:120px; background:#0A0A0A; background-size:cover; background-position:center; flex-shrink:0; border-radius:50%; }
  .ps-qbig .attr .name { font-family:var(--sans); font-size:28px; color:var(--bg); font-weight:500; }
  .ps-qbig .attr .role { font-family:var(--sans); font-size:24px; color:#666; margin-top:4px; }
  .ps-qbig em { font-style:italic; }

  /* tabla (comparison table) */
  .ps-tabla { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-tabla h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:64px; color:var(--bg); font-weight:400; }
  .ps-tabla table { width:100%; border-collapse:collapse; }
  .ps-tabla th { font-family:var(--sans); font-size:24px; font-weight:400; letter-spacing:0.1em; text-align:left; color:#444; padding:28px 16px; border-bottom:1px solid rgba(0,0,0,0.2); text-transform:uppercase; }
  .ps-tabla td { font-family:var(--sans); font-size:30px; padding:26px 16px; border-bottom:1px solid rgba(0,0,0,0.08); color:var(--bg); }
  .ps-tabla tr.hi td { background:var(--yellow); border-bottom:0; }
  .ps-tabla td.c { text-align:center; }

  /* equipo (team grid) */
  .ps-team { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-team h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:72px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-team h2, .ps-slide.yl .ps-team h2 { color:var(--bg); }
  .ps-team .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:48px; }
  .ps-team .card .photo { aspect-ratio:1; margin-bottom:24px; background:#333; background-size:cover; background-position:center; }
  .ps-team .card .photo.ph1 { background:linear-gradient(135deg,#3a3a3a,#1a1a1a); }
  .ps-team .card .photo.ph2 { background:linear-gradient(135deg,#2e2e2e,#141414); }
  .ps-team .card .photo.ph3 { background:linear-gradient(135deg,#4a4a4a,#222); }
  .ps-team .card .photo.ph4 { background:linear-gradient(135deg,#333,#181818); }
  .ps-team .card .name { font-family:var(--sans); font-size:30px; color:#FAFAFA; margin-bottom:8px; }
  .ps-slide.lt .ps-team .card .name, .ps-slide.yl .ps-team .card .name { color:var(--bg); }
  .ps-team .card .role { font-family:var(--sans); font-size:24px; color:#B8B8B8; }
  .ps-slide.lt .ps-team .card .role { color:#666; }
  .ps-slide.yl .ps-team .card .role { color:var(--bg); opacity:0.7; }

  /* pricing (3 col) */
  .ps-pricing { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-pricing h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:72px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-pricing h2, .ps-slide.yl .ps-pricing h2 { color:var(--bg); }
  .ps-pricing .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; align-items:stretch; }
  .ps-pricing .col { padding:40px; position:relative; background:var(--bg); color:#FAFAFA; }
  .ps-slide.lt .ps-pricing .col { background:#FFF; color:var(--bg); }
  .ps-pricing .col + .col { border-left:1px solid rgba(255,255,255,0.1); }
  .ps-slide.lt .ps-pricing .col + .col { border-left-color:rgba(0,0,0,0.12); }
  .ps-pricing .col.hi { background:var(--yellow); color:var(--bg); border-left:none; }
  .ps-pricing .col.hi + .col { border-left:none; }
  .ps-pricing .col .lbl { font-family:var(--sans); font-size:24px; letter-spacing:0.12em; color:#B8B8B8; margin-bottom:24px; text-transform:uppercase; }
  .ps-pricing .col.hi .lbl { color:var(--bg); }
  .ps-pricing .col .name { font-family:var(--serif); font-size:56px; line-height:1; margin-bottom:32px; letter-spacing:-0.02em; font-weight:400; }
  .ps-pricing .col .price { font-family:var(--serif); font-size:160px; line-height:0.9; color:var(--yellow); letter-spacing:-0.04em; font-weight:400; }
  .ps-pricing .col.hi .price { color:var(--bg); }
  .ps-pricing .col .unit { font-family:var(--sans); font-size:24px; color:#B8B8B8; margin-bottom:32px; }
  .ps-pricing .col.hi .unit { color:var(--bg); opacity:0.7; }
  .ps-pricing .col ul { list-style:none; border-top:1px solid rgba(255,255,255,0.1); padding:24px 0 0; margin:0; }
  .ps-pricing .col.hi ul { border-top-color:rgba(0,0,0,0.2); }
  .ps-pricing .col li { font-family:var(--sans); font-size:24px; padding:12px 0; }

  /* cta-final (yellow big cta) */
  .ps-ctafinal { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:0 160px; text-align:center; }
  .ps-ctafinal .eyebrow { font-family:var(--sans); font-size:24px; letter-spacing:0.15em; color:var(--bg); margin-bottom:32px; display:block; text-transform:uppercase; }
  .ps-ctafinal h1 { font-family:var(--serif); font-size:140px; line-height:1.0; color:var(--bg); margin-bottom:56px; font-weight:400; letter-spacing:-0.02em; }
  .ps-ctafinal .contact { font-family:var(--sans); font-size:32px; color:var(--bg); }
  .ps-ctafinal em { font-style:italic; }

  /* stats-charla (grid of big numbers, 2x2 or 1xN)
     - Layout: padding-bottom grande para que .src no se solape con la fila inferior en 2x2 (B9).
     - .num nowrap para que "55/45" o "3.4×" no se partan en slash/punto (B8).
     - .hi con variantes .hi-neg (rojo, default) y .hi-pos (destacado brand) para darle semántica
       al highlight — un 5% puede ser alerta, un 92% puede ser logro (B11). */
  .ps-statsc { padding:140px 160px 120px; height:100%; display:flex; flex-direction:column; justify-content:center; position:relative; }
  .ps-statsc h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:72px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-statsc h2, .ps-slide.yl .ps-statsc h2 { color:var(--bg); }
  .ps-statsc .grid { display:grid; gap:56px 80px; }
  .ps-statsc .grid.cols2 { grid-template-columns:repeat(2, 1fr); }
  .ps-statsc .grid.cols3 { grid-template-columns:repeat(3, 1fr); gap:48px; }
  .ps-statsc .grid.cols4 { grid-template-columns:repeat(4, 1fr); gap:40px; }
  .ps-statsc .cell .num { font-family:var(--serif); font-weight:400; font-size:180px; line-height:0.9; letter-spacing:-0.04em; color:var(--yellow); margin-bottom:16px; white-space:nowrap; }

  .ps-slide.lt .ps-recursos .cat .hd, .ps-slide.yl .ps-recursos .cat .hd { color:#B8A000; border-bottom-color:rgba(184,160,0,0.35); }

// ── COLOR SELECTOR ──
// Renders a segmented control when the active variant declares `colors`. Clicking a button updates state
// and re-runs generate() if a preview already exists so the user sees the change instantly.
function renderColorBar(colors) {
  const bar = document.getElementById('color-bar');
  if (!colors || !colors.length) {
    bar.classList.remove('on');
    bar.innerHTML = '';
    currentColor = null;
    currentVariantColors = null;
    return;
  }
  currentVariantColors = colors;
  if (!currentColor || !colors.find(c => c.id === currentColor)) {
    currentColor = colors[0].id;
  }
  bar.innerHTML = `<span class="color-label">Color</span>` + colors.map(c =>
    `<button class="color-btn${c.id === currentColor ? ' on' : ''}" data-color="${c.id}" onclick="setColor('${c.id}')">
      <span class="swatch"></span>${c.label}
    </button>`
  ).join('');
  bar.classList.add('on');
}

function setColor(color) {
  currentColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('on', b.dataset.color === color));
  // Re-render if a preview already exists so the change is visible immediately.
  if (renderedFrames.length) generate();
}

// ── IMAGE UPLOADS ──
// ~5MB per image cap: larger files produce data URIs that make the HTML and exports sluggish. LinkedIn compresses anyway.
const MAX_IMG_BYTES = 5 * 1024 * 1024;

function handleImageFiles(files) {
  // Orden determinístico por nombre para que drag-drop múltiple respete el orden
  // alfabético del filesystem (01_*, 02_*, 03_*...). Antes el ID dependía de cuándo
  // terminaba FileReader cada archivo: archivos pequeños ganaban ID bajos y los grandes
  // quedaban al final, rompiendo el mapping esperado por el YAML.
  const list = Array.from(files || [])
    .filter(f => f.type.startsWith('image/'))
    .filter(f => {
      if (f.size > MAX_IMG_BYTES) { toast(`${f.name}: supera los 5MB`); return false; }
      return true;
    })
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
  if (!list.length) return;

  // Reservamos el ID ANTES del async: así img(N) queda asignado al archivo en la posición N
  // independientemente del orden en que FileReader termine.
  const assignments = list.map(file => {
    uploadCounter += 1;
    return { id: 'img' + uploadCounter, file };
  });

  assignments.forEach(({ id, file }) => {
    const reader = new FileReader();
    reader.onload = () => {
      uploadedImages[id] = reader.result;
      renderImageThumbs();
    };
    reader.onerror = () => toast('Error leyendo ' + file.name);
    reader.readAsDataURL(file);
  });
}

function removeUploadedImage(id) {
  delete uploadedImages[id];
  renderImageThumbs();
}

// Reordenar imágenes moviendo una imagen arriba/abajo en la lista. Al mover, los IDs se
// reasignan (img1, img2... en orden actual) para que el YAML refleje la posición visual.
// Esto evita que el usuario tenga que contar 7 thumbs para saber cuál es img7 (B10).
function moveUploadedImage(id, delta) {
  const ids = Object.keys(uploadedImages);
  const idx = ids.indexOf(id);
  if (idx < 0) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= ids.length) return;
  // Reordenar el array y reconstruir uploadedImages con nuevos IDs consecutivos.
  const dataUrls = ids.map(k => uploadedImages[k]);
  const [moved] = dataUrls.splice(idx, 1);
  dataUrls.splice(newIdx, 0, moved);
  uploadedImages = {};
  dataUrls.forEach((url, i) => { uploadedImages['img' + (i + 1)] = url; });
  uploadCounter = dataUrls.length;
  renderImageThumbs();
  // Regenerar preview si hay deck para que el usuario vea el nuevo orden inmediatamente.
  if (document.getElementById('render-container').children.length > 0) generate();
}

function renderImageThumbs() {
  const host = document.getElementById('upload-thumbs');
  if (!host) return;
  const ids = Object.keys(uploadedImages);
  host.innerHTML = ids.map((id, i) => `
    <div class="upload-thumb">
      <img src="${uploadedImages[id]}" alt="${id}">
      <span class="id">${id}</span>
      <button class="rm" title="Eliminar" onclick="removeUploadedImage('${id}')">×</button>
      <div class="move">
        ${i > 0 ? `<button class="mv" title="Subir (${id} → img${i})" onclick="moveUploadedImage('${id}', -1)">↑</button>` : ''}
        ${i < ids.length - 1 ? `<button class="mv" title="Bajar (${id} → img${i + 2})" onclick="moveUploadedImage('${id}', 1)">↓</button>` : ''}
      </div>
    </div>
  `).join('');
}

function wireUploadZone() {
  const drop = document.getElementById('upload-drop');
  const input = document.getElementById('upload-input');
  if (!drop || !input) return;
  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', e => { handleImageFiles(e.target.files); input.value = ''; });
  ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); drop.classList.add('drag');
  }));
  ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    if (ev === 'dragleave' && e.target !== drop) return;
    drop.classList.remove('drag');
  }));
  drop.addEventListener('drop', e => handleImageFiles(e.dataTransfer.files));
}

// ── SIDEBAR / TYPE SELECTION ──
function selectType(type) {
  currentType = type;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('on'));
  document.querySelector(`[data-type="${type}"]`).classList.add('on');

  const meta = TYPE_META[type];
  document.getElementById('panel-title').textContent = meta.title;
  document.getElementById('panel-desc').textContent = meta.desc;
  document.getElementById('btn-export').textContent = meta.exportLabel;
  document.getElementById('btn-export').disabled = true;

  // Show/hide upload zone based on whether this type supports images.
  document.getElementById('uploads').classList.toggle('on', !!meta.supportsImages);
  // Hide color bar by default; variants re-show it via selectVariant.
  renderColorBar(null);

  // If this type has multiple variants, show the variant picker gallery first.
  const variants = VARIANTS[type];
  const contentEl = document.getElementById('content');
  const contentWrap = contentEl.parentElement;
  if (variants && variants.length) {
    // Hide textarea, show gallery in hint area
    contentWrap.style.display = 'none';
    document.getElementById('hint').innerHTML = renderVariantGallery(type, variants);
  } else {
    contentWrap.style.display = '';
    document.getElementById('hint').innerHTML = meta.hint;
    contentEl.value = meta.example;
  }

  // Reset preview
  document.getElementById('preview').innerHTML = `<div class="empty-state">
    <p style="font-size:32px; opacity:0.15; font-family:var(--serif);">M</p>
    <p>${variants ? 'Elige una plantilla arriba para empezar' : 'Pulsa <strong>Generar Preview</strong> para ver el resultado'}</p>
  </div>`;
  document.getElementById('render-container').innerHTML = '';
  renderedFrames = [];
}

function renderVariantGallery(type, variants) {
  const cards = variants.map(v => `<button class="variant-card" onclick="selectVariant('${type}', '${v.id}')">
    <span class="vn">${v.name}</span>
    <span class="vd">${v.desc}</span>
  </button>`).join('');
  return `<p class="variant-intro"><strong>Elige una plantilla:</strong></p>
    <div class="variant-grid">${cards}</div>`;
}

function selectVariant(type, variantId) {
  const variants = VARIANTS[type] || [];
  const v = variants.find(x => x.id === variantId);
  if (!v) return;
  const meta = TYPE_META[type];
  // Swap UI from gallery to editor
  const contentEl = document.getElementById('content');
  contentEl.parentElement.style.display = '';
  contentEl.value = v.example;
  // Hint: show a "back to gallery" link + the type-level format hint
  document.getElementById('hint').innerHTML = `<div class="variant-back" onclick="selectType('${type}')">\u2190 Ver otras plantillas</div>${meta.hint}`;
  // Color bar: show only if this variant declares `colors`. Reset currentColor so each variant starts on its default.
  currentColor = null;
  renderColorBar(v.colors || null);
  // Auto-generate preview so user sees the variant immediately
  generate();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── PARSER ──
function parseBlock(text) {
  const data = {};
  const lines = text.trim().split('\n');
  let currentKey = null;
  // Strip surrounding single/double quotes if the whole value is wrapped in them.
  // Without this, users writing `sufijo: ":1"` end up with the literal quotes in output.
  const unquote = (v) => {
    const s = v.trim();
    if ((s.startsWith('"') && s.endsWith('"') && s.length > 1) ||
        (s.startsWith("'") && s.endsWith("'") && s.length > 1)) {
      return s.slice(1, -1);
    }
    return s;
  };
  for (const line of lines) {
    if (/^\s*#/.test(line)) { continue; }
    const m = line.match(/^(\w+(?:[-_]\w+)*):\s*(.*)$/);
    if (m) {
      currentKey = m[1].toLowerCase();
      data[currentKey] = unquote(m[2]);
    } else if (currentKey) {
      // Continuation lines: trim leading whitespace so YAML-style 2-space indentation
      // doesn't leak into rendered output as visible indents. Preserve the text content.
      // También quitamos comillas que envuelvan la línea entera — casos típicos: handles
      // tipo @SearchLDN escritos como '@SearchLDN' para evitar que YAML los interprete como alias.
      data[currentKey] += '\n' + unquote(line.replace(/^\s+/, ''));
    }
  }
  // Re-unquote once more in case the whole multi-line value was quoted.
  for (const k of Object.keys(data)) data[k] = unquote(data[k]);
  return data;
}

function applyHighlights(text) {
  // Include trailing punctuation (.,;:!?) INSIDE the yellow highlight so "[realidades]." reads as one visual unit.
  // The previous behavior left punctuation outside, which — combined with the 0.22em side-padding on .hl — produced
  // a visible gap ("realidades ."). Pulling punctuation inside both removes the gap and reads as a single editorial beat.
  // Inner-trailing punctuation ([word.]) is kept inside too (same rule).
  return text.replace(/\[([^\]]+)\]([.,;:!?]*)/g, (_, inner, trailing) => {
    return `<span class="hl">${inner}${trailing}</span>`;
  });
}

// Highlight the .ING suffix in eyebrows (Active Particle pattern: DIAGNOS.ING, PRIORITIZ.ING, etc.)
function applyActiveParticle(text) {
  if (!text) return text;
  return String(text).replace(/\.ING\b/gi, '<span class="ing-ap">.ING</span>');
}

// Returns eyebrow + accent line markup, or empty string if no text provided.
// This way eyebrow-less posts don't show placeholder defaults like "INSIGHT" or "DATO CLAVE".
function eyebrowBlock(text, eyebrowClass, accentClass, accentStyle) {
  if (!text || !String(text).trim()) return '';
  eyebrowClass = eyebrowClass || 'eyebrow-yl';
  accentClass = accentClass || 'accent-yl';
  const style = accentStyle ? ` style="${accentStyle}"` : '';
  return `<span class="eyebrow ${eyebrowClass}">${applyActiveParticle(text)}</span>
    <div class="accent ${accentClass}"${style}></div>`;
}

function renderQuote(d) {
  // color: dark (default) | light | yellow — three surfaces of the Magnify brand system.
  // Priority: explicit `color:` in textarea > active color-bar button > default 'dark'.
  const color = (d.color || currentColor || 'dark').toLowerCase().trim();
  const frameClass = color === 'light' ? 'lt' : color === 'yellow' ? 'yl' : 'dk';
  const wmColor = color === 'dark' ? '#FAFAFA' : '#0A0A0A';
  const eyebrowClass = color === 'dark' ? 'eyebrow-yl' : 'eyebrow-lt';
  // On yellow surface the yellow accent disappears — switch to the dark accent.
  const accentClass = color === 'yellow' ? 'accent-dk' : 'accent-yl';
  const footer = color === 'dark' ? ftrDk() : ftrLt();
  return `<div class="frame sq ${frameClass}"><div class="t1">
    <div class="watermark">${icon(wmColor)}</div>
    ${eyebrowBlock(d.eyebrow, eyebrowClass, accentClass)}
    <h2>${applyHighlights(d.titular || 'Tu headline aqu\u00ed')}</h2>
    <p class="attr">${d.atribucion || ''}</p>
  </div>${footer}</div>`;
}

function renderStatsGrid(d) {
  const color = (d.color || currentColor || 'light').toLowerCase().trim();
  const frameClass = color === 'light' ? 'lt' : color === 'yellow' ? 'yl' : 'dk';
  const eyebrowClass = color === 'dark' ? 'eyebrow-yl' : 'eyebrow-lt';
  const accentClass = color === 'yellow' ? 'accent-dk' : 'accent-yl';
  const footer = color === 'dark' ? ftrDk() : ftrLt();
  const stats = [];
  for (let i = 1; i <= 4; i++) {
    const num = d['stat' + i] || d['num' + i] || '';
    const lbl = d['label' + i] || d['etiqueta' + i] || '';
    if (num) stats.push({ num, lbl });
  }
  while (stats.length < 4) stats.push({ num: '\u2014', lbl: '' });
  return `<div class="frame sq ${frameClass}"><div class="t2">
    ${eyebrowBlock(d.eyebrow, eyebrowClass, accentClass)}
    <div class="t2-grid">
      ${stats.map((s, i) => `<div class="t2-cell"><div class="t2-num${i === 0 ? ' t2-num-yl' : ''}">${s.num}</div><div class="t2-lbl">${s.lbl}</div></div>`).join('')}
    </div>
  </div>${footer}</div>`;
}

function renderStatsHero(d) {
  const color = (d.color || currentColor || 'dark').toLowerCase().trim();

// ════════════════════════════════════════════
// DOCUMENTO (MD → A4 multi-page)
// ════════════════════════════════════════════

// Split raw MD on "double hr" page breaks: two ---\n--- lines (optionally separated by blank lines).
// Single --- within a page stays as <hr> in the rendered HTML.
function splitDocMdPages(raw) {
  const normalized = raw.replace(/\r\n/g, '\n');
  const SENTINEL = '\x00PAGE\x00';
  const withSentinel = normalized.replace(/(^|\n)---\s*\n(?:\s*\n)*---\s*(?=\n|$)/g, `$1${SENTINEL}`);
  return withSentinel.split(SENTINEL).map(s => s.trim()).filter(Boolean);
}

// Cover-page detection: the first chunk qualifies for cover treatment when it contains a heading
// followed by paragraphs only (no lists, hrs, tables, blockquotes). Anything richer goes to body.
function looksLikeCover(chunkHtml) {
  const div = document.createElement('div');
  div.innerHTML = chunkHtml;
  const kids = Array.from(div.children);
  if (!kids.length) return false;
  if (!/^H[1-4]$/i.test(kids[0].tagName)) return false;
  for (const c of kids) {
    if (['UL', 'OL', 'TABLE', 'HR', 'BLOCKQUOTE', 'PRE'].includes(c.tagName)) return false;
  }
  return true;
}

// Split the cover chunk into semantic parts: title (first heading), subtitle (second heading),
// metadata paragraphs (those with <strong>), and confidential line (italic-only paragraph).
function extractCoverParts(chunkHtml) {
  const div = document.createElement('div');
  div.innerHTML = chunkHtml;
  const kids = Array.from(div.children);
  let title = '', subtitle = '';
  const meta = [];
  let confidential = '';
  kids.forEach(el => {
    const tag = el.tagName.toLowerCase();
    if (/^h[1-4]$/.test(tag)) {
      if (!title) title = el.innerHTML;
      else if (!subtitle) subtitle = el.innerHTML;
    } else if (tag === 'p') {
      // Italic-only paragraph (just <em>) is treated as the confidential / tagline marker.
      const onlyEm = el.children.length === 1 && el.firstElementChild && el.firstElementChild.tagName === 'EM';
      if (onlyEm) {
        confidential = el.firstElementChild.innerHTML;
      } else {
        meta.push(el.innerHTML);
      }
    }
  });
  return { title, subtitle, meta, confidential };
}

function renderDocumentoCover(parts, pageN, total) {
  const eyebrowHtml = parts.subtitle ? `<div class="mc-subtitle">${parts.subtitle}</div>` : '';
  const metaHtml = parts.meta.length
    ? `<div class="mc-meta">${parts.meta.map(m => `<p>${m}</p>`).join('')}${parts.confidential ? `<div class="mc-confidential">${parts.confidential}</div>` : ''}</div>`
    : (parts.confidential ? `<div class="mc-meta"><div class="mc-confidential">${parts.confidential}</div></div>` : '');
  return `<div class="frame a4 docmd-page docmd-cover">
    ${wordmark('#FAFAFA')}
    <h1 class="mc-title">${parts.title || ''}</h1>
    ${eyebrowHtml}
    <div class="mc-accent"></div>
    ${metaHtml}
    <div class="mc-bottom">
      <span>${pageN} / ${total}</span>
      <span>magnify.<span class="ing-ap">ing</span></span>
    </div>
  </div>`;
}

function renderDocumentoPage(bodyHtml, pageN, total) {
  // Wordmark-only header — the old right-side "running header" duplicated the brand name when the MD
  // started with "# Magnify" and added noise without information otherwise.
  return `<div class="frame a4 docmd-page">
    <div class="docmd-head">
      ${wordmark('#0A0A0A')}
    </div>
    <div class="docmd-sep"></div>
    <div class="docmd-body">${bodyHtml}</div>
    <div class="docmd-foot">
      <span>${pageN} / ${total}</span>
      <span>magnify.<span class="ing-ap">ing</span></span>
    </div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// Extract the running header and export-slug from the first H1 in the raw MD.
function deriveDocTitle(raw) {
  const m = raw.match(/^#\s+(.+)$/m);
  return m ? m[1].trim().replace(/\s+/g, ' ').slice(0, 80) : '';
}
function deriveDocSlug(raw) {
  const title = deriveDocTitle(raw).toLowerCase();
  return title.replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60) || 'doc';
}

// Pre-process the raw MD before marked runs:
// - Em-dashes at paragraph start ("— text") are often used as list markers in prose. Convert to real `- ` bullets.
const SIGNOFFS = ['Best', 'Best regards', 'Kind regards', 'Sincerely', 'Regards',
                  'Saludos', 'Saludos cordiales', 'Un saludo', 'Atentamente', 'Cordialmente'];
const SIGNOFF_RE = new RegExp('^(?:' + SIGNOFFS.map(s => s.replace(/\s/g, '\\s+')).join('|') + '),?\\s*$', 'i');

function polishDocMd(md) {
  let out = md;
  // The wordmark in the page header already says "Magnify" — a leading `# Magnify` as the first h1
  // duplicates the brand name in the body. Strip it so we get one Magnify at the top, not two.
  out = out.replace(/^\s*#\s+Magnify\s*$/im, '');
  // Em-dashes at line-start are often used as visual list markers in prose. Convert to real bullets.
  out = out.replace(/(^|\n\n)— /g, '$1- ');
  return out;
}

// Post-process marked's HTML output to tighten structure for doc rendering:
// - A paragraph that is just a bold label (e.g. "**Client profile**") becomes an h4 — but only for short labels.
// - A paragraph whose first line is a sign-off greeting gets wrapped in `.docmd-signoff` with name+affiliation styling.
function polishDocHtml(html) {
  return html
    .replace(/<p>\s*<strong>([^<]+)<\/strong>\s*<\/p>/g, (m, label) =>
      label.length <= 60 ? `<h4>${label}</h4>` : m
    )
    .replace(/<p>([\s\S]+?)<\/p>/g, (m, inner) => {
      // Split on <br> (marked with breaks:true emits "<br>" or "<br/>").
      const lines = inner.split(/<br\s*\/?>/i).map(s => s.trim());
      if (lines.length < 2) return m;
      if (!SIGNOFF_RE.test(lines[0].replace(/<[^>]+>/g, ''))) return m;
      const salutation = lines[0];
      const name = lines[1] || '';
      const rest = lines.slice(2).filter(Boolean);
      const tail = rest.length ? rest.map(l => `<span class="so-affiliation">${l}</span>`).join('<br>') : '';
      return `<p class="docmd-signoff"><span class="so-salutation">${salutation}</span><br><span class="so-name">${name}</span>${tail ? '<br>' + tail : ''}</p>`;
    });
}

// Split an HTML string at top-level element boundaries so we can paginate it. Returns an array of HTML strings,
// each fitting within `maxHeight` pixels when rendered in a body with `.docmd-body` styles at width 682px.
// Uses an off-screen measurement container so sizes include real font metrics + margin collapsing.
function paginateDocHtml(html, maxHeight) {
  const measure = document.createElement('div');
  measure.className = 'docmd-body';
  // width = A4 body width minus the left/right padding of .docmd-body (56*2). Keep styling identical so measurement is accurate.
  measure.style.cssText = 'position:absolute; left:-9999px; top:0; width:682px; padding:0; overflow:visible;';
  measure.innerHTML = html;
  document.body.appendChild(measure);

  const kids = Array.from(measure.children);
  // Measure each child's outer height (bounding rect + collapsed margins captured as offsets between siblings).
  // Simpler heuristic: use offsetTop + offsetHeight across siblings vs total scrollHeight.
  const pages = [[]];
  let currentPageHeight = 0;

  kids.forEach(el => {
    const h = el.getBoundingClientRect().height;
    const styles = getComputedStyle(el);
    const marginTop = parseFloat(styles.marginTop) || 0;
    const marginBottom = parseFloat(styles.marginBottom) || 0;
    // For the first element on a page, don't count marginTop (it collapses against the page top).
    const effectiveH = h + (pages[pages.length - 1].length === 0 ? 0 : marginTop) + marginBottom;

    // If adding this element would overflow the page AND the page already has content, start a new page.
    if (currentPageHeight + effectiveH > maxHeight && pages[pages.length - 1].length > 0) {
      pages.push([]);
      currentPageHeight = 0;
    }
    pages[pages.length - 1].push(el.outerHTML);
    currentPageHeight += (pages[pages.length - 1].length === 1 ? h + marginBottom : effectiveH);
  });

  document.body.removeChild(measure);
  return pages.map(p => p.join(''));
}

function generateDocumento(raw, preview, renderC) {
  if (typeof marked === 'undefined' || !marked.parse) {
    showError('El parser de markdown no ha cargado (bloqueo de CDN, SRI o red). Abre DevTools \u2192 Network y busca <code>marked.min.js</code> para ver el motivo.');
    return;
  }
  const chunks = splitDocMdPages(raw);
  if (!chunks.length) { showError('El documento est\u00e1 vac\u00edo.'); return; }
  // breaks:true so single-line-separated metadata lines and sign-offs ("Best,\nDavid\nMagnify") don't collapse into one paragraph.
  marked.setOptions({ gfm: true, breaks: true });

  // A4 flowable area inside .docmd-body (content box, excluding body's own padding):
  // 1123 − 46 header − 14 sep − 36 top-pad − 72 bot-pad ≈ 955px. Conservative budget of 880 absorbs
  // font-load variance + margin-collapse slop + keeps content clear of the absolute-positioned footer.
  const BODY_BUDGET = 880;

  // The first chunk, if it looks like a cover (heading + prose, no lists/tables), gets dark editorial
  // cover treatment. Everything else paginates through the standard body flow.
  let coverParts = null;
  const renderedPages = [];
  chunks.forEach((mdChunk, chunkIdx) => {
    let bodyHtml;
    try { bodyHtml = polishDocHtml(marked.parse(polishDocMd(mdChunk))); }
    catch (e) { bodyHtml = `<p>Error parseando: ${e.message}</p>`; }
    if (chunkIdx === 0 && looksLikeCover(bodyHtml)) {
      coverParts = extractCoverParts(bodyHtml);
      return;
    }
    const split = paginateDocHtml(bodyHtml, BODY_BUDGET);
    split.forEach(h => renderedPages.push(h));
  });

  // Anti-orphan: if a page ends with a heading (h1–h4), move it to the next page so no subtitle is
  // left floating without its paragraph. The regex uses a back-reference + negative lookahead so it
  // captures ONLY the last heading — a naïve `<h[1-4]>[\s\S]*?</h[1-4]>$` is lazy in theory but
  // backtracks to match from the first heading when anchored by $, eating the whole page.
  const TRAIL_HEADING_RE = /<(h[1-4])[^>]*>(?:(?!<\/\1>)[\s\S])*<\/\1>\s*$/i;
  for (let i = 0; i < renderedPages.length - 1; i++) {
    let page = renderedPages[i];
    while (true) {
      const trailMatch = page.match(TRAIL_HEADING_RE);
      if (!trailMatch) break;
      const afterRemoval = page.slice(0, page.length - trailMatch[0].length).trim();
      if (!afterRemoval) break;
      renderedPages[i + 1] = trailMatch[0].replace(/\s*$/, '') + renderedPages[i + 1];
      page = afterRemoval;
    }
    renderedPages[i] = page;
  }

  // Defensive: remove any page that ended up empty (e.g., from an authored chunk that only contained an h1
  // which got stripped by polishDocMd, or from a degenerate paginator outcome).
  const nonEmpty = renderedPages.map(p => p.trim()).filter(Boolean);
  renderedPages.length = 0;
  renderedPages.push(...nonEmpty);

  const total = (coverParts ? 1 : 0) + renderedPages.length;
  const maxW = preview.clientWidth - 80;
  const scale = Math.min(maxW / 794, 0.55);

  const appendPage = (pageHtml, pageN) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = pageHtml;
    renderC.appendChild(actualDiv);
    const frame = actualDiv.querySelector('.frame');
    renderedFrames.push(frame);

    const card = document.createElement('div');
    card.className = 'preview-card paper';
    card.style.width = (794 * scale) + 'px';
    card.style.height = (1123 * scale) + 'px';
    card.style.marginBottom = '32px';
    card.innerHTML = `<div class="slide-label">${pageN} / ${total}</div>` + pageHtml;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  };

  let pageCursor = 0;
  if (coverParts) {
    pageCursor += 1;
    appendPage(renderDocumentoCover(coverParts, pageCursor, total), pageCursor);
  }
  renderedPages.forEach(bodyHtml => {
    pageCursor += 1;
    appendPage(renderDocumentoPage(bodyHtml, pageCursor, total), pageCursor);
  });
}

function parseMultiDoc(raw) {
  const blocks = raw.split(/^---$/m).map(b => b.trim()).filter(Boolean);
  if (blocks.length === 0) return { global: {}, sections: [] };
  const global = parseBlock(blocks[0]);
  const sections = blocks.slice(1).map(b => parseBlock(b));
  return { global, sections };
}

function pageHeader(label) {
  return `<div class="doc-header">
    ${wordmark('#0A0A0A').replace('class="logo-svg wm"', 'class="logo-svg wm doc-wm"')}
    <span class="doc-eyebrow">${label}</span>
  </div><div class="doc-sep"></div>`;
}
function pageFooter(pageN, total) {
  const num = String(pageN).padStart(2, '0');
  const tot = String(total).padStart(2, '0');
  return `<div class="doc-footer"><span>${num} / ${tot}</span><span>magnify.<span class="ing-ap">ing</span></span></div>`;
}

function parseSlashStat(s) {
  if (!s) return { num: '', lbl: '' };
  const parts = s.split('/');
  return { num: (parts[0] || '').trim(), lbl: (parts.slice(1).join('/') || '').trim() };
}

function generateMultiPageDoc(raw, preview, renderC, renderers, options) {
  const { global, sections } = parseMultiDoc(raw);
  if (sections.length === 0) { toast('A\u00f1ade al menos una secci\u00f3n separada por ---'); return; }

  const total = sections.length;
  const pages = [];
  sections.forEach((s, idx) => {
    const key = (s.seccion || '').toLowerCase().trim();
    const fn = renderers[key];
    if (!fn) return;
    // portada is page 1 but no numbered footer logic — still pass
    const html = fn(global, s, idx + 1, total, sections.find(x => (x.seccion || '').toLowerCase() === 'aproximacion'));
    pages.push({ html, label: key });
  });

  // Render into renderC and preview
  const previewCols = Math.min(2, pages.length);
  pages.forEach((p, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = p.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));
  });

  const w = 794, h = 1123;
  const maxW = preview.clientWidth - 80;
  const maxH = preview.clientHeight - 120;
  const scale = Math.min((maxW / 2 - 32) / w, maxH / h, 0.45);

  pages.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'preview-card paper';
    card.style.width = (w * scale) + 'px';
    card.style.height = (h * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${String(i + 1).padStart(2, '0')} \u00b7 ${p.label}</div>` + p.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

// ════════════════════════════════════════════
// CHARLA — slide renderers (keynote talks)
// All share ps-slide + ps-charla helpers; event chrome (logo + handle)
// comes from psTopMeta(g) which reads evento_logo / evento_handle from
// the global block. Brand icon bottom-left is always emitted.
// ════════════════════════════════════════════

function psBrandIcon(surface) {
  // Uses the bare A-polygon (no surrounding box) to stay consistent with the
  // rest of the studio (sidebar, LinkedIn post footers, existing presentacion
  // slides). On dark / on-image: white A. On light / yellow: black A.
  if (surface === 'lt' || surface === 'yl') return icon('#0A0A0A');
  return icon('#FAFAFA');
}

function psTopMeta(g) {
  if (!g) return '';
  const logoRef = (g.evento_logo || '').trim();
  const handle = (g.evento_handle || '').trim();
  const nombre = (g.evento_nombre || '').trim();
  const logoSrc = uploadedImages[logoRef] || null;
  const left = logoSrc
    ? `<img class="logo" src="${logoSrc}" alt="${nombre || 'logo evento'}">`
    : (nombre ? `<span>${nombre}</span>` : '<span></span>');
  const right = handle ? `<span class="handle">${handle}</span>` : '<span></span>';
  if (!logoSrc && !nombre && !handle) return '';
  return `<div class="ps-top-meta">${left}${right}</div>`;
}

// Flag global que el runtime pone antes de generar cada deck. Si el usuario declara
// `paginacion: no` (también acepta `off` / `false` / `0`) en el bloque global, psPaginator
// devuelve vacío y todas las slides salen sin el contador N/tot.
let PS_PAGINATION_ENABLED = true;

function psPaginator(n, tot, onImage) {
  if (!PS_PAGINATION_ENABLED) return '';
  if (!n && n !== 0) return '';
  const cls = onImage ? 'ps-pag' : 'ps-pag';
  const style = onImage ? ' style="color:#FAFAFA;opacity:0.75"' : '';
  return `<div class="${cls}"${style}>${String(n).padStart(2, '0')} / ${String(tot).padStart(2, '0')}</div>`;
}

function psBgFromImage(imgRef, fallbackClass) {
  // Returns style string for background or falls back to placeholder class.
  const src = uploadedImages[imgRef];
  if (src) return { style: `background-image:url('${src}')`, className: '' };
  return { style: '', className: fallbackClass };
}

// Charla — Stats Charla (grid 2x2, 1x3 or 1x4 of big numbers)
function renderPsStatsCharla(d, g, n, tot) {
  const surface = d.fondo === 'amarillo' ? 'yl' : d.fondo === 'claro' ? 'lt' : 'dk';
  // hi admite variantes semánticas (B11): 'si' / 'negativo' / 'neg' → rojo (alerta).
  // 'positivo' / 'pos' / 'ok' → amarillo brand realzado. Cualquier otro valor = sin highlight.
  const hiClass = (v) => {
    const x = (v || '').toLowerCase().trim();
    if (!x) return '';
    if (['si', 'yes', 'true', 'negativo', 'neg', '1'].includes(x)) return 'hi hi-neg';
    if (['positivo', 'pos', 'ok', 'good'].includes(x)) return 'hi hi-pos';
    return '';
  };
  const cells = [];
  for (let i = 1; i <= 4; i++) {
    if (d[`num${i}`] || d[`desc${i}`]) {
      cells.push({
        num: d[`num${i}`] || '',
        lbl: d[`label${i}`] || '',
        desc: d[`desc${i}`] || '',
        hiCls: hiClass(d[`hi${i}`])
      });
    }
  }
  const layout = (d.layout || '').toLowerCase();
  let gridCls = 'cols2';
  if (layout === '1x3' || cells.length === 3) gridCls = 'cols3';
  else if (layout === '1x4' || cells.length === 4 && layout === 'fila') gridCls = 'cols4';
  return `<div class="frame ps"><div class="ps-slide ${surface}">
    ${psTopMeta(g)}
    <div class="ps-statsc">
      ${d.titular ? `<h2>${applyHighlights(d.titular)}</h2>` : ''}
      <div class="grid ${gridCls}">
        ${cells.map(c => `<div class="cell ${c.hiCls}">
          <div class="num">${c.num}</div>
          ${c.lbl ? `<span class="lbl">${c.lbl}</span>` : ''}
          ${c.desc ? `<div class="desc">${c.desc}</div>` : ''}
        </div>`).join('')}
      </div>
      ${d.fuente ? `<div class="src">${d.fuente}</div>` : ''}
    </div>
    <div class="ps-wmk-bl">${psBrandIcon(surface)}</div>
    ${psPaginator(n, tot)}
  </div></div>`;
}

// Charla — Recursos Agrupados (list grouped by category, 2-3 columns)
function renderPsRecursos(d, g, n, tot) {
  const surface = d.fondo === 'amarillo' ? 'yl' : d.fondo === 'claro' ? 'lt' : 'dk';
  const cats = [];
  for (let c = 1; c <= 4; c++) {
    const head = d[`cat${c}_titulo`];
    if (!head) continue;
    const items = [];
    for (let i = 1; i <= 6; i++) {
      if (d[`cat${c}_item${i}`]) items.push(d[`cat${c}_item${i}`]);
    }
    cats.push({ head, items });
  }
  const gridCls = cats.length === 2 ? 'cols2' : '';
  // Each item can be "Nombre — fuente" or "Nombre | fuente"; we split and style.
  const renderItem = (s) => {
    const sep = /\s+[—–|-]\s+/;
    const parts = s.split(sep);
    if (parts.length >= 2) return `<b>${parts[0]}</b><span class="src">${parts.slice(1).join(' — ')}</span>`;
    return s;
  };
  return `<div class="frame ps"><div class="ps-slide ${surface}">
    ${psTopMeta(g)}
    <div class="ps-recursos">
      ${d.titular ? `<h2>${applyHighlights(d.titular)}</h2>` : ''}
      <div class="grid ${gridCls}">
        ${cats.map(c => `<div class="cat">
          <div class="hd">${c.head}</div>
          <ul>${c.items.map(it => `<li>${renderItem(it)}</li>`).join('')}</ul>
        </div>`).join('')}
      </div>
    </div>
    <div class="ps-wmk-bl">${psBrandIcon(surface)}</div>
    ${psPaginator(n, tot)}
  </div></div>`;
}
