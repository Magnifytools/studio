  .ps-img .ph { width:72%; height:62%; background:#F0F0F0; display:flex; align-items:center; justify-content:center; font-size:40px; color:#AAA; letter-spacing:4px; font-weight:500; position:relative; border:2px dashed #DDD; }
  .ps-img .ph::before { content:""; position:absolute; top:0; left:0; width:60px; height:4px; background:var(--yellow); }
  .ps-img .cap { font-size:40px; color:var(--body-lt); margin-top:32px; letter-spacing:2.5px; text-transform:uppercase; font-weight:500; }

  /* siguiente-paso */
  .ps-sig { justify-content:center; align-items:center; text-align:center; }
  .ps-sig h2 { font-family:var(--serif); font-size:140px; line-height:1.04; color:var(--bg); max-width:1500px; letter-spacing:-3px; }
  .ps-sig h2 .hl { background:var(--bg); color:var(--yellow); padding:0.08em 0.22em 0.14em; }
  .ps-sig .cta { margin-top:72px; background:var(--bg); color:#fff; font-size:44px; font-weight:500; padding:28px 56px; letter-spacing:0.04em; display:inline-flex; align-items:center; gap:18px; }
  .ps-sig .cta .arrow { color:var(--yellow); font-size:44px; }

  /* ══════════════════════════════════════════════════════════════
     CHARLA — keynote slide types ported from Deck template.
     Minimum font size 20px across the board (meta/url can go to 20).
     New slide types live alongside the existing ps-* ones; they use
     their own class prefixes to avoid collisions. Event chrome
     (logo + handle) is injected via .ps-top-meta from the renderer.
     ═══════════════════════════════════════════════════════════ */

  /* Chrome: icon bottom-left + paginator bottom-right + event top-meta */
  .ps-wmk-bl { position:absolute; bottom:72px; left:120px; width:56px; height:56px; z-index:2; }
  .ps-wmk-bl svg { width:100%; height:100%; display:block; }
  /* Regla 4 Magnify: mínimo 20pt PPTX = 40px CSS (ratio 2px/pt en slide 1920/13.33"). */
  .ps-pag { position:absolute; bottom:84px; right:120px; font-size:40px; letter-spacing:0.08em; color:#B8B8B8; font-family:var(--sans); z-index:2; }
  .ps-top-meta { position:absolute; top:72px; left:120px; right:120px; display:flex; justify-content:space-between; align-items:center; font-size:40px; letter-spacing:0.08em; color:#B8B8B8; font-family:var(--sans); z-index:3; }
  .ps-top-meta .logo { max-height:44px; max-width:260px; width:auto; height:auto; display:block; }
  .ps-top-meta .handle { font-weight:500; }
  .ps-slide.lt .ps-pag, .ps-slide.lt .ps-top-meta { color:#666; }
  .ps-slide.yl .ps-pag, .ps-slide.yl .ps-top-meta { color:rgba(10,10,10,0.6); }
  .ps-slide.on-image .ps-pag, .ps-slide.on-image .ps-top-meta { color:#FAFAFA; opacity:0.95; }
  /* B22: surfaces lt/yl en imagen-full → ps-pag/top-meta vuelven a colores oscuros y
     los scrims se pintan del color del fondo (no negro). */
  .ps-slide.lt.on-image .ps-pag, .ps-slide.lt.on-image .ps-top-meta { color:#444; opacity:0.85; }
  .ps-slide.yl.on-image .ps-pag, .ps-slide.yl.on-image .ps-top-meta { color:rgba(10,10,10,0.7); opacity:1; }
  /* Scrim sobre slides con imagen: barra superior densa para aislar top-meta de chips/SERP
     headers que suelen vivir en la franja alta. 120px opacos (0.88) con fade rápido en los
     últimos 40px para no crear línea dura. Igual tratamiento abajo para el paginator. */
  .ps-slide.on-image::before { content:""; position:absolute; top:0; left:0; right:0; height:160px; background:linear-gradient(to bottom, rgba(0,0,0,0.88) 0, rgba(0,0,0,0.88) 120px, rgba(0,0,0,0) 100%); pointer-events:none; z-index:2; }
  .ps-slide.on-image::after { content:""; position:absolute; bottom:0; left:0; right:0; height:140px; background:linear-gradient(to top, rgba(0,0,0,0.85) 0, rgba(0,0,0,0.85) 100px, rgba(0,0,0,0) 100%); pointer-events:none; z-index:2; }
  /* B22: scrims surface-aware. En lt el gradient va de hueso opaco a transparente; en yl,
     amarillo opaco a transparente. Mantienen legibilidad de header/paginator sin meter
     bandas oscuras sobre fondo claro. */
  .ps-slide.lt.on-image::before { background:linear-gradient(to bottom, rgba(250,250,250,0.92) 0, rgba(250,250,250,0.92) 120px, rgba(250,250,250,0) 100%); }
  .ps-slide.lt.on-image::after { background:linear-gradient(to top, rgba(250,250,250,0.92) 0, rgba(250,250,250,0.92) 100px, rgba(250,250,250,0) 100%); }
  .ps-slide.yl.on-image::before { background:linear-gradient(to bottom, rgba(255,214,0,0.92) 0, rgba(255,214,0,0.92) 120px, rgba(255,214,0,0) 100%); }
  .ps-slide.yl.on-image::after { background:linear-gradient(to top, rgba(255,214,0,0.92) 0, rgba(255,214,0,0.92) 100px, rgba(255,214,0,0) 100%); }
  /* B23: overlay_texto:no skipea scrims globales (top + bottom) para no tapar contenido
     denso de la imagen (tablas, esquemas, treemaps con datos). El header y paginator
     siguen visibles encima; si la imagen los pisa visualmente, mover el contenido en
     el YAML (no es responsabilidad del template). */
  .ps-slide.no-overlay::before, .ps-slide.no-overlay::after { display:none; }

  /* ════════════════════════════════════════════════════════════════════════
     SISTEMA TIPOGRÁFICO ps-* (Charla / Keynote) — B19 audit Apr 2026
     ────────────────────────────────────────────────────────────────────────
     Roles:
       titular (h1/h2/.title/.text/.num grandes) → PP Editorial New 400 (serif)
       eyebrow (kicker uppercase letterspaced)   → NM 700 Bold uppercase
       cuerpo (.body-l, .body-m, .body-xl)       → NM 400 Book (regular)
       énfasis dentro de body (.name, em weight) → NM 500 Medium
       meta/fuente (.meta-s, .src, .desc, .lbl)  → NM 400 Book
       acentos (.hl, .ing-ap)                    → estilo cromático, no peso
     ────────────────────────────────────────────────────────────────────────
     Cascada: la regla genérica .eyebrow (línea ~281) define 700 Bold y aplica
     a todos los .eyebrow del sistema ps-* salvo los .ps-charla que sobrescriben
     a 400 (decisión histórica para slides estándar — los demás van bold).
     Hierarchy de font-weight explícita abajo evita ambigüedad por cascada.
     ════════════════════════════════════════════════════════════════════════ */

  /* Generic charla body area (matches Deck template geometry). 20px min enforced. */
  .ps-charla { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-charla .eyebrow { font-family:var(--sans); font-size:40px; font-weight:400; letter-spacing:0.15em; color:#B8B8B8; text-transform:uppercase; }
  .ps-slide.lt .ps-charla .eyebrow, .ps-slide.yl .ps-charla .eyebrow { color:#444; }
  .ps-charla h1.h1 { font-family:var(--serif); font-weight:400; font-size:96px; line-height:1.05; letter-spacing:-0.02em; color:#F0F0F0; margin:0; }
  .ps-slide.lt .ps-charla h1.h1, .ps-slide.yl .ps-charla h1.h1 { color:var(--bg); }
  .ps-charla h2.h2 { font-family:var(--serif); font-weight:400; font-size:64px; line-height:1.10; letter-spacing:-0.02em; color:#FAFAFA; margin:0; }
  .ps-slide.lt .ps-charla h2.h2, .ps-slide.yl .ps-charla h2.h2 { color:var(--bg); }
  .ps-charla .body-l { font-family:var(--sans); font-weight:400; font-size:44px; line-height:1.35; color:#FAFAFA; max-width:1200px; }
  .ps-slide.lt .ps-charla .body-l, .ps-slide.yl .ps-charla .body-l { color:var(--bg); }
  .ps-charla .body-m { font-family:var(--sans); font-weight:400; font-size:40px; line-height:1.4; color:#FAFAFA; }
  .ps-slide.lt .ps-charla .body-m, .ps-slide.yl .ps-charla .body-m { color:var(--bg); }
  .ps-charla .meta-s { font-family:var(--sans); font-weight:400; font-size:40px; line-height:1.5; color:#B8B8B8; }
  .ps-slide.lt .ps-charla .meta-s { color:#666; }
  .ps-slide.yl .ps-charla .meta-s { color:var(--bg); }
  .ps-charla .h3-label { font-family:var(--sans); font-size:40px; font-weight:400; letter-spacing:0.10em; color:#B8B8B8; text-transform:uppercase; }
  .ps-slide.lt .ps-charla .h3-label, .ps-slide.yl .ps-charla .h3-label { color:#444; }
  .ps-charla em { font-style:italic; }

  /* hero (cover) — pattern Magnify Design System slide 1: griego ARRIBA italic amarillo,
     eyebrow gris uppercase letterspaced, titular grande italic serif, hairline amarilla,
     autor + fecha apilados (sans). Centrado vertical, no pegado al fondo. */
  .ps-hero { padding:120px 160px; display:flex; flex-direction:column; justify-content:center; height:100%; }
  .ps-hero .griego { font-family:var(--serif); font-style:italic; font-size:40px; color:var(--yellow); letter-spacing:0.02em; margin-bottom:36px; }
  .ps-slide.lt .ps-hero .griego, .ps-slide.yl .ps-hero .griego { color:var(--bg); }
  .ps-hero .eyebrow { font-size:26px; font-weight:500; letter-spacing:0.18em; color:#999; margin-bottom:48px; }
  .ps-slide.lt .ps-hero .eyebrow, .ps-slide.yl .ps-hero .eyebrow { color:rgba(10,10,10,0.55); }
  .ps-hero .title { font-family:var(--serif); font-style:italic; font-weight:400; font-size:140px; line-height:1.0; letter-spacing:-0.02em; color:#F0F0F0; max-width:1500px; }
  .ps-slide.lt .ps-hero .title, .ps-slide.yl .ps-hero .title { color:var(--bg); }
  .ps-hero .hairline { width:80px; height:2px; background:var(--yellow); margin:48px 0 28px; }
  .ps-slide.yl .ps-hero .hairline { background:var(--bg); }
  .ps-hero .author { font-family:var(--sans); font-size:26px; color:#FAFAFA; line-height:1.3; }
  .ps-slide.lt .ps-hero .author, .ps-slide.yl .ps-hero .author { color:var(--bg); }
  .ps-hero .fecha { font-family:var(--sans); font-size:26px; color:#999; line-height:1.3; margin-top:6px; }
  .ps-slide.lt .ps-hero .fecha, .ps-slide.yl .ps-hero .fecha { color:rgba(10,10,10,0.55); }

  /* agenda */
  .ps-agenda-list { list-style:none; margin-top:48px; padding:0; }
  .ps-agenda-list li { font-family:var(--sans); font-weight:400; font-size:48px; line-height:1.6; color:#FAFAFA; display:grid; grid-template-columns:120px 1fr; align-items:baseline; }
  .ps-slide.lt .ps-agenda-list li, .ps-slide.yl .ps-agenda-list li { color:var(--bg); }
  .ps-agenda-list .n { color:#B8B8B8; font-family:var(--serif); }
  .ps-slide.lt .ps-agenda-list .n { color:#777; }
  .ps-slide.yl .ps-agenda-list .n { color:rgba(10,10,10,0.5); }
  .ps-agenda-list li.active .n { color:var(--yellow); }
  .ps-slide.yl .ps-agenda-list li.active .n { color:#fff; }

  /* manifiesto (hero-xxl italic) — tamaños dinámicos espejan buildPptxManifiesto:
     80pt≈160px / 64pt≈128px / 52pt≈104px / 42pt≈84px. align:flex-start para match con PPTX (x:0.7, align:left). */
  .ps-manif { display:flex; flex-direction:column; align-items:flex-start; justify-content:center; height:100%; padding:0 95px; }
  /* B18: titulares muy cortos (<= 15 chars) en manifiesto se sienten huérfanos
     en la esquina sup-izq con tanto espacio vacío. Centramos horizontalmente y
     añadimos peso visual para que ocupen el escenario. */
  .ps-manif.short { align-items:center; text-align:center; }
  .ps-manif.short .hero-xxl { text-align:center; }
  /* F3 hilo griego: stamp encima del titular, tenue. Default sans para frases largas
     (ej. "Γνῶθι σεαυτόν" en slide 30). Modificador .anchor para letras sueltas Α/Β/Γ
     usadas como marcadores de acto — serif italic grande estilo hero. */
  .ps-manif .griego-stamp { font-family:var(--sans); font-size:40px; letter-spacing:0.2em; color:rgba(250,250,250,0.5); margin-bottom:40px; font-weight:400; }
  .ps-manif .griego-stamp.anchor { font-family:var(--serif); font-style:italic; font-size:120px; letter-spacing:0.02em; color:rgba(250,250,250,0.4); margin-bottom:48px; font-weight:400; line-height:1; }
  .ps-slide.lt .ps-manif .griego-stamp, .ps-slide.yl .ps-manif .griego-stamp { color:rgba(10,10,10,0.55); }
  .ps-slide.lt .ps-manif .griego-stamp.anchor, .ps-slide.yl .ps-manif .griego-stamp.anchor { color:rgba(10,10,10,0.4); }
  /* manifiesto — pattern Magnify Design System slide 29: titular serif regular (no italic global,
     solo el highlight [palabra] activa el italic). Tamaños alineados al ratio DS. */
  .ps-manif .hero-xxl { font-family:var(--serif); font-weight:400; font-style:normal; font-size:140px; line-height:1.05; letter-spacing:-0.02em; text-align:left; color:#F0F0F0; }
  .ps-manif .hero-xxl.s-md { font-size:120px; }
  .ps-manif .hero-xxl.s-sm { font-size:96px; }
  .ps-manif .hero-xxl.s-xs { font-size:80px; }
  .ps-slide.lt .ps-manif .hero-xxl, .ps-slide.yl .ps-manif .hero-xxl { color:var(--bg); }

  /* stat-hero (big number + side explanation) */
  /* B18: gap 120px hacía que el número y la explicación se sintieran "en zonas
     distintas". 80px conserva separación pero los conecta como un mismo bloque. */
  /* stat-hero — pattern Magnify Design System slide 18: layout VERTICAL CENTRADO.
     Eyebrow gris → número italic amarillo grande → descripción serif blanco → fuente sans gris. */
  .ps-stat-hero { padding:0 160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; height:100%; text-align:center; }
  .ps-stat-hero .stat-block { flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
  /* white-space:nowrap evita que sufijos con espacio (' · KD 72', '/mes') se partan en dos líneas.
     Cuando numero+sufijo suman muchos caracteres, el renderer ya baja el font-size dinámicamente. */
  .ps-stat-hero .num { font-family:var(--serif); font-style:italic; font-weight:400; font-size:200px; line-height:0.95; letter-spacing:-0.04em; color:var(--yellow); white-space:nowrap; margin:32px 0; }
  .ps-stat-hero .num.long { font-size:160px; }
  .ps-stat-hero .num.xlong { font-size:120px; letter-spacing:-0.02em; }
  /* Sufijo secundario debajo del número principal (p.ej. '· KD 72'). Tamaño ~1/3 del num y
     mismo color yellow, sin italic para que lea como dato complementario. */
  .ps-stat-hero .suf { font-family:var(--sans); font-weight:500; font-size:44px; color:var(--yellow); letter-spacing:0.02em; margin-top:12px; }
  .ps-slide.yl .ps-stat-hero .suf { color:var(--bg); }
  .ps-stat-hero .explain { max-width:1200px; text-align:center; display:flex; flex-direction:column; align-items:center; }
  /* B21: gaps eyebrow→titular (32) + titular→fuente (40) hacían que los tres elementos
     se sintieran "tres slides distintas". 16px y 16px los unifican como una columna
     semántica anclada al [num] de la izquierda. */
  .ps-stat-hero > .eyebrow { display:block; font-size:22px; font-weight:500; letter-spacing:0.18em; color:#999; text-transform:uppercase; }
  .ps-slide.lt .ps-stat-hero > .eyebrow, .ps-slide.yl .ps-stat-hero > .eyebrow { color:rgba(10,10,10,0.55); }
  .ps-stat-hero .explain h2 { font-family:var(--serif); font-weight:400; font-size:54px; line-height:1.15; letter-spacing:-0.01em; margin-bottom:24px; color:#FAFAFA; }
  .ps-slide.lt .ps-stat-hero .explain h2, .ps-slide.yl .ps-stat-hero .explain h2 { color:var(--bg); }
  .ps-stat-hero .explain .src { font-family:var(--sans); font-size:22px; color:#999; }
  .ps-slide.lt .ps-stat-hero .explain .src { color:#666; }
  .ps-slide.yl .ps-stat-hero .explain .src { color:var(--bg); }

  /* divisor charla (yellow act with huge number + right text) */
  .ps-divisor-c { display:flex; align-items:center; justify-content:center; height:100%; }
  .ps-divisor-c .num { font-family:var(--serif); font-size:560px; line-height:0.8; letter-spacing:-0.04em; font-weight:400; color:var(--bg); }
  .ps-divisor-c .sep { width:2px; height:240px; background:var(--bg); opacity:0.25; margin:0 80px; }
  .ps-divisor-c .right .meta-s { font-family:var(--sans); font-size:40px; letter-spacing:0.1em; color:var(--bg); opacity:0.7; text-transform:uppercase; margin-bottom:24px; }
  .ps-divisor-c .right .title { font-family:var(--serif); font-size:120px; line-height:1.0; letter-spacing:-0.02em; color:var(--bg); }

  /* compare (horizontal 2-col with hairline dividers) */
  .ps-compare { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-compare h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; text-align:center; margin-bottom:80px; color:#FAFAFA; }
  .ps-slide.lt .ps-compare h2, .ps-slide.yl .ps-compare h2 { color:var(--bg); }
  .ps-compare .grid { display:grid; grid-template-columns:1fr 1px 1fr; gap:80px; align-items:start; }
  .ps-compare .divider { background:rgba(255,255,255,0.1); width:1px; min-height:400px; }
  .ps-slide.lt .ps-compare .divider, .ps-slide.yl .ps-compare .divider { background:rgba(0,0,0,0.15); }
  .ps-compare .col .lbl { font-family:var(--sans); font-size:40px; letter-spacing:0.1em; color:#B8B8B8; display:block; margin-bottom:40px; text-transform:uppercase; }
  .ps-slide.lt .ps-compare .col .lbl, .ps-slide.yl .ps-compare .col .lbl { color:#444; }
  .ps-compare .col.magnify .lbl { color:var(--yellow); }
  .ps-slide.lt .ps-compare .col.magnify .lbl, .ps-slide.yl .ps-compare .col.magnify .lbl { color:#B8A000; }
  .ps-compare .col ul { list-style:none; padding:0; }
  .ps-compare .col li { padding:24px 0; border-bottom:1px solid rgba(255,255,255,0.1); font-family:var(--sans); font-size:44px; color:#FAFAFA; }
  .ps-slide.lt .ps-compare .col li, .ps-slide.yl .ps-compare .col li { color:var(--bg); border-bottom-color:rgba(0,0,0,0.12); }
  .ps-compare .col li:last-child { border-bottom:none; }

  /* framework 3 steps */
  /* framework — pattern Magnify Design System slide 25: titular grande arriba, hairline
     amarilla fina sobre cada paso, número italic amarillo, descripción sans blanco. */
  .ps-fw { padding:120px 160px 160px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-fw h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:80px; color:#FAFAFA; }
  .ps-slide.lt .ps-fw h2, .ps-slide.yl .ps-fw h2 { color:var(--bg); }
  .ps-fw .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:48px; }
  .ps-fw .grid.cols4 { grid-template-columns:repeat(4, 1fr); gap:48px; }
  .ps-fw .step { padding-top:24px; border-top:1px solid var(--yellow); }
  .ps-slide.yl .ps-fw .step { border-top-color:var(--bg); }
  .ps-fw .step .num { color:var(--yellow); font-family:var(--serif); font-style:italic; font-size:120px; line-height:0.95; letter-spacing:-0.04em; margin-bottom:24px; }
  .ps-slide.yl .ps-fw .step .num { color:var(--bg); }
  .ps-fw .grid.cols4 .step .num { font-size:96px; }
  .ps-fw .step .label { font-family:var(--sans); font-size:22px; letter-spacing:0.18em; color:#FAFAFA; margin-bottom:8px; text-transform:uppercase; font-weight:500; }
  .ps-slide.lt .ps-fw .step .label, .ps-slide.yl .ps-fw .step .label { color:var(--bg); }
  .ps-fw .step .desc { font-family:var(--sans); font-size:28px; line-height:1.3; color:#FAFAFA; }
  .ps-slide.lt .ps-fw .step .desc, .ps-slide.yl .ps-fw .step .desc { color:var(--bg); }
  .ps-fw .grid.cols4 .step .desc { font-size:24px; }

  /* timeline charla (4 nodes on horizontal rail) */
  .ps-tl-c { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-tl-c h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:120px; color:#FAFAFA; }
  .ps-slide.lt .ps-tl-c h2, .ps-slide.yl .ps-tl-c h2 { color:var(--bg); }
  .ps-tl-c .track { position:relative; }
  .ps-tl-c .track::before { content:""; position:absolute; top:14px; left:14px; right:14px; height:1px; background:rgba(255,255,255,0.2); }
  .ps-slide.lt .ps-tl-c .track::before, .ps-slide.yl .ps-tl-c .track::before { background:rgba(0,0,0,0.2); }
  .ps-tl-c .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:48px; position:relative; }
  .ps-tl-c .node .dot { width:28px; height:28px; background:var(--yellow); border:6px solid var(--bg); margin-bottom:40px; }
  .ps-slide.lt .ps-tl-c .node .dot, .ps-slide.yl .ps-tl-c .node .dot { border-color:#fff; }
  .ps-slide.yl .ps-tl-c .node .dot { background:var(--bg); border-color:var(--yellow); }
  .ps-tl-c .node .label { font-family:var(--sans); font-size:40px; letter-spacing:0.1em; color:var(--yellow); margin-bottom:20px; text-transform:uppercase; }
  .ps-slide.lt .ps-tl-c .node .label, .ps-slide.yl .ps-tl-c .node .label { color:#B8A000; }
  .ps-tl-c .node .title { font-family:var(--serif); font-size:52px; line-height:1.1; color:#FAFAFA; margin-bottom:20px; letter-spacing:-0.01em; }
  .ps-slide.lt .ps-tl-c .node .title, .ps-slide.yl .ps-tl-c .node .title { color:var(--bg); }
  .ps-tl-c .node .desc { font-family:var(--sans); font-size:40px; line-height:1.45; color:#FAFAFA; }
  .ps-slide.lt .ps-tl-c .node .desc, .ps-slide.yl .ps-tl-c .node .desc { color:var(--bg); }

  /* imagen full-bleed */
  .ps-imgfull { position:absolute; inset:0; overflow:hidden; }
  /* .bg sólo para placeholder (gradiente + scanlines) cuando no hay imagen subida. */
  .ps-imgfull .bg { position:absolute; inset:0; }
  .ps-imgfull .bg.ph { background:linear-gradient(180deg,#2a2a2a 0%,#161616 70%,#0a0a0a 100%); }
  .ps-imgfull .bg.ph::after { content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg, transparent 0 80px, rgba(255,255,255,0.02) 80px 82px); }
  /* B15 + B16-final (Apr 26 2026): imagen real renderizada como <img>, no background-image.
     html2canvas (motor del export PDF) tiene DOS bugs conocidos con data:URLs:
       1. background-size:contain → siempre cover
       2. object-fit:contain → ignorado, imagen a tamaño natural
     CSS-only fallaba porque max-width:100% + margin:auto no escala IMÁGENES MENORES
     que el frame (treemap 1600×800 en 1920×1080 quedaba con bandas laterales de 160px).
     Solución definitiva: JS onload calcula aspect ratio y aplica width/height explícitos
     (100%/auto o auto/100%) — html2canvas SÍ respeta width/height inline. Ver fitContainOnLoad. */
  .ps-imgfull .bg-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }
  .ps-imgfull .bg-img.fit-contain {
    /* Defaults pre-onload: imagen visible mientras carga. Tras onload se sobrescriben
       width/height con los valores calculados según aspect ratio. */
    inset:0; margin:auto;
    object-fit:initial;
    max-width:100%; max-height:100%;
    background-color:#0A0A0A;
  }
  .ps-imgfull .scrim { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.75), transparent 55%); }
  /* B22: scrim/overlay surface-aware. Sobre lt el scrim es hueso→transparent, texto negro;
     sobre yl el scrim es amarillo→transparent, texto negro. */
  .ps-slide.lt .ps-imgfull .scrim { background:linear-gradient(to top, rgba(250,250,250,0.85), transparent 55%); }
  .ps-slide.yl .ps-imgfull .scrim { background:linear-gradient(to top, rgba(255,214,0,0.85), transparent 55%); }
  .ps-imgfull .overlay { position:absolute; bottom:240px; left:120px; right:120px; }
  .ps-imgfull .overlay .eyebrow { color:#FAFAFA; opacity:0.85; margin-bottom:20px; display:block; font-size:40px; letter-spacing:0.15em; font-family:var(--sans); text-transform:uppercase; }
  .ps-imgfull .overlay .title { color:#FAFAFA; font-family:var(--serif); font-weight:400; font-size:96px; line-height:1.05; letter-spacing:-0.02em; }
  .ps-slide.lt .ps-imgfull .overlay .eyebrow { color:rgba(10,10,10,0.65); opacity:1; }
  .ps-slide.lt .ps-imgfull .overlay .title { color:#0A0A0A; }
  .ps-slide.yl .ps-imgfull .overlay .eyebrow { color:rgba(10,10,10,0.7); opacity:1; }
  .ps-slide.yl .ps-imgfull .overlay .title { color:#0A0A0A; }
  .ps-imgfull .overlay em { font-style:italic; }

  /* imagen split (2col: image + text) */
  .ps-imgsplit { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; }
  .ps-imgsplit .pane-img { position:relative; overflow:hidden; background-size:cover; background-position:center; background-repeat:no-repeat; }
  /* imagen_ajuste: contain — retratos / fotos verticales / logos: se ven enteras con aire,
     no rellenan ni recortan. Background neutral oscuro detrás para evitar bordes blancos. */
  .ps-imgsplit .pane-img.fit-contain { background-size:contain; background-color:#0A0A0A; }
  .ps-slide.lt .ps-imgsplit .pane-img.fit-contain { background-color:#FAFAFA; }
  .ps-slide.yl .ps-imgsplit .pane-img.fit-contain { background-color:var(--yellow); }
  .ps-imgsplit .pane-img.ph { background:linear-gradient(135deg,#555,#1c1c1c); }
  .ps-imgsplit.rev .pane-img { order:2; }
  /* Banda amarilla vertical al borde donde el texto empieza — misma lógica que diptych
     para separar visualmente captura de copy. Funciona en ambas posiciones (izq/der). */
  .ps-imgsplit .pane-txt { position:relative; padding:160px 120px; display:flex; flex-direction:column; justify-content:center; background:var(--bg); color:#FAFAFA; border-left:4px solid var(--yellow); }
  .ps-imgsplit.rev .pane-txt { border-left:none; border-right:4px solid var(--yellow); }
  .ps-slide.lt .ps-imgsplit .pane-txt { background:#FFF; color:var(--bg); }
  .ps-slide.yl .ps-imgsplit .pane-txt { background:var(--yellow); color:var(--bg); }
  .ps-imgsplit .pane-txt .eyebrow { font-family:var(--sans); font-size:40px; letter-spacing:0.15em; color:#B8B8B8; margin-bottom:32px; display:block; text-transform:uppercase; }
  .ps-slide.lt .ps-imgsplit .pane-txt .eyebrow, .ps-slide.yl .ps-imgsplit .pane-txt .eyebrow { color:#444; }
  .ps-imgsplit .pane-txt h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:32px; font-weight:400; }
  /* B13: cuerpos con URLs (Magnify · magnifytools.com, linkedin.com/in/...) en el panel
     estrecho del split partían huérfanos ("Mirror ·" sin URL pegada) o cortaban con guion
     léxico ("david-\ncarrasco-pamies"). Estrategia: el JS envuelve dominios y URLs en
     <span class="nowrap"> (ver wrapNoBreakUrls); CSS aquí declara el nowrap y permite que
     URLs largas se desborden del max-width antes que partirse en mitad. max-width subido
     560→720 da margen para que "Mirror · mirror.magnifytools.com" quepa entero en una línea. */
  .ps-imgsplit .pane-txt .body-l { font-family:var(--sans); font-size:44px; max-width:720px; line-height:1.35; overflow-wrap:anywhere; hyphens:none; }
  .ps-imgsplit .pane-txt .body-l .nowrap { white-space:nowrap; }
  .ps-imgsplit .pane-txt .body-l a { word-break:break-all; }
  .ps-imgsplit .pane-txt .meta-s { font-family:var(--sans); font-size:40px; margin-top:32px; color:#B8B8B8; }
  .ps-slide.lt .ps-imgsplit .pane-txt .meta-s { color:#666; }
  .ps-slide.yl .ps-imgsplit .pane-txt .meta-s { color:var(--bg); opacity:0.7; }
  /* Hilo griego (F3) en imagen-split: italic serif tenue, encima del meta — coherente con hero/manifiesto. */
  .ps-imgsplit .pane-txt .griego { font-family:var(--serif); font-style:italic; font-size:40px; color:rgba(250,250,250,0.55); margin-top:32px; letter-spacing:0.02em; }
  .ps-slide.lt .ps-imgsplit .pane-txt .griego { color:rgba(10,10,10,0.5); }
  .ps-slide.yl .ps-imgsplit .pane-txt .griego { color:rgba(10,10,10,0.55); }
  .ps-imgsplit em { font-style:italic; }

  /* diptych (2 images with captions) */
  /* Diptych: 2 columns, cada una partida en 70% imagen / 30% caption sólida abajo.
     Antes el caption iba superpuesto sobre la imagen tapando contenido crítico (SERPs, chips de ChatGPT).
     Ahora la imagen respira arriba y el caption va en zona exclusiva con fondo opaco del brand. */
  /* Diptych — pattern Magnify Design System slide 2/5: imágenes top ~80%, captions bottom
     ~20% sin línea amarilla separadora (el contraste de surface ya delimita). Label amarillo
     pequeño + title italic. */
  .ps-dip { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; }
  .ps-dip .pane { position:relative; overflow:hidden; display:grid; grid-template-rows:80% 20%; background:var(--bg); }
  .ps-dip .pane .img { position:relative; background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#0A0A0A; }
  .ps-dip .pane .img.ph1 { background:linear-gradient(135deg,#3a3a3a 0%,#1a1a1a 100%); }
  .ps-dip .pane .img.ph2 { background:linear-gradient(135deg,#555,#1c1c1c 100%); }
  .ps-dip .pane .cap { padding:32px 64px 40px; display:flex; flex-direction:column; justify-content:center; background:#0A0A0A; }
  .ps-dip .pane .lbl { font-family:var(--sans); font-size:22px; letter-spacing:0.18em; color:var(--yellow); margin-bottom:14px; display:block; text-transform:uppercase; font-weight:600; }
  .ps-dip .pane .title { font-family:var(--serif); font-style:italic; font-size:44px; line-height:1.15; letter-spacing:-0.01em; color:#FAFAFA; font-weight:400; }
  .ps-dip .pane .body { font-family:var(--sans); font-size:24px; line-height:1.4; color:#CCC; margin-top:10px; max-width:540px; }
  .ps-dip em { font-style:italic; }

  /* triptych (3 image tiles + caption overlay).
     B17: imágenes como <img> reales (no background-image) — html2canvas tiene bug con
     background-size:cover en data:URLs y pinta a tamaño natural, desbordando la celda.
     <img class="tile-img"> con object-fit:cover replica el comportamiento y exporta bien. */
  /* Triptych — pattern Magnify Design System slide 15: imagen ARRIBA (~67%), caption BAJO (~33%)
     en banda negra opaca SIN scrim ni gradient overlay. Número italic amarillo grande + título
     blanco + descripción blanca. Imagen no se recorta con scrim. */
  .ps-trp { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr 1fr; }
  .ps-trp .tile { position:relative; overflow:hidden; display:grid; grid-template-rows:67% 33%; background:var(--bg); }
  .ps-trp .tile .tile-img { width:100%; height:100%; object-fit:cover; object-position:center; }
  .ps-trp .tile.ph1 { background:linear-gradient(135deg,#383838,#1a1a1a); }
  .ps-trp .tile.ph2 { background:linear-gradient(135deg,#555,#1c1c1c); }
  .ps-trp .tile.ph3 { background:linear-gradient(135deg,#2a2a2a,#0f0f0f); }
  .ps-trp .tile .cap { padding:48px 48px 56px; display:flex; flex-direction:column; background:var(--bg); }
  .ps-trp .tile .num { font-family:var(--serif); font-style:italic; font-size:64px; line-height:1; color:var(--yellow); margin-bottom:18px; font-weight:400; }
  .ps-trp .tile .t { font-family:var(--serif); font-size:48px; line-height:1.1; color:#FAFAFA; letter-spacing:-0.01em; font-weight:400; margin-bottom:14px; }
  .ps-trp .tile .s { font-family:var(--sans); font-size:24px; color:#FAFAFA; opacity:0.85; line-height:1.35; max-width:380px; }
  .ps-trp em { font-style:italic; }

  /* mosaic (1 big + 3-4 small) */
  .ps-mos { position:absolute; inset:120px; display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:1fr 1fr; gap:16px; }
  .ps-mos .cell { position:relative; overflow:hidden; background-size:cover; background-position:center; }
  .ps-mos .cell.big { grid-row:1 / span 2; }
  .ps-mos .cell.ph1 { background:linear-gradient(135deg,#3a3a3a,#1a1a1a); }
  .ps-mos .cell.ph2 { background:linear-gradient(135deg,#555,#1c1c1c); }
  .ps-mos .cell.ph3 { background:linear-gradient(135deg,#383838,#1a1a1a); }
  .ps-mos .cell.ph4 { background:linear-gradient(135deg,#1a1a1a,#0a0a0a); }
  .ps-mos .cell.ph5 { background:linear-gradient(135deg,#2a2a2a,#161616); }
  .ps-mos .cell::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.55), transparent 60%); }
  .ps-mos .cap { position:absolute; bottom:32px; left:32px; right:32px; z-index:1; }
  .ps-mos .cap .lbl { font-family:var(--sans); font-size:40px; letter-spacing:0.12em; color:var(--yellow); display:block; margin-bottom:10px; text-transform:uppercase; }
  .ps-mos .cap .t { font-family:var(--serif); font-size:48px; line-height:1.1; color:#FAFAFA; letter-spacing:-0.01em; font-weight:400; }
  .ps-mos .big .cap .t { font-size:64px; }
  .ps-mos em { font-style:italic; }
  .ps-mos-head { position:absolute; top:72px; left:120px; right:120px; z-index:3; display:flex; justify-content:space-between; align-items:baseline; }
  .ps-mos-head h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; color:#FAFAFA; font-weight:400; margin:0; }

  /* portrait quote (big photo + quote) */
  .ps-port { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; }
  .ps-port .pane-img { position:relative; overflow:hidden; background-size:cover; background-position:center; }
  .ps-port .pane-img.ph { background:linear-gradient(160deg,#4a4a4a 0%,#2a2a2a 60%,#101010 100%); }
  .ps-port .pane-txt { padding:120px 120px 180px; display:flex; flex-direction:column; justify-content:flex-end; background:var(--bg); color:#FAFAFA; }
  .ps-slide.lt .ps-port .pane-txt { background:#FFF; color:var(--bg); }
  .ps-port .pane-txt .eyebrow { font-family:var(--sans); font-size:40px; letter-spacing:0.15em; color:#B8B8B8; display:block; margin-bottom:24px; text-transform:uppercase; }
  .ps-port .pane-txt .h-quote { font-family:var(--serif); font-size:60px; line-height:1.15; color:#FAFAFA; letter-spacing:-0.01em; margin-bottom:40px; font-weight:400; }
  .ps-slide.lt .ps-port .pane-txt .h-quote { color:var(--bg); }
  .ps-port .pane-txt .name { font-family:var(--sans); font-size:44px; color:#FAFAFA; font-weight:500; }
  .ps-slide.lt .ps-port .pane-txt .name { color:var(--bg); }
  .ps-port .pane-txt .role { font-family:var(--sans); font-size:40px; color:#B8B8B8; margin-top:6px; }
  .ps-slide.lt .ps-port .pane-txt .role { color:#666; }
  .ps-port em { font-style:italic; }

  /* quote-big — pattern Magnify Design System slide 6/7: comilla AMARILLA pequeña arriba-izquierda,
     cita serif italic-mixto, atribución en UNA LÍNEA (name bold + role gris) sin photo. */
  .ps-qbig { padding:120px 160px 160px; height:100%; display:flex; flex-direction:column; justify-content:center; position:relative; }
  .ps-qbig .mark { position:absolute; top:160px; left:160px; font-family:var(--serif); font-size:80px; line-height:1; color:var(--yellow); pointer-events:none; }
  .ps-slide.lt .ps-qbig .mark, .ps-slide.yl .ps-qbig .mark { color:var(--bg); }
  .ps-qbig .text { font-family:var(--serif); font-weight:400; font-size:80px; line-height:1.15; letter-spacing:-0.01em; color:#FAFAFA; max-width:1600px; margin-top:80px; position:relative; z-index:1; }
  .ps-slide.lt .ps-qbig .text, .ps-slide.yl .ps-qbig .text { color:var(--bg); }
  .ps-qbig .attr { display:flex; align-items:baseline; flex-wrap:wrap; gap:24px; margin-top:80px; }
  .ps-qbig .attr .photo { display:none; }
  .ps-qbig .attr .name { font-family:var(--sans); font-size:26px; color:#FAFAFA; font-weight:600; }
  .ps-slide.lt .ps-qbig .attr .name, .ps-slide.yl .ps-qbig .attr .name { color:var(--bg); }
  .ps-qbig .attr .role { font-family:var(--sans); font-size:26px; color:#999; font-weight:400; }
  .ps-slide.lt .ps-qbig .attr .role, .ps-slide.yl .ps-qbig .attr .role { color:rgba(10,10,10,0.55); }
  .ps-qbig em { font-style:italic; }

  /* tabla (comparison table) */
  .ps-tabla { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-tabla h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:64px; color:var(--bg); font-weight:400; }
  .ps-tabla table { width:100%; border-collapse:collapse; }
  .ps-tabla th { font-family:var(--sans); font-size:40px; font-weight:400; letter-spacing:0.1em; text-align:left; color:#444; padding:28px 16px; border-bottom:1px solid rgba(0,0,0,0.2); text-transform:uppercase; }
  .ps-tabla td { font-family:var(--sans); font-size:44px; padding:26px 16px; border-bottom:1px solid rgba(0,0,0,0.08); color:var(--bg); }
  .ps-tabla tr.hi td { background:var(--yellow); border-bottom:0; }
  .ps-tabla td.c { text-align:center; }

  /* equipo (team grid) */
  .ps-team { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-team h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:72px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-team h2, .ps-slide.yl .ps-team h2 { color:var(--bg); }
  .ps-team .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:48px; }
  .ps-team .card .photo { aspect-ratio:1; margin-bottom:24px; background:#333; background-size:cover; background-position:center; }
  .ps-team .card .photo.ph1 { background:linear-gradient(135deg,#3a3a3a,#1a1a1a); }
  .ps-team .card .photo.ph2 { background:linear-gradient(135deg,#2e2e2e,#141414); }
  .ps-team .card .photo.ph3 { background:linear-gradient(135deg,#4a4a4a,#222); }
  .ps-team .card .photo.ph4 { background:linear-gradient(135deg,#333,#181818); }
  .ps-team .card .name { font-family:var(--sans); font-size:44px; color:#FAFAFA; margin-bottom:8px; }
  .ps-slide.lt .ps-team .card .name, .ps-slide.yl .ps-team .card .name { color:var(--bg); }
  .ps-team .card .role { font-family:var(--sans); font-size:40px; color:#B8B8B8; }
  .ps-slide.lt .ps-team .card .role { color:#666; }
  .ps-slide.yl .ps-team .card .role { color:var(--bg); opacity:0.7; }

  /* pricing (3 col) */
  .ps-pricing { padding:160px 160px 180px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-pricing h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:72px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-pricing h2, .ps-slide.yl .ps-pricing h2 { color:var(--bg); }
  .ps-pricing .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; align-items:stretch; }
  .ps-pricing .col { padding:40px; position:relative; background:var(--bg); color:#FAFAFA; }
  .ps-slide.lt .ps-pricing .col { background:#FFF; color:var(--bg); }
  .ps-pricing .col + .col { border-left:1px solid rgba(255,255,255,0.1); }
  .ps-slide.lt .ps-pricing .col + .col { border-left-color:rgba(0,0,0,0.12); }
  .ps-pricing .col.hi { background:var(--yellow); color:var(--bg); border-left:none; }
  .ps-pricing .col.hi + .col { border-left:none; }
  .ps-pricing .col .lbl { font-family:var(--sans); font-size:40px; letter-spacing:0.12em; color:#B8B8B8; margin-bottom:24px; text-transform:uppercase; }
  .ps-pricing .col.hi .lbl { color:var(--bg); }
  .ps-pricing .col .name { font-family:var(--serif); font-size:56px; line-height:1; margin-bottom:32px; letter-spacing:-0.02em; font-weight:400; }
  .ps-pricing .col .price { font-family:var(--serif); font-size:160px; line-height:0.9; color:var(--yellow); letter-spacing:-0.04em; font-weight:400; }
  .ps-pricing .col.hi .price { color:var(--bg); }
  .ps-pricing .col .unit { font-family:var(--sans); font-size:40px; color:#B8B8B8; margin-bottom:32px; }
  .ps-pricing .col.hi .unit { color:var(--bg); opacity:0.7; }
  .ps-pricing .col ul { list-style:none; border-top:1px solid rgba(255,255,255,0.1); padding:24px 0 0; margin:0; }
  .ps-pricing .col.hi ul { border-top-color:rgba(0,0,0,0.2); }
  .ps-pricing .col li { font-family:var(--sans); font-size:40px; padding:12px 0; }

  /* cta-final (yellow big cta) */
  /* cta-final — pattern Magnify Design System slide 32: eyebrow uppercase letterspaced,
     titular italic serif grande, contacto sans pequeño. Con QR: layout horizontal con
     bloque de texto a la izquierda. */
  .ps-ctafinal { display:flex; flex-direction:column; align-items:flex-start; justify-content:center; height:100%; padding:0 160px; text-align:left; }
  .ps-ctafinal .eyebrow { font-family:var(--sans); font-size:22px; letter-spacing:0.18em; color:rgba(10,10,10,0.55); margin-bottom:48px; display:block; text-transform:uppercase; font-weight:500; }
  .ps-ctafinal h1 { font-family:var(--serif); font-style:italic; font-size:160px; line-height:1.0; color:var(--bg); margin-bottom:64px; font-weight:400; letter-spacing:-0.02em; }
  .ps-ctafinal .contact { font-family:var(--sans); font-size:30px; color:var(--bg); }
  .ps-ctafinal em { font-style:italic; }

  /* stats-charla (grid of big numbers, 2x2 or 1xN)
     - Layout: padding-bottom grande para que .src no se solape con la fila inferior en 2x2 (B9).
     - .num nowrap para que "55/45" o "3.4×" no se partan en slash/punto (B8).
     - .hi con variantes .hi-neg (rojo, default) y .hi-pos (destacado brand) para darle semántica
       al highlight — un 5% puede ser alerta, un 92% puede ser logro (B11). */
  /* B18: padding 120/200 era asimétrico (top<bottom) → centro real desplazado
     hacia arriba. 200/200 simétrico devuelve true center vertical. */
  /* stats-charla — pattern Magnify Design System slide 22/26: titular grande arriba, hairline
     fina horizontal arriba del grid, número italic AMARILLO, label uppercase BLANCO letterspaced
     (no amarillo), descripción sans gris pequeña. */
  .ps-statsc { padding:120px 160px 160px; height:100%; display:flex; flex-direction:column; justify-content:center; position:relative; }
  .ps-statsc .grid::before { content:""; position:absolute; left:160px; right:160px; top:calc(50% - 80px); height:1px; background:rgba(250,250,250,0.15); }
  .ps-slide.lt .ps-statsc .grid::before, .ps-slide.yl .ps-statsc .grid::before { background:rgba(10,10,10,0.15); }
  /* B18: margin-bottom 48px alejaba el titular del grid. 32px lo ata más como
     unidad cabecera→datos. */
  .ps-statsc h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:80px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-statsc h2, .ps-slide.yl .ps-statsc h2 { color:var(--bg); }
  .ps-statsc .grid { display:grid; gap:48px 80px; padding-top:64px; position:relative; }
  .ps-statsc .grid.cols2 { grid-template-columns:repeat(2, 1fr); gap:48px 80px; }
  .ps-statsc .grid.cols3 { grid-template-columns:repeat(3, 1fr); gap:48px; }
  .ps-statsc .grid.cols4 { grid-template-columns:repeat(4, 1fr); gap:40px; }
  .ps-statsc .cell .num { font-family:var(--serif); font-style:italic; font-weight:400; font-size:140px; line-height:0.95; letter-spacing:-0.04em; color:var(--yellow); margin-bottom:24px; white-space:nowrap; }
  .ps-statsc .grid.cols2 .cell .num { font-size:130px; }
  .ps-statsc .grid.cols3 .cell .num { font-size:110px; }
  .ps-statsc .grid.cols4 .cell .num { font-size:90px; }
  /* Variantes semánticas de highlight (B11). hi sin tipo = hi-neg para compat. */
  .ps-statsc .cell.hi .num, .ps-statsc .cell.hi-neg .num { color:#FF5A5A; }
  .ps-statsc .cell.hi-pos .num { color:var(--yellow); text-shadow:0 0 0 var(--yellow); }
  .ps-statsc .cell.hi-pos .lbl { color:var(--yellow); }
  .ps-slide.yl .ps-statsc .cell .num { color:var(--bg); }
  .ps-slide.yl .ps-statsc .cell.hi .num, .ps-slide.yl .ps-statsc .cell.hi-neg .num { color:#C81E1E; }
  .ps-slide.yl .ps-statsc .cell.hi-pos .num { color:var(--bg); font-weight:700; }
  .ps-statsc .cell .lbl { font-family:var(--sans); font-size:22px; letter-spacing:0.18em; color:#FAFAFA; text-transform:uppercase; margin-bottom:10px; display:block; font-weight:500; }
  .ps-slide.lt .ps-statsc .cell .lbl, .ps-slide.yl .ps-statsc .cell .lbl { color:var(--bg); }
  .ps-statsc .cell .desc { font-family:var(--sans); font-size:22px; line-height:1.4; color:#999; max-width:420px; }
  .ps-slide.lt .ps-statsc .cell .desc, .ps-slide.yl .ps-statsc .cell .desc { color:rgba(10,10,10,0.55); }
  .ps-slide.lt .ps-statsc .cell .desc, .ps-slide.yl .ps-statsc .cell .desc { color:var(--bg); }
  .ps-statsc .grid.cols4 .cell .desc { font-size:40px; }
  /* .src anclada abajo del container, fuera del grid — evita colisión con celdas en 2x2 (B9).
     left:220px reserva espacio para el monograma A que vive en esquina inferior-izquierda. */
  .ps-statsc .src { position:absolute; bottom:30px; left:220px; right:160px; font-family:var(--sans); font-size:40px; color:#B8B8B8; margin:0; }
  .ps-slide.lt .ps-statsc .src { color:#666; }
  .ps-slide.yl .ps-statsc .src { color:var(--bg); opacity:0.7; }

  /* citas-grid (2x2 testimonial grid) */
  /* citas-grid — pattern Magnify Design System slide 20: titular grande arriba (no centrado),
     grid 2x2 de celdas con barra vertical NEGRA (no amarilla), cita italic serif, autor
     uppercase pequeño gris. */
  .ps-citas { padding:120px 160px 160px; height:100%; display:flex; flex-direction:column; justify-content:center; }
  .ps-citas h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:80px; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-citas h2, .ps-slide.yl .ps-citas h2 { color:var(--bg); }
  .ps-citas .grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:64px 96px; }
  .ps-citas .grid.cols3 { grid-template-columns:repeat(3, 1fr); gap:48px 64px; }
  .ps-citas .cell { display:flex; flex-direction:column; gap:28px; border-left:2px solid currentColor; padding-left:32px; color:#FAFAFA; }
  .ps-slide.lt .ps-citas .cell, .ps-slide.yl .ps-citas .cell { color:var(--bg); }
  .ps-citas .cell .q { font-family:var(--serif); font-style:italic; font-size:36px; line-height:1.25; letter-spacing:-0.01em; color:inherit; font-weight:400; }
  .ps-citas .grid.cols3 .cell .q { font-size:32px; }
  .ps-citas .cell .who { font-family:var(--sans); font-size:18px; letter-spacing:0.18em; text-transform:uppercase; color:#999; font-weight:500; }
  .ps-slide.lt .ps-citas .cell .who { color:#666; }
  .ps-slide.yl .ps-citas .cell .who { color:rgba(10,10,10,0.55); }

  /* cta-final QR variant (keeps text layout but splits with QR tile on one side) */
  /* CTA con QR: el QR legible desde 5m ocupa ~25-30% del ancho. Dejamos espacio al titular para que domine. */
  .ps-ctafinal.with-qr { flex-direction:row; text-align:left; gap:100px; align-items:center; justify-content:center; }
  .ps-ctafinal.with-qr .qr-box { flex-shrink:0; width:560px; height:560px; background:#FFF; padding:24px; display:flex; align-items:center; justify-content:center; }
  .ps-ctafinal.with-qr.qr-sm .qr-box { width:360px; height:360px; }
  .ps-ctafinal.with-qr.qr-lg .qr-box { width:820px; height:820px; }
  .ps-ctafinal.with-qr .qr-box img { width:100%; height:100%; object-fit:contain; }
  .ps-ctafinal.with-qr .qr-box.empty { border:4px dashed rgba(10,10,10,0.3); background:transparent; color:var(--bg); font-family:var(--sans); font-size:40px; letter-spacing:2px; text-transform:uppercase; }
  .ps-ctafinal.with-qr .txt { max-width:1100px; }
  .ps-ctafinal.with-qr h1 { font-size:140px; margin-bottom:48px; }
  .ps-ctafinal.with-qr.qr-lg h1 { font-size:110px; }
  .ps-ctafinal.with-qr .eyebrow { margin-bottom:36px; }
  .ps-ctafinal.with-qr .contact { font-size:44px; }

  /* recursos-agrupados (list grouped by category) */
  /* B12: con justify-content:center y 4 cols con muchos items, el bloque crecía hacia arriba
     y comía la zona del titular ("Para profundizar." cortado por arriba). Fix: el grid usa
     auto+1fr para reservar fila al titular siempre, align-content:start ancla arriba.
     padding-top 110 garantiza aire constante con la barra de header del slide. */
  .ps-recursos { padding:110px 160px 120px; height:100%; display:grid; grid-template-rows:auto 1fr; align-content:start; row-gap:48px; }
  .ps-recursos h2 { font-family:var(--serif); font-size:64px; line-height:1.1; letter-spacing:-0.02em; margin-bottom:0; color:#FAFAFA; font-weight:400; }
  .ps-slide.lt .ps-recursos h2, .ps-slide.yl .ps-recursos h2 { color:var(--bg); }
  /* Default: grid 2 columnas (pattern DS slide 35: 4 categorías en 2x2). */
  .ps-recursos .grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:56px 96px; }
  .ps-recursos .grid.cols3 { grid-template-columns:repeat(3, 1fr); gap:48px; }
  .ps-recursos .grid.cols4 { grid-template-columns:repeat(4, 1fr); gap:32px; }
  /* B20: con 4 columnas y 3+ items/columna (algunos a 2-3 líneas), las columnas pasaban
     de los ~750px disponibles y los últimos items se salían por abajo. Reducimos tamaños
     en cols4 manteniendo la jerarquía visual. */
  .ps-recursos .grid.cols4 .cat .hd { font-size:32px; margin-bottom:18px; padding-bottom:10px; }
  .ps-recursos .grid.cols4 .cat ul { gap:14px; }
  .ps-recursos .grid.cols4 .cat li { font-size:28px; line-height:1.3; }
  .ps-recursos .grid.cols4 .cat li .src { font-size:24px; }
  /* F1: link clicable — subrayado sutil del mismo color del texto (nada de azul). */
  .ps-recursos .cat li a.lnk { color:inherit; text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:3px; text-decoration-color:rgba(255,214,0,0.5); }
  .ps-slide.lt .ps-recursos .cat li a.lnk { text-decoration-color:rgba(184,160,0,0.7); }
  .ps-slide.yl .ps-recursos .cat li a.lnk { text-decoration-color:rgba(10,10,10,0.5); }
  .ps-recursos .cat .hd { font-family:var(--sans); font-size:22px; letter-spacing:0.18em; color:var(--yellow); text-transform:uppercase; margin-bottom:24px; font-weight:600; }
  .ps-slide.lt .ps-recursos .cat .hd, .ps-slide.yl .ps-recursos .cat .hd { color:var(--bg); }
  .ps-recursos .cat ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:18px; }
  .ps-recursos .cat li { font-family:var(--sans); font-size:22px; line-height:1.35; color:#FAFAFA; font-weight:500; }
  .ps-slide.lt .ps-recursos .cat li, .ps-slide.yl .ps-recursos .cat li { color:var(--bg); }
  .ps-recursos .cat li b { font-weight:500; display:block; margin-bottom:4px; }
  .ps-recursos .cat li .src { color:#999; font-size:18px; font-weight:400; display:block; }
  .ps-slide.lt .ps-recursos .cat li .src, .ps-slide.yl .ps-recursos .cat li .src { color:rgba(10,10,10,0.55); }

  /* cierre (final thank you) */
  .ps-cierre { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; position:relative; }
  .ps-cierre .wm { height:120px; margin-bottom:48px; }
  .ps-cierre .wm svg { height:100%; width:auto; }

  .ps-cierre .contact { position:absolute; bottom:180px; left:120px; font-family:var(--sans); font-size:40px; line-height:1.7; color:#FAFAFA; }
  .ps-slide.lt .ps-cierre .contact, .ps-slide.yl .ps-cierre .contact { color:var(--bg); }

  /* standard (simple h1 + body) */
  .ps-std .h1 { max-width:1600px; margin-bottom:64px; }
  .ps-std .h1-m { font-family:var(--serif); font-size:96px; line-height:1.05; letter-spacing:-0.02em; font-weight:400; color:#F0F0F0; margin-bottom:64px; max-width:1600px; }
  .ps-slide.lt .ps-std .h1-m, .ps-slide.yl .ps-std .h1-m { color:var(--bg); }
  .ps-std .body-xl { font-family:var(--sans); font-size:40px; line-height:1.35; color:#FAFAFA; max-width:1400px; }
  .ps-slide.lt .ps-std .body-xl, .ps-slide.yl .ps-std .body-xl { color:var(--bg); }
  .ps-std em { font-style:italic; }

  /* Print CSS for A4 */

  @media print {

// ── COLOR SELECTOR ──
// Renders a segmented control when the active variant declares `colors`. Clicking a button updates state
// and re-runs generate() if a preview already exists so the user sees the change instantly.
function renderColorBar(colors) {
  const bar = document.getElementById('color-bar');
  if (!colors || !colors.length) {
    bar.classList.remove('on');
    bar.innerHTML = '';
    currentColor = null;
    currentVariantColors = null;
    return;
  }
  currentVariantColors = colors;
  if (!currentColor || !colors.find(c => c.id === currentColor)) {
    currentColor = colors[0].id;
  }
  bar.innerHTML = `<span class="color-label">Color</span>` + colors.map(c =>
    `<button class="color-btn${c.id === currentColor ? ' on' : ''}" data-color="${c.id}" onclick="setColor('${c.id}')">
      <span class="swatch"></span>${c.label}
    </button>`
  ).join('');
  bar.classList.add('on');
}

function setColor(color) {
  currentColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('on', b.dataset.color === color));
  // Re-render if a preview already exists so the change is visible immediately.
  if (renderedFrames.length) generate();
}

// ── IMAGE UPLOADS ──
// ~5MB per image cap: larger files produce data URIs that make the HTML and exports sluggish. LinkedIn compresses anyway.
const MAX_IMG_BYTES = 5 * 1024 * 1024;

// Dispatcher: separa drops mixtos (imágenes + .yaml + .md) y los procesa en el orden
// correcto (md primero para tener el mapping, yaml al textarea, imágenes con mapping aplicado).
// Permite arrastrar el bundle entero de un dossier (yaml + guía + 8 visuales) en un solo gesto.
function handleDroppedFiles(files) {
  const list = Array.from(files || []);
  const images = [], yamls = [], mds = [];
  list.forEach(f => {
    const n = f.name.toLowerCase();
    if (f.type.startsWith('image/')) images.push(f);
    else if (n.endsWith('.yaml') || n.endsWith('.yml')) yamls.push(f);
    else if (n.endsWith('.md') || n.endsWith('.markdown')) mds.push(f);
    else toast(`${f.name}: tipo no soportado`);
  });
  // MD primero: parsear mapping antes de asignar imágenes.
  const pre = [];
  mds.forEach(f => pre.push(readTextFile(f).then(txt => {
    const n = parseImageMappingFromMd(txt);
    toast(n ? `Mapping cargado · ${n} imágenes` : `${f.name}: sin tabla mapping reconocible`);
  })));
  yamls.forEach(f => pre.push(readTextFile(f).then(txt => {
    document.getElementById('content').value = txt;
    toast(`YAML cargado · ${f.name}`);
  })));
  Promise.all(pre).then(() => { if (images.length) handleImageFiles(images); });
}

function readTextFile(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('read fail: ' + file.name));
    r.readAsText(file);
  });
}

// Parsea filas de markdown del estilo `| **img1** | VISUAL_02_FILE.png | …` y guarda
// basename→imgN en imageMapping. Acepta filename con o sin backticks.
function parseImageMappingFromMd(md) {
  const rowRe = /\|\s*\*\*img(\d+)\*\*\s*\|\s*`?([^`|]+\.(?:png|jpe?g|webp|gif|svg))`?\s*\|/i;
  let count = 0;
  md.split('\n').forEach(row => {
    const m = row.match(rowRe);
    if (m) { imageMapping[m[2].trim().toLowerCase()] = 'img' + m[1]; count += 1; }
  });
  return count;
}

function handleImageFiles(files) {
  const list = Array.from(files || [])
    .filter(f => f.type.startsWith('image/'))
    .filter(f => {
      if (f.size > MAX_IMG_BYTES) { toast(`${f.name}: supera los 5MB`); return false; }
      return true;
    });
  if (!list.length) return;
  // Particiona: las imágenes con filename en imageMapping van directas a su slot fijo;
  // el resto sigue la lógica clásica (orden alfabético, IDs secuenciales).
  const mapped = [], unmapped = [];
  list.forEach(f => {
    const id = imageMapping[f.name.toLowerCase()];
    if (id) mapped.push({ id, file: f });
    else unmapped.push(f);
  });
  // Mapped: asignación directa al slot (img4 = ese archivo, sin importar orden de drop).
  mapped.forEach(({ id, file }) => {
    const n = parseInt(id.slice(3), 10);
    if (!isNaN(n) && n > uploadCounter) uploadCounter = n;
    const reader = new FileReader();
    reader.onload = () => { uploadedImages[id] = reader.result; renderImageThumbs(); };
    reader.onerror = () => toast('Error leyendo ' + file.name);
    reader.readAsDataURL(file);
  });
  // Unmapped: orden alfabético + IDs secuenciales. Reserva ID antes del async para que
  // img(N) quede ligado al archivo en la posición N independientemente del orden en que
  // termine FileReader (los grandes terminan después que los pequeños).
  unmapped.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
  const assignments = unmapped.map(file => {
    uploadCounter += 1;
    return { id: 'img' + uploadCounter, file };
  });
  assignments.forEach(({ id, file }) => {
    const reader = new FileReader();
    reader.onload = () => { uploadedImages[id] = reader.result; renderImageThumbs(); };
    reader.onerror = () => toast('Error leyendo ' + file.name);
    reader.readAsDataURL(file);
  });
}

function removeUploadedImage(id) {
  delete uploadedImages[id];
  renderImageThumbs();
}

// Reordenar imágenes moviendo una imagen arriba/abajo en la lista. Al mover, los IDs se
// reasignan (img1, img2... en orden actual) para que el YAML refleje la posición visual.
// Esto evita que el usuario tenga que contar 7 thumbs para saber cuál es img7 (B10).
function moveUploadedImage(id, delta) {
  const ids = Object.keys(uploadedImages);
  const idx = ids.indexOf(id);
  if (idx < 0) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= ids.length) return;
  // Reordenar el array y reconstruir uploadedImages con nuevos IDs consecutivos.
  const dataUrls = ids.map(k => uploadedImages[k]);
  const [moved] = dataUrls.splice(idx, 1);
  dataUrls.splice(newIdx, 0, moved);
  uploadedImages = {};
  dataUrls.forEach((url, i) => { uploadedImages['img' + (i + 1)] = url; });
  uploadCounter = dataUrls.length;
  renderImageThumbs();
  // Regenerar preview si hay deck para que el usuario vea el nuevo orden inmediatamente.
  if (document.getElementById('render-container').children.length > 0) generate();
}

function renderImageThumbs() {
  const host = document.getElementById('upload-thumbs');
  if (!host) return;
  const ids = Object.keys(uploadedImages);
  host.innerHTML = ids.map((id, i) => `
    <div class="upload-thumb">
      <img src="${uploadedImages[id]}" alt="${id}">
      <span class="id">${id}</span>
      <button class="rm" title="Eliminar" onclick="removeUploadedImage('${id}')">×</button>
      <div class="move">
        ${i > 0 ? `<button class="mv" title="Subir (${id} → img${i})" onclick="moveUploadedImage('${id}', -1)">↑</button>` : ''}
        ${i < ids.length - 1 ? `<button class="mv" title="Bajar (${id} → img${i + 2})" onclick="moveUploadedImage('${id}', 1)">↓</button>` : ''}
      </div>
    </div>
  `).join('');
}

function wireUploadZone() {
  const drop = document.getElementById('upload-drop');
  const input = document.getElementById('upload-input');
  if (!drop || !input) return;
  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', e => { handleDroppedFiles(e.target.files); input.value = ''; });
  ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); drop.classList.add('drag');
  }));
  ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    if (ev === 'dragleave' && e.target !== drop) return;
    drop.classList.remove('drag');
  }));
  drop.addEventListener('drop', e => handleDroppedFiles(e.dataTransfer.files));
}

// ── SIDEBAR / TYPE SELECTION ──
function selectType(type) {
  currentType = type;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('on'));
  document.querySelector(`[data-type="${type}"]`).classList.add('on');

  const meta = TYPE_META[type];
  document.getElementById('panel-title').textContent = meta.title;
  document.getElementById('panel-desc').textContent = meta.desc;
  document.getElementById('btn-export').textContent = meta.exportLabel;
  document.getElementById('btn-export').disabled = true;
  // Botón PDF visible solo en presentación (export PPTX + PDF como output secundario).
  const pdfBtn = document.getElementById('btn-export-pdf');
  pdfBtn.style.display = (type === 'presentacion') ? '' : 'none';
  pdfBtn.disabled = true;

  // Show/hide upload zone based on whether this type supports images.
  document.getElementById('uploads').classList.toggle('on', !!meta.supportsImages);
  // Hide color bar by default; variants re-show it via selectVariant.
  renderColorBar(null);

  // If this type has multiple variants, show the variant picker gallery first.
  const variants = VARIANTS[type];
  const contentEl = document.getElementById('content');
  const contentWrap = contentEl.parentElement;
  if (variants && variants.length) {
    // Hide textarea, show gallery in hint area
    contentWrap.style.display = 'none';
    document.getElementById('hint').innerHTML = renderVariantGallery(type, variants);
  } else {
    contentWrap.style.display = '';
    document.getElementById('hint').innerHTML = meta.hint;
    contentEl.value = meta.example;
  }

  // Reset preview
  document.getElementById('preview').innerHTML = `<div class="empty-state">
    <p style="font-size:32px; opacity:0.15; font-family:var(--serif);">M</p>
    <p>${variants ? 'Elige una plantilla arriba para empezar' : 'Pulsa <strong>Generar Preview</strong> para ver el resultado'}</p>
  </div>`;
  document.getElementById('render-container').innerHTML = '';
  renderedFrames = [];
}

function renderVariantGallery(type, variants) {
  const cards = variants.map(v => `<button class="variant-card" onclick="selectVariant('${type}', '${v.id}')">
    <span class="vn">${v.name}</span>
    <span class="vd">${v.desc}</span>
  </button>`).join('');
  return `<p class="variant-intro"><strong>Elige una plantilla:</strong></p>
    <div class="variant-grid">${cards}</div>`;
}

function selectVariant(type, variantId) {
  const variants = VARIANTS[type] || [];
  const v = variants.find(x => x.id === variantId);
  if (!v) return;
  const meta = TYPE_META[type];
  // Swap UI from gallery to editor
  const contentEl = document.getElementById('content');
  contentEl.parentElement.style.display = '';
  contentEl.value = v.example;
  // Hint: show a "back to gallery" link + the type-level format hint
  document.getElementById('hint').innerHTML = `<div class="variant-back" onclick="selectType('${type}')">\u2190 Ver otras plantillas</div>${meta.hint}`;
  // Color bar: show only if this variant declares `colors`. Reset currentColor so each variant starts on its default.
  currentColor = null;
  renderColorBar(v.colors || null);
  // Auto-generate preview so user sees the variant immediately
  generate();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── PARSER ──
function parseBlock(text) {
  const data = {};
  const lines = text.trim().split('\n');
  let currentKey = null;
  // Strip surrounding single/double quotes if the whole value is wrapped in them.
  // Without this, users writing `sufijo: ":1"` end up with the literal quotes in output.
  const unquote = (v) => {
    const s = v.trim();
    if ((s.startsWith('"') && s.endsWith('"') && s.length > 1) ||
        (s.startsWith("'") && s.endsWith("'") && s.length > 1)) {
      return s.slice(1, -1);
    }
    return s;
  };
  for (const line of lines) {
    if (/^\s*#/.test(line)) { continue; }
    const m = line.match(/^(\w+(?:[-_]\w+)*):\s*(.*)$/);
    if (m) {
      currentKey = m[1].toLowerCase();
      let val = unquote(m[2]);
      // YAML block scalar indicators (| literal, > folded). El parser no es YAML real —
      // tratamos ambos como "empieza aquí, líneas indentadas son continuación".
      // Sin esto, `titular: |` deja el pipe como valor y renderiza "|" literal.
      if (val === '|' || val === '>' || /^[|>][-+]?$/.test(val)) val = '';
      data[currentKey] = val;
    } else if (currentKey) {
      // Continuation lines: trim leading whitespace so YAML-style 2-space indentation
      // doesn't leak into rendered output as visible indents. Preserve the text content.
      // También quitamos comillas que envuelvan la línea entera — casos típicos: handles
      // tipo @SearchLDN escritos como '@SearchLDN' para evitar que YAML los interprete como alias.
      // Primera continuación tras bloque literal vacío: no prepends '\n' (evita <br> inicial
      // que desplaza todo el texto una línea hacia abajo).
      const piece = unquote(line.replace(/^\s+/, ''));
      data[currentKey] = data[currentKey] ? data[currentKey] + '\n' + piece : piece;
    }
  }
  // Re-unquote once more in case the whole multi-line value was quoted.
  for (const k of Object.keys(data)) data[k] = unquote(data[k]);
  return data;
}

function applyHighlights(text) {
  // Include trailing punctuation (.,;:!?) INSIDE the yellow highlight so "[realidades]." reads as one visual unit.
  // Inner-trailing punctuation ([word.]) is kept inside too (same rule).
  // También procesa negritas markdown `**texto**` → <strong>texto</strong> para énfasis editorial
  // en cuerpos largos, decks y descripciones del framework.
  let out = text.replace(/\[([^\]]+)\]([.,;:!?]*)/g, (_, inner, trailing) => {
    return `<span class="hl">${inner}${trailing}</span>`;
  });
  // Markdown bold (lazy match, no anidado). Ya se hacía implícitamente en algunos sitios; aquí
  // lo aplicamos uniformemente a cualquier campo que pase por applyHighlights.
  out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  return out;
}

// B13: envuelve dominios y URLs en <span class="nowrap"> para que el browser no los parta
// en mitad ("david-\ncarrasco-pamies"). Diseñado para aplicarse DESPUÉS de applyHighlights:
// el único tag que esa función produce es <span class="hl"> sin atributos URL, así que
// la regex no riesga matchear dentro de href/src. La regex pide al menos UN punto entre
// labels alfanuméricos (dominio.tld) + path opcional, así "fin · propósito" y "Magnify"
// no se tocan. Markdown links [text](url) se protegen extrayéndolos a placeholders antes de
// aplicar la regex y restaurándolos al final — un lookbehind simple no basta porque la regex
// es greedy y captura parcialmente la URL dentro de paréntesis.
function wrapNoBreakUrls(html) {
  const mdLinks = [];
  let s = String(html).replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m) => {
    mdLinks.push(m);
    return `␀MDLINK${mdLinks.length - 1}␀`;
  });
  s = s.replace(
    /((?:https?:\/\/)?(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z]{2,}(?:\/[\w\-./?#=&%]*)?)/gi,
    '<span class="nowrap">$1</span>'
  );
  return s.replace(/␀MDLINK(\d+)␀/g, (_, i) => mdLinks[+i]);
}

// Highlight the .ING suffix in eyebrows (Active Particle pattern: DIAGNOS.ING, PRIORITIZ.ING, etc.)
function applyActiveParticle(text) {
  if (!text) return text;
  return String(text).replace(/\.ING\b/gi, '<span class="ing-ap">.ING</span>');
}

// Returns eyebrow + accent line markup, or empty string if no text provided.
// This way eyebrow-less posts don't show placeholder defaults like "INSIGHT" or "DATO CLAVE".
function eyebrowBlock(text, eyebrowClass, accentClass, accentStyle) {
  if (!text || !String(text).trim()) return '';
  eyebrowClass = eyebrowClass || 'eyebrow-yl';
  accentClass = accentClass || 'accent-yl';
  const style = accentStyle ? ` style="${accentStyle}"` : '';
  return `<span class="eyebrow ${eyebrowClass}">${applyActiveParticle(text)}</span>
    <div class="accent ${accentClass}"${style}></div>`;
}

// ════════════════════════════════════════════
// DOCUMENTO (MD → A4 multi-page)
// ════════════════════════════════════════════

// Split raw MD on "double hr" page breaks: two ---\n--- lines (optionally separated by blank lines).
// Single --- within a page stays as <hr> in the rendered HTML.
function splitDocMdPages(raw) {
  const normalized = raw.replace(/\r\n/g, '\n');
  const SENTINEL = '\x00PAGE\x00';
  const withSentinel = normalized.replace(/(^|\n)---\s*\n(?:\s*\n)*---\s*(?=\n|$)/g, `$1${SENTINEL}`);
  return withSentinel.split(SENTINEL).map(s => s.trim()).filter(Boolean);
}

// Cover-page detection: the first chunk qualifies for cover treatment when it contains a heading
// followed by paragraphs only (no lists, hrs, tables, blockquotes). Anything richer goes to body.
function looksLikeCover(chunkHtml) {
  const div = document.createElement('div');
  div.innerHTML = chunkHtml;
  const kids = Array.from(div.children);
  if (!kids.length) return false;
  if (!/^H[1-4]$/i.test(kids[0].tagName)) return false;
  for (const c of kids) {
    if (['UL', 'OL', 'TABLE', 'HR', 'BLOCKQUOTE', 'PRE'].includes(c.tagName)) return false;
  }
  return true;
}

// Split the cover chunk into semantic parts: title (first heading), subtitle (second heading),
// metadata paragraphs (those with <strong>), and confidential line (italic-only paragraph).
function extractCoverParts(chunkHtml) {
  const div = document.createElement('div');
  div.innerHTML = chunkHtml;
  const kids = Array.from(div.children);
  let title = '', subtitle = '';
  const meta = [];
  let confidential = '';
  kids.forEach(el => {
    const tag = el.tagName.toLowerCase();
    if (/^h[1-4]$/.test(tag)) {
      if (!title) title = el.innerHTML;
      else if (!subtitle) subtitle = el.innerHTML;
    } else if (tag === 'p') {
      // Italic-only paragraph (just <em>) is treated as the confidential / tagline marker.
      const onlyEm = el.children.length === 1 && el.firstElementChild && el.firstElementChild.tagName === 'EM';
      if (onlyEm) {
        confidential = el.firstElementChild.innerHTML;
      } else {
        meta.push(el.innerHTML);
      }
    }
  });
  return { title, subtitle, meta, confidential };
}

function renderDocumentoCover(parts, pageN, total) {
  const eyebrowHtml = parts.subtitle ? `<div class="mc-subtitle">${parts.subtitle}</div>` : '';
  const metaHtml = parts.meta.length
    ? `<div class="mc-meta">${parts.meta.map(m => `<p>${m}</p>`).join('')}${parts.confidential ? `<div class="mc-confidential">${parts.confidential}</div>` : ''}</div>`
    : (parts.confidential ? `<div class="mc-meta"><div class="mc-confidential">${parts.confidential}</div></div>` : '');
  return `<div class="frame a4 docmd-page docmd-cover">
    ${wordmark('#FAFAFA')}
    <h1 class="mc-title">${parts.title || ''}</h1>
    ${eyebrowHtml}
    <div class="mc-accent"></div>
    ${metaHtml}
    <div class="mc-bottom">
      <span>${decorateIngUrl(null)}</span>
      <span>${String(pageN).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
    </div>
  </div>`;
}

function renderDocumentoPage(bodyHtml, pageN, total) {
  // Wordmark-only header — the old right-side "running header" duplicated the brand name when the MD
  // started with "# Magnify" and added noise without information otherwise.
  // Footer alineado al patrón Magnify (csl-foot): URL con .ing izquierda, paginación derecha.
  return `<div class="frame a4 docmd-page">
    <div class="docmd-head">
      ${wordmark('#0A0A0A')}
    </div>
    <div class="docmd-sep"></div>
    <div class="docmd-body">${bodyHtml}</div>
    <div class="csl-foot">
      <span>${decorateIngUrl(null)}</span>
      <span class="csl-num">${String(pageN).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
    </div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// Extract the running header and export-slug from the first H1 in the raw MD.
function deriveDocTitle(raw) {
  const m = raw.match(/^#\s+(.+)$/m);
  return m ? m[1].trim().replace(/\s+/g, ' ').slice(0, 80) : '';
}
function deriveDocSlug(raw) {
  const title = deriveDocTitle(raw).toLowerCase();
  return title.replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60) || 'doc';
}

// Pre-process the raw MD before marked runs:
// - Em-dashes at paragraph start ("— text") are often used as list markers in prose. Convert to real `- ` bullets.
const SIGNOFFS = ['Best', 'Best regards', 'Kind regards', 'Sincerely', 'Regards',
                  'Saludos', 'Saludos cordiales', 'Un saludo', 'Atentamente', 'Cordialmente'];
const SIGNOFF_RE = new RegExp('^(?:' + SIGNOFFS.map(s => s.replace(/\s/g, '\\s+')).join('|') + '),?\\s*$', 'i');

function polishDocMd(md) {
  let out = md;
  // The wordmark in the page header already says "Magnify" — a leading `# Magnify` as the first h1
  // duplicates the brand name in the body. Strip it so we get one Magnify at the top, not two.
  out = out.replace(/^\s*#\s+Magnify\s*$/im, '');
  // Em-dashes at line-start are often used as visual list markers in prose. Convert to real bullets.
  out = out.replace(/(^|\n\n)— /g, '$1- ');
  return out;
}

// Post-process marked's HTML output to tighten structure for doc rendering:
// - A paragraph that is just a bold label (e.g. "**Client profile**") becomes an h4 — but only for short labels.
// - A paragraph whose first line is a sign-off greeting gets wrapped in `.docmd-signoff` with name+affiliation styling.
function polishDocHtml(html) {
  return html
    .replace(/<p>\s*<strong>([^<]+)<\/strong>\s*<\/p>/g, (m, label) =>
      label.length <= 60 ? `<h4>${label}</h4>` : m
    )
    .replace(/<p>([\s\S]+?)<\/p>/g, (m, inner) => {
      // Split on <br> (marked with breaks:true emits "<br>" or "<br/>").
      const lines = inner.split(/<br\s*\/?>/i).map(s => s.trim());
      if (lines.length < 2) return m;
      if (!SIGNOFF_RE.test(lines[0].replace(/<[^>]+>/g, ''))) return m;
      const salutation = lines[0];
      const name = lines[1] || '';
      const rest = lines.slice(2).filter(Boolean);
      const tail = rest.length ? rest.map(l => `<span class="so-affiliation">${l}</span>`).join('<br>') : '';
      return `<p class="docmd-signoff"><span class="so-salutation">${salutation}</span><br><span class="so-name">${name}</span>${tail ? '<br>' + tail : ''}</p>`;
    });
}

// Split an HTML string at top-level element boundaries so we can paginate it. Returns an array of HTML strings,
// each fitting within `maxHeight` pixels when rendered in a body with `.docmd-body` styles at width 682px.
// Uses an off-screen measurement container so sizes include real font metrics + margin collapsing.
function paginateDocHtml(html, maxHeight) {
  const measure = document.createElement('div');
  measure.className = 'docmd-body';
  // width = A4 body width minus the left/right padding of .docmd-body (56*2). Keep styling identical so measurement is accurate.
  measure.style.cssText = 'position:absolute; left:-9999px; top:0; width:682px; padding:0; overflow:visible;';
  measure.innerHTML = html;
  document.body.appendChild(measure);

  const kids = Array.from(measure.children);
  // Measure each child's outer height (bounding rect + collapsed margins captured as offsets between siblings).
  // Simpler heuristic: use offsetTop + offsetHeight across siblings vs total scrollHeight.
  const pages = [[]];
  let currentPageHeight = 0;

  kids.forEach(el => {
    const h = el.getBoundingClientRect().height;
    const styles = getComputedStyle(el);
    const marginTop = parseFloat(styles.marginTop) || 0;
    const marginBottom = parseFloat(styles.marginBottom) || 0;
    // For the first element on a page, don't count marginTop (it collapses against the page top).
    const effectiveH = h + (pages[pages.length - 1].length === 0 ? 0 : marginTop) + marginBottom;

    // If adding this element would overflow the page AND the page already has content, start a new page.
    if (currentPageHeight + effectiveH > maxHeight && pages[pages.length - 1].length > 0) {
      pages.push([]);
      currentPageHeight = 0;
    }
    pages[pages.length - 1].push(el.outerHTML);
    currentPageHeight += (pages[pages.length - 1].length === 1 ? h + marginBottom : effectiveH);
  });

  document.body.removeChild(measure);
  return pages.map(p => p.join(''));
}

function generateDocumento(raw, preview, renderC) {
  if (typeof marked === 'undefined' || !marked.parse) {
    showError('El parser de markdown no ha cargado (bloqueo de CDN, SRI o red). Abre DevTools \u2192 Network y busca <code>marked.min.js</code> para ver el motivo.');
    return;
  }
  const chunks = splitDocMdPages(raw);
  if (!chunks.length) { showError('El documento est\u00e1 vac\u00edo.'); return; }
  // breaks:true so single-line-separated metadata lines and sign-offs ("Best,\nDavid\nMagnify") don't collapse into one paragraph.
  marked.setOptions({ gfm: true, breaks: true });

  // A4 flowable area inside .docmd-body (content box, excluding body's own padding):
  // 1123 − 46 header − 14 sep − 36 top-pad − 72 bot-pad ≈ 955px. Conservative budget of 880 absorbs
  // font-load variance + margin-collapse slop + keeps content clear of the absolute-positioned footer.
  const BODY_BUDGET = 880;

  // The first chunk, if it looks like a cover (heading + prose, no lists/tables), gets dark editorial
  // cover treatment. Everything else paginates through the standard body flow.
  let coverParts = null;
  const renderedPages = [];
  chunks.forEach((mdChunk, chunkIdx) => {
    let bodyHtml;
    try { bodyHtml = polishDocHtml(marked.parse(polishDocMd(mdChunk))); }
    catch (e) { bodyHtml = `<p>Error parseando: ${e.message}</p>`; }
    if (chunkIdx === 0 && looksLikeCover(bodyHtml)) {
      coverParts = extractCoverParts(bodyHtml);
      return;
    }
    const split = paginateDocHtml(bodyHtml, BODY_BUDGET);
    split.forEach(h => renderedPages.push(h));
  });

  // Anti-orphan: if a page ends with a heading (h1–h4), move it to the next page so no subtitle is
  // left floating without its paragraph. The regex uses a back-reference + negative lookahead so it
  // captures ONLY the last heading — a naïve `<h[1-4]>[\s\S]*?</h[1-4]>$` is lazy in theory but
  // backtracks to match from the first heading when anchored by $, eating the whole page.
  const TRAIL_HEADING_RE = /<(h[1-4])[^>]*>(?:(?!<\/\1>)[\s\S])*<\/\1>\s*$/i;
  for (let i = 0; i < renderedPages.length - 1; i++) {
    let page = renderedPages[i];
    while (true) {
      const trailMatch = page.match(TRAIL_HEADING_RE);
      if (!trailMatch) break;
      const afterRemoval = page.slice(0, page.length - trailMatch[0].length).trim();
      if (!afterRemoval) break;
      renderedPages[i + 1] = trailMatch[0].replace(/\s*$/, '') + renderedPages[i + 1];
      page = afterRemoval;
    }
    renderedPages[i] = page;
  }

  // Defensive: remove any page that ended up empty (e.g., from an authored chunk that only contained an h1
  // which got stripped by polishDocMd, or from a degenerate paginator outcome).
  const nonEmpty = renderedPages.map(p => p.trim()).filter(Boolean);
  renderedPages.length = 0;
  renderedPages.push(...nonEmpty);

  const total = (coverParts ? 1 : 0) + renderedPages.length;
  const maxW = preview.clientWidth - 80;
  const scale = Math.min(maxW / 794, 0.55);

  const appendPage = (pageHtml, pageN) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = pageHtml;
    renderC.appendChild(actualDiv);
    const frame = actualDiv.querySelector('.frame');
    renderedFrames.push(frame);

    const card = document.createElement('div');
    card.className = 'preview-card paper';
    card.style.width = (794 * scale) + 'px';
    card.style.height = (1123 * scale) + 'px';
    card.style.marginBottom = '32px';
    card.innerHTML = `<div class="slide-label">${pageN} / ${total}</div>` + pageHtml;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  };

  let pageCursor = 0;
  if (coverParts) {
    pageCursor += 1;
    appendPage(renderDocumentoCover(coverParts, pageCursor, total), pageCursor);
  }
  renderedPages.forEach(bodyHtml => {
    pageCursor += 1;
    appendPage(renderDocumentoPage(bodyHtml, pageCursor, total), pageCursor);
  });
}
