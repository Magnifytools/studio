function parseMultiDoc(raw) {
  const blocks = raw.split(/^---$/m).map(b => b.trim()).filter(Boolean);
  if (blocks.length === 0) return { global: {}, sections: [] };
  const global = parseBlock(blocks[0]);
  const sections = blocks.slice(1).map(b => parseBlock(b));
  return { global, sections };
}

// Per-page toggles `header: no` / `footer: no` (también `top_meta: no` / `foot: no`).
// Color del wordmark se invierte si la página es oscura (fondo: oscuro).
// pageHeader/pageFooter — patrón unificado Magnify (mismo markup que cslHead/cslFoot).
// Mono uppercase, izquierda=documento (TIPO 01 · NOMBRE), derecha=referencia.
// Footer: izquierda=URL con .ing accent, derecha=paginación XX / XX.
// `fallback` se usa si el YAML no trae `g.documento`/`g.titulo`.
function pageHeader(g, d, fallback) {
  if (d) {
    const hv = (d.header || d.top_meta || '').toString().toLowerCase().trim();
    if (['no', 'off', 'false', 'none', 'hidden', '0'].includes(hv)) return '';
  }
  const doc = ((g && (g.documento || g.titulo)) || fallback || 'Documento').toUpperCase();
  const ref = ((g && (g.referencia || g.cliente)) || '').toUpperCase();
  return `<div class="csl-head"><span class="csl-doc">${doc}</span><span>${ref}</span></div>`;
}
function pageFooter(g, pageN, total, d) {
  if (d) {
    const fv = (d.footer || d.foot || '').toString().toLowerCase().trim();
    if (['no', 'off', 'false', 'none', 'hidden', '0'].includes(fv)) return '';
  }
  const url = decorateIngUrl(g && g.url);
  return `<div class="csl-foot"><span>${url}</span><span class="csl-num">${String(pageN).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span></div>`;
}
// Helper para resolver clase de fondo en doc-page (case-study/propuesta).
function docSurface(d) {
  if (!d) return '';
  if (d.fondo === 'oscuro') return 'dk';
  if (d.fondo === 'amarillo') return 'yl';
  if (d.fondo === 'claro' || d.fondo === 'hueso') return ''; // default ya es blanco
  return '';
}

function parseSlashStat(s) {
  if (!s) return { num: '', lbl: '' };
  const parts = s.split('/');
  return { num: (parts[0] || '').trim(), lbl: (parts.slice(1).join('/') || '').trim() };
}

// ════════════════════════════════════════════
// CASE STUDY LONGFORM (DOSSIER) — multi-page A4 editorial
// 16-20 páginas, sistema cromático tri-paleta (oscuro/claro/amarillo).
// Comparte generateMultiPageDoc; cada renderer devuelve un .frame.a4 con .csl-page.
// ════════════════════════════════════════════

// Helpers — header y footer institucionales en cada página de cuerpo (no en divisores full-bleed).
// Per-page override: `header: no` suprime el header (el evento ya está en el contenido principal).
// Per-page override: `footer: no` suprime el pie de página y nº.
function cslHead(g, d) {
  if (d) {
    const hv = (d.header || d.top_meta || '').toString().toLowerCase().trim();
    if (['no', 'off', 'false', 'none', 'hidden', '0'].includes(hv)) return '';
  }
  const doc = (g.documento || g.titulo || 'Dossier').toUpperCase();
  const ref = (g.referencia || g.cliente || '').toUpperCase();
  return `<div class="csl-head"><span class="csl-doc">${doc}</span><span>${ref}</span></div>`;
}
// Auto-acentúa cualquier `.ing` final dentro de una URL (ej. `magnify.ing` → `magnify.<span>ing</span>`).
// El YAML lleva la URL como dato puro y el render se ocupa del accent de marca.
function decorateIngUrl(raw) {
  const v = (raw == null ? '' : String(raw)).trim();
  if (!v) return 'magnify.<span class="ing-ap">ing</span>';
  // Si el usuario ya pasó HTML (legacy YAMLs con span), respétalo.
  if (/<span/i.test(v)) return v;
  return v.replace(/\.ing\b/gi, '.<span class="ing-ap">ing</span>');
}
function cslFoot(g, pN, tot, d) {
  if (d) {
    const fv = (d.footer || d.foot || '').toString().toLowerCase().trim();
    if (['no', 'off', 'false', 'none', 'hidden', '0'].includes(fv)) return '';
  }
  const url = decorateIngUrl(g.url);
  return `<div class="csl-foot"><span>${url}</span><span class="csl-num">${String(pN).padStart(2, '0')} / ${String(tot).padStart(2, '0')}</span></div>`;
}
// Resuelve la clase de fondo para una página: oscuro|claro|hueso|amarillo → '' para hueso default.
function cslSurface(d) {
  const f = (d.fondo || '').toLowerCase();
  if (f === 'oscuro' || f === 'dark') return 'dk';
  if (f === 'amarillo' || f === 'yellow') return 'yl';
  return ''; // claro/hueso default
}

// PORTADA — default dark, acepta fondo: claro/amarillo.
// Overrides:
//   header: no   → oculta SOLO el eyebrow (no afecta al wordmark)
//   footer: no   → oculta pt-bottom (URL del footer)
//   wordmark:    → 'arriba' (default), 'abajo' (firma editorial al pie), 'oculto' (sin wordmark)
//   confidencial: → texto explícito al pie. Se respeta aunque footer: no esté activo.
//   cliente/industria/fecha: si vienen como string vacío, no se renderizan (usar '' en lugar de borrar campo).
function renderCSLPortada(g, d, pN, tot) {
  const isOff = (v) => ['no', 'off', 'false', 'none', 'hidden', '0'].includes((v || '').toString().toLowerCase().trim());
  const hideHeader = isOff(d.header || d.top_meta);
  const hideFooter = isOff(d.footer || d.foot);
  const wmPos = (d.wordmark || 'arriba').toString().toLowerCase().trim();
  const wmHidden = wmPos === 'oculto' || wmPos === 'no' || wmPos === 'hidden';
  const wmAbajo = wmPos === 'abajo' || wmPos === 'pie' || wmPos === 'bottom';
  const eyebrow = (d.eyebrow || g.referencia || 'CASE STUDY · CONFIDENCIAL').toUpperCase();
  // Meta: respetar strings vacíos del YAML (`cliente: ""` → no renderiza esa línea).
  // Si `d.meta` está declarado, usarlo tal cual. Si no, construir desde g pero solo con
  // los campos NO vacíos (sin '—' fallback que el usuario no pidió).
  let metaLines;
  if (d.meta) {
    metaLines = d.meta.split('\n').filter(Boolean);
  } else {
    metaLines = [];
    if (g.cliente !== undefined && g.cliente !== '') metaLines.push(`Cliente: ${g.cliente}`);
    if (g.industria !== undefined && g.industria !== '') metaLines.push(`Industria: ${g.industria}`);
    if (g.fecha !== undefined && g.fecha !== '') metaLines.push(`Fecha: ${g.fecha}`);
    // Si TODOS están en blanco, no renderizar el bloque ni la línea amarilla.
    if (metaLines.length === 0 && (g.cliente === undefined && g.industria === undefined && g.fecha === undefined)) {
      // Sin overrides explícitos: mantener el formato Cliente/Industria/Fecha con —. Compatibilidad.
      metaLines = [`Cliente: —`, `Industria: —`, `Fecha: —`];
    }
  }
  const hasMeta = metaLines.length > 0;
  const meta = metaLines.map(l => `<div>${l}</div>`).join('');
  // Confidencial: si está explícitamente declarado, se muestra al pie aunque footer:no oculte la URL.
  const confDeclared = d.confidencial !== undefined && d.confidencial !== '';
  const confText = confDeclared ? d.confidencial : 'INTERNAL · NO DISTRIBUIR';
  const surf = (d.fondo === 'claro' || d.fondo === 'hueso') ? 'lt' : (d.fondo === 'amarillo' ? 'yl' : '');
  const wmColor = surf ? '#0A0A0A' : '#FAFAFA';
  const wmArribaHtml = (!wmHidden && !wmAbajo) ? `<div class="pt-wm">${wordmark(wmColor)}</div>` : '';
  const wmAbajoHtml = (!wmHidden && wmAbajo) ? `<div class="pt-wm-bottom">${wordmark(wmColor)}</div>` : '';
  // pt-bottom: si footer:no Y confidencial declarado, mostrar solo confidencial (sin URL).
  // Si footer:no y sin confidencial, ocultar todo.
  let bottomHtml = '';
  if (hideFooter) {
    if (confDeclared) bottomHtml = `<div class="pt-bottom"><span></span><span>${confText}</span></div>`;
  } else {
    bottomHtml = `<div class="pt-bottom"><span>${decorateIngUrl(g.url)}</span><span>${confText.toUpperCase ? confText : confText}</span></div>`;
  }
  const titular = d.titular || g.titulo || 'Dossier';
  const titularLen = titular.replace(/\[|\]/g, '').length;
  const tCls = titularLen <= 30 ? 't-short' : titularLen <= 70 ? 't-medium' : 't-long';
  return `<div class="frame a4"><div class="csl-page ${surf} csl-portada${wmAbajo ? ' wm-bottom' : ''}">
    ${wmArribaHtml}
    ${hideHeader ? '' : `<div class="pt-eyebrow">${eyebrow}</div>`}
    <h1 class="${tCls}">${applyHighlights(titular)}</h1>
    ${d.subtitulo ? `<div class="pt-sub">${d.subtitulo}</div>` : ''}
    ${hasMeta ? '<div class="pt-accent"></div>' : ''}
    ${hasMeta ? `<div class="pt-meta">${meta}</div>` : ''}
    ${wmAbajoHtml}
    ${bottomHtml}
  </div></div>`;
}

// TL;DR — página 2, default hueso (acepta fondo: oscuro/amarillo/claro)
function renderCSLTldr(g, d, pN, tot) {
  const items = [];
  for (let i = 1; i <= 8; i++) if (d['punto' + i] || d['p' + i]) items.push(d['punto' + i] || d['p' + i]);
  const surf = cslSurface(d);
  return `<div class="frame a4"><div class="csl-page ${surf} csl-tldr">
    ${cslHead(g, d)}
    <div class="csl-body">
      <div class="tl-eyebrow">${(d.eyebrow || 'TL;DR').toUpperCase()}</div>
      <h2>${applyHighlights(d.titular || 'Resumen ejecutivo')}</h2>
      ${d.deck ? `<p class="tl-deck">${applyHighlights(d.deck)}</p>` : ''}
      <ol>${items.map(it => `<li><p>${applyHighlights(it)}</p></li>`).join('')}</ol>
    </div>
    ${cslFoot(g, pN, tot, d)}
  </div></div>`;
}

// DIVISOR-SECCION — chapter break full-bleed con número grande
function renderCSLDivisor(g, d, pN, tot) {
  const surf = cslSurface(d);
  return `<div class="frame a4"><div class="csl-page ${surf} csl-divisor ${surf}">
    <div class="num">${(d.numero || '01').toString().padStart(2, '0')}</div>
    <div class="num-line"></div>
    ${d.eyebrow ? `<div class="eyebrow">${d.eyebrow.toUpperCase()}</div>` : ''}
    <h2>${applyHighlights(d.titular || d.titulo || '')}</h2>
    ${d.deck ? `<div class="deck">${applyHighlights(d.deck)}</div>` : ''}
    ${cslFoot(g, pN, tot, d)}
  </div></div>`;
}

// SECCION-CUERPO — texto editorial con visuals embebidos opcionales
function renderCSLSeccion(g, d, pN, tot) {
  const surf = cslSurface(d);
  // Acepta cuerpo plano o con visuals intercalados ([VISUAL_01] como marker que renderiza placeholder).
  const cuerpoHtml = (d.cuerpo || '').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  const pull = d.pull ? `<div class="sec-pull">${applyHighlights(d.pull)}</div>` : '';
  // Visual opcional con id, slot, caption. Si visual_id parece referencia a imagen
  // subida (`img1`, `img2`...) se usa también como source y la etiqueta queda vacía
  // — patrón común cuando el YAML lista directamente `visual_id: img1` sin un campo
  // `visual:` separado. Si visual_id es una etiqueta humana ("VISUAL_01") se mantiene
  // como label y la imagen viene de `visual:` o `imagen:`.
  let visualHtml = '';
  if (d.visual || d.imagen || d.visual_id || d.visual_caption) {
    const visualIdRaw = (d.visual_id || '').trim();
    const visualIdIsImageRef = /^img\d+$/i.test(visualIdRaw);
    const imgRef = ((d.visual || d.imagen || '').trim()) || (visualIdIsImageRef ? visualIdRaw : '');
    const label = visualIdIsImageRef ? '' : (visualIdRaw || 'VISUAL_XX');
    const imgSrc = uploadedImages[imgRef];
    const slotInner = imgSrc ? `<img src="${imgSrc}" alt="${label || imgRef}">` : `[ ${label || 'VISUAL_XX'} ]`;
    visualHtml = `<div class="csl-visual">
      ${label ? `<div class="v-id">${label}</div>` : ''}
      <div class="v-slot ${imgSrc ? 'has-img' : ''}">${slotInner}</div>
      ${d.visual_caption ? `<div class="v-cap">${applyHighlights(d.visual_caption)}</div>` : ''}
    </div>`;
  }
  // Si la sección es minimal (solo eyebrow + titular, sin cuerpo/pull/visual) centramos
  // el contenido verticalmente para que no quede pegado arriba con la página vacía.
  const isMinimal = !cuerpoHtml && !pull && !visualHtml;
  return `<div class="frame a4"><div class="csl-page ${surf} csl-section${isMinimal ? ' is-minimal' : ''}">
    ${cslHead(g, d)}
    <div class="csl-body">
      ${d.eyebrow ? `<div class="sec-eyebrow">${d.eyebrow.toUpperCase()}</div>` : ''}
      ${d.titular ? `<h2>${applyHighlights(d.titular)}</h2>` : ''}
      ${cuerpoHtml ? `<div class="sec-body"><p>${applyHighlights(cuerpoHtml)}</p></div>` : ''}
      ${pull}
      ${visualHtml}
    </div>
    ${cslFoot(g, pN, tot, d)}
  </div></div>`;
}

// VISUAL — página entera para un visual destacado con caption editorial.
// `layout: subordinado` (default) renderiza el visual dentro de una caja con borde y label
// VISUAL_0X — sirve cuando el visual ACOMPAÑA texto y necesita su propia titulación.
// `layout: protagonista` quita caja, label y borde — el visual es la pieza central de la
// página y el `eyebrow + titular` actúan como título único (sin doble titulación).
function renderCSLVisual(g, d, pN, tot) {
  const surf = cslSurface(d);
  const visualIdRaw = (d.visual_id || d.id || '').trim();
  const visualIdIsImageRef = /^img\d+$/i.test(visualIdRaw);
  const imgRef = ((d.visual || d.imagen || '').trim()) || (visualIdIsImageRef ? visualIdRaw : '');
  const label = visualIdIsImageRef ? '' : (visualIdRaw || 'VISUAL_XX');
  const imgSrc = uploadedImages[imgRef];
  const layout = (d.layout || 'subordinado').toString().toLowerCase().trim();
  const isProtag = layout === 'protagonista' || layout === 'protag' || layout === 'fill';
  const slotInner = imgSrc ? `<img src="${imgSrc}" alt="${label || imgRef}">` : (label || 'VISUAL_XX');
  const showLabel = !isProtag && label;
  return `<div class="frame a4"><div class="csl-page ${surf} csl-section">
    ${cslHead(g, d)}
    <div class="csl-body">
      ${d.eyebrow ? `<div class="sec-eyebrow">${d.eyebrow.toUpperCase()}</div>` : ''}
      ${d.titular ? `<h2>${applyHighlights(d.titular)}</h2>` : ''}
      <div class="csl-visual csl-visual-fill${isProtag ? ' csl-visual-protag' : ''}">
        ${showLabel ? `<div class="v-id">${label}</div>` : ''}
        <div class="v-slot ${imgSrc ? 'has-img' : ''}">${slotInner}</div>
        ${d.caption || d.visual_caption ? `<div class="v-cap">${applyHighlights(d.caption || d.visual_caption)}</div>` : ''}
      </div>
    </div>
    ${cslFoot(g, pN, tot, d)}
  </div></div>`;
}

// SECCION-VISUAL — página entera con SOLO el visual + eyebrow opcional.
// Sin titular, sin prosa, sin caption. El visual ocupa todo el body dentro

// CIERRE — default amarillo crescendo, acepta fondo: oscuro/claro.
// Sin header ni footer por defecto: es página de cierre puro (paginación interrumpe la cadencia).
// Overrides:
//   footer: si    → reactiva paginación (default no)
//   numero:       → si declarado, pinta el número arriba; si vacío/no, no reserva slot
//   alineacion_vertical: arriba (default) | centro | abajo
//   cta_size:     pequeño (default) | medio | grande
function renderCSLCierre(g, d, pN, tot) {
  const surf = (d.fondo === 'oscuro') ? 'dk' : (d.fondo === 'claro' || d.fondo === 'hueso') ? 'lt' : 'yl';
  const showFoot = ['si', 'sí', 'yes', 'true', '1', 'on'].includes((d.footer || '').toString().toLowerCase().trim());
  const numero = (d.numero === undefined || d.numero === null || d.numero === '' || d.numero === false)
    ? null : d.numero.toString().padStart(2, '0');
  const alineV = (d.alineacion_vertical || d.valign || 'arriba').toString().toLowerCase().trim();
  const valignCls = alineV === 'centro' || alineV === 'center' ? 'v-center' : (alineV === 'abajo' || alineV === 'bottom' ? 'v-bottom' : '');
  const ctaSize = (d.cta_size || '').toString().toLowerCase().trim();
  const ctaCls = ctaSize === 'grande' || ctaSize === 'big' ? 'ci-cta-lg' : (ctaSize === 'medio' || ctaSize === 'medium' ? 'ci-cta-md' : '');
  return `<div class="frame a4"><div class="csl-page ${surf} csl-cierre ${valignCls}">
    ${numero ? `<div class="ci-num">${numero}</div><div class="ci-line"></div>` : ''}
    <h2>${applyHighlights(d.titular || 'El espejo')}</h2>
    ${d.deck ? `<p class="ci-deck">${applyHighlights(d.deck)}</p>` : ''}
    ${d.cta ? `<div class="ci-cta ${ctaCls}"><span>${d.cta}</span><span>→</span></div>` : ''}
    ${showFoot ? cslFoot(g, pN, tot, d) : ''}

}

      rows.push({ label: s['timeline' + i + '_fase'], weeks: parseFloat(s['timeline' + i + '_semanas'] || '1') });

  }
  if (rows.length === 0 && aproxSection) {

}

function generateMultiPageDoc(raw, preview, renderC, renderers, options) {
  const { global, sections } = parseMultiDoc(raw);
  if (sections.length === 0) { toast('A\u00f1ade al menos una secci\u00f3n separada por ---'); return; }

  const total = sections.length;
  const pages = [];
  sections.forEach((s, idx) => {
    const key = (s.seccion || '').toLowerCase().trim();
    const fn = renderers[key];
    if (!fn) return;
    // portada is page 1 but no numbered footer logic — still pass
    const html = fn(global, s, idx + 1, total, sections.find(x => (x.seccion || '').toLowerCase() === 'aproximacion'));
    pages.push({ html, label: key });
  });

  // Render into renderC and preview
  const previewCols = Math.min(2, pages.length);
  pages.forEach((p, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = p.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));
  });

  const w = 794, h = 1123;
  // Clamp para evitar scale negativo cuando preview-area aún no tiene layout
  // (mismo bug que afectaba a generatePresentacion). Min 0.1 = 79×112 px legible.
  const maxW = Math.max(preview.clientWidth - 80, 400);
  const maxH = Math.max(preview.clientHeight - 120, 600);
  const scale = Math.max(Math.min((maxW / 2 - 32) / w, maxH / h, 0.45), 0.1);

  pages.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'preview-card paper';
    card.style.width = (w * scale) + 'px';
    card.style.height = (h * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${String(i + 1).padStart(2, '0')} \u00b7 ${p.label}</div>` + p.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

// ════════════════════════════════════════════
// CHARLA — slide renderers (keynote talks)
// All share ps-slide + ps-charla helpers; event chrome (logo + handle)
// comes from psTopMeta(g) which reads evento_logo / evento_handle from
// the global block. Brand icon bottom-left is always emitted.
// ════════════════════════════════════════════

function psBrandIcon(surface, d) {
  // Per-slide override: `marca: no` (alias `watermark: no`) suprime el monograma.
  // Útil en slides donde la marca compite con la imagen (capturas full-bleed,
  // mockups con monograma propio, etc.).
  if (d && (d.marca === 'no' || d.watermark === 'no')) return '';
  // Uses the bare A-polygon (no surrounding box) to stay consistent with the
  // rest of the studio (sidebar, LinkedIn post footers, existing presentacion
  // slides). On dark / on-image: white A. On light / yellow: black A.
  if (surface === 'lt' || surface === 'yl') return icon('#0A0A0A');
  return icon('#FAFAFA');
}

function psTopMeta(g, d) {
  if (!g) return '';
  // Per-slide override: `header: no/off/false/none/hidden` suprime el top-meta del evento.
  // Útil para hero/cierre cuando el evento ya está visualmente presente en el contenido.
  // También a nivel global: `header: hero-cierre` solo lo muestra en primera y última slide
  // (gestionado por el caller pasando d.__slideIdx y d.__slideTotal si está disponible).
  if (d) {
    const hv = (d.header || d.top_meta || d.evento || '').toString().toLowerCase().trim();
    if (['no', 'off', 'false', 'none', 'hidden', '0'].includes(hv)) return '';
  }
  const logoRef = (g.evento_logo || '').trim();
  const handle = (g.evento_handle || '').trim();
  const nombre = (g.evento_nombre || '').trim();
  const logoSrc = uploadedImages[logoRef] || null;
  const left = logoSrc
    ? `<img class="logo" src="${logoSrc}" alt="${nombre || 'logo evento'}">`
    : (nombre ? `<span>${nombre}</span>` : '<span></span>');
  const right = handle ? `<span class="handle">${handle}</span>` : '<span></span>';
  if (!logoSrc && !nombre && !handle) return '';
  return `<div class="ps-top-meta">${left}${right}</div>`;
}

// Flag global que el runtime pone antes de generar cada deck. Si el usuario declara
// `paginacion: no` (también acepta `off` / `false` / `0`) en el bloque global, psPaginator
// devuelve vacío y todas las slides salen sin el contador N/tot.
let PS_PAGINATION_ENABLED = true;

function psPaginator(n, tot, onImage) {
  if (!PS_PAGINATION_ENABLED) return '';
  if (!n && n !== 0) return '';
  const cls = onImage ? 'ps-pag' : 'ps-pag';
  const style = onImage ? ' style="color:#FAFAFA;opacity:0.75"' : '';
  return `<div class="${cls}"${style}>${String(n).padStart(2, '0')} / ${String(tot).padStart(2, '0')}</div>`;
}

function psBgFromImage(imgRef, fallbackClass) {
  // Returns style string for background or falls back to placeholder class.
  const src = uploadedImages[imgRef];
  if (src) return { style: `background-image:url('${src}')`, className: '' };
  return { style: '', className: fallbackClass };
}

// Charla — Hero (cover with hairline + author/date)
function renderPsHero(d, g, n, tot) {

  const author = d.autor || g.autor || '';

  // F3 — hilo griego en hero: va ARRIBA del eyebrow (anchor conceptual amarillo italic),

function renderPsManifiesto(d, g, n, tot) {

  // Mismo escalado que buildPptxManifiesto: len<30→80pt, <60→64pt, <100→52pt, else→42pt.
  const raw = (d.titular || d.frase || '').replace(/\s+/g, ' ').trim();
  const len = raw.length;
  const sizeCls = len < 30 ? '' : len < 60 ? 's-md' : len < 100 ? 's-sm' : 's-xs';
  // B18: titulares muy cortos (≤15 chars como "El caso." / "El espejo.") se sienten
  // descolgados en la esquina sup-izq sobre fondo claro/amarillo. Modo `short` los
  // centra horizontalmente para darles peso editorial.
  const shortCls = len <= 15 ? ' short' : '';
  // F3 — hilo griego: stamp encima del titular (p.ej. "Γνῶθι σεαυτόν" en slide 26).
  // Letras sueltas (1-3 chars como "Α"/"Β"/"Γ") se renderizan como anchor visual grande
  // (serif italic 120px estilo hero); frases más largas mantienen el stamp sans pequeño.
  const griego = (d.griego || d.subtitular_griego || '').trim();
  const griegoAnchor = griego.length > 0 && griego.length <= 3;
  return `<div class="frame ps"><div class="ps-slide ${surface}">
    ${psTopMeta(g, d)}
    <div class="ps-manif${shortCls}">
      ${griego ? `<div class="griego-stamp${griegoAnchor ? ' anchor' : ''}">${griego}</div>` : ''}
      <div class="hero-xxl ${sizeCls}">${applyHighlights(d.titular || d.frase || '').replace(/\n/g, '<br>')}</div>

    <div class="ps-wmk-bl">${psBrandIcon(surface, d)}</div>

}

// B16-final (Apr 26 2026): aplica dimensiones explícitas al <img> contain para que
// html2canvas las respete. CSS object-fit es ignorado en data:URLs por html2canvas.
// Calcula si fit width o height comparando aspect ratios y emite width:100%/height:auto
// (o viceversa). Centrado vía margin:auto + inset:0 ya viene del CSS base.
function fitContainOnLoad(img) {
  const boxW = 1920, boxH = 1080;  // slide nativo 16:9
  const ar = img.naturalWidth / img.naturalHeight;
  const arBox = boxW / boxH;
  if (ar > arBox) {
    // imagen más ancha que el slide → fit width, bandas top/bottom
    img.style.width = '100%';
    img.style.height = 'auto';
  } else {
    // imagen más alta o cuadrada → fit height, bandas laterales
    img.style.width = 'auto';
    img.style.height = '100%';
  }
}

// Charla — Image full-bleed with overlay
function renderPsImagenFull(d, g, n, tot) {
  // B15: si hay imagen subida la emitimos como <img> con object-fit (no background-image)
  // porque html2canvas — motor del export PDF — tiene bug con background-size:contain
  // en data:URLs y siempre lo pinta como cover. object-fit en <img> real sí lo respeta.
  // Sin imagen → placeholder con el .bg.ph clásico (gradiente + scanlines).
  // B22: fondo: claro|amarillo soportado (antes hardcoded a dk). Las bandas de letterbox
  // y los scrims de header/paginator se pintan del color del surface.
  // B23: overlay_texto: no skipea eyebrow+titular+scrim+gradients para imágenes densas
  // (tablas, esquemas, treemaps con datos). Permite mostrar la imagen sin overlay.
  const src = uploadedImages[d.imagen];
  const surface = d.fondo === 'amarillo' ? 'yl' : d.fondo === 'claro' ? 'lt' : 'dk';
  // B24: si el YAML no trae eyebrow ni titular, no hace falta overlay — auto-skip scrim+gradients.
  // Sin esto, quitar los textos del YAML deja la imagen con bandas oscuras encima (gradients on-image).
  const hasOverlayContent = (d.eyebrow && String(d.eyebrow).trim()) || (d.titular && String(d.titular).trim());
  const noOverlay = d.overlay_texto === 'no' || d.overlay === 'no' || !hasOverlayContent;
  const ajuste = (d.imagen_ajuste || d.ajuste || 'cover').toLowerCase();
  const ajusteCls = ajuste === 'contain' ? ' fit-contain' : '';
  const bgEl = src
    ? `<img class="bg-img${ajusteCls}" src="${src}" alt=""${ajuste === 'contain' ? ' onload="fitContainOnLoad(this)"' : ''}>`
    : `<div class="bg ph"></div>`;
  const overlayHtml = noOverlay ? '' : `
      <div class="scrim"></div>
      <div class="overlay">
        ${d.eyebrow ? `<span class="eyebrow">${d.eyebrow}</span>` : ''}
        <div class="title">${applyHighlights(d.titular || '').replace(/\n/g, '<br>')}</div>
      </div>`;
  // .on-image añade scrims globales (header arriba + paginator abajo) que mejoran
  // legibilidad sobre imagen. Con overlay_texto:no o si el slide ya está sobre fondo
  // claro/amarillo coherente, los scrims pueden estorbar — los hacemos surface-aware.
  const onImageCls = noOverlay ? 'no-overlay' : 'on-image';
  return `<div class="frame ps"><div class="ps-slide ${surface} ${onImageCls}">
    <div class="ps-imgfull">
      ${bgEl}${overlayHtml}
    </div>
    ${psTopMeta(g, d)}
    <div class="ps-wmk-bl">${psBrandIcon(surface === 'dk' ? 'img' : surface, d)}</div>
    ${psPaginator(n, tot, true)}
  </div></div>`;
}

// Charla — Image split (text + image, or reverse)
function renderPsImagenSplit(d, g, n, tot) {
  const surface = d.fondo === 'amarillo' ? 'yl' : d.fondo === 'claro' ? 'lt' : 'dk';
  const bg = psBgFromImage(d.imagen, 'ph');
  const rev = d.posicion === 'derecha' ? ' rev' : '';
  // imagen_ajuste: contain → la imagen se ve entera con aire (typical para retratos verticales).
  // Default cover llena el panel pero recorta. zoom: 0-100 (default 100) reduce visualmente.
  const ajuste = (d.imagen_ajuste || d.ajuste || 'cover').toLowerCase();
  const ajusteCls = ajuste === 'contain' ? ' fit-contain' : '';
  const zoom = parseFloat(d.imagen_zoom || d.zoom);
  const zoomStyle = (!isNaN(zoom) && zoom > 0 && zoom < 100) ? ` background-size:${zoom}% auto;` : '';
  return `<div class="frame ps"><div class="ps-slide ${surface}">
    <div class="ps-imgsplit${rev}">
      <div class="pane-img${ajusteCls} ${bg.className}" style="${bg.style}${zoomStyle}"></div>
      <div class="pane-txt">
        ${d.eyebrow ? `<span class="eyebrow">${d.eyebrow}</span>` : ''}
        <h2>${applyHighlights(d.titular || '').replace(/\n/g, '<br>')}</h2>
        ${d.cuerpo ? `<div class="body-l">${wrapNoBreakUrls(applyHighlights(d.cuerpo)).replace(/\n/g, '<br>')}</div>` : ''}

}

// Charla — Diptych (2 images with captions)
function renderPsDiptych(d, g, n, tot) {
  const bg1 = psBgFromImage(d.imagen_a, 'ph1');
  const bg2 = psBgFromImage(d.imagen_b, 'ph2');
  // Imagen en su propio <div class="img"> (70% alto) + caption opaco (30%).
  // Antes la imagen era bg del .pane y el caption iba overlay — tapaba contenido crítico.
  return `<div class="frame ps"><div class="ps-slide dk">
    <div class="ps-dip">
      <div class="pane">
        <div class="img ${bg1.className}" style="${bg1.style}"></div>
        <div class="cap">

        </div>
      </div>
      <div class="pane">

        <div class="cap">
          <span class="lbl">${d.label_b || 'DESPUÉS'}</span>
          <div class="title">${applyHighlights(d.titulo_b || '').replace(/\n/g, '<br>')}</div>

}

// Charla — Triptych (3 image tiles)
// B17: cuando hay imagen subida la emitimos como <img class="tile-img"> en vez de
// background-image — html2canvas (export PDF) ignora background-size:cover en data:URLs
// y pinta a tamaño natural, desbordando la celda. <img> con object-fit:cover sí se respeta.
function renderPsTriptych(d, g, n, tot) {
  const tiles = [];
  for (let i = 1; i <= 3; i++) {
    const src = uploadedImages[d[`imagen${i}`]];
    tiles.push({
      src,
      phCls: src ? '' : `ph${i}`,
      num: d[`num${i}`] || String(i).padStart(2, '0'),
      t: d[`titulo${i}`] || '',
      s: d[`descripcion${i}`] || d[`meta${i}`] || ''
    });
  }
  return `<div class="frame ps"><div class="ps-slide dk on-image">
    <div class="ps-trp">
      ${tiles.map(t => `<div class="tile ${t.phCls}">${t.src ? `<img class="tile-img" src="${t.src}" alt="">` : ''}<div class="cap"><div class="num">${t.num}</div><div class="t">${applyHighlights(t.t)}</div>${t.s ? `<div class="s">${t.s}</div>` : ''}</div></div>`).join('')}
    </div>
    ${psTopMeta(g, d)}
    <div class="ps-wmk-bl">${psBrandIcon('img', d)}</div>
    ${psPaginator(n, tot, true)}
  </div></div>`;
}

// Charla — Mosaic (1 big + 4 small with head)
function renderPsMosaic(d, g, n, tot) {
  const cells = [];
  for (let i = 1; i <= 5; i++) {

    cells.push({
      big: i === 1,
      style: bg.style,
      className: bg.className,
      lbl: d[`label${i}`] || '',
      t: d[`titulo${i}`] || ''
    });
  }
  return `<div class="frame ps"><div class="ps-slide dk on-image">
    <div class="ps-mos-head"><h2>${applyHighlights(d.titular || '').replace(/\n/g, '<br>')}</h2><span>${n && tot ? `${String(n).padStart(2, '0')} / ${String(tot).padStart(2, '0')}` : ''}</span></div>
    <div class="ps-mos">
      ${cells.map(c => `<div class="cell ${c.big ? 'big' : ''} ${c.className}" style="${c.style}"><div class="cap">${c.lbl ? `<span class="lbl">${c.lbl}</span>` : ''}<div class="t">${applyHighlights(c.t).replace(/\n/g, '<br>')}</div></div></div>`).join('')}
    </div>
    ${psTopMeta(g, d)}
    <div class="ps-wmk-bl">${psBrandIcon('img', d)}</div>

}

function renderPsTabla(d, g, n, tot) {
  const surface = 'lt';

  for (let i = 1; i <= 4; i++) if (d[`col${i}`]) cols.push(d[`col${i}`]);

// Charla — CTA final (big yellow slide; optional QR image slot via `qr: imgN`)
function renderPsCtaFinal(d, g, n, tot) {
  const surface = d.fondo === 'oscuro' ? 'dk' : d.fondo === 'claro' ? 'lt' : 'yl';
  const qrSrc = uploadedImages[(d.qr || '').trim()];
  const withQr = !!(d.qr && d.qr.trim());
  // F2: tamaño QR configurable. pequeño 18% / medio 30% (default) / grande 45%.
  const qrSize = (d.qr_size || 'medio').toLowerCase().trim();

// Charla — Stats Charla (grid 2x2, 1x3 or 1x4 of big numbers)
function renderPsStatsCharla(d, g, n, tot) {
  const surface = d.fondo === 'amarillo' ? 'yl' : d.fondo === 'claro' ? 'lt' : 'dk';
  // hi admite variantes semánticas (B11): 'si' / 'negativo' / 'neg' → rojo (alerta).
  // 'positivo' / 'pos' / 'ok' → amarillo brand realzado. Cualquier otro valor = sin highlight.
  const hiClass = (v) => {
    const x = (v || '').toLowerCase().trim();
    if (!x) return '';
    if (['si', 'yes', 'true', 'negativo', 'neg', '1'].includes(x)) return 'hi hi-neg';
    if (['positivo', 'pos', 'ok', 'good'].includes(x)) return 'hi hi-pos';
    return '';
  };
  const cells = [];
  for (let i = 1; i <= 4; i++) {
    if (d[`num${i}`] || d[`desc${i}`]) {
      cells.push({
        num: d[`num${i}`] || '',
        lbl: d[`label${i}`] || '',
        desc: d[`desc${i}`] || '',
        hiCls: hiClass(d[`hi${i}`])
      });
    }
  }
  const layout = (d.layout || '').toLowerCase();
  let gridCls = 'cols2';
  if (layout === '1x3' || cells.length === 3) gridCls = 'cols3';
  else if (layout === '1x4' || cells.length === 4 && layout === 'fila') gridCls = 'cols4';
  return `<div class="frame ps"><div class="ps-slide ${surface}">
    ${psTopMeta(g, d)}
    <div class="ps-statsc">
      ${d.titular ? `<h2>${applyHighlights(d.titular)}</h2>` : ''}
      <div class="grid ${gridCls}">
        ${cells.map(c => `<div class="cell ${c.hiCls}">
          <div class="num">${c.num}</div>
          ${c.lbl ? `<span class="lbl">${c.lbl}</span>` : ''}
          ${c.desc ? `<div class="desc">${c.desc}</div>` : ''}
        </div>`).join('')}
      </div>
      ${d.fuente ? `<div class="src">${d.fuente}</div>` : ''}
    </div>
    <div class="ps-wmk-bl">${psBrandIcon(surface, d)}</div>
    ${psPaginator(n, tot)}
  </div></div>`;
}

// Charla — Recursos Agrupados (list grouped by category, 2-3 columns)
function renderPsRecursos(d, g, n, tot) {
  const surface = d.fondo === 'amarillo' ? 'yl' : d.fondo === 'claro' ? 'lt' : 'dk';
  const cats = [];
  for (let c = 1; c <= 4; c++) {
    const head = d[`cat${c}_titulo`];
    if (!head) continue;
    const items = [];
    for (let i = 1; i <= 6; i++) {
      if (d[`cat${c}_item${i}`]) {
        items.push({ text: d[`cat${c}_item${i}`], link: d[`cat${c}_item${i}_link`] || null });
      }
    }
    cats.push({ head, items });
  }
  const gridCls = cats.length === 2 ? 'cols2' : cats.length === 4 ? 'cols4' : '';
  // Each item can be "Nombre — fuente" or "Nombre | fuente"; we split and style.
  // Si tiene link, envuelve el nombre en <a href=...> para que sea clicable en el PDF exportado.
  const renderItem = (it) => {
    const sep = /\s+[—–|-]\s+/;
    const parts = it.text.split(sep);
    const nameHTML = it.link
      ? `<a href="${it.link}" class="lnk" target="_blank" rel="noopener"><b>${parts[0]}</b></a>`
      : `<b>${parts[0]}</b>`;
    if (parts.length >= 2) return `${nameHTML}<span class="src">${parts.slice(1).join(' — ')}</span>`;
    return nameHTML;
  };
  return `<div class="frame ps"><div class="ps-slide ${surface}">
    ${psTopMeta(g, d)}
    <div class="ps-recursos">
      ${d.titular ? `<h2>${applyHighlights(d.titular)}</h2>` : ''}
      <div class="grid ${gridCls}">
        ${cats.map(c => `<div class="cat">
          <div class="hd">${c.head}</div>
          <ul>${c.items.map(it => `<li>${renderItem(it)}</li>`).join('')}</ul>
        </div>`).join('')}
      </div>
    </div>
    <div class="ps-wmk-bl">${psBrandIcon(surface, d)}</div>
    ${psPaginator(n, tot)}
  </div></div>`;
}

// Charla — Cierre (thank you / close)

// ════════════════════════════════════════════
// PRESENTACION — PPTX BUILDERS
// Layout: LAYOUT_WIDE 13.33 x 7.5 in
// ════════════════════════════════════════════

const PPTX_W = 13.33, PPTX_H = 7.5;
const COLOR_DARK = '0A0A0A', COLOR_YELLOW = 'FFD600', COLOR_WHITE = 'FFFFFF';
const COLOR_LIGHT_TEXT = 'F0F0F0', COLOR_GREY = '999999', COLOR_GREY_DK = '444444';
// Fuentes Magnify reales (mismas que escribe el design system PPTX y la web magnify.ing):
// - serif: DM Serif Display (Google Fonts, cargada en el preview HTML)
// - sans: PP Neue Montreal (instalada localmente en máquinas Magnify)
// PowerPoint sustituye por fuente del sistema si no las tiene, pero los nombres en el XML
// son los correctos.
const FONT_SERIF = 'DM Serif Display', FONT_SANS = 'PP Neue Montreal';

// Convert [highlight] syntax to pptxgenjs rich text array.
// bgMode: 'light' (default), 'dark', or 'yellow' — determines highlight treatment since Keynote doesn't render OOXML highlight reliably.
function richWithHighlights(text, baseOpts, bgMode) {
  bgMode = bgMode || 'light';
  const parts = [];
  const re = /\[([^\]]+)\]/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ text: text.slice(last, m.index), options: baseOpts });
    // Patrón Magnify Design System: en cualquier surface el highlight es
    // texto negro + fondo amarillo (espejo del CSS `.hl` y `.csl-page.dk .hl-c`).
    // En PPTX se emite con `highlight` de pptxgenjs → atributo `<a:highlight val="FFD600"/>`.
    // PowerPoint lo respeta. Keynote NO lo renderiza (bug histórico): si el deck se va a
    // abrir desde Keynote, abrir desde PowerPoint o exportar PDF directamente desde Studio.
    let hlOpts;
    if (bgMode === 'dark') {
      hlOpts = { ...baseOpts, color: COLOR_DARK, italic: true, highlight: COLOR_YELLOW };
    } else if (bgMode === 'yellow') {
      // Underline grueso sobre amarillo — el stamp amarillo no funciona y el bold
      // solo no se diferencia bastante. Subrayado editorial mantiene el amarillo
      // dominante del slide.
      hlOpts = { ...baseOpts, color: COLOR_DARK, italic: true, underline: { style: 'sng', color: '0A0A0A' } };
    } else {
      // light (claro/hueso): mismo patrón editorial que yellow — texto negro italic con
      // underline grueso. Sincroniza con CSS `.ps-slide.lt .hl`.
      hlOpts = { ...baseOpts, color: COLOR_DARK, italic: true, underline: { style: 'sng', color: '0A0A0A' } };
    }
    // Extract trailing punctuation from the highlight so the bold/yellow run doesn't include it — punctuation stays in the normal baseOpts run.
    const inner = m[1];
    const punctMatch = inner.match(/^(.*?)([.,;:!?]+)$/);
    if (punctMatch) {
      parts.push({ text: punctMatch[1], options: hlOpts });
      parts.push({ text: punctMatch[2], options: baseOpts });
    } else {
      parts.push({ text: inner, options: hlOpts });
    }
    last = re.lastIndex;
  }
  if (last < text.length) parts.push({ text: text.slice(last), options: baseOpts });
  return parts.length ? parts : [{ text: text, options: baseOpts }];
}

function stripBrackets(text) {
  return (text || '').replace(/\[([^\]]+)\]/g, '$1');
}

function wordmarkDataUri(color) {
  // Same intrinsic-ratio fix as iconDataUri — explicit width/height so <img> knows the aspect.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="178" viewBox="348 620 2140 178"><path fill="${color}" d="${WORDMARK_PATH}"/></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}
function iconDataUri(color) {
  // Explicit width/height attributes on the SVG root — needed so <img> gets the correct intrinsic aspect ratio (155:178). Without them, browsers default to 300x150 which distorts the A-mark.
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="155" height="178" viewBox="65 52 155 178"><polygon fill="${color}" points="${ICON_POINTS}"/></svg>`;
  return 'data:image/svg+xml;base64,' + btoa(svg);
}

// ════════════════════════════════════════════
// CHARLA — PPTX builders (pragmatic, text-first)
// Image-heavy slides embed the uploaded image when available; otherwise
// they degrade to a monochrome card with text. PPTX doesn't render
// layered scrim gradients reliably, so captions sit on an opaque shape.
// ════════════════════════════════════════════

function addTopMetaPptx(slide, g, onColor, d) {
  if (!g) return;
  // Per-slide override: `header: no` (o aliases) suprime el top-meta del evento.
  if (d) {
    const hv = (d.header || d.top_meta || d.evento || '').toString().toLowerCase().trim();
    if (['no', 'off', 'false', 'none', 'hidden', '0'].includes(hv)) return;
  }
  const handle = (g.evento_handle || '').trim();
  const nombre = (g.evento_nombre || '').trim();
  const logoRef = (g.evento_logo || '').trim();
  const logoSrc = uploadedImages[logoRef];
  const color = onColor || COLOR_GREY;
  if (logoSrc) {
    slide.addImage({ data: logoSrc, x: 0.7, y: 0.42, w: 1.8, h: 0.4, sizing: { type: 'contain', w: 1.8, h: 0.4 } });
  } else if (nombre) {
    slide.addText(nombre, { x: 0.7, y: 0.45, w: 6, h: 0.35, fontFace: FONT_SANS, fontSize: 20, color, charSpacing: 1.2 });
  }
  if (handle) {
    slide.addText(handle, { x: 7, y: 0.45, w: 5.63, h: 0.35, fontFace: FONT_SANS, fontSize: 20, color, align: 'right', bold: true });
  }
}

// Brand icon placement: kept tucked into the lower-left corner and smaller than
// before so it doesn't collide with caption bodies. Call sites pass `skip:true`
// when the slide content (image panes, grids) already fills that zone.
function addBrandIcon(slide, d) {
  // Per-slide override: `marca: no` (alias `watermark: no`) suprime el monograma.
  if (d && (d.marca === 'no' || d.watermark === 'no')) return;
  slide.addImage({ data: iconDataUri('#FAFAFA'), x: 0.55, y: 6.95, w: 0.32, h: 0.37 });
}

function addBrandIconLt(slide, d) {
  if (d && (d.marca === 'no' || d.watermark === 'no')) return;
  slide.addImage({ data: iconDataUri('#0A0A0A'), x: 0.55, y: 6.95, w: 0.32, h: 0.37 });
}

function addPaginator(slide, n, tot, color) {
  if (!PS_PAGINATION_ENABLED) return;
  if (!n || !tot) return;
  slide.addText(`${String(n).padStart(2, '0')} / ${String(tot).padStart(2, '0')}`, {
    x: 10.8, y: 6.75, w: 2, h: 0.35, fontFace: FONT_SANS, fontSize: 20, color: color || COLOR_GREY, align: 'right', charSpacing: 1.2
  });
}

function surfaceBg(d, defaultDk) {
  if (d.fondo === 'amarillo') return { bg: COLOR_YELLOW, fg: COLOR_DARK, meta: '444444' };
  // FAFAFA en lugar de FFFFFF: blanco puro quema en proyector.
  // Acepta 'claro' o 'hueso' como alias del off-white.
  if (d.fondo === 'claro' || d.fondo === 'hueso') return { bg: 'FAFAFA', fg: COLOR_DARK, meta: '666666' };
  if (d.fondo === 'oscuro' || defaultDk) return { bg: COLOR_DARK, fg: COLOR_LIGHT_TEXT, meta: COLOR_GREY };
  return { bg: 'FAFAFA', fg: COLOR_DARK, meta: '666666' };
}

function buildPptxHero(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  // Layout pattern Magnify Design System slide 1: griego ARRIBA italic amarillo,
  // eyebrow gris uppercase, titular italic grande, hairline amarilla, autor + fecha apilados.
  const griegoHero = d.griego || d.subtitular_griego || d.subtitular || '';
  const eyebrow = d.eyebrow || d.kicker || (g.evento_nombre ? g.evento_nombre.toUpperCase() : '');
  const griegoColor = (surf.bg === COLOR_YELLOW || d.fondo === 'claro') ? COLOR_DARK : COLOR_YELLOW;
  const hairlineColor = (surf.bg === COLOR_YELLOW) ? COLOR_DARK : COLOR_YELLOW;
  if (griegoHero) s.addText(griegoHero, { x: 0.7, y: 2.5, w: 12, h: 0.55, fontFace: FONT_SERIF, fontSize: 33, color: griegoColor, italic: true });
  if (eyebrow) s.addText(eyebrow, { x: 0.7, y: 3.05, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 22, color: surf.meta, charSpacing: 2 });
  s.addText(richWithHighlights(d.titular || g.titulo || 'Titulo', { fontFace: FONT_SERIF, fontSize: 96, color: surf.fg, italic: true }, d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark')),
    { x: 0.7, y: 3.5, w: 12, h: 1.4, valign: 'top' });
  s.addShape(pptx.ShapeType.rect, { x: 0.7, y: 5.05, w: 0.6, h: 0.02, fill: { color: hairlineColor }, line: { color: hairlineColor } });
  if (d.autor || g.autor) s.addText(d.autor || g.autor, { x: 0.7, y: 5.3, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 22, color: surf.fg });
  if (d.fecha || g.fecha) s.addText(d.fecha || g.fecha, { x: 0.7, y: 5.65, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 22, color: surf.meta });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxAgenda(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  s.addText(d.eyebrow || 'AGENDA', { x: 0.7, y: 1.2, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: surf.meta, charSpacing: 2 });
  s.addText(richWithHighlights(d.titular || 'Agenda', { fontFace: FONT_SERIF, fontSize: 56, color: surf.fg }, d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark')),
    { x: 0.7, y: 1.7, w: 12, h: 0.9 });
  const items = [];
  for (let i = 1; i <= 6; i++) if (d['item' + i]) items.push(d['item' + i]);
  const active = parseInt(d.activo || '1', 10);
  items.forEach((it, i) => {
    const y = 3.1 + i * 0.6;
    const numColor = (i + 1 === active) ? COLOR_YELLOW : (surf.fg === COLOR_DARK ? '777777' : COLOR_GREY);
    s.addText(String(i + 1).padStart(2, '0'), { x: 0.7, y, w: 1, h: 0.5, fontFace: FONT_SERIF, fontSize: 28, color: numColor });
    s.addText(it, { x: 1.8, y, w: 10, h: 0.5, fontFace: FONT_SANS, fontSize: 24, color: surf.fg });
  });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxManifiesto(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const useYellow = d.fondo !== 'oscuro' && d.fondo !== 'claro';
  const bg = useYellow ? COLOR_YELLOW : (d.fondo === 'claro' ? 'FAFAFA' : COLOR_DARK);
  const fg = useYellow || d.fondo === 'claro' ? COLOR_DARK : COLOR_LIGHT_TEXT;
  s.background = { color: bg };
  addTopMetaPptx(s, g, useYellow ? '444444' : COLOR_GREY, d);
  const mode = useYellow ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark');
  const raw = (d.titular || d.frase || '').replace(/\s+/g, ' ').trim();
  // Scale font by content length. With the fallback font (no DM Serif Display installed),
  // each glyph is ~1.3× wider than intended, so we size conservatively to avoid overflow.
  const len = raw.length;
  const size = len < 30 ? 80 : len < 60 ? 64 : len < 100 ? 52 : 42;
  // F3 hilo griego: stamp opcional encima del titular. Letras sueltas (≤3 chars) se
  // renderizan como anchor grande serif italic estilo hero; frases largas mantienen el
  // stamp sans pequeño que ya teníamos.
  const griegoManif = (d.griego || d.subtitular_griego || '').trim();
  const griegoIsAnchor = griegoManif.length > 0 && griegoManif.length <= 3;
  const griegoColor = useYellow ? '444444' : (d.fondo === 'claro' ? '666666' : COLOR_GREY);
  if (griegoManif) {
    if (griegoIsAnchor) {
      s.addText(griegoManif, { x: 0.7, y: 0.8, w: 11.9, h: 1.6, fontFace: FONT_SERIF, fontSize: 80, color: griegoColor, italic: true });
    } else {
      s.addText(griegoManif, { x: 0.7, y: 1.0, w: 11.9, h: 0.5, fontFace: FONT_SANS, fontSize: 20, color: griegoColor, charSpacing: 2 });
    }
  }
  const titleY = griegoManif ? (griegoIsAnchor ? 2.5 : 1.7) : 1.2;
  const titleH = griegoManif ? (griegoIsAnchor ? 4.0 : 4.8) : 5.3;
  // Pattern Magnify Design System slide 29: titular serif REGULAR (no italic global). Solo el
  // highlight `[palabra]` activa italic + fondo amarillo (lo aplica richWithHighlights).
  s.addText(richWithHighlights((d.titular || d.frase || ''), { fontFace: FONT_SERIF, fontSize: size, color: fg }, mode),
    { x: 0.7, y: titleY, w: 11.9, h: titleH, valign: 'middle', align: 'left' });
  fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, useYellow ? '444444' : COLOR_GREY);
}

function buildPptxStatHero(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  // Pattern Magnify Design System slide 18: layout VERTICAL CENTRADO horizontalmente.
  // Eyebrow gris top → número italic amarillo gigante centro → descripción serif blanco → fuente sans gris.
  const mode = d.fondo === 'amarillo' ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark');
  const num = (d.numero || '0').toString();
  const suf = (d.sufijo || '').toString();
  const longSuf = suf.length > 3 || /\s/.test(suf);
  const numColor = d.fondo === 'amarillo' ? COLOR_DARK : COLOR_YELLOW;
  if (d.eyebrow) s.addText(d.eyebrow, { x: 0.7, y: 1.5, w: PPTX_W - 1.4, h: 0.4, fontFace: FONT_SANS, fontSize: 18, color: surf.meta, charSpacing: 2, align: 'center' });
  if (longSuf) {
    const statSize = num.length <= 3 ? 150 : 110;
    s.addText(num, { x: 0.7, y: 2.3, w: PPTX_W - 1.4, h: 2.2, fontFace: FONT_SERIF, fontSize: statSize, color: numColor, italic: true, align: 'center', valign: 'middle' });
    s.addText(suf, { x: 0.7, y: 4.5, w: PPTX_W - 1.4, h: 0.5, fontFace: FONT_SANS, fontSize: 22, color: numColor, align: 'center' });
  } else {
    const statText = num + suf;
    const statSize = statText.length <= 3 ? 150 : statText.length <= 5 ? 120 : 95;
    s.addText(statText, { x: 0.7, y: 2.3, w: PPTX_W - 1.4, h: 2.5, fontFace: FONT_SERIF, fontSize: statSize, color: numColor, italic: true, align: 'center', valign: 'middle' });
  }
  const descLen = (d.descripcion || '').length;
  const descSize = descLen < 80 ? 36 : descLen < 140 ? 28 : 22;
  s.addText(richWithHighlights(d.descripcion || '', { fontFace: FONT_SERIF, fontSize: descSize, color: surf.fg }, mode),
    { x: 0.7, y: 5.2, w: PPTX_W - 1.4, h: 0.9, align: 'center', valign: 'top' });
  if (d.fuente) s.addText(d.fuente, { x: 0.7, y: 6.2, w: PPTX_W - 1.4, h: 0.4, fontFace: FONT_SANS, fontSize: 18, color: surf.meta, align: 'center' });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxFramework(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  // Pattern Magnify Design System slide 25: titular grande arriba, hairline amarilla sobre
  // cada step, número italic amarillo grande, label uppercase BLANCO, descripción sans blanco.
  s.addText(richWithHighlights(d.titular || '', { fontFace: FONT_SERIF, fontSize: 44, color: surf.fg }, d.fondo === 'amarillo' ? 'yellow' : 'dark'),
    { x: 0.7, y: 1.0, w: 12, h: 0.9 });
  const steps = [];
  for (let i = 1; i <= 4; i++) {
    const lbl = d[`paso${i}_label`] || d[`paso${i}_etiqueta`] || '';
    const desc = d[`paso${i}_titulo`] || d[`paso${i}_descripcion`] || '';
    if (lbl || desc) steps.push({ i, lbl, desc });
  }
  const four = steps.length >= 4;
  const colW = four ? 2.9 : 3.9;
  const colGap = four ? 0.2 : 0.3;
  const numSize = four ? 72 : 96;
  const descSize = four ? 16 : 20;
  const lineColor = d.fondo === 'amarillo' ? COLOR_DARK : COLOR_YELLOW;
  steps.forEach((st, idx) => {
    const x = 0.7 + idx * (colW + colGap);
    s.addShape(pptx.ShapeType.line, { x, y: 3.0, w: colW, h: 0, line: { color: lineColor, width: 1 } });
    s.addText(String(st.i).padStart(2, '0'), { x, y: 3.15, w: colW, h: 1.4, fontFace: FONT_SERIF, fontSize: numSize, color: lineColor, italic: true });
    if (st.lbl) s.addText(st.lbl, { x, y: 4.55, w: colW, h: 0.3, fontFace: FONT_SANS, fontSize: 14, color: surf.fg, charSpacing: 2, bold: true });
    s.addText(st.desc, { x, y: 4.85, w: colW, h: 1.5, fontFace: FONT_SANS, fontSize: descSize, color: surf.fg });
  });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxImgGeneric(pptx, d, g, n, tot, imgKey, textBuilder) {
  const s = pptx.addSlide();
  s.background = { color: COLOR_DARK };
  const src = uploadedImages[d[imgKey]];
  // `ajuste: contain` preserva la imagen completa con letterbox (útil para treemaps
  // 2:1, infografías portrait, etc.). Default cover llena el frame cropeando lo que sobre.
  const fit = (d.imagen_ajuste || d.ajuste || d.fit || 'cover').toLowerCase() === 'contain' ? 'contain' : 'cover';
  if (src) s.addImage({ data: src, x: 0, y: 0, w: PPTX_W, h: PPTX_H, sizing: { type: fit, w: PPTX_W, h: PPTX_H } });
  else s.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PPTX_W, h: PPTX_H, fill: { color: '1a1a1a' }, line: { color: '1a1a1a' } });
  // Dark scrim bar at bottom for text readability
  s.addShape(pptx.ShapeType.rect, { x: 0, y: 4.5, w: PPTX_W, h: 3, fill: { color: '000000', transparency: 35 }, line: { color: '000000' } });
  textBuilder(s);
  addTopMetaPptx(s, g, 'CCCCCC', d);
  // Skip brand icon on full-bleed image slides — it would sit on top of caption text.
  addPaginator(s, n, tot, 'CCCCCC');
}

function buildPptxImagenFull(pptx, d, g, n, tot) {
  // Cuando ajuste=contain la imagen puede llegar hasta el borde inferior sin recortar.
  // El overlay tradicional pisaría el contenido central, así que en contain movemos
  // texto a una banda dedicada arriba (y ocupa 5.6 abajo para imagen). En cover
  // mantenemos overlay clásico con scrim (ya viene del buildPptxImgGeneric).
  // B22: respetar fondo:claro|amarillo|oscuro (antes hardcoded a COLOR_DARK).
  // B24: si no hay eyebrow+titular y no se pide overlay_texto:si → la imagen ocupa el slide
  // completo sin banda ni scrim, mismo criterio que el preview HTML.
  const fit = (d.imagen_ajuste || d.ajuste || d.fit || 'cover').toLowerCase() === 'contain' ? 'contain' : 'cover';
  const surf = surfaceBg(d, true);
  const hasOverlayContent = (d.eyebrow && String(d.eyebrow).trim()) || (d.titular && String(d.titular).trim());
  const noOverlay = d.overlay_texto === 'no' || d.overlay === 'no' || !hasOverlayContent;
  const src = uploadedImages[d.imagen];
  if (noOverlay) {
    const s = pptx.addSlide();
    s.background = { color: surf.bg };
    if (src) s.addImage({ data: src, x: 0, y: 0, w: PPTX_W, h: PPTX_H, sizing: { type: fit, w: PPTX_W, h: PPTX_H } });
    else s.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PPTX_W, h: PPTX_H, fill: { color: '1a1a1a' }, line: { color: '1a1a1a' } });
    addTopMetaPptx(s, g, surf.meta, d);
    surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
    addPaginator(s, n, tot, surf.meta);
    return;
  }
  if (fit === 'contain') {
    const s = pptx.addSlide();
    s.background = { color: surf.bg };
    // Banda de texto arriba (0 a 1.7), imagen contain abajo.
    if (d.eyebrow) s.addText(d.eyebrow, { x: 0.7, y: 0.45, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: surf.meta, charSpacing: 2 });
    s.addText(richWithHighlights((d.titular || '').replace(/\n/g, '\n'), { fontFace: FONT_SERIF, fontSize: 42, color: surf.fg }, surf.bg === COLOR_YELLOW ? 'yellow' : (surf.bg === COLOR_DARK ? 'dark' : 'light')),
      { x: 0.7, y: 0.85, w: 12, h: 0.9 });
    if (src) s.addImage({ data: src, x: 0.4, y: 1.9, w: PPTX_W - 0.8, h: 5.2, sizing: { type: 'contain', w: PPTX_W - 0.8, h: 5.2 } });
    addTopMetaPptx(s, g, surf.meta, d);
    surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
    addPaginator(s, n, tot, surf.meta);
    return;
  }
  buildPptxImgGeneric(pptx, d, g, n, tot, 'imagen', (s) => {
    if (d.eyebrow) s.addText(d.eyebrow, { x: 0.7, y: 5, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: 'FFFFFF', charSpacing: 2 });
    s.addText(richWithHighlights((d.titular || '').replace(/\n/g, '\n'), { fontFace: FONT_SERIF, fontSize: 52, color: 'FFFFFF' }, 'dark'),
      { x: 0.7, y: 5.5, w: 12, h: 1.6 });
  });
}

function buildPptxImagenSplit(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  const src = uploadedImages[d.imagen];
  const rev = d.posicion === 'derecha';
  const panelW = 6.665;
  const imgX = rev ? panelW : 0, txtX = rev ? 0.7 : 7;
  // imagen_ajuste: contain → la imagen se ve entera con aire (retratos verticales).
  // Default cover llena el panel pero recorta. Coincide con el preview HTML.
  const ajuste = (d.imagen_ajuste || d.ajuste || 'cover').toLowerCase();
  const sizingType = ajuste === 'contain' ? 'contain' : 'cover';
  // imagen_zoom (10-100): reduce el tamaño visual de la imagen dentro del panel.
  // Default 100 = ocupa todo el panel. Útil para retratos que dominan visualmente.
  const zoomRaw = parseFloat(d.imagen_zoom || d.zoom);
  const zoom = (!isNaN(zoomRaw) && zoomRaw >= 10 && zoomRaw <= 100) ? zoomRaw / 100 : 1;
  // Pinta fondo neutral detrás SIEMPRE que haya contain o zoom < 100 (para evitar franjas).
  const needsPad = sizingType === 'contain' || zoom < 1;
  if (needsPad) {
    const padBg = surf.bg === COLOR_YELLOW ? COLOR_YELLOW : (surf.bg === 'FAFAFA' ? 'FAFAFA' : COLOR_DARK);
    s.addShape(pptx.ShapeType.rect, { x: imgX, y: 0, w: panelW, h: PPTX_H, fill: { color: padBg }, line: { color: padBg } });
  }
  // Calcula posición y tamaño de la imagen aplicando zoom (centrada en el panel).
  const imgW = panelW * zoom;
  const imgH = PPTX_H * zoom;
  const ix = imgX + (panelW - imgW) / 2;
  const iy = (PPTX_H - imgH) / 2;
  if (src) s.addImage({ data: src, x: ix, y: iy, w: imgW, h: imgH, sizing: { type: sizingType, w: imgW, h: imgH } });
  else s.addShape(pptx.ShapeType.rect, { x: imgX, y: 0, w: panelW, h: PPTX_H, fill: { color: '2a2a2a' }, line: { color: '2a2a2a' } });
  // Banda amarilla vertical separando imagen de texto (igual estética que diptych).
  const bandX = rev ? 6.625 : 6.625;
  s.addShape(pptx.ShapeType.rect, { x: bandX, y: 0, w: 0.04, h: PPTX_H, fill: { color: COLOR_YELLOW }, line: { color: COLOR_YELLOW } });
  if (d.eyebrow) s.addText(d.eyebrow, { x: txtX, y: 2.2, w: 5.5, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: surf.meta, charSpacing: 2 });
  s.addText(richWithHighlights((d.titular || '').replace(/\n/g, '\n'), { fontFace: FONT_SERIF, fontSize: 36, color: surf.fg }, 'dark'),
    { x: txtX, y: 2.7, w: 5.5, h: 1.6 });
  if (d.cuerpo) s.addText(d.cuerpo.replace(/\n/g, '\n'), { x: txtX, y: 4.4, w: 5.5, h: 1.6, fontFace: FONT_SANS, fontSize: 22, color: surf.fg });
  // F3 hilo griego: italic serif tenue debajo del cuerpo. Coherente con hero/manifiesto.
  const griegoSplit = d.griego || d.subtitular_griego || '';
  if (griegoSplit) s.addText(griegoSplit, { x: txtX, y: 5.9, w: 5.5, h: 0.5, fontFace: FONT_SERIF, fontSize: 20, color: surf.meta, italic: true });
  addTopMetaPptx(s, g, surf.meta, d);
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxDiptych(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  s.background = { color: COLOR_DARK };
  // Layout pattern Magnify Design System slide 2/5: imagen ~80% top, caption ~20% bottom
  // SIN línea amarilla separadora (el contraste de la propia imagen y caption ya los delimita).
  // Label amarillo pequeño + title italic serif.
  const imgH = 6.0;
  const capY = 6.0;
  const capH = 1.5;

function buildPptxCtaFinal(pptx, d, g, n, tot) {

  const fg = useYellow || d.fondo === 'claro' ? COLOR_DARK : COLOR_LIGHT_TEXT;
  s.background = { color: bg };
  addTopMetaPptx(s, g, useYellow ? '444444' : COLOR_GREY, d);
  const qrSrc = uploadedImages[(d.qr || '').trim()];
  const withQr = !!(d.qr && d.qr.trim());
  const mode = useYellow ? 'yellow' : (d.fondo === 'claro' ? 'light' : 'dark');
  if (withQr) {
    // QR tamaño configurable (F2): pequeño 2.4" / medio 3" / grande 5.3". Default: medio.
    const qrSize = (d.qr_size || 'medio').toLowerCase().trim();
    const qrDim = qrSize === 'grande' ? 5.3 : qrSize === 'pequeño' || qrSize === 'pequeno' ? 2.4 : 3;
    const qrX = 1, qrY = (7.5 - qrDim) / 2;
    const txtX = qrX + qrDim + 0.5;
    const txtW = 13.33 - txtX - 0.7;
    if (qrSrc) s.addImage({ data: qrSrc, x: qrX, y: qrY, w: qrDim, h: qrDim, sizing: { type: 'contain', w: qrDim, h: qrDim } });
    else s.addShape(pptx.ShapeType.rect, { x: qrX, y: qrY, w: qrDim, h: qrDim, fill: { color: 'FFFFFF' }, line: { color: fg, width: 2, dashType: 'dash' } });
    const titleFS = qrSize === 'grande' ? 48 : 60;
    if (d.eyebrow) s.addText(d.eyebrow, { x: txtX, y: qrY, w: txtW, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: fg, charSpacing: 2 });
    s.addText(richWithHighlights((d.titular || '').replace(/\n/g, '\n'), { fontFace: FONT_SERIF, fontSize: titleFS, color: fg }, mode),
      { x: txtX, y: qrY + 0.5, w: txtW, h: 2.2, valign: 'top' });
    if (d.contacto) s.addText(d.contacto.replace(/\n/g, '\n'), { x: txtX, y: qrY + qrDim - 0.7, w: txtW, h: 1.2, fontFace: FONT_SANS, fontSize: 20, color: fg });
  } else {
    if (d.eyebrow) s.addText(d.eyebrow, { x: 0.7, y: 2, w: 12, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: fg, charSpacing: 2, align: 'center' });
    s.addText(richWithHighlights((d.titular || '').replace(/\n/g, '\n'), { fontFace: FONT_SERIF, fontSize: 84, color: fg }, mode),
      { x: 0.7, y: 2.7, w: 12, h: 2.8, align: 'center', valign: 'middle' });
    if (d.contacto) s.addText(d.contacto.replace(/\n/g, '\n'), { x: 0.7, y: 5.8, w: 12, h: 0.8, fontFace: FONT_SANS, fontSize: 20, color: fg, align: 'center' });
  }
  fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, useYellow ? '444444' : COLOR_GREY);
}

function buildPptxStatsCharla(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  if (d.titular) s.addText(richWithHighlights(d.titular, { fontFace: FONT_SERIF, fontSize: 40, color: surf.fg }, 'dark'),
    { x: 0.7, y: 1.1, w: 12, h: 0.9 });
  // hi semántico: si/negativo = rojo, positivo = amarillo realzado (B11).
  const hiColor = (v) => {
    const x = (v || '').toLowerCase().trim();
    if (['si', 'yes', 'true', 'negativo', 'neg', '1'].includes(x)) return 'D32F2F';
    if (['positivo', 'pos', 'ok', 'good'].includes(x)) return COLOR_YELLOW;
    return null;
  };
  const cells = [];
  for (let i = 1; i <= 4; i++) {
    if (d[`num${i}`] || d[`desc${i}`]) {
      cells.push({
        num: d[`num${i}`] || '',
        lbl: d[`label${i}`] || '',
        desc: d[`desc${i}`] || '',
        hi: hiColor(d[`hi${i}`])
      });
    }
  }
  const layout = (d.layout || '').toLowerCase();
  const cols = cells.length === 3 ? 3 : (cells.length === 4 && (layout === '2x2' || !layout.includes('x')) ? 2 : (cells.length >= 4 ? 4 : 2));
  const rows = Math.ceil(cells.length / cols);
  // Geometría: reservamos y:6.7-7.0 para la fuente (.src). El grid nunca se mete ahí.
  // En 2x2 antes las celdas ocupaban hasta y:6.9 y la fuente aparecía ENCIMA de las celdas
  // inferiores. Ahora cellH en 2x2 se reduce a 1.7 para que el grid acabe en y:6.4 con aire.
  const gridTop = 2.3;
  const cellH = rows === 1 ? 4.2 : 1.8;
  const rowGap = 0.25;
  const cellW = 11.6 / cols;
  // Pattern Magnify Design System slide 22: hairline horizontal arriba del grid + número
  // italic amarillo + label uppercase BLANCO (no amarillo) + descripción gris.
  s.addShape(pptx.ShapeType.line, { x: 0.7, y: gridTop - 0.15, w: 11.6, h: 0, line: { color: surf.fg === COLOR_DARK ? '333333' : 'CCCCCC', width: 0.75 } });
  const numSize = cols === 4 ? 56 : (cols === 3 ? 80 : 96);
  const labelColor = surf.fg;
  cells.forEach((c, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 0.7 + col * cellW;
    const y = gridTop + row * (cellH + rowGap);
    const numColor = c.hi || (surf.fg === COLOR_DARK ? COLOR_YELLOW : COLOR_YELLOW);
    s.addText(c.num, { x, y, w: cellW - 0.3, h: cellH * 0.55, fontFace: FONT_SERIF, fontSize: numSize, color: numColor, italic: true });
    if (c.lbl) s.addText(c.lbl.toUpperCase(), { x, y: y + cellH * 0.62, w: cellW - 0.3, h: 0.3, fontFace: FONT_SANS, fontSize: 14, color: labelColor, charSpacing: 2, bold: true });
    if (c.desc) s.addText(c.desc, { x, y: y + cellH * 0.78, w: cellW - 0.3, h: cellH * 0.22, fontFace: FONT_SANS, fontSize: 14, color: surf.meta });
  });
  // Fuente desplazada a la derecha del monograma (x:1.3) para no solaparse con él.
  if (d.fuente) s.addText(d.fuente, { x: 1.3, y: 6.95, w: 9, h: 0.3, fontFace: FONT_SANS, fontSize: 20, color: surf.meta });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxCitasGrid(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  // Pattern Magnify Design System slide 20: titular grande arriba, grid de celdas con barra
  // vertical del MISMO color que el texto (no amarilla), autor en uppercase letterspaced gris.
  if (d.titular) s.addText(richWithHighlights(d.titular, { fontFace: FONT_SERIF, fontSize: 44, color: surf.fg }, 'dark'),
    { x: 0.7, y: 1.0, w: 12, h: 0.9 });
  const cells = [];
  for (let i = 1; i <= 6; i++) if (d[`cita${i}`]) cells.push({ q: d[`cita${i}`], who: d[`autor${i}`] || '' });
  const cols = cells.length > 4 ? 3 : 2;
  const rows = Math.ceil(cells.length / cols);
  const cellW = 11.6 / cols;
  const cellH = rows === 1 ? 4 : 1.9;
  const qSize = cols === 3 ? 16 : 20;
  const barColor = surf.fg;
  cells.forEach((c, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 0.7 + col * cellW;
    const y = 2.5 + row * (cellH + 0.4);
    s.addShape(pptx.ShapeType.rect, { x, y, w: 0.03, h: cellH, fill: { color: barColor }, line: { color: barColor } });
    s.addText(c.q.replace(/\n/g, '\n'), { x: x + 0.25, y, w: cellW - 0.4, h: cellH * 0.75, fontFace: FONT_SERIF, fontSize: qSize, color: surf.fg, italic: true });
    if (c.who) s.addText(c.who.toUpperCase(), { x: x + 0.25, y: y + cellH * 0.82, w: cellW - 0.4, h: 0.3, fontFace: FONT_SANS, fontSize: 12, color: surf.meta, charSpacing: 2, bold: true });
  });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxRecursos(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const surf = surfaceBg(d, true);
  s.background = { color: surf.bg };
  addTopMetaPptx(s, g, surf.meta, d);
  if (d.titular) s.addText(richWithHighlights(d.titular, { fontFace: FONT_SERIF, fontSize: 36, color: surf.fg }, 'dark'),
    { x: 0.7, y: 1.3, w: 12, h: 0.7 });
  const cats = [];
  for (let c = 1; c <= 4; c++) {
    const head = d[`cat${c}_titulo`];
    if (!head) continue;
    const items = [];
    for (let i = 1; i <= 6; i++) {
      if (d[`cat${c}_item${i}`]) {
        items.push({ text: d[`cat${c}_item${i}`], link: d[`cat${c}_item${i}_link`] || null });
      }
    }
    cats.push({ head, items });
  }
  const cols = Math.max(cats.length, 1);
  const colW = 11.6 / cols;
  cats.forEach((c, i) => {
    const x = 0.7 + i * colW;
    s.addText(c.head.toUpperCase(), { x, y: 2.4, w: colW - 0.3, h: 0.4, fontFace: FONT_SANS, fontSize: 20, color: COLOR_YELLOW, charSpacing: 2, bold: true });
    s.addShape(pptx.ShapeType.rect, { x, y: 2.9, w: colW - 0.3, h: 0.02, fill: { color: COLOR_YELLOW, transparency: 60 }, line: { color: COLOR_YELLOW } });
    const rich = [];
    c.items.forEach((it, k) => {
      const parts = it.text.split(/\s+[—–|-]\s+/);
      // pptxgenjs: hyperlink en options.hyperlink activa el enlace en PDF/online.
      // Mantenemos el subrayado implícito via `underline` para indicar visualmente el link sin romper estética.
      // pptxgenjs aplica color azul + subrayado por defecto al hyperlink. Para mantener
      // estética editorial Magnify (texto color del fondo + subrayado amarillo tenue, NO azul-link),
      // pasamos el color DENTRO de hyperlink.color. Si no, ignora el color exterior.
      const ulColor = surf.fg === COLOR_DARK ? '0A0A0A' : 'FAFAFA';
      const mkLink = (color) => it.link ? { hyperlink: { url: it.link, color }, underline: { style: 'sng', color: ulColor } } : {};
      if (parts.length >= 2) {
        rich.push({ text: parts[0], options: { bold: true, fontSize: 20, color: surf.fg, fontFace: FONT_SANS, breakLine: false, ...mkLink(surf.fg) } });
        rich.push({ text: '\n' + parts.slice(1).join(' — '), options: { fontSize: 20, color: surf.meta, fontFace: FONT_SANS, breakLine: true, ...mkLink(surf.meta) } });
      } else {
        rich.push({ text: it.text, options: { fontSize: 20, color: surf.fg, fontFace: FONT_SANS, breakLine: true, ...mkLink(surf.fg) } });
      }
      if (k < c.items.length - 1) rich.push({ text: '\n', options: { fontSize: 8 } });
    });
    s.addText(rich, { x, y: 3.1, w: colW - 0.3, h: 3.6, valign: 'top' });
  });
  surf.fg === COLOR_DARK ? addBrandIconLt(s, d) : addBrandIcon(s, d);
  addPaginator(s, n, tot, surf.meta);
}

function buildPptxCierre(pptx, d, g, n, tot) {
  const s = pptx.addSlide();
  const dk = d.fondo !== 'claro' && d.fondo !== 'amarillo';
  const bg = dk ? COLOR_DARK : (d.fondo === 'amarillo' ? COLOR_YELLOW : 'FAFAFA');
  const fg = dk ? COLOR_LIGHT_TEXT : COLOR_DARK;
  s.background = { color: bg };
  addTopMetaPptx(s, g, dk ? COLOR_GREY : '666666', d);
  s.addImage({ data: wordmarkDataUri(dk ? '#FAFAFA' : '#0A0A0A'), x: 4, y: 2.5, w: 5.33, h: 0.44 });
  s.addText(d.titular || 'GRACIAS', { x: 0.5, y: 3.3, w: 12.33, h: 0.5, fontFace: FONT_SANS, fontSize: 20, color: dk ? COLOR_GREY : '666666', charSpacing: 8, align: 'center' });
  if (d.contacto) s.addText(d.contacto.replace(/\n/g, '\n'), { x: 0.7, y: 5.5, w: 6, h: 1.5, fontFace: FONT_SANS, fontSize: 22, color: fg });
}

function generatePresentacion(raw, preview, renderC) {
  const { global, sections } = parseMultiDoc(raw);
  if (sections.length === 0) { toast('A\u00f1ade al menos un slide separado por ---'); return; }

  // Toggle global de paginación. Acepta varios valores off-ish para ser permisivo.
  const pagVal = (global.paginacion || global.numeracion || '').toString().toLowerCase().trim();
  PS_PAGINATION_ENABLED = !['no', 'off', 'false', '0', 'none'].includes(pagVal);

  const slides = [];
  // Count valid slides first so renderers can emit N / total pagination.
  const valid = sections.filter(s => PS_RENDERERS[(s.slide || '').toLowerCase().trim()]);
  const tot = valid.length;
  valid.forEach((s, idx) => {
    const key = (s.slide || '').toLowerCase().trim();
    const fn = PS_RENDERERS[key];
    slides.push({ key, data: s, html: fn(s, global, idx + 1, tot) });
  });

  if (slides.length === 0) { toast('Ning\u00fan slide reconocido. Usa slide: portada/divisor/contenido/etc.'); return; }

  // Non-blocking validations against the 12 canonical rules.
  showWarnings(validatePresentacion(valid, global));
  showStats(statsPresentacion(valid));

  const w = 1920, h = 1080;
  const maxW = Math.max(preview.clientWidth - 80, 400);
  const colW = Math.max((maxW - 32) / 2, 200);
  const scale = Math.max(Math.min(colW / w, 0.4), 0.1);

  slides.forEach((sl, i) => {
    const actualDiv = document.createElement('div');
    actualDiv.innerHTML = sl.html;
    renderC.appendChild(actualDiv);
    renderedFrames.push(actualDiv.querySelector('.frame'));

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.style.width = (w * scale) + 'px';
    card.style.height = (h * scale) + 'px';
    card.style.marginTop = '32px';
    card.innerHTML = `<div class="slide-label">${String(i + 1).padStart(2, '0')} \u00b7 ${sl.key}</div>` + sl.html;
    const inner = card.querySelector('.frame');
    inner.style.transform = `scale(${scale})`;
    inner.style.transformOrigin = 'top left';
    preview.appendChild(card);
  });
}

async function exportPptx() {
  const raw = document.getElementById('content').value.trim();
  const { global, sections } = parseMultiDoc(raw);
  if (!window.PptxGenJS) { toast('pptxgenjs no cargado'); return; }
  // Honor el toggle de paginación también al exportar, por si el usuario exporta sin haber
  // pulsado Generar Preview antes (el flag se setea en ambos caminos).
  const pagVal = (global.paginacion || global.numeracion || '').toString().toLowerCase().trim();
  PS_PAGINATION_ENABLED = !['no', 'off', 'false', '0', 'none'].includes(pagVal);
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';
  pptx.title = global.titulo || 'Presentacion Magnify';
  pptx.author = global.autor || 'Magnify';

  // Wrap addSlide to capture a reference to the last slide so we can attach speaker notes
  const origAddSlide = pptx.addSlide.bind(pptx);
  let lastSlide = null;
  pptx.addSlide = function(...args) {
    lastSlide = origAddSlide(...args);
    return lastSlide;
  };

  sections.forEach(s => {
    const key = (s.slide || '').toLowerCase().trim();
    const fn = PS_BUILDERS[key];
    if (!fn) return;
    fn(pptx, s, global);
    // Speaker notes: any `notas:` field on the slide (also accept `notes:` alias)
    const notas = s.notas || s.notes || '';
    if (notas && lastSlide && typeof lastSlide.addNotes === 'function') {
      lastSlide.addNotes(notas);
    }
  });

  const slug = (global.titulo || 'presentacion').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  await pptx.writeFile({ fileName: `magnify-presentacion-${slug}.pptx` });
  toast('\u2713 PPTX descargado');
}

// PDF de presentaci\u00f3n: rasteriza cada slide 1920x1080 con html2canvas y arma un PDF landscape.
// Funciona como backup universal (Keynote/PowerPoint pueden no renderizar igual en cualquier m\u00e1quina;
// el PDF es el fallback que s\u00ed garantiza render fiel).
async function exportPresentacionPdf() {
  if (!renderedFrames || renderedFrames.length === 0) {
    toast('Genera el preview primero');
    return;
  }
  if (!window.jspdf || !window.html2canvas) {
    toast('jsPDF/html2canvas no cargados');
    return;
  }
  toast('Generando PDF (esto puede tardar varios segundos)\u2026');
  try {
    const { jsPDF } = window.jspdf;
    const SLIDE_W = 1920, SLIDE_H = 1080;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [SLIDE_W, SLIDE_H], compress: true });
    for (let i = 0; i < renderedFrames.length; i++) {
      // scale:1 ya es 1:1 con la slide real (1920x1080). Suficiente para PDF de pantalla y proyeccion.
      // JPEG @0.92 mantiene calidad fotografica con tamano razonable.
      const canvas = await html2canvas(renderedFrames[i], { scale: 1, useCORS: true, backgroundColor: '#0A0A0A', logging: false });
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      if (i > 0) pdf.addPage([SLIDE_W, SLIDE_H], 'landscape');
      pdf.addImage(dataUrl, 'JPEG', 0, 0, SLIDE_W, SLIDE_H, undefined, 'FAST');
    }
    const raw = document.getElementById('content').value.trim();
    const { global } = parseMultiDoc(raw);
    const slug = (global.titulo || 'presentacion').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    pdf.save(`magnify-presentacion-${slug}.pdf`);
    toast('\u2713 PDF descargado');
  } catch (e) {
    console.error(e);
    toast('Error al generar PDF: ' + (e && e.message ? e.message : String(e)));
  }
}

  el.classList.add('show');
}
function clearError() {

}
function showWarnings(items) {
  const el = document.getElementById('warn');
  if (!items || !items.length) { el.classList.remove('show'); el.innerHTML = ''; return; }
  el.innerHTML = '<strong>Avisos de diseño</strong><ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  el.classList.add('show');
}
function clearWarnings() {
  const el = document.getElementById('warn');
  el.classList.remove('show');
  el.innerHTML = '';
}
function showStats(parts) {

}
