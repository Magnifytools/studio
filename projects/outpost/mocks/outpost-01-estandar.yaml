titular: AI Overviews lleva un año estable.
cuerpo: |
  Las marcas que aparecen citadas en AI Overviews no coinciden con las que ocupan top 1-3 orgánico. Solapamiento parcial, no total. La pelea por aparecer en SERPs y la pelea por aparecer en respuestas de IA no son el mismo trabajo.

---
slide: standard
eyebrow: '[SEÑAL_02]'
titular: ChatGPT y Perplexity citan consenso, no on-page.
cuerpo: |
  Cuando se les pregunta por una recomendación de producto, citan a las marcas más mencionadas en foros, prensa y discurso público. La autoridad no se está midiendo en backlinks. Se está midiendo en presencia narrativa.

---
slide: standard
eyebrow: '[SEÑAL_03]'
titular: Tracking de menciones en LLMs, como métrica nueva.
cuerpo: |
  Las SEO tools la integran como métrica nueva, no como derivada del posicionamiento. Eso ya es una pista. Si fuera lo mismo, lo derivarían. La tratan como métrica nueva porque saben que es un eje distinto.

